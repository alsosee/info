name: Fringe
description: >
  FBI Special Agent Olivia Dunham is assigned to the bureau's Fringe Division, where she investigates cases involving "fringe science" such as telepathy, levitation, invisibility, and reanimation. To help her, she recruits an eccentric, formerly institutionalized scientist, Dr. Walter Bishop, and his estranged son, Peter Bishop. Together, they uncover a global conspiracy known as "The Pattern" and a brewing conflict between parallel universes.
