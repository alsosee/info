name: Friends
description: >
  The first season introduces six young friends living in Manhattan: runaway bride Rachel Green, chef Monica Geller, masseuse Phoebe Buffay, actor Joey Tribbiani, office worker Chandler Bing, and paleontologist Ross Geller. As Rachel starts over with Monica and the group, the season follows their early jobs, relationships, family complications, and Ross's lingering feelings for Rachel.
