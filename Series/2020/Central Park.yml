episodes:
  - name: Episode One
    description: >
      Birdie introduces the Tillerman-Hunter family, Bitsy Brandenham, and the competing dreams that tie all of them to Central Park.
    released: 2020-05-29
    directors: Gavin Dell
    writers:
      - Loren Bouchard
      - Nora Smith
      - Regina Hicks
  - name: Skater's Circle
    description: >
      Owen tries to resolve a conflict with Central Park's skaters while Molly and Cole look for a way to see Shampagne again.
    released: 2020-05-29
    directors: Corey Barnes
    writers: Halsted Sullivan
  - name: Hat Luncheon
    description: >
      Owen prepares for a major park luncheon as Paige investigates a funding vote and Molly tries to reconnect with Brendan.
    released: 2020-06-05
    directors: Ian Hamilton
    writers: Chuck Tatham
  - name: Garbage Ballet
    description: >
      A garbage crisis hits the park while Paige feels sick at home and Molly deals with the fallout from her kiss with Brendan.
    released: 2020-06-12
    directors: Gavin Dell
    writers: Monica Padrick
  - name: Dog Spray Afternoon
    description: >
      Bitsy hires a tagger to deface the park while Paige keeps digging into suspicious real estate purchases.
    released: 2020-06-19
    directors: Joel Moser
    writers:
      - Annie Levine
      - Jonathan Emerson
  - name: Rival Busker
    description: >
      A new narrator takes over for Birdie as Owen and Cole follow an owl cam and Paige continues investigating Bitsy from the hotel.
    released: 2020-06-26
    directors: Corey Barnes
    writers: Sanjay Shah
  - name: Squirrel, Interrupted
    description: >
      Cole prepares for a Central Park scavenger hunt based on his favorite book series while Molly spends time playing chess with Paige.
    released: 2020-07-03
    directors: "Mario D'Anna"
    writers: Jeff Drake
  - name: Hot Oven
    description: >
      Molly invites Brendan to dinner, forcing her to navigate his family connection to Bitsy as Owen obsesses over homemade pizza.
    released: 2020-07-10
    directors: Corey Barnes
    writers: Rachel Hastings
  - name: Live It Up Tonight
    description: >
      Bitsy sends an auditor after Owen while Molly and Cole attend a pop-culture tour and Owen and Paige try to salvage a date night.
    released: 2020-07-17
    directors: "Mario D'Anna"
    writers: Syreeta Singleton
  - name: A Fish Called Snakehead
    description: >
      Owen investigates a possible invasive snakehead fish in the Harlem Meer as Bitsy tries to use the story for her own campaign.
    released: 2020-07-24
    directors: Corey Barnes
    writers: Mark Alton Brown
