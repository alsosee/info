name: Industry
description: >
  Young graduates compete for a limited number of permanent positions at Pierpoint & Co.,
  a prestigious investment bank in London, navigating the cutthroat world of international
  finance where the boundaries between colleague, friend, lover, and enemy blur.
released: 2020-11-09
rating: TV-MA
genres:
  - drama
  - financial thriller
network: HBO
wikipedia: https://en.wikipedia.org/wiki/Industry_(TV_series)
imdb: https://www.imdb.com/title/tt7671070/episodes/?season=1
