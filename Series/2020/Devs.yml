name: Devs
description: >
  Software engineer Lily Chan investigates the secretive Devs division of
  Amaya, a Silicon Valley quantum computing company, after her boyfriend
  disappears on his first day with the team. The limited series follows her
  search for answers while Amaya's founder Forest pursues technology that
  challenges ideas of free will, determinism, and grief.
