episodes:
  - name: The Black Market Car
    description: >
      Lake hides from the Reflection Police and meets Jesse after a visit to a
      busy market car.
    released: 2020-01-06
    length: 11m
    writers: Justin Michael
  - name: The Family Tree Car
    description: >
      Lake and Jesse climb through a living family tree car while their
      disagreement changes the world around them.
    released: 2020-01-06
    length: 11m
    writers: Lindsay Katai
  - name: The Map Car
    description: >
      Jesse and Lake try to complete a map car while Jesse begins confronting
      how he lets others make choices for him.
    released: 2020-01-07
    length: 11m
    writers: Alex Horab
  - name: The Toad Car
    description: >
      The group is trapped in a blank room with a toad as Jesse learns more
      about Lake's fugitive status.
    released: 2020-01-07
    length: 11m
    writers: Justin Michael
  - name: The Parasite Car
    description: >
      Lake and Jesse search for a way to help Alan Dracula after a parasite
      begins affecting him.
    released: 2020-01-08
    length: 11m
    writers: Justin Michael
  - name: The Lucky Cat Car
    description: >
      The Cat runs a carnival where Lake and Jesse must win access to the exit
      door.
    released: 2020-01-08
    length: 11m
    writers: Lindsay Katai
  - name: The Mall Car
    description: >
      Grace introduces Jesse to the Apex, a group of passengers with dangerous
      beliefs about the train.
    released: 2020-01-09
    length: 11m
    writers: Alex Horab
  - name: The Wasteland
    description: >
      Lake and Alan Dracula are forced outside the train while the Reflection
      Police continue their pursuit.
    released: 2020-01-09
    length: 11m
    writers: Lindsay Katai
  - name: The Tape Car
    description: >
      Jesse searches for a way back to the train and Lake looks for proof that
      she has her own identity.
    released: 2020-01-10
    length: 11m
    writers: Alex Horab
  - name: The Number Car
    description: >
      Lake, Jesse, and Alan Dracula face the rules of the train and the mirror
      world as they try to leave together.
    released: 2020-01-10
    length: 11m
    writers: Justin Michael
