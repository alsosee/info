name: "Luther, Season 5"
description: >
  A new wave of gruesome murders in London leads DCI John Luther to suspect a killer 
  with a twisted psychological motive. While hunting the murderer, Luther is also 
  confronted by the shock return of Alice Morgan, whose presence complicates his 
  investigation and forces him to face a final, deadly confrontation with old and 
  new enemies.
