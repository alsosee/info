episodes:
  - name: In the Beginning
    description: Aziraphale and Crowley, who have been watching over Earth since the Garden of Eden, learn that the Antichrist has been born and must be found before the end of the world begins.
    released: 2019-05-31
    length: 52m
    imdb: https://www.imdb.com/title/tt7091742/
    directors: Douglas Mackinnon
    writers: Neil Gaiman

  - name: The Book
    description: After realizing they have been watching the wrong child for eleven years, Aziraphale and Crowley use the prophecies of Agnes Nutter to track down the real Antichrist in the English village of Tadfield.
    released: 2019-05-31
    length: 57m
    imdb: https://www.imdb.com/title/tt8172156/
    directors: Douglas Mackinnon
    writers: Neil Gaiman

  - name: Hard Times
    description: A series of flashbacks spanning thousands of years reveals the origins of Aziraphale and Crowley's unlikely friendship, while Agnes Nutter's descendant arrives in Tadfield with a warning.
    released: 2019-05-31
    length: 58m
    imdb: https://www.imdb.com/title/tt8172158/
    directors: Douglas Mackinnon
    writers: Neil Gaiman

  - name: Saturday Morning Funtime
    description: Heaven and Hell move to take direct control of the situation, placing new pressure on Aziraphale and Crowley, while the Antichrist's growing powers begin to reshape reality around Tadfield.
    released: 2019-05-31
    length: 57m
    imdb: https://www.imdb.com/title/tt8071704/
    directors: Douglas Mackinnon
    writers: Neil Gaiman

  - name: The Doomsday Option
    description: With only hours remaining before Armageddon, Aziraphale and Crowley each race toward the military airbase where the Four Horsemen of the Apocalypse are gathering.
    released: 2019-05-31
    length: 53m
    imdb: https://www.imdb.com/title/tt8172160/
    directors: Douglas Mackinnon
    writers: Neil Gaiman

  - name: The Very Last Day of the Rest of Their Lives
    description: The Four Horsemen assemble and the armies of Heaven and Hell converge on the airbase as the final confrontation over humanity's fate begins.
    released: 2019-05-31
    length: 55m
    imdb: https://www.imdb.com/title/tt8172162/
    directors: Douglas Mackinnon
    writers: Neil Gaiman
