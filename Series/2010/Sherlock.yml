  In modern-day London, consulting detective Sherlock Holmes and former army doctor John Watson become flatmates at 221B Baker Street and begin solving baffling cases for Scotland Yard. The first series introduces their partnership, Sherlock's deductive methods, and the unseen criminal network testing him from the shadows.
