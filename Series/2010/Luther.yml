name: Luther
description: >
  DCI John Luther is a brilliant but emotionally impulsive detective who returns to the Serious Crime Unit after a traumatic breakdown. 
  As he tracks down a variety of serial killers, he develops a complex, cat-and-mouse relationship with Alice Morgan, a brilliant 
  murderer he knows is guilty but cannot prove it.
