name: Billions
description: >
  A high-stakes drama set in the world of New York high finance, focusing on the collision between two titan figures.
  Ruthless, blue-blooded U.S. Attorney Chuck Rhoades and brilliant, self-made hedge fund king Bobby "Axe" Axelrod
  engage in a complex game of cat-and-mouse as they use their vast power, influence, and legal maneuvering to destroy each other.
