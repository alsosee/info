name: "How I Met Your Mother"
description: >
  The season introduces Ted Mosby in the year 2030 as he tells his children the story of how he met their mother. The narrative begins in 2005, following 27-year-old architect Ted as he navigates life and love in Manhattan. After his best friend Marshall Eriksen proposes to Lily Aldrin, Ted becomes determined to find his own soul mate. He soon meets and falls for Robin Scherbatsky, an ambitious reporter, while his friend Barney Stinson encourages his bachelor lifestyle.
