name: The Office
description: >
  A documentary crew follows the employees of Dunder Mifflin's Scranton branch as regional manager Michael Scott tries to present his workplace as a happy, well-run office.
  The first season introduces Michael's awkward management style, Jim Halpert's pranks on Dwight Schrute, Pam Beesly's role at reception, and temp Ryan Howard's view of the office's daily absurdities.
