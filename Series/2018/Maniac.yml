characters:
  - name: Annie Landsberg
    actor: Emma Stone
    description: A woman with borderline personality disorder who dwells unhealthily on her past relationships and the death of her sister.
  - name: Owen Milgrim
    actor: Jonah Hill
    description: The son of a wealthy family who potentially has schizophrenia and struggles to find his own path.
  - name: Dr. James K. Mantleray
    actor: Justin Theroux
    description: The eccentric scientist who originally designed the pharmaceutical trial.
  - name: Dr. Azumi Fujita
    actor: Sonoya Mizuno
    description: A scientist who runs the experiment and feels immense pressure to deliver results.
  - name: Porter Milgrim
    actor: Gabriel Byrne
    description: Owen's wealthy and influential father.
  - name: Dr. Greta Mantleray
    actor: Sally Field
    description: A famous therapist and James's mother; she also provides the voice and personality for the supercomputer GRTA.
