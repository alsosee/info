name: Maniac
description: >
  Two strangers, Annie Landsberg and Owen Milgrim, connect during a mind-bending pharmaceutical trial conducted by Neberdine Pharmaceutical Biotech. Set in a retro-future New York City, the trial involves three pills designed to "repair" the mind, leading participants through shared hallucinations and vivid dream sequences where they must confront their internal struggles and past traumas.
