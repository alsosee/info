name: "Marvel's Agent Carter"
description: >
  In 1946, Peggy Carter balances administrative work for the Strategic Scientific Reserve (SSR) in New York City with secret missions for Howard Stark, who has been framed for selling his deadliest weapons to enemies of the United States. While navigating the sexism of post-WWII America, Peggy investigates a mysterious organization known as Leviathan.
