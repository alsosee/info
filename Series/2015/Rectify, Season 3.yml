name: "Rectify, Season 3"
description: >
  With Daniel's plea deal accepted, he faces a deadline to leave Georgia while
  Daggett keeps digging into the old case and the people around Daniel reckon
  with the damage left behind. Amantha, Tawney, Teddy, and Janet each confront
  what Daniel's exile means for their own lives.
