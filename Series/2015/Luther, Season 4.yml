name: "Luther, Season 4"
description: >
  Living a reclusive life on the edge of the coast, Luther is pulled back to London 
  by news of a cannibalistic serial killer whose crimes are baffling the police. 
  At the same time, he receives information about the mysterious disappearance of 
  Alice Morgan, leading him to investigate a dangerous criminal underworld.
