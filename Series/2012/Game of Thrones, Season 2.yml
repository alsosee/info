name: "Game of Thrones, Season 2"
description: >
  The second season of the fantasy drama television series Game of Thrones focuses on the War of the Five Kings,
  with various factions vying for the Iron Throne following the death of King Robert Baratheon.
  While Tyrion Lannister serves as acting Hand of the King, Robb Stark continues his northern rebellion,
  and Stannis Baratheon begins his own campaign for the crown.
