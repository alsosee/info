name: Invincible
description: >
  Teenager Mark Grayson begins to develop superpowers inherited from his father Nolan,
  who is secretly Omni-Man, the world's most powerful superhero. As Mark builds his own
  identity as a crime-fighting hero, he uncovers dark truths about the people sworn to
  protect Earth.
released: 2021-03-25
rating: TV-MA
genres:
  - superhero
  - action
  - adventure
  - science fiction
network: Prime Video
wikipedia: https://en.wikipedia.org/wiki/Invincible_(TV_series)
imdb: https://www.imdb.com/title/tt6741278
tmdb: https://www.themoviedb.org/tv/95557-invincible/season/1
rotten_tomatoes: https://www.rottentomatoes.com/tv/invincible/s01
creators:
  - Robert Kirkman
  - Simon Racioppa
characters:
  - name: Mark Grayson / Invincible
    voice: Steven Yeun
  - name: Nolan Grayson / Omni-Man
    voice: J.K. Simmons
  - name: Debbie Grayson
    voice: Sandra Oh
  - name: Samantha Eve Wilkins / Atom Eve
    voice: Gillian Jacobs
  - name: Amber Bennett
    voice: Zazie Beetz
  - name: William Clockwell
    voice: Andrew Rannells
episodes:
  - name: "It's About Time"
    description: >
      Mark Grayson finally develops superpowers inherited from his father Omni-Man and
      begins training to become a superhero under his guidance.
    released: 2021-03-25
    length: 51m
    imdb: https://www.imdb.com/title/tt9691152
    directors: Robert Valley
    writers: Robert Kirkman
  - name: Here Goes Nothing
    description: >
      With his father sidelined, Invincible joins the Teen Team to defend Earth against an
      inter-dimensional invasion by a relentless alien force called the Flaxans.
    released: 2021-03-25
    length: 48m
    imdb: https://www.imdb.com/title/tt9691174
    directors: Paul Furminger
    writers: Simon Racioppa
  - name: "Who You Calling Ugly?"
    description: >
      Mark struggles to balance school and heroics while Robot sets out to recruit a new
      team of teenage superheroes.
    released: 2021-03-25
    length: 45m
    imdb: https://www.imdb.com/title/tt9691178
    directors: Jeff Allen
    writers: Chris Black
  - name: "Neil Armstrong, Eat Your Heart Out"
    description: >
      Mark volunteers for a mission to Mars to assist a struggling human colony, embarking
      on his first adventure beyond Earth.
    released: 2021-04-01
    length: 48m
    directors: Cory Evans
    writers: Ryan Ridley
  - name: That Actually Hurt
    description: >
      Mark faces increasingly dangerous battles as Invincible while trying to keep up with
      school and his relationship with Amber.
    released: 2021-04-08
    length: 50m
    directors: Jay Baker
    writers: Christine Lavaf
  - name: You Look Kinda Dead
    description: >
      Mark visits a college campus with William and Amber, while troubling questions about
      Omni-Man's past begin to surface.
    released: 2021-04-15
    length: 48m
    directors: Paul Furminger
    writers: Curtis Gwinn
  - name: We Need to Talk
    description: >
      Mark seeks advice from Atom Eve as long-held secrets within the superhero community
      begin to come to light.
    released: 2021-04-22
    length: 52m
    imdb: https://www.imdb.com/title/tt9691186
    directors: Vinton Heuck
    writers: Simon Racioppa
  - name: Where I Really Come From
    description: >
      Mark is forced to confront the truth about his father's origins and the real reason
      Omni-Man came to Earth.
    released: 2021-04-29
    length: 48m
    imdb: https://www.imdb.com/title/tt9691188
    directors: William Ruzicka
    writers: Robert Kirkman
