name: WandaVision
description: >
  Wanda Maximoff and Vision live an idyllic suburban life in Westview, New Jersey, as their world shifts through decades of American sitcom styles.
  When outside investigators notice strange signals from the town, the mystery around Wanda and Vision's reality begins to deepen.
