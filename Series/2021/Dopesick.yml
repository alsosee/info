episodes:
  - name: First Bottle
    description: >
      Richard Sackler launches a powerful new painkiller as a rural doctor, a coal miner, a DEA agent, and federal prosecutors first encounter OxyContin's growing reach.
    released: 2021-10-13
    length: 1h2m
    imdb: https://www.imdb.com/title/tt12536068
    directors: Barry Levinson
    writers: Danny Strong
  - name: Breakthrough Pain
    description: >
      OxyContin reaches the market, Purdue's influence extends into Finch Creek, Bridget pushes beyond her DEA authority, and the criminal investigation begins.
    released: 2021-10-13
    length: 1h2m
    imdb: https://www.imdb.com/title/tt12536074
    directors: Barry Levinson
    writers: Danny Strong
  - name: The 5th Vital Sign
    description: >
      Finnix tries to taper Betsy off OxyContin, Bridget sees the drug's impact on communities, and Rick and Randy investigate pain societies tied to Purdue's marketing.
    released: 2021-10-13
    length: 57m
    imdb: https://www.imdb.com/title/tt12536076
    directors: Michael Cuesta
    writers:
      - Danny Strong
      - Beth Macy
  - name: Pseudo-Addiction
    description: >
      Reports of OxyContin abuse threaten Purdue's sales, prosecutors examine a central marketing claim, and Finnix begins to question the drug's safety.
    released: 2021-10-20
    length: 1h1m
    imdb: https://www.imdb.com/title/tt12536086
    directors: Michael Cuesta
    writers: Jessica Mecklenburg
  - name: The Whistleblower
    description: >
      Bridget pressures Purdue over addiction and abuse, Rick and Randy search for an insider witness, and Finnix and Betsy struggle with OxyContin dependence.
    released: 2021-10-27
    length: 1h3m
    imdb: https://www.imdb.com/title/tt12536088
    directors: Patricia Riggen
    writers:
      - Danny Strong
      - Benjamin Rubin
  - name: Hammer the Abusers
    description: >
      Richard Sackler faces a challenge to Purdue's business, Bridget brings her fight to the FDA, Finnix reassesses his life, and Rick and Randy find new evidence.
    released: 2021-11-03
    length: 1h
