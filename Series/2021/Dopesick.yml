name: Dopesick
description: >
  Dopesick follows doctors, patients, prosecutors, regulators, and Purdue Pharma executives as OxyContin spreads through American communities and draws federal scrutiny.
  Inspired by Beth Macy's nonfiction book, the limited series traces the human and institutional failures behind the opioid crisis.
