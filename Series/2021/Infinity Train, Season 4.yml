episodes:
  - name: The Twin Tapes
    description: >
      Ryan and Min-Gi's friendship and musical ambitions lead them onto the
      train after their plans pull them in different directions.
    released: 2021-04-15
    length: 11m
    writers: Justin Michael
  - name: The Iceberg Car
    description: >
      Ryan and Min-Gi wake in a glacier-filled car, meet Kez, and learn that
      their numbers are linked.
    released: 2021-04-15
    length: 11m
    writers: Lindsay Katai
  - name: The Old West Car
    description: >
      Kez leads Ryan and Min-Gi into an Old West car where her past mistakes
      quickly catch up with the group.
    released: 2021-04-15
    length: 11m
    writers: Alex Horab
  - name: The Pig Baby Car
    description: >
      The group enters a giant kitchen car and tries to satisfy Pig Baby while
      Ryan and Min-Gi argue over who must change.
    released: 2021-04-15
    length: 11m
    writers: Lindsay Katai
  - name: The Astro Queue Car
    description: >
      Ryan and Min-Gi wait in a surreal line for a club while their different
      ways of handling problems frustrate each other.
    released: 2021-04-15
    length: 11m
    writers: Alex Horab
  - name: The Party Car
    description: >
      Ryan and Min-Gi prepare to perform in a party car while Kez tries to fit
      in with old friends.
    released: 2021-04-15
    length: 11m
    writers: Justin Michael
  - name: The Art Gallery Car
    description: >
      An art gallery car amplifies Ryan and Min-Gi's unresolved resentments as
      Kez tries to keep them together.
    released: 2021-04-15
    length: 11m
    writers: Alex Horab
  - name: The Mega Maze Car
    description: >
      Kez guides Ryan and Min-Gi through a maze toward her home while several
      denizens pursue them.
    released: 2021-04-15
    length: 11m
    writers: Justin Michael
  - name: The Castle Car
    description: >
      Ryan and Min-Gi meet Morgan in Kez's castle home and learn more about
      why Kez avoids apologizing.
    released: 2021-04-15
    length: 11m
    writers: Lindsay Katai
  - name: The Train to Nowhere
    description: >
      Ryan, Min-Gi, and Kez face the consequences of their choices as the
      season's conflicts converge in the castle.
    released: 2021-04-15
    length: 11m
    writers: Alex Horab
