episodes:
  - name: "Never Meet Your Heroes"
    description: >
      A young Kate Bishop witnesses the Battle of New York and is inspired by Hawkeye.
      Years later, Clint Barton is in New York City for Christmas when Kate stumbles into danger at a black-market auction of Avengers artifacts.
