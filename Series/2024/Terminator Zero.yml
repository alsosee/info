episodes:
  - name: Model 101
    description: >
      In a devastated 2022, Eiko receives a mission from the Resistance while
      Malcolm Lee focuses on building Kokoro in an alternate 1997 Japan.
    released: 2024-08-29
    directors: Mineo Ōe
    writers: Mattson Tomlin
  - name: Model 102
    description: >
      Eiko and a Terminator arrive in 1997 as Malcolm debates Kokoro and his
      children wander into danger.
    released: 2024-08-29
    directors: Haruka Tanaka
    writers: Mattson Tomlin
  - name: Model 103
    description: >
      Malcolm tries to persuade Kokoro that humanity deserves protection while
      Eiko, Misaki, and the Lee children evade the machine hunting them.
    released: 2024-08-29
    directors: Shigeki Hatakeyama
    writers: Mattson Tomlin
  - name: Model 104
    description: >
      Eiko and Reika run from the police, Misaki takes the boys to a station,
      and Malcolm faces the choice of whether to activate Kokoro.
    released: 2024-08-29
    directors: Tomomi Takeuchi
    writers: Mattson Tomlin
  - name: Model 105
    description: >
      Kokoro's launch changes the balance of power in Japan as the Lee children
      and their protectors struggle to regroup.
    released: 2024-08-29
    directors: Shigeki Hatakeyama
    writers: Mattson Tomlin
  - name: Model 106
    description: >
      The Prophet explains the rules of time travel to Eiko while Malcolm
      reflects on loss and the children head toward Cat Town.
    released: 2024-08-29
    directors: Mineo Ōe
    writers: Mattson Tomlin
  - name: Model 107
    description: >
      Malcolm's hidden history with machines comes into focus as the Terminator
      uses Kenta to draw him out.
    released: 2024-08-29
    directors: Haruka Tanaka
    writers: Mattson Tomlin
  - name: Model 108
    description: >
      Eiko, Malcolm, Kokoro, and the Lee children converge as the Terminator
      presses Kenta toward a decision about the future.
    released: 2024-08-29
    directors:
      - Masashi Kudō
      - Yuta Maruyama
    writers: Mattson Tomlin
