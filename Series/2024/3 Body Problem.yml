episodes:
  - name: Countdown
    description: >
      In 1966 China, Ye Wenjie witnesses her father's murder. In 2024 London,
      detective Da Shi investigates a string of scientist suicides.
    released: 2024-03-21
  - name: Red Coast
    description: >
      Auggie's countdown forces her to halt her nanotech research. A flashback
      reveals Ye Wenjie's fateful decision at the Red Coast base.
    released: 2024-03-21
  - name: Destroyer of Worlds
    description: >
      Jin and Jack Rooney race to solve a complex VR game's riddle, revealing
      the true nature of an alien civilization.
    released: 2024-03-21
  - name: Our Lord
    description: >
      Investigators uncover an extremist organization that worships the San-Ti
      as their "Lord."
    released: 2024-03-21
  - name: Judgment Day
    description: >
      Wade and Auggie execute a brutal mission using nanofibers to retrieve
      vital data. The world receives an ominous message.
    released: 2024-03-21
  - name: The Stars Our Destination
    description: >
      As global panic sets in, Thomas Wade gathers the world's top minds to
      form a defense against the incoming fleet.
    released: 2024-03-21
  - name: Only Advance
    description: >
      The group faces ethical dilemmas over the Staircase Project while Will
      Downing makes a monumental choice.
    released: 2024-03-21
  - name: Wallfacer
    description: >
      The UN launches the Wallfacer Project, appointing three individuals to
      develop secret defense plans.
    released: 2024-03-21
