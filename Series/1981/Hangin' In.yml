name: "Hangin' In"
description: >
  A Canadian comedy-drama series set at a youth drop-in centre in Toronto, where director Kate Brown
  and her small staff help teenagers navigate real counselling problems.
  The show launched the careers of many young Canadian actors who appeared as guest clients of the centre.
