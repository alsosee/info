episodes:
  - name: One Year Later
    description: >
      Cassian leads an undercover mission to steal a starfighter prototype
      while scattered allies navigate new threats across the galaxy and the
      Empire tightens its grip on the mineral-rich world of Ghorman.
    released: 2025-04-22
    length: 51m
    wikipedia: https://en.wikipedia.org/wiki/One_Year_Later_(Andor)
    directors: Ariel Kleiman
    writers: Tony Gilroy
  - name: Sagrona Teema
    description: >
      Cassian finds himself trapped in a dangerous standoff between rival rebel
      factions, while allies on Coruscant and Chandrila navigate political
      complications and growing Imperial suspicions.
    released: 2025-04-22
    length: 44m
    wikipedia: https://en.wikipedia.org/wiki/Sagrona_Teema
    directors: Ariel Kleiman
    writers: Tony Gilroy
  - name: Harvest
    description: >
      Multiple storylines converge on a single pivotal day as personal
      milestones across Chandrila, Mina-Rau, and the wider galaxy collide
      with mounting danger.
    released: 2025-04-22
    length: 53m
    wikipedia: https://en.wikipedia.org/wiki/Harvest_(Andor)
    directors: Ariel Kleiman
    writers: Tony Gilroy
  - name: "Ever Been to Ghorman?"
    description: >
      A year has passed. Cassian and Bix settle into life on Coruscant between
      missions, while Syril embeds himself in Ghorman's local resistance
      movement under Imperial orders.
    released: 2025-04-29
    length: 54m
    wikipedia: https://en.wikipedia.org/wiki/Ever_Been_to_Ghorman
    directors: Ariel Kleiman
    writers: Beau Willimon
  - name: I Have Friends Everywhere
    description: >
      Cassian travels to Ghorman under a cover identity to make contact with
      the local rebel cell, as operatives on multiple fronts pursue their
      missions under mounting pressure.
    released: 2025-04-29
    length: 54m
    wikipedia: https://en.wikipedia.org/wiki/I_Have_Friends_Everywhere
    directors: Ariel Kleiman
    writers: Beau Willimon
  - name: What a Festive Evening
    description: >
      Rebel operatives converge on a high-society event for a dangerous
      intelligence extraction as multiple storylines across the galaxy reach
      a turning point.
    released: 2025-04-29
    length: 55m
    wikipedia: https://en.wikipedia.org/wiki/What_a_Festive_Evening
    directors: Ariel Kleiman
    writers: Beau Willimon
  - name: Messenger
    description: >
      Cassian is recruited for a critical mission on Ghorman while the
      planet's local resistance debates its next move against Imperial
      control of its resources.
    released: 2025-05-06
    length: 44m
    wikipedia: https://en.wikipedia.org/wiki/Messenger_(Andor)
    directors: Janus Metz
    writers: Dan Gilroy
  - name: "Who Are You?"
    description: >
      Imperial forces move against civilian protesters on Ghorman, pushing
      multiple characters toward direct confrontation amid rising chaos.
    released: 2025-05-06
    length: 44m
    wikipedia: https://en.wikipedia.org/wiki/Who_Are_You%3F_(Andor)
    directors: Janus Metz
    writers: Dan Gilroy
  - name: Welcome to the Rebellion
    description: >
      Senator Mon Mothma takes a decisive public stand against the Empire,
      triggering a tense extraction operation as Cassian races to get her
      out of Coruscant.
    released: 2025-05-06
    length: 58m
    wikipedia: https://en.wikipedia.org/wiki/Welcome_to_the_Rebellion
    directors: Janus Metz
    writers: Dan Gilroy
  - name: Make It Stop
    description: >
      The focus shifts to Luthen Rael and Kleya Marki, exploring their shared
      past and the ties that bind them as they face a pivotal test of their
      partnership.
    released: 2025-05-13
    length: 48m
    wikipedia: https://en.wikipedia.org/wiki/Make_It_Stop_(Andor)
    directors: Alonso Ruizpalacios
    writers: Tom Bissell
  - name: "Who Else Knows?"
    description: >
      The Empire closes in on the Rebellion's secrets, forcing Dedra Meero to
      answer for a security breach while Cassian's team mounts an unauthorized
      rescue mission on Coruscant.
    released: 2025-05-13
    length: 42m
    wikipedia: https://en.wikipedia.org/wiki/Who_Else_Knows%3F
    directors: Alonso Ruizpalacios
    writers: Tom Bissell
  - name: "Jedha, Kyber, Erso"
    description: >
      Cassian is dispatched on a mission that will set the stage for the events
      of Rogue One as the Rebellion grapples with critical intelligence about
      the Empire's ultimate weapon.
    released: 2025-05-13
    length: 46m
    wikipedia: https://en.wikipedia.org/wiki/Jedha,_Kyber,_Erso
    directors: Alonso Ruizpalacios
    writers: Tom Bissell
