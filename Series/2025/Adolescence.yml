episodes:
  - name: Episode 1
    description: >
      Police raid the Miller home and arrest 13-year-old Jamie on suspicion
      of murdering a female classmate; his father Eddie accompanies him as
      appropriate adult through the initial interrogation.
    released: 2025-03-13
  - name: Episode 2
    description: >
      Detectives visit Jamie's school to investigate the circumstances of
      the crime, examining his relationships, online activity, and the
      social dynamics surrounding the victim.
    released: 2025-03-13
  - name: Episode 3
    description: >
      Seven months after the arrest, forensic psychologist Briony Ariston
      meets with Jamie to assess his mental state and understand the factors
      that shaped his worldview.
    released: 2025-03-13
  - name: Episode 4
    description: >
      A year after the murder, the Miller family faces the ongoing
      consequences of Jamie's case on their relationships, community
      standing, and understanding of their son.
    released: 2025-03-13
