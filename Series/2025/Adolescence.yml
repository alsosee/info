name: Adolescence
description: >
  When a 13-year-old schoolboy is arrested for the murder of a female
  classmate, his family, therapist, and the detective leading the
  investigation are left searching for answers. Shot in a single
  continuous take per episode, the series examines online radicalization,
  toxic masculinity, and the hidden lives of adolescent boys.
released: 2025-03-13
rating: TV-MA
genres:
