episodes:
  - name: Pilot
    description: >
      A documentary crew discovers the Toledo Truth Teller, a historic
      Midwestern newspaper where Ned Sampson begins work as editor-in-chief.
    released: 2025-09-04
    length: 32m
    directors: Greg Daniels
    writers:
      - Greg Daniels
      - Michael Koman
  - name: The Five W's
    description: >
      Ned pushes his volunteer newsroom into the field after Esmeralda forces
      the staff to scramble for stories.
    released: 2025-09-04
    length: 27m
    directors: Ken Kwapis
    writers:
      - Greg Daniels
      - Michael Koman
  - name: Buddy and the Dude
    description: >
      Ned joins Mare on a consumer sting story after Esmeralda tries to unsettle
      him about Mare's future at the paper.
    released: 2025-09-04
    length: 30m
    directors: Yana Gorskaya
    writers:
      - Patrick Kang
      - Michael Levin
  - name: TTT vs the Blogger
    description: >
      Ned and Esmeralda clash with a popular high school blogger while Mare and
      Oscar cover a teacher's final production.
    released: 2025-09-04
    length: 27m
    directors: Paul Lieberstein
    writers: Amanda Rosenberg
  - name: Scam Alert!
    description: >
      Ned pursues a dating-app scam story and discovers that Esmeralda may be
      personally connected to the case.
    released: 2025-09-04
    length: 28m
    directors: Tazbah Chavez
    writers: Mo Welch
  - name: Churnalism
    description: >
      Ned rejects Esmeralda's advertorial plan and assigns the newsroom to test
      products themselves for a review feature.
    released: 2025-09-04
    length: 30m
    directors: Jason Woliner
    writers: Eric Rahill
  - name: I Love You
    description: >
      Marv's temporary presence in the newsroom brings the staff's unresolved
      feelings about workplace authority to the surface.
    released: 2025-09-04
    length: 29m
    directors: Jennifer Celotta
    writers: Alex Edelman
  - name: Church and State
    description: >
      Mare uncovers a story that puts the Truth Teller at odds with its parent
      company while Ned confronts embarrassment over his past.
    released: 2025-09-04
    length: 26m
    directors: Matt Sohn
    writers: Ben Philippe
  - name: Matching Ponchos
    description: >
      Ned and Mare take a road trip to investigate a possible cult leader while
      Ken tries to repair a public-relations problem.
    released: 2025-09-04
    length: 29m
    directors: Dave Rogers
    writers: L.E. Correia
  - name: The Ohio Journalism Awards
    description: >
      The Truth Teller attends the Ohio Journalism Awards as Ned tries to hide
      how much he wants the paper's work to be recognized.
    released: 2025-09-04
    length: 30m
    directors: Jeffrey Blitz
    writers: Paul Lieberstein
