name: Severance
subtitle: Season 2
description: >
  Mark leads a team of office workers whose memories have been surgically
  divided between their work and personal lives. In the second season, the
  consequences of the "Overtime Contingency" ripple through both worlds as Mark
  and his team attempt to reunite and uncover the deeper, more sinister truths
  behind Lumon Industries.
