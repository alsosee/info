name: The Studio
description: >
  Matt Remick is the newly appointed head of the floundering film production
  company Continental Studios. A self-described cinephile, Matt struggles to
  balance Continental's corporate aims in an increasingly intellectual
  property-driven entertainment landscape with his own ambition to produce
  films.
released: 2025-03-26
rating: TV-MA
genres:
  - comedy
  - satire
network: Apple TV+
wikipedia: https://en.wikipedia.org/wiki/The_Studio_(TV_series)
