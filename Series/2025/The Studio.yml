episodes:
  - name: The Promotion
    description: >
      Matt Remick is promoted to studio head at Continental Studios and must
      reluctantly greenlight a movie based on the Kool-Aid Man to satisfy the
      new CEO.
    released: 2025-03-26
  - name: The Oner
    description: >
      Matt and Sal visit a film set to witness a complex single-take shot,
      but Matt's attempts to be helpful lead to a series of ruined takes.
    released: 2025-03-26
  - name: The Note
    description: >
      The team struggles with how to tell director Ron Howard that a sequence
      in his new film needs to be cut.
    released: 2025-04-02
  - name: The Missing Reel
    description: >
      When a crucial reel from Olivia Wilde's overbudget movie goes missing,
      Matt and Sal go on a frantic search to find it.
    released: 2025-04-09
  - name: The War
    description: >
      Sal and Quinn's professional rivalry turns into a series of petty
      sabotages as they compete over which director to hire.
    released: 2025-04-16
  - name: The Pediatric Oncologist
    description: >
      Matt attends a high-society fundraiser with his girlfriend and finds
      himself defending the cultural significance of his studio's low-brow
      comedies.
    released: 2025-04-23
  - name: Casting
    description: >
      The production of the Kool-Aid movie faces challenges regarding racial
      representation in casting and the controversial use of AI animation.
    released: 2025-04-30
  - name: The Golden Globes
    description: >
      During the Golden Globe Awards, Matt becomes obsessed with receiving a
      public thank-you from a director.
    released: 2025-05-07
  - name: CinemaCon
    description: >
      In Las Vegas for a major industry event, the team's plans are
      complicated by the threat of a studio sale.
    released: 2025-05-14
  - name: The Presentation
    description: >
      The team must overcome their various states of intoxication and
      personal crises to deliver a triumphant presentation at CinemaCon.
    released: 2025-05-21
