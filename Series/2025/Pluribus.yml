episodes:
  - name: We Is Us
    description: >
      As the "Others" begin to transform Albuquerque, Carol Sturka discovers
      her immunity and the unsettling happiness of her neighbors.
    released: 2025-11-07
    length: 56m
  - name: Pirate Lady
    description: >
      Carol attempts to navigate the new social order while searching for a
      way to contact other survivors.
    released: 2025-11-07
    length: 63m
  - name: Grenade
    description: >
      A confrontation with a group of "Others" leads to a surprising
      revelation about the virus's limitations.
    released: 2025-11-14
    length: 43m
  - name: Please, Carol
    description: >
      The hive mind makes a personal plea to Carol, offering her the same
      contentment it has given the rest of the world.
    released: 2025-11-21
    length: 46m
  - name: Got Milk
    description: >
      Carol's struggle for basic resources in a world that no longer values
      individual needs reaches a breaking point.
    released: 2025-11-26
    length: 46m
  - name: HDP
    description: >
      A high-stakes mission into the center of the "Others'" local hub reveals
      the true scale of the Joining.
    released: 2025-12-05
    length: 50m
  - name: The Gap
    description: >
      Carol finds a temporary sanctuary but realizes that the hive mind's
      influence is spreading faster than she thought.
    released: 2025-12-12
    length: 46m
  - name: Charm Offensive
    description: >
      The "Others" launch a new strategy to win over the remaining immune
      individuals through subtle psychological pressure.
    released: 2025-12-19
    length: 43m
  - name: La Chica o El Mundo
    description: >
      In the season finale, Carol must make a choice between her own survival
      and a potential cure for the world.
    released: 2025-12-26
    length: 57m
