name: Pluribus
description: >
  Set in Albuquerque, New Mexico, an extraterrestrial virus transforms
  humanity into a peaceful, content, and unnervingly happy hive mind known
  as "the Others." Carol Sturka, a miserable historical romance novelist, is
  one of only 13 people in the world immune to the virus and must find a way
  to reverse the infection.
released: 2025-11-07
rating: TV-MA
genres:
  - science fiction
  - psychological thriller
  - black comedy
network: Apple TV+
wikipedia: https://en.wikipedia.org/wiki/Pluribus_(TV_series)
imdb: https://www.imdb.com/title/tt22135012
tmdb: https://www.themoviedb.org/tv/211534-pluribus
creators: Vince Gilligan
characters:
