episodes:
  - name: This Is What Happens
    description: >
      After being abruptly fired, Coop impulsively steals from a neighbor
      during a party, leading him to consider a criminal path.
    released: 2025-04-11
    directors: Craig Gillespie
    writers: Jonathan Tropper
  - name: Deuce
    description: >
      Coop struggles to sell his stolen goods and finds himself robbing
      another neighbor while dealing with family tensions.
    released: 2025-04-11
    directors: Craig Gillespie
    writers: Jonathan Tropper
  - name: Theoretical Herpes
    description: >
      Coop's criminal activities continue as he witnesses a neighbor's secret
      and attempts a risky heist at Nick's house.
    released: 2025-04-18
    directors: Greg Yaitanes
    writers: Jonathan Tropper
  - name: Literal Dragons
    description: >
      Coop forms an unlikely partnership with Nick's housekeeper Elena, using
      her inside information to carry out a series of robberies.
    released: 2025-04-25
    directors: Greg Yaitanes
    writers: Jamie Rosengard
  - name: This Tourist Has Balls
    description: >
      Under increasing financial pressure, Coop and Elena plan a high-stakes
      art theft.
    released: 2025-05-02
    directors: Greg Yaitanes
    writers:
      - Evan Endicott
      - Josh Stoddard
  - name: The Things You Lost Along the Way
    description: >
      As the police investigate a local death, Coop and Mel spend a day
      reminiscing at Princeton.
    released: 2025-05-09
    directors: Stephanie Laing
    writers: Jennifer Yale
  - name: The First Honest Thing
    description: >
      Following a hospital stay, Coop faces mounting evidence against him as
      the police close in.
    released: 2025-05-16
    directors: Stephanie Laing
    writers: Danielle DiPaolo
  - name: When Did We Become These People?
    description: >
      Out on bail but isolated from his family, Coop confronts the
      consequences of his actions.
    released: 2025-05-23
    directors: Stephanie Laing
    writers: Bryan Parker
  - name: Everything Becomes Symbol and Irony
    description: >
      Facing prison, Coop uncovers the truth behind the crime he's accused of,
      leading to a final confrontation.
    released: 2025-05-30
    directors: Jonathan Tropper
    writers: Jonathan Tropper
