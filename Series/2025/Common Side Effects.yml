name: Common Side Effects
description: >
  Two former high school lab partners, Marshall and Frances, reconnect after
  Marshall discovers the Blue Angel Mushroom — a rare fungus with extraordinary
  healing properties. Together they unravel a conspiracy by pharmaceutical giant
  Reutical and the federal government to suppress the cure from reaching the world.
released: 2025-02-02
rating: TV-MA
genres:
  - animation
  - comedy
  - drama
network: Adult Swim
