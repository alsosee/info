episodes:
  - name: Pilot
    description: >
      Marshall reconnects with his high school lab partner Frances after
      discovering a mysterious mushroom with seemingly miraculous healing
      properties, setting off a chain of dangerous events.
    released: 2025-02-02
    directors: Camille Bozec
    writers:
      - Joe Bennett
      - Steve Hely
  - name: Lakeshore Limited
    description: >
      As word of the mushroom spreads, Marshall finds himself on the run from
      forces determined to suppress its existence.
    released: 2025-02-02
    directors: Sean Buckelew
    writers: Steve Hely
  - name: Hildy
    description: >
      Marshall seeks refuge with Hildy, his former mycology mentor, hoping she
      can help him understand and protect the mushroom.
    released: 2025-02-09
    directors: Vincent Tsui
    writers: Emma Barrie
  - name: Dumpsite
    description: >
      Frances investigates the mushroom's effects while Marshall tries to stay
      one step ahead of the pursuing pharmaceutical agents closing in around them.
    released: 2025-02-16
    directors: Camille Bozec
    writers: Jean Kyoung Frazier
  - name: Star-Tel-Lite
    description: >
      Marshall and Frances attempt to cultivate the mushroom with help from their
      neighbors, unaware of the surveillance tightening around them.
    released: 2025-02-23
    directors: Sean Buckelew
    writers: Dave King
  - name: In the System
    description: >
      Marshall's situation grows more dangerous as he faces legal trouble, while
      Frances struggles with mounting pressure from corporate interests.
    released: 2025-03-02
    directors: Vincent Tsui
    writers: Jon Foor
  - name: Blowfish
    description: >
      Marshall must navigate dangerous new relationships behind bars while
      searching for a way out.
    released: 2025-03-09
    directors: Camille Bozec
    writers: Karey Dornetto
  - name: Amelia & Wyatt
    description: >
      Marshall and Frances each confront difficult truths about their alliance
      and the increasingly high stakes of their mushroom crusade.
    released: 2025-03-16
    directors: Sean Buckelew
    writers: Dan Schofield
  - name: Cliff's Edge
    description: >
      The operation to protect and study the mushroom expands, but so does the
      threat from authorities and corporations determined to shut it down.
    released: 2025-03-23
    directors: Vincent Tsui
    writers: Sophie Kriegel
  - name: Raid
    description: >
      As the season reaches its climax, Marshall and Frances face the full force
      of the conspiracy they have been fighting to expose.
    released: 2025-03-30
    directors: Camille Bozec
    writers: Steve Hely
