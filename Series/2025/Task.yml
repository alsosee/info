name: Task
description: >
  In the working-class suburbs of Philadelphia, FBI special agent Tom Brandis
  leads a task force to investigate a series of violent robberies against
  outlaw motorcycle gang stash houses, while an unassuming family man quietly
  orchestrates the heists from the other side.
