episodes:
  - name: The Signal
    description: After their deep-space freighter is damaged, the stranded crew of the Demeter must fight to survive on a beautiful yet dangerous alien planet.
    released: 2023-10-19
    length: 25m

  - name: The Storm
    description: As a storm rages, Sam and Ursula set out to find the Demeter, while Azi and Levi seek shelter.
    released: 2023-10-19
    length: 27m

  - name: The Wall
    description: While Ursula bears witness to a transformation, Azi struggles with Levi's ever-changing personality as she tries to survive a deadly stampede.
    released: 2023-10-19
    length: 25m

  - name: The Dream
    description: Alone and in pursuit of Sam, Ursula resorts to desperate measures, while Kamen continues his hunt.
    released: 2023-10-26
    length: 25m

  - name: The Demeter
    description: After an encounter with another survivor, Kamen considers the weight of his actions, while Azi experiences a change of heart.
    released: 2023-10-26
    length: 24m

  - name: The Fall
    description: While Ursula faces an all-too-familiar adversary, Azi and Levi find themselves pitted against a formidable new foe.
    released: 2023-10-26
    length: 25m

  - name: The Cure
    description: Facing mounting health issues, Ursula and Azi each find that they are not alone.
    released: 2023-11-02
    length: 25m

  - name: The Nest
    description: While Azi leads Kris, Terrence, and Barry towards her downed ship, Ursula struggles to keep up with an overzealous Sam.
    released: 2023-11-02
    length: 23m

  - name: The Mountain
    description: After reaching an obstacle that seems impossible to cross, Azi must learn to trust Kris and Barry, while Sam navigates treacherous new waters.
    released: 2023-11-02
    length: 26m

  - name: The Decision
    description: In range of the wrecked Demeter, Azi confronts Kris about the ship's remaining survivors, while Sam delivers a devastating truth.
    released: 2023-11-09
    length: 25m

  - name: The Return
    description: As Ursula races to reach the ship, Azi fights to get free and Kamen faces a haunting new vision.
    released: 2023-11-09
    length: 27m

  - name: The Reunion
    description: In a bid to save the surviving crew, Azi and Ursula face off against their greatest threat yet, while a conflicted Barry weighs an important decision.
    released: 2023-11-09
    length: 25m
