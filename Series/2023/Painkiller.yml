name: Painkiller
description: >
  A limited series dramatizing the birth of America's opioid epidemic, following Purdue Pharma's aggressive
  marketing of OxyContin through the eyes of a tenacious federal investigator, a young sales representative,
  and ordinary families whose lives are upended by addiction.
