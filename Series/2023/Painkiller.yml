episodes:
  - name: The One to Start With, The One to Stay With
    description: >
      Richard Sackler bets on an extended-release opioid as a breakthrough painkiller, while a college
      graduate named Shannon joins Purdue's sales force and a factory worker named Glen suffers a workplace injury.
    released: 2023-08-10
    length: 51m
    imdb: https://www.imdb.com/title/tt11835644
    directors: Peter Berg
    writers:
      - Micah Fitzerman-Blue
      - Noah Harpster

  - name: Jesus Gave Me Water
    description: >
      A patient using OxyContin attends a Purdue conference while federal investigator Edie witnesses
      the drug's alarming effects and Richard pushes the company's ambitions further.
    released: 2023-08-10
    length: 47m
    imdb: https://www.imdb.com/title/tt11835646
    directors: Peter Berg
    writers:
      - Micah Fitzerman-Blue
      - Noah Harpster

  - name: Blizzard of the Century
    description: >
      Glen's escalating addiction lands him in the emergency room, while Edie struggles to persuade
      her boss, the US Attorney, to open a case against Purdue Pharma.
    released: 2023-08-10
    length: 42m
    imdb: https://www.imdb.com/title/tt11835648
    directors: Peter Berg
    writers:
      - Will Hettinger
      - Micah Fitzerman-Blue
      - Noah Harpster

  - name: Is Believed
    description: >
      Edie presses forward with her investigation of Purdue, Shannon begins to question her role at
      the company, and Glen's behavior at work becomes increasingly erratic.
    released: 2023-08-10
    length: 45m
    imdb: https://www.imdb.com/title/tt11835704
    directors: Peter Berg
    writers:
      - Boo Killebrew
      - Micah Fitzerman-Blue
      - Noah Harpster

  - name: "Hot! Hot! Hot!"
    description: >
      Glen reaches a breaking point as his addiction spirals, while Edie's investigation turns up
      potentially damning evidence against the pharmaceutical giant.
    released: 2023-08-10
    length: 60m
    imdb: https://www.imdb.com/title/tt11835652
    directors: Peter Berg
    writers:
      - Boo Killebrew
      - Micah Fitzerman-Blue
      - Noah Harpster

  - name: "What's in a Name?"
    description: >
      Edie and her team bring the case against Purdue Pharma to court, while Glen and Shannon each
      face pivotal decisions about the paths their lives will take.
    released: 2023-08-10
    length: 44m
    imdb: https://www.imdb.com/title/tt11835654
    directors: Peter Berg
