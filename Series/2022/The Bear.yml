name: The Bear
description: >
  Carmen "Carmy" Berzatto, a young chef from the fine-dining world, comes home to Chicago to run his family's sandwich shop after a heartbreaking death in his family.
  As he fights to transform both the shop and himself, he works alongside a rough-around-the-edges kitchen crew that ultimately reveal themselves as his chosen family.
