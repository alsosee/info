name: Marco Polo
description: >
  Inspired by the early years of the Italian explorer Marco Polo, the series follows
  his journey to the court of Kublai Khan, the Khagan of the Mongol Empire and
  founder of the Yuan dynasty. As a guest and prisoner in the Khan's court, Marco
  must navigate a world of political intrigue, cultural clashes, and brutal warfare.
released: 2014-12-12
rating: TV-MA
genres:
  - historical drama
  - adventure
network: Netflix
