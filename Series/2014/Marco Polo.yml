episodes:
  - name: The Wayfarer
    description: >
      After three years crossing seas, deserts and the Silk Road, a young Marco Polo
      finds himself a prisoner of the great Kublai Khan.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550500
    directors:
      - Joachim Rønning
      - Espen Sandberg
    writers: John Fusco
  - name: The Wolf and the Deer
    description: >
      Kublai Khan battles his warmonger brother Ariq for rule over Mongolia. Marco
      learns that justice in the Imperial City is swift and deadly.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550502
    directors:
      - Joachim Rønning
      - Espen Sandberg
    writers: John Fusco
  - name: Feast
    description: >
      Marco begins a dangerous relationship with the Blue Princess Kokachin as
      tensions grow between Kublai and the Song chancellor.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550504
    directors: Alik Sakharov
    writers: Michael Chernuchin
  - name: The Fourth Step
    description: >
      As war looms with Xiangyang, Prince Jingim tests his diplomacy while Kublai
      questions Marco's allegiance.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550506
    directors: Alik Sakharov
    writers: Brett Conrad
  - name: Hashshashin
    description: >
      Marco searches for the mastermind behind a murderous plot, while Prince Jingim
      weighs the risks of retaliation.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550508
    directors: Daniel Minahan
    writers: Patrick Macmanus
  - name: White Moon
    description: >
      On the eve of a ceremony, Marco searches for the culprit behind an
      assassination attempt on Kublai Khan.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550510
    directors: Daniel Minahan
    writers: Dave Erickson
  - name: The Scholar's Pen
    description: >
      Marco and Hundred Eyes take on a dangerous mission to infiltrate the walled
      city of Xiangyang.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550512
    directors: David Petrarca
    writers: Michael Chernuchin
  - name: Rendering
    description: >
      When Kublai sets his sights on taking Xiangyang, Marco's allegiance is tested.
      Kokachin reveals her true identity.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550514
    directors: John Maybury
    writers: Brett Conrad
  - name: Prisoners
    description: >
      Marco is imprisoned and sentenced to death following a defeat. Yusuf admits
      his complicity in the assassination attempt.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550516
    directors: David Petrarca
    writers: Patrick Macmanus
  - name: The Heavenly and Primal
    description: >
      Marco helps design trebuchets for the final assault on Xiangyang. The invasion
      is successful, and Jia Sidao is defeated.
    released: 2014-12-12
    length: 52m
    imdb: https://www.imdb.com/title/tt3550518
    directors: John Maybury
    writers: John Fusco
