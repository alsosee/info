name: Malcolm in the Middle
description: >
  A gifted middle-schooler is placed in a class for high-achieving students while trying to survive life with his chaotic working-class family.
  The first season introduces Malcolm, his strict mother Lois, easygoing father Hal, older brothers Francis and Reese, younger brother Dewey, and the Krelboyne class that makes school even more complicated.
