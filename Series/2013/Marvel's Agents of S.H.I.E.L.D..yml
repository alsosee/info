      - name: Maria Hill
        actor: Cobie Smulders
  - name: 0-8-4
    description: >
      The team travels to Peru to recover an "object of unknown origin," which turns out to be forgotten technology.
    released: 2013-10-01
    length: 42m
    imdb: https://www.imdb.com/title/tt3130816/
  - name: The Asset
    description: >
      S.H.I.E.L.D. searches for kidnapped scientist Dr. Franklin Hall, held by a CEO who wants to control gravity.
    released: 2013-10-08
    length: 44m
    imdb: https://www.imdb.com/title/tt3130820/
  - name: Eye Spy
    description: >
      The team investigates a series of diamond thefts by Coulson's former protégé, who is being blackmailed via a cybernetic eye.
    released: 2013-10-15
    length: 43m
    imdb: https://www.imdb.com/title/tt3130822/
  - name: Girl in the Flower Dress
    description: >
      The team tracks a street performer with pyrokinetic abilities who has been kidnapped by a mysterious organization.
    released: 2013-10-22
    length: 43m
    imdb: https://www.imdb.com/title/tt3130826/
  - name: FZZT
    description: >
      The team investigates deaths involving an alien virus from a Chitauri helmet; Simmons becomes infected.
    released: 2013-11-05
    length: 43m
    imdb: https://www.imdb.com/title/tt3130830/
  - name: The Hub
    description: >
      Ward and Fitz are sent on a classified mission to disable a weapon called the "Overkill Device" in South Ossetia.
    released: 2013-11-12
    length: 43m
    imdb: https://www.imdb.com/title/tt3130834/
  - name: The Well
    description: >
      The team investigates a pagan hate group searching for pieces of an Asgardian Berserker Staff that grants super strength and rage.
    released: 2013-11-19
    length: 43m
    imdb: https://www.imdb.com/title/tt3130838/
  - name: Repairs
