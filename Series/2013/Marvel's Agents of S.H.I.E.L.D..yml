name: "Marvel's Agents of S.H.I.E.L.D."
description: >
  Following the Battle of New York, Agent Phil Coulson assembles a small, highly skilled team of S.H.I.E.L.D. agents to investigate the new, the strange, and the unknown around the globe, protecting the ordinary from the extraordinary. The season follows their investigation into "Project Centipede" and the mysterious "Clairvoyant," while exploring the truth behind Coulson's resurrection.
