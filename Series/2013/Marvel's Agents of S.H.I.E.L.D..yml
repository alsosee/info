    length: 44m
    imdb: https://www.imdb.com/title/tt3130842/
  - name: The Bridge
    description: >
      Coulson recruits Mike Peterson for support against upgraded soldiers; the team is ambushed and Coulson is taken.
    released: 2013-12-10
    length: 42m
    imdb: https://www.imdb.com/title/tt3130846/
  - name: The Magical Place
    description: >
      S.H.I.E.L.D. launches a rescue mission for Coulson while he is tortured to uncover the secret of his resurrection.
    released: 2014-01-07
    length: 43m
    imdb: https://www.imdb.com/title/tt3130850/
  - name: Seeds
    description: >
      At a S.H.I.E.L.D. Academy, the team investigates an attack involving a device that can freeze people and surroundings.
    released: 2014-01-14
    length: 44m
    imdb: https://www.imdb.com/title/tt3130854/
  - name: T.R.A.C.K.S.
    description: >
      Hunting the Clairvoyant, the team boards a train in Italy to intercept a package being shipped to Ian Quinn.
    released: 2014-02-04
    length: 43m
    imdb: https://www.imdb.com/title/tt3130858/
  - name: T.A.H.I.T.I.
    description: >
      Coulson goes on a desperate mission to find a mysterious drug to save a teammate, discovering a facility called the "Guest House."
    released: 2014-03-04
    length: 43m
    imdb: https://www.imdb.com/title/tt3130862/
  - name: Yes Men
    description: >
      The Asgardian Lorelei escapes to Earth and begins enslaving men; Lady Sif arrives to help the team capture her.
    released: 2014-03-11
    length: 44m
    imdb: https://www.imdb.com/title/tt3130866/
  - name: End of the Beginning
    description: >
      Multiple agents join the team to hunt the Clairvoyant, leading to a confrontation with a man named Thomas Nash.
    released: 2014-04-01
    length: 42m
    imdb: https://www.imdb.com/title/tt3130870/
  - name: Turn, Turn, Turn
    description: >
      The team faces a crisis of trust when an internal threat within S.H.I.E.L.D. is revealed, forcing them to figure out who they can trust.
    released: 2014-04-08
    length: 44m
    imdb: https://www.imdb.com/title/tt3130874/
  - name: Providence
    description: >
      With S.H.I.E.L.D. compromised, Coulson leads the team to a secret base while their enemies raid S.H.I.E.L.D. facilities.
    released: 2014-04-15
    length: 44m
    imdb: https://www.imdb.com/title/tt3130878/
  - name: The Only Light in the Darkness
    description: >
      The team stops a superhuman with Darkforce powers who is obsessed with a cellist from Coulson's past.
    released: 2014-04-22
    length: 43m
    imdb: https://www.imdb.com/title/tt3130882/
  - name: Nothing Personal
    description: >
      Maria Hill helps the team as they hunt for a traitor; Coulson learns the disturbing truth about his resurrection.
    released: 2014-04-29
    length: 44m
    imdb: https://www.imdb.com/title/tt3130886/
    characters:
      - name: Maria Hill
        actor: Cobie Smulders
  - name: Ragtag
    description: >
      Flashbacks reveal the origins of a team member's training; in the present, the team infiltrates Cybertek to stop Hydra.
    released: 2014-05-06
    length: 43m
    imdb: https://www.imdb.com/title/tt3130890/
  - name: Beginning of the End
    description: >
      The team makes a final stand against their enemies; Nick Fury returns to help Coulson's team in their darkest hour.
    released: 2014-05-13
    length: 43m
    imdb: https://www.imdb.com/title/tt3130894/
