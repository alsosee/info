episodes:
  - name: Always There
    description: >
      Daniel leaves prison after 19 years on death row and returns home to a
      family, town, and legal system still unsettled by his case.
    released: 2013-04-22
    length: 48m
    directors: Keith Gordon
    writers: Ray McKinnon
  - name: Sexual Peeling
    description: >
      Daniel begins reacquainting himself with town while Amantha worries about
      his safety and Ted Jr. fears what his return means for the family business.
    released: 2013-04-22
    length: 45m
    directors: Billy Gierhart
    writers: Ray McKinnon
  - name: Modern Times
    description: >
      Daniel struggles with the changes around him as Amantha senses the town's
      anger building and Tawney quietly reaches out to him.
    released: 2013-04-29
    length: 45m
    directors: Nicole Kassell
    writers:
      - Evan Dunsky
      - Graham Gordy
      - Michael D. Fuller
  - name: Plato's Cave
    description: >
      A day in town turns overwhelming for Daniel and Janet, while Daggett
      questions Trey Willis about a missing witness.
    released: 2013-05-06
    length: 45m
    directors: Jim McKay
    writers:
      - Graham Gordy
      - Michael D. Fuller
  - name: Drip, Drip
    description: >
      Daniel's adjustment becomes more fragile after a strange outing, and Ted
      Jr. grows more anxious about Daniel's place in the family.
    released: 2013-05-13
    length: 44m
    directors: Romeo Tirone
    writers: Ray McKinnon
  - name: Jacob's Ladder
    description: >
      The pressure around Daniel's return intensifies as Foulkes pushes for a
      retrial and Daniel weighs what kind of future he can have in Paulie.
    released: 2013-05-20
    length: 46m
    directors: Ray McKinnon
    writers: Ray McKinnon
