name: A Knight of the Seven Kingdoms
description: >
  A prequel to Game of Thrones, set roughly 90 years before the events of A
  Song of Ice and Fire. The series follows the adventures of Ser Duncan the
  Tall, a lowborn hedge knight, and his young squire, Egg.
released: 2026-01-18
rating: TV-MA
