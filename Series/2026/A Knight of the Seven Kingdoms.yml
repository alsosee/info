episodes:
  - name: The Hedge Knight
    description: >
      After the death of his mentor, a young hedge knight named Dunk travels
      to a tournament at Ashford Meadow, where he encounters a mysterious boy
      named Egg who becomes his squire.
    released: 2026-01-18
    directors: Owen Harris
    writers: Ira Parker
  - name: Hard Salt Beef
    description: >
      Dunk arrives at the Ashford tournament and seeks to enter the lists,
      while navigating the complexities of the royal family's presence.
    released: 2026-01-25
    directors: Owen Harris
    writers:
      - Aziza Barnes
      - Ira Parker
  - name: The Squire
    description: >
      As the tournament begins, Dunk finds himself in a confrontation with a
      royal prince to protect an innocent puppeteer.
    released: 2026-02-01
    directors: Sarah Adina Smith
    writers:
      - Hiram Martinez
      - Annie Julia Wyman
      - Ira Parker
  - name: "Seven"
    description: >
      Facing a dire legal challenge after his confrontation with Prince
      Aerion, Dunk must find six allies to stand with him in a trial by seven.
    released: 2026-02-08
    directors: Sarah Adina Smith
    writers:
      - Aziza Barnes
      - Annie Julia Wyman
      - Ira Parker
  - name: In the Name of the Mother
    description: >
      The trial of seven commences, determining the fate of Dunk and his
      companions in a high-stakes battle.
    released: 2026-02-15
    directors: Owen Harris
    writers:
      - Hiram Martinez
      - Ti Mikkel
      - Ira Parker
  - name: The Morrow
    description: >
      In the aftermath of the tournament's tragic conclusion, Dunk and Egg
      make a decision about their future together as they depart Ashford.
    released: 2026-02-22
    directors: Sarah Adina Smith
    writers:
      - Ira Parker
      - Ti Mikkel
