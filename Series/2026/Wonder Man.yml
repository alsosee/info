name: Wonder Man
description: >
  Set in the Marvel Cinematic Universe (MCU), the series follows struggling
  actor Simon Williams, who secretly possesses ionic energy-based
  superpowers. He forms an unlikely friendship with experienced actor Trevor
  Slattery as they both attempt to land roles in a remake of the in-universe
  superhero film Wonder Man.
