episodes:
  - name: Matinee
    description: >
      Struggling actor Simon Williams auditions for a remake of the superhero
      film Wonder Man and meets the eccentric Trevor Slattery.
    released: 2026-01-27
  - name: Self-Tape
    description: >
      Simon attempts a self-tape audition while dealing with the sudden
      activation of his secret superpowers.
    released: 2026-01-27
  - name: Pacoima
    description: >
      Simon and Trevor visit Simon's family in Pacoima for his mother's
      birthday, leading to a confrontation with his brother Eric.
    released: 2026-01-27
  - name: Doorman
    description: >
      A black-and-white flashback episode exploring the origin of DeMarr
      Davis and his rise to fame as "Doorman."
    released: 2026-01-27
  - name: Found Footage
    description: >
      Simon and Trevor must retrieve GoPro footage of Simon using his powers
      while helping a local boy.
    released: 2026-01-27
  - name: Callback
    description: >
      Simon and Trevor attend a high-stakes callback at director Von Kovak's
      mansion.
    released: 2026-01-27
  - name: Kathy Friedman
    description: >
      As filming for Wonder Man begins, Simon becomes paranoid that a New
      York Times journalist's profile will expose his secret powers.
    released: 2026-01-27
  - name: Yucca Valley
    description: >
      In the season finale, Simon and Trevor face the fallout of an explosion
      on set, leading to a daring prison break.
    released: 2026-01-27
