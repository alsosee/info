name: "The Walking Dead, Season 2"
description: >
  In the second season, Rick Grimes and his group of survivors leave Atlanta in search of a safe haven, only to find themselves searching for a missing child.
  Their journey leads them to a secluded farm owned by the Greene family, where tensions rise between the two groups as they struggle to survive in a world overrun by walkers and internal conflict.
