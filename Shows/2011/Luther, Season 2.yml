name: "Luther, Season 2"
description: >
  After a leave of absence following the death of his ex-wife, DCI John Luther returns to the police force. 
  He joins a new unit, the Serious and Serial, and is immediately tasked with catching a masked killer 
  obsessed with urban legends. Simultaneously, Luther tries to protect a young woman named Jenny from 
  the criminal world he encountered in the past.
