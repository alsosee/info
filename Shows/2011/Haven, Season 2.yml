name: "Haven, Season 2"
description: >
  Audrey Parker continues to investigate "The Troubles" in Haven, while dealing with the arrival of a woman who
  also claims to be Audrey Parker. As the supernatural afflictions become more dangerous, Audrey, Nathan,
  and Duke must delve deeper into the town's history and their own families' roles in the mysteries of Haven.
