episodes:
  - name: The Falcon and the D'ohman
    description: Homer befriends Wayne, a reserved security guard recently hired by the nuclear power plant. Plagued by violent flashbacks from his past as a CIA agent, he must overcome his tortured nightmares to save Homer from a Ukranian terrorist. Meanwhile, Marge fantasizes about being a contestant on "Top Chef" hosted by Tom Colicchio, and the future of Springfield's hottest "it" couple Nedna, Edna Krabappel and Ned Flanders, will be revealed after months of online fan voting and speculation.
    released: 2011-09-25
    length: 30m
  - name: Bart Stops to Smell the Roosevelts
    description: Principal Skinner challenges superintendent Gary Chalmers to take over Bart's education after one of Bart's pranks leads to a school fundraiser debacle. Chalmers takes an unconventional approach to teaching American history which sparks a fascination in President Teddy Roosevelt. Encouraged by Bart's educational renaissance, Chalmers takes Bart and his band of "Rough Riders" on an overnight excursion to Springfield Forest, but after a minor accident, the school administration fires Chalmers for taking the boys on an unauthorized field trip. Determined to get Chalmers' job back, Bart and the boys hold the school hostage until the administration reinstates Chalmers, and they stand up for the teacher who made a meaningful impact. Blackboard "It's not to early to speculate about the 2016 election".
    released: 2011-10-02
    length: 30m
  - name: Treehouse of Horror XXII
    description: In the spooky opener of the 22nd annual installment of "Treehouse of Horror," Homer takes a dangerous dive into an isolated canyon on Candy Peak, but when a crashing boulder traps his arm, he channels Aron Ralston to save himself. In "The Diving Bell and Butterball," the first of three hair-raising Halloween tales, a venomous spider bite leaves Homer paralyzed, but when Lisa discovers Homer's ability to communicate through natural gases, he is able to express his love for Marge. The killer spells continue in "Dial D for Diddly," when Ned Flanders, devout preacher by day, transforms into a cold-blooded vigilante by night. In the final terrifying tale, "In the Na'Vi," Bart and Milhouse are assigned on a mission to access a sacred extract on a distant planet. They morph into the land's indigenous one-eyed avatars, but when Bart finds love and an eternal mate abroad, he is caught in planet warfare.
    released: 2011-10-30
    length: 30m
  - name: Replaceable You
    description: 'BART''s science fair project, a mechanical baby seal, outshines Lisa''s brainy asteroid model and becomes a popular pet among the retirement home patrons. Meanwhile, Homer gets a new and eager assistant Roz, but when Homer quickly loses his job to her and discovers her evil past, he and Flanders team up to reveal her true dark colors. Blackboard : ''It''s November 6th, how come we''re not airing a Halloween Show?''.'
    released: 2011-11-06
    length: 30m
  - name: The Food Wife
    description: Marge takes Bart and Lisa on a weekend excursion, but when an unexpected restaurant detour awakens their taste buds, fellow foodies Amuse Bruce and Fois Garth inspire them to start their own food blog, "The Three Mouthketeers." They score an exclusive reservation at Springfield's premiere modern restaurant, but Marge has an unsettling dream during which Anthony Bourdain, Gordon Ramsay, and Mario Batali lead her to reconsider extending the invite to Homer. Later, Marge directs Homer to a different type of cooking lab where he gets into a bind with law enforcement authorities.
    released: 2011-11-13
    length: 30m
  - name: The Book Job
    description: Lisa becomes disheartened when she learns the shocking truth behind the "tween lit" industry and her beloved fantasy novel characters. But Homer decides to cash in on the craze and forms a team to group-write the next "tween lit" hit, with the king of fantasy, Neil Gaiman, lending his expertise to the effort. After catching the eye of a slick industry publisher at the Springfield Book Fair, the team gets an advanced copy of their work and discovers that the corporate lit business is a bigger operation than they imagined.
    released: 2011-11-20
    length: 30m
  - name: The Man in the Blue Flannel Pants
    description: Host a tastemaker party at their home to promote Absolut Krusty, Krusty the Clown's own brand of liquor. Mr. Burns takes notice of the party's success and decides to promote Homer to "Account Man" for the Springfield Nuclear Plant. Robert Marlow, a seasoned account veteran, takes Homer under his wing and shows Homer what the high life is like in the corner office. Meanwhile, Lisa introduces Bart to a new literary world which sparks his interest in reading classic novels, and when Homer's long hours at the office become the norm, a family vacation with Marge and the kids help him realize that family always comes before work.
    released: 2011-11-27
    length: 30m
  - name: The Ten-Per-Cent Solution
    description: Krusty the Clown is stuck in a rut when the television network pulls his show from the air and his talent agency drops him as a client. But when THE SIMPSONS introduce him to seasoned agent Annie, they are surprised to learn that Annie was Krusty's very first agent. Despite their rocky relationship, Annie is convinced to re-sign Krusty and craft his career comeback. But when Krusty's retro comedy show reboot is deemed a critical success, Krusty must decide to stay with his agent or side with the network executives.
    released: 2011-12-04
    length: 30m
  - name: Holidays of Future Passed
    description: 'It''s the most wonderful time of the year, and THE SIMPSONS flash forward thirty years and find themselves in a tech-savvy, futuristic Springfield. Bart and Lisa have children of their own and decide to spend the holidays as one big family at Homer and Marge''s house. Lisa and Bart turn to Homer and Marge for parenting advice and begin to realize that the apple doesn''t fall far from the tree. Blackboard: ''Cafeteria trays are not toboggans''.'
    released: 2011-12-11
    length: 30m
  - name: Politically Inept, with Homer Simpson
    description: Homer lands his own political talk show after a video featuring his impassioned rant on poor treatment at the airport goes viral. As his talk show quickly gains popularity nationwide, Homer becomes the spokesperson for the Gravy Movement and the voice of America's newest political party. But when ill-informed Homer is asked to select the next Republican nominee for President and officially endorses right-wing rock star Ted Nugent, Marge and Lisa worry that Homer's opinion and influence might be more powerful than he realizes.
    released: 2012-01-08
    length: 30m
  - name: The D'oh-cial Network
    description: As the mastermind and creator of the online social networking phenomenon SpringFace, Lisa is called to trial when Springfield's obsession with the site becomes chaotic and dysfunctional. Lisa recounts her story and explains that she created the site after realizing she had no real friends. But as SpringFace expands and Springfield's fixation with the site causes mass hysteria, Lisa begins to realize that adding thousands of friends online did not compare to having real friendships. Later, Patty and Selma compete against the Winklevoss Twins in the rowing event at the 2012 Olympic Games.
    released: 2012-01-15
    length: 30m
  - name: Moe Goes from Rags to Riches
    description: After Moe is heckled for not having any real companions, Moe's best friend and beloved bar rag narrates his incredible thousand-year journey to Springfield. Beginning in the Middle Ages, the bar rag was loomed into a beautiful and ornate medieval tapestry and traveled around the globe through the hands of royalty before finding himself found himself at Moe's Tavern. Meanwhile, Bart begs Milhouse for forgiveness after the two friends get into a tiff, and when the bar rag goes missing, Moe realizes that he has more friends than he thought.
    released: 2012-01-29
    length: 30m
  - name: The Daughter Also Rises
    description: Marge and Lisa's mother-daughter Valentine's Day plans take a turn when Lisa meets Nick, an intellectual romantic who shares the same passion for culture, history and literature. Lisa and Nick fall head over heels for each other in a fairytale romance and make a secret getaway to Mulberry Island to profess their eternal love. Meanwhile, Bart and Milhouse are inspired by the hosts of "MythCrackers" to "crack" Springfield Elementary's own legends.
    released: 2012-02-12
    length: 30m
  - name: At Long Last Leave
    description: The Simpsons are evicted from Springfield and join an off-the-grid community outside of town. But when Homer and Marge try to sneak back into Springfield, they are welcomed with hostility from their former friends and neighbors and begin to appreciate their new and more accepting home.
    released: 2012-02-19
    length: 30m
  - name: Exit Through the Kwik-E-Mart
    description: In order to get back at his dad, Bart goes undercover as a graffiti street artist and plasters Homer's unflattering image all over Springfield. But one night, Bart and Milhouse get caught in the act by established street artists Shepard Fairey, Ron English, Kenny Scharf and Robbie Conal, and to Bart's surprise, they invite him to exhibit his satirical artwork in his very own gallery show. Meanwhile, a hip, new health food superstore opens in Springfield that threatens to put Apu and the Kwik-E-Mart out of business.
    released: 2012-03-04
    length: 30m
  - name: How I Wet Your Mother
    description: Karma gets the best of Homer after he gets his friends in trouble, and as a result, his bedwetting problem worsens. The family goes on a mission to infiltrate his dreams to search for clues in his subconscious to determine the source of his problem. But just as things take a dangerous turn in the dream, a figure from Homer's past appears, and he is finally reassured that the fond memories of his mother Mona remain alive, giving him just the right amount of reassurance to cure him of his problem.
    released: 2012-03-11
    length: 30m
  - name: Them, Robot
    description: Mr. Burns replaces all of Springfield Power Plant's employees with robots but decides to keep Homer as the sole human worker. With unemployment at an all-time high and mechanical arms operating the workplace, Springfield becomes a dismal and humorless place. But when Homer's machine-programmed peers start to turn on the community and his former real-life employees come to the rescue, they all realize that robots can't replace human friends.
    released: 2012-03-18
    length: 30m
  - name: Beware My Cheating Bart
    description: When Bart is forced to chaperone Jimbo's girlfriend to a movie, she ends up developing feelings for him, resulting in a whole bunch of trouble with the bullies at school. Meanwhile, Homer is persuaded to buy a state-of-the-art treadmill, fully equipped with a television. When Lisa shows Homer that he can access television shows wirelessly, he develops an obsession with watching an old television show from the treadmill, but not actually working out, until Marge decides to intervene. Blackboard 'Teacher does not have to pay a "Ugly Tax".
    released: 2012-04-15
    length: 30m
  - name: A Totally Fun Thing That Bart Will Never Do Again
    description: When Bart sees a commercial for the ultimate cruise, he begs his parents for a family vacation. Low on cash, the only way they can go is if each family member sells one valuable. Once they're away, Bart is determined to make the vacation last forever. So he comes up with a plan to make sure they never have to return home.
    released: 2012-04-29
    length: 30m
  - name: The Spy Who Learned Me
    description: After going on "date night" to a spy movie starring crime fighter Stradivarius Cain, Marge becomes upset with Homer for blurting out embarrassing remarks throughout the film, but Homer's attempts to reconcile with Marge do not seem to fix anything. Later, Homer is knocked off a ladder and suffers a concussion on the job, leaving him out of work for six weeks. Instead of telling Marge, Homer decides to use the time to learn how to become a better husband with the help of someone whom he believes is Stradivarius Cain.
    released: 2012-05-06
    length: 30m
  - name: Ned 'n' Edna's Blend
    description: When the town of Springfield discovers that Ned and Edna have secretly gotten hitched, Marge offers to throw them a congratulatory reception. However, bringing everyone together makes them all realize that no marriage is perfect. Meanwhile, Edna tries to help Ned's children become more socially acceptable by changing some of the rules.
    released: 2012-05-13
    length: 30m
  - name: Lisa Goes Gaga
    description: Lisa tries to reverse her status as one of the least popular girls in school by ghostwriting positive things about herself on the school blog. When her plan backfires, her social ranking plummets to a new low - until a psychic force tells Lady Gaga that Lisa needs her help. With Gaga's assistance, Lisa and the entire town of Springfield realize that being yourself is better than being like anyone else.
    released: 2012-05-20
    length: 30m
