episodes:
  - name: Lottery Fever
    description: Peter blows his savings on lottery tickets and the family writes it off as one of his usual shenanigans until they end up millionaires. In true Griffin fashion, they can't handle the good fortune and struggle to stay grounded.
    released: 2011-09-25
    length: 30m
  - name: Seahorse Seashell Party
    description: When a storm hits in Quahog, to help pass the time and calm his nerves, Brian consumes some questionable substances and has trouble sobering up. Meanwhile, Meg goes off the deep end after the family takes one too many jabs at her.
    released: 2011-10-02
    length: 30m
  - name: 'Screams of Silence: The Story of Brenda Q'
    description: Quagmire lands in the hospital and his sister, Brenda, and her boyfriend, Jeff, rush to Quahog to nurse him back to health. As Glenn recovers he quickly realizes that Brenda is the one who needs help.
    released: 2011-10-30
    length: 30m
  - name: Stewie Goes for a Drive
    description: Ryan Reynolds pays a visit to Quahog and becomes obsessed with Peter Griffin. Meanwhile, Stewie tries to be a big boy and steals the family car for a joy ride but lands in a bit of trouble.
    released: 2011-11-06
    length: 30m
  - name: Back to the Pilot
    description: Brian and Stewie travel back in time to the pilot episode of FAMILY GUY to change history, and then to change history again.
    released: 2011-11-13
    length: 30m
  - name: Thanksgiving
    description: Lois cooks a big Thanksgiving meal and invites the whole crew over for dinner, and Joe is shocked when his formerly M.I.A. son, Kevin Swanson, returns from Iraq.
    released: 2011-11-20
    length: 30m
  - name: Amish Guy
    description: On the return from an adventurous day at an amusement park, the Griffins' car breaks down in Amish country and they are stranded with no way out. When Meg falls for an Amish boy, the Griffins then find themselves in a crusade against the conservative locals.
    released: 2011-11-27
    length: 30m
  - name: Cool Hand Peter
    description: Peter and the guys take a stand against their wives and flee to the Deep South on a road trip. On the way there, the men earn a one-way ticket to jail. But when they decide to make a run for it, Joe's quick planning and Peter's seductive ways help them escape. Meanwhile, Lois spends some quality time with the girls and they engage in childish antics.
    released: 2011-12-04
    length: 30m
  - name: Grumpy Old Man
    description: It's winter in Quahog, and Lois' parents, Carter and Babs, take Stewie for a trip. But when Carter falls asleep at the wheel, the family decides it might be time for him to retire. Peter and Lois take the clan to Florida to check out some fine retirement communities, but Carter refuses to go down without a fight.
    released: 2011-12-11
    length: 30m
  - name: Meg and Quagmire
    description: When Meg finally turns 18, Quagmire seizes the opportunity to pursue his next romantic conquest. As the new couple's relationship blossoms, Peter stops at nothing to come in between his innocent - well, somewhat innocent - daughter and his creepy friend.
    released: 2012-01-08
    length: 30m
  - name: The Blind Side
    description: Brian starts dating a blind girl and things get a little dicey when she divulges that she hates dogs. Meanwhile, the Griffin family installs a new staircase in their home when Peter keeps falling on the old one and decides to live upstairs full-time.
    released: 2012-01-15
    length: 30m
  - name: Livin' on a Prayer
    description: When Stewie's new best friend falls ill, Lois takes him to the hospital where she finds out he has a critical, but treatable, disease. However, the boy's parents refuse treatment due to their religious beliefs, leaving Lois no choice but to take drastic measures to seek treatment for the boy herself. Meanwhile, Peter has a religious experience of his own.
    released: 2012-01-29
    length: 30m
  - name: 'Tom Tucker: The Man and His Dream'
    description: When Peter decides to be a famous actor, he becomes Tom Tucker's agent as his first step toward stardom. Meanwhile, Chris dates a girl who looks disturbingly like a member of the Griffin household.
    released: 2012-02-12
    length: 30m
  - name: Be Careful What You Fish For
    description: When Peter and the guys try to salvage a sunken Mercedes-Benz, Peter half-heartedly promises a favor to a helpful dolphin. Soon the dolphin moves to Quahog, outstays his welcome at Peter's and moves into Cleveland's house across the street. Peter tries to reunite the dolphin with his ex-wife in hopes that he'll return to the ocean, but his plan backfires and the whole dolphin family moves into Cleveland's.
    released: 2012-02-19
    length: 30m
  - name: Burning Down the Bayit
    description: Overwhelmed with financial troubles, Mort asks Peter and Quagmire to help him save his pharmacy. However, things take a turn for the worse when the trio decides to burn it down to collect insurance money.
    released: 2012-03-04
    length: 30m
  - name: Killer Queen
    description: When Peter and Chris go away to fat camp, they cross paths with a serial killer who targets overweight kids. Meanwhile, Stewie is traumatized by the frightening cover of a Queen album.
    released: 2012-03-11
    length: 30m
  - name: Forget-Me-Not
    description: When a seemingly innocent guy's night out takes a sudden turn, Peter, Joe, Brian and Quagmire wake up in a hospital and discover that their memories have been erased and Quahog has been deserted.
    released: 2012-03-18
    length: 30m
  - name: You Can't Do That on Television, Peter
    description: After Peter's favorite children's television show gets cancelled, he takes matters into his own hands by creating and starring in his own show for kids. Meanwhile, Meg begins an internship at the hospital with Dr. Hartman.
    released: 2012-04-01
    length: 30m
  - name: Mr. and Mrs. Stewie
    description: Stewie becomes smitten when he meets a girl who happens to be the female version of himself. Meanwhile, Peter and Quagmire take their friendship to a new level.
    released: 2012-04-29
    length: 30m
  - name: Leggo My Meg-O
    description: When Meg travels abroad to Europe, her exciting adventure comes to a halt when she gets kidnapped. Brian and Stewie embark on an action-packed mission to find her before it's too late.
    released: 2012-05-06
    length: 30m
  - name: Tea Peter
    description: After Quahog City Hall threatens to shut down Peter's illegally-run business, Peter joins the Tea Party and successfully campaigns to shut down the government. As a result of all the chaos in Quahog, Peter's father-in-law, Carter, reaps the benefits.
    released: 2012-05-13
    length: 30m
  - name: Family Guy Viewer Mail (2)
    description: Continuing a popular show tradition, Brian and Stewie respond to viewer mail. We meet a British version of the Griffins, Quahog is taken over by a famous comedian and we get to see the world from Stewie's POV. Then, Peter encourages Joe to have a one-night stand with his attractive new partner in order to even the score with Bonnie for her own indiscretions. But when Bonnie finds out and threatens divorce, Lois insists that Peter get them back together. Meanwhile, Peter has another run-in with the angry chicken which makes for yet another epic fight.
    released: 2012-05-20
    length: 30m
  - name: Internal Affairs
    description: Joe cheats on the cheating Bonnie; and it's Peter vs. the angry chicken (again).
    released: 2012-05-20
    length: 30m
