name: "Avatar: The Last Airbender"
description: >
  A live-action adaptation of the animated series. Set in a world divided into four nations (Water, Earth, Fire, and Air), the story follows twelve-year-old Aang, the last survivor of the Air Nomads and the next "Avatar." As the only one capable of mastering all four elements, Aang must journey to end the Fire Nation's war and restore balance to the world.
