name: "Doctor Who, Season 1"
description: >
  The first season of the Fifteenth Doctor's era follows the Doctor and his new companion, Ruby Sunday, as they travel through time and space. From the Regency era in England to war-torn future worlds, they encounter a variety of threats, including the musical Maestro and the return of the ancient god of death, Sutekh.
