name: The Simpsons
description: >
  In the first season, The Simpsons introduces its ensemble and the animated world that frames the series' recurring comic conflicts.
released: 1989-12-17
rating: TV-PG
genres:
  - animation
  - comedy
  - satire
network: FOX
imdb: https://www.imdb.com/title/tt0096697/episodes?season=1
website: http://www.fox.com/the-simpsons
creators: Matt Groening
characters:
  - name: Homer Simpson
    voice: Dan Castellaneta
  - name: Marge Simpson
    voice: Julie Kavner
  - name: Bart Simpson
    voice: Nancy Cartwright
  - name: Lisa Simpson
    voice: Yeardley Smith
  - name: Maggie Simpson
    voice: Nancy Cartwright
  - name: Grampa Simpson
    voice: Dan Castellaneta
  - name: Ned Flanders
    voice: Harry Shearer
  - name: Mr. Burns
    voice: Harry Shearer
