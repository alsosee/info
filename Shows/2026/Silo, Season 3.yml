name: "Silo, Season 3"
description: >
  Juliette returns to a shaken Silo 18 with memory loss as the community
  recovers from rebellion and faces a new threat. The season also follows an
  origin story in the Before Times, where journalist Helen Drew and Congressman
  Daniel Keene uncover a conspiracy tied to the creation of the silos.
