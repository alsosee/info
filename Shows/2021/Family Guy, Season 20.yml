episodes:
  - name: LASIK Instinct
    description: With her vision waning, Lois elects to get LASIK surgery, but exploits her new disability for monetary gain. Meanwhile, Peter, Chris and Stewie must partake in all the activities with Doug that his father neglects.
    released: 2021-09-26
    length: 29m
  - name: Rock Hard
    description: 'While at an old record store, Peter and the guys recount tales of three rock legends: Jim Morrison, Muddy Waters and Elton John.'
    released: 2021-10-03
    length: 30m
  - name: Must Love Dogs
    description: Quagmire meets an avid dog lover, and pretends Brian is his dog in an attempt to win her over. Meanwhile, Chris helps Stewie track down the culprit who stole his Halloween candy in the "Must Love Dogs" Halloween-themed episode of FAMILY GUY.
    released: 2021-10-10
    length: 30m
  - name: 80's Guy
    description: Impelled by nostalgia, Peter recreates movie scenes from his favorite decade. Meanwhile, Stewie and Doug compete to retrieve a frisbee stuck at the top of the jungle gym.
    released: 2021-10-17
    length: 30m
  - name: Brief Encounter
    description: When Peter and Quagmire accidentally switch underwear, they begin to mimic the other's behavior. Meanwhile, Stewie and Doug agree to commit each other's murders.
    released: 2021-10-24
    length: 30m
  - name: Cootie & The Blowhard
    description: Stewie takes drastic measures when he thinks he is diagnosed with terminal "cooties." Meanwhile, Peter becomes infatuated with Bonnie's cooking.
    released: 2021-11-07
    length: 30m
  - name: Peterschmidt Manor
    description: Lois and her father attend the funeral of Lois' childhood nanny. Meanwhile, Peter and the rest of the family turn Pewterschmidt mansion into a hotel.
    released: 2021-11-14
    length: 30m
  - name: The Birthday Bootlegger
    description: 'A new boss (Preston Lloyd) quells Peter''s favorite part about work: office birthdays. Meanwhile, Stewie is put in detention and comes out a ruffian.'
    released: 2021-11-21
    length: 30m
  - name: The Fatman Always Rings Twice
    description: In noir-style, Peter/Mac investigates the disappearance of Meg/Sister Megan.
    released: 2021-11-28
    length: 30m
  - name: Christmas Crime
    description: When Mayor West's nativity scene is ruined, Brian is seen as the prime suspect.
    released: 2021-12-19
    length: 30m
  - name: Mister Act
    description: An accident leaves Peter with a high-pitched voice, and Jesus coaches him into fending off the other choir boys; meanwhile, Stewie is attracted to Lois' new masculine physique.
    released: 2022-01-09
    length: 30m
  - name: The Lois Quagmire
    description: At odds with Peter, Lois takes Quagmire to her high school reunion. Meanwhile, the rest of the family must cover up the death of a pizza delivery man.
    released: 2022-02-27
    length: 30m
  - name: Lawyer Guy
    description: Peter hires the town's new lawyer, Brick Baker, to represent him in litigation against his new neighbor.. who turns out to be Brick. Meanwhile, Brian and Stewie become lobstermen and save Rupert from the perils of the deep.
    released: 2022-03-06
    length: 30m
  - name: HBO-No
    description: 'The Griffins tell their own versions of three HBO shows: "Game of Thrones," "Succession" and "Big Little Lies."'
    released: 2022-03-13
    length: 30m
  - name: Hard Boiled Meg
    description: Meg is invigorated by her new role as a getaway driver, Meanwhile, Quagmire can't rid himself of the hiccups and implores Peter to kill him.
    released: 2022-03-20
    length: 30m
  - name: Prescription Heroine
    description: After Brian sustains an injury, Lois gets hooked on his painkillers. Meanwhile, Cleveland refurbishes Peter's ping pong table, which becomes the hot spot in the neighborhood.
    released: 2022-03-27
    length: 30m
  - name: All About Alana
    description: When Lois' piano student, Alana, comes to work for the Griffins, Lois is initially glad for the help, until she realizes Alana's intentions are more sinister than she thought.
    released: 2022-05-01
    length: 30m
  - name: Girlfriend, Eh?
    description: Peter and Chris take a road trip to Canada to prove the existence of Chris' girlfriend. Meanwhile, Lois and Meg compete for the attention of a handsome handyman.
    released: 2022-05-08
    length: 30m
  - name: First Blood
    description: The guys' physical prowess is tested at Mayor West's dude ranch. Meanwhile, Stewie thinks he's gotten his first period.
    released: 2022-05-15
    length: 30m
  - name: Jersey Bore
    description: Peter attends a business conference in Atlantic City with Preston. Meanwhile, Stewie helps Chris prepare for his role in Adam West High's rendition of "Romeo and Juliet".
    released: 2022-05-22
    length: 30m
