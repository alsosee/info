name: Hacks
description: >
  Deborah Vance, a legendary Las Vegas stand-up comedy diva, is forced to hire a young, "cancelled" comedy writer to refresh her aging material.
  As they clash and eventually bond, they both learn to navigate the evolving comedy landscape and their own personal demons.
