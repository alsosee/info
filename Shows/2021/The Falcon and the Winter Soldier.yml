name: "The Falcon and the Winter Soldier"
description: >
  Six months after being handed the mantle of Captain America, Sam Wilson teams up with Bucky Barnes on a global mission to stop an anti-patriotism group called the Flag Smashers.
  The series explores Sam's struggle with the shield's legacy and Bucky's journey to make amends for his past as the Winter Soldier.
