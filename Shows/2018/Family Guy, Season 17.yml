episodes:
  - name: Married... with Cancer
    description: Brian meets and quickly falls in love with a woman named Jess, who reveals she has cancer. After she receives devastating news regarding her diagnosis, Brian proposes marriage to her.
    released: 2018-09-30
    length: 30m
  - name: Dead Dog Walking
    description: Brian's marriage to Jess is not what he envisioned. At the suggestion of Peter, Brian lets himself go, causing Jess to make a surprising decision.
    released: 2018-10-07
    length: 30m
  - name: Pal Stewie
    description: To Stewie's surprise, he quickly befriends a boy his age, but is devastated when he realizes he isn't invited to his birthday party. Meanwhile, Peter and Lois attend a self-empowerment seminar.
    released: 2018-10-14
    length: 30m
  - name: Big Trouble in Little Quahog
    description: After Brian teases Stewie for being small, Stewie invents a shrinking machine that results in both of them shrinking to a microscopic size.
    released: 2018-10-21
    length: 30m
  - name: Regarding Carter
    description: Lois receives a surprising birthday present from her father, Carter Pewterschmidt, that leads to an unfortunate accident leaving him dependent on Lois and the Griffin's care.
    released: 2018-11-04
    length: 30m
  - name: Stand By Meg
    description: After Meg saves Stewie from a choking incident, Stewie makes it his personal mission to create a better life for Meg. Meanwhile, Chris is sent to a vocational school.
    released: 2018-11-11
    length: 30m
  - name: The Griffin Winter Games
    description: To the surprise of all the Griffins, Meg makes the U.S. Olympic team as a biathlete and competes in the Winter Olympics.
    released: 2018-11-18
    length: 30m
  - name: Con Heiress
    description: Stewie and Brian compete for the inheritance of a wealthy, older heiress. Meanwhile, Peter and Chris battle for Mr. Herbert's affection.
    released: 2018-12-02
    length: 30m
  - name: Pawtucket Pete
    description: The Pawtucket Brewery hires new bosses, who decide to change the company's mascot. In an attempt to be crowned the new face of Pawtucket Ale, Peter and Brian go head-to-head.
    released: 2018-12-09
    length: 30m
  - name: Hefty Shades of Gray
    description: After Peter's hair turns white from a ghost-hunting adventure in his house with the guys, his new look grabs the attention of local news anchor Tom Tucker. Under Tucker's guidance, he learns the ways of reporting fake news, and soon becomes a senior crime analyst on Quahog's Channel 5 News. Meanwhile, Brian and Stewie attempt to help Chris improve his dating game.
    released: 2019-01-06
    length: 30m
  - name: Trump Guy
    description: The Griffins move to Washington D.C. where Peter is hired as the new White House Press Secretary.
    released: 2019-01-13
    length: 30m
  - name: Bri, Robot
    description: Brian worries about the legacy he's leaving behind, so Stewie makes a robot duplicate as a living biography.
    released: 2019-02-10
    length: 30m
  - name: Trans-Fat
    description: Peter is mistakenly identified as transgender, which leads to an unexpected event and an important learning lesson.
    released: 2019-02-17
    length: 30m
  - name: Family Guy Lite
    description: After a mishap at work, Peter decides to take his health more seriously and diet with the help of Quagmire, Joe, and Cleveland. When Lois takes a stab at writing a romantic fantasy novel, a curious Brian and Stewie investigate to find out who she might have a crush.
    released: 2019-03-03
    length: 30m
  - name: No Giggity, No Doubt
    description: When the guys volunteer to chaperone the high school prom, Quagmire hits it off with Courtney only to discover that she is his daughter. To his and the gang's surprise, Quagmire makes a serious effort to embrace parenting Courtney, joining Peter and Meg on an ill-fated father-daughter camping trip.
    released: 2019-03-10
    length: 30m
  - name: You Can't Handle the Booth
    description: In a special episode, the Griffins provide DVD commentary on a recent episode and reveal never-before-told drama between Peter and Lois.
    released: 2019-03-24
    length: 30m
  - name: Island Adventure
    description: In search of Stewie's cherished big wheel tricycle, that Peter threw out, Stewie and Brian embark on an adventure to "Garbage Island," a giant floating mass of trash out in the sea. Meanwhile, Lois tries to help Quagmire elevate his dating game, as he courts a middle-aged woman.
    released: 2019-03-31
    length: 30m
  - name: Throw It Away
    description: After Lois reads a new book on the joys of decluttering, she challenges the rest of the Griffins to throw anything out of the house that does not spark joy. While all starts out well, Lois soon takes the decluttering to a surprising extreme.
    released: 2019-04-28
    length: 30m
  - name: Girl, Internetted
    description: When Meg suddenly becomes internet famous, she and an excited Peter work together to build her following and create content for her new image that revolves around unhealthy eating. Meanwhile, Brian and Stewie revel in a new ride while Brian's car gets repaired.
    released: 2019-05-05
    length: 30m
  - name: Adam West High
    description: When Brian's proposition to rename Quahog's high school "Adam West High," to honor the late Mayor West, is successful, he feels encouraged to run for office as Quahog's new mayor. The race takes a turn when Quagmire campaigns against Brian for the open seat.
    released: 2019-05-12
    length: 30m
