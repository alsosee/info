episodes:
  - name: Bart's Not Dead
    description: Bart takes a dare, and ends up in the hospital. To cover for himself and Homer, he says he went to Heaven and met Jesus. Christian producers offer the Simpsons a movie deal, which Homer takes. But Bart can't deal with the guilt and comes clean to Marge after the movie is finished.
    released: 2018-09-30
    length: 30m
  - name: Heartbreak Hotel
    description: Marge and Homer's marriage is tested when they travel to a tropical island to compete for a million dollars on Marge's favorite reality competition show.
    released: 2018-10-07
    length: 30m
  - name: My Way or the Highway to Heaven
    description: God and St. Peter contemplate what merits a soul getting into heaven, while citizens of Springfield remember their divine encounters.
    released: 2018-10-14
    length: 30m
  - name: Treehouse of Horror XXIX
    description: Homer wins an oyster-eating contest against the mythical Cthulhu, Springfield is overrun by plant body-snatchers, Lisa finally snaps and Mr. Burns opens a retirement home with some Jurassic upgrades.
    released: 2018-10-21
    length: 30m
  - name: Baby You Can't Drive My Car
    description: A self-driving car company comes to Springfield, poaching all of the power plant employees with its fun work environment.
    released: 2018-11-04
    length: 30m
  - name: From Russia Without Love
    description: On a mission to play hardcore pranks, Bart, Nelson and Milhouse get Moe a mail-order bride on the Dark Web.
    released: 2018-11-11
    length: 30m
  - name: Werking Mom
    description: Marge wants a job, and stumbles into becoming a plastic food storage container-selling drag queen. Meanwhile, Lisa tries to make the world better in the style of "Amelie"
    released: 2018-11-18
    length: 30m
  - name: Krusty the Clown
    description: Homer finds his calling as a TV recapper, but his harsh grading causes a brawl with Krusty. After almost killing Homer, Krusty hides out at a real circus, and finds happiness there.
    released: 2018-11-25
    length: 30m
  - name: Daddicus Finch
    description: Lisa and Homer's bond gets stronger when they start spending real quality time together, and Bart feels neglected. So Marge tries to help Homer balance his attention between the kids.
    released: 2018-12-02
    length: 30m
  - name: '''Tis the 30th Season'
    description: After a failed Black Friday shopping spree, Marge is determined to fix Christmas. However, Homer and the kids surprise Marge with a vacation to a Florida resort.
    released: 2018-12-09
    length: 30m
  - name: Mad About the Toy
    description: When Marge and Homer leave Grampa to babysit the kids, some little green army men trigger a PTSD episode, sending the family on a journey to Grampa's past to when he was a post-war toy model.
    released: 2019-01-06
    length: 30m
  - name: The Girl on the Bus
    description: When Lisa spots a new best friend from the window of the bus, she gets a taste of what life could be like with a different, more cultured family, and proceeds to try and live a double life.
    released: 2019-01-13
    length: 30m
  - name: I'm Dancing as Fat as I Can
    description: Homer angers Marge by binging their favorite show without her, and has to pick up a new skill in order to make amends. Meanwhile, Bart prepares to compete in "Krusty's Holiday Trample".
    released: 2019-02-10
    length: 30m
  - name: The Clown Stays in the Picture
    description: Krusty reveals the untold story of his past in his movie "The Sands of Space." While working as personal assistants on the movie, Bart and Lisa learn about the early years of their parents' relationship.
    released: 2019-02-17
    length: 30m
  - name: 101 Mitigations
    description: After Homer steals Comic Book Guy's car, he must either prove his innocence in court or reconcile with the jilted nerd.
    released: 2019-03-03
    length: 30m
  - name: I Want You (She's So Heavy)
    description: When a romantic night ends in injury, Marge recovers by taking up kiteboarding while Homer bonds with his hallucinated hernia. Lisa attempts to fix her parents' strained relationship by seeking advice from an unlikely source.
    released: 2019-03-10
    length: 30m
  - name: E My Sports
    description: As Bart begins to excel in video game competitions, Homer discovers a passion for coaching him. Lisa attempts to bring Homer back to reality, but the plan causes chaos.
    released: 2019-03-17
    length: 30m
  - name: Bart vs. Itchy & Scratchy
    description: Krusty releases an all-female reboot of "Itchy and Scratchy," so Bart and his crew of all-male friends decide to boycott the show. After Bart's friends turn on him for laughing at the reboot, Bart joins a woke group of sixth-grade girls who commit crimes against patriarchy.
    released: 2019-03-24
    length: 30m
  - name: Girl's in the Band
    description: Lisa is scouted by the director of the Capitol City Philharmonic, to her band teacher's dismay. Homer works extra shifts at the plant so Lisa can play, putting strain on the family.
    released: 2019-03-31
    length: 30m
  - name: I'm Just a Girl Who Can't Say D'oh
    description: Marge becomes Director of Springfield's local theater, armed with Lisa's script resembling "Hamilton." Meanwhile, Homer joins a baby class with Maggie, where he takes a liking to supervisor Chloe
    released: 2019-04-07
    length: 30m
  - name: D'oh Canada
    description: On a family vacation to Niagara Falls, Lisa is mistakenly granted political asylum in Canada. When Marge goes to rescue Lisa, they are forced to re-evaluate their love for America as they navigate the polite Canadian landscape. Meanwhile, Homer takes Maggie to a "Daddy and Me" class.
    released: 2019-04-28
    length: 30m
  - name: Woo-Hoo Dunnit
    description: When the secret stack of cash – aka Lisa's college fund – Marge keeps under the sink goes missing, the documentary crime series "Deadline Springfield" goes in-depth to solve the case, leaving no stone unturned.
    released: 2019-05-05
    length: 30m
  - name: Crystal Blue-Haired Persuasion
    description: After Homer's work cuts children's healthcare benefits, Marge turns to buying healing crystals as a cheaper solution for Bart's ADD. Bart begins to succeed in school, prompting Marge to open her very own crystals empire and sell to the naive mothers at school.
    released: 2019-05-12
    length: 30m
