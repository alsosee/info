episodes:
  - name: Hank's on Board
    description: Hank ends up going with the guys when they try to sneak out of town for a guys weekend without him. He finds out they think he is uptight and he tries to prove he is not and ends up going overboard in the process.
    released: 2005-09-18
    length: 30m
  - name: Bystand Me
    description: Hank thinks delivering papers in the morning would be a great job for Bobby and ropes him into a deliver job when he finds out the new owner of the newspaper is going to be hiring local children. Meanwhile, Peggy is hired by the same newspaper to write a helpful tips column.
    released: 2005-09-25
    length: 30m
  - name: Bill's House
    description: After the Hill's become sick and Bill nurses them back to health, he feels the need to help others and he turns his house into a halfway house. Hank then becomes determined to find them a different permanent residence.
    released: 2005-11-06
    length: 30m
  - name: Harlottown
    description: Hank and Peggy get all excited about saving the Tea Kettle rock formation because it is a historical spot in Arlen. Then Hank discovers the real historical aspect of it and how the town was founded.
    released: 2005-11-20
    length: 30m
  - name: A Portrait of the Artist as a Young Clown
    description: Hank reaches the point where he can't stand Bobby's jokes any more so he enrolls him in clown class at the local community college.
    released: 2005-12-04
    length: 30m
  - name: Orange You Sad I Did Say Banana
    description: The back alley guys build a swimming pool for Khan then Khan starts to fear that he is losing his Laotian heritage so he joins Ted Wassanasong's army and gives up his creature comforts.
    released: 2005-12-11
    length: 30m
  - name: You Gotta Believe (In Moderation)
    description: When Hank and his softball team play in a charity game against a better team, Hank takes it a bit too seriously.
    released: 2006-01-29
    length: 30m
  - name: Business is Picking Up
    description: The school holds a job fair and Hank tries to hold a place for Bobby with Strickland but Bobby pokes along. Bobby ends up shadowing a man who's business shocks both Hank and Peggy.
    released: 2006-03-19
    length: 30m
  - name: The Year of Washing Dangerously
    description: When Kahn buys the local car wash and runs it into the ground, Strickland becomes his business partner and gets Hank to join the car wash team.
    released: 2006-03-26
    length: 30m
  - name: Hank Fixes Everything
    description: Buck Strickland embarks on a propane price war with Thatherton and two other rivals, and hires the guys from "American Chopper" to boost sales at the Propane Expo. When the 'war' goes too far, and the companies are all losing profit, Hank takes matters into his own hands, and calls a meeting. Unfortunately, the owners decide to 'price fix' and get caught. Meanwhile, Lucky and Luanne wait for Brownville Station tickets, in line 6 days before tickets go on sale.
    released: 2006-04-02
    length: 30m
  - name: Church Hopping
    description: The Hills are late to church and a new family has taken their pew. Hank becomes upset and starts looking for another church to attend. Peggy becomes involved with being a assistant at a new church.
    released: 2006-04-09
    length: 30m
  - name: 24 Hour Propane People
    description: Buck Strickland finds himself banned from his favorite strip club and he refocuses on making Strickland Propane a fun place to work to compensate.
    released: 2006-04-23
    length: 30m
  - name: The Texas Panhandler
    description: Bobby meets a young freeloader when he gets a job to pay for a pair of trendy jeans and realizes there could be a easier way to get the pants.
    released: 2006-04-30
    length: 30m
  - name: Hank's Bully
    description: The Hills get some liberal neighbors; Hank tries to come up with a plan to put the neighborhood bully in his place; Meanwhile Dale informs Peggy he has picked up the hobby of taxidermy and Dale and Peggy enter a contest.
    released: 2006-05-07
    length: 30m
  - name: Edu-macating Lucky
    description: Lucky has big ideas about Luanne who makes a major announcement; Peggy tutors Lucky so he can get his GED.
    released: 2006-05-14
    length: 30m
