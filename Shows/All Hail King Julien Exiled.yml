name: "All Hail King Julien: Exiled"
series: Madagascar
description: >
  All Hail King Julien: Exiled is a serialized season of All Hail King Julien in
  which King Julien is forced from his kingdom by the mountain lemur Koto. The
  story follows Julien, Maurice, Mort, Clover, and their allies as they regroup
  and try to reclaim the lemur kingdom.
