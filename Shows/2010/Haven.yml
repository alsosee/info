name: Haven
description: >
  When FBI Agent Audrey Parker arrives in the small town of Haven, Maine on a routine case, she soon finds herself
  increasingly involved in the return of "The Troubles," a plague of supernatural afflictions that have occurred
  in the town at least twice before. As she stays to help the townspeople manage their abilities, she uncovers
  deep-seated mysteries about the town's history and her own mysterious past.
