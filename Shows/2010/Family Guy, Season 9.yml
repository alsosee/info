episodes:
  - name: And Then There Were Fewer
    description: When the Griffins and other residents of Quahog are invited to visit the mansion of James Woods, the evening turns into a real murder mystery when guests end up dead and everyone scrambles to figure out who done it.
    released: 2010-09-26
    length: 60m
  - name: Excellence in Broadcasting
    description: When Brian learns that Rush Limbaugh is going to be at the Quahog Mall for a book-signing, he decides to go down there and give him a piece of his left-wing mind. But when Rush unexpectedly comes to Brian's rescue, Brian has a political change of heart.
    released: 2010-10-03
    length: 30m
  - name: Welcome Back, Carter
    description: After Peter catches Lois' dad, Carter, having an affair, he is strong-armed into keeping a secret. But when Peter accidentally spills the beans, Lois' mom demands a divorce, and Peter is in charge of Carter's return to bachelorhood.
    released: 2010-10-10
    length: 30m
  - name: Halloween on Spooner Street
    description: Peter and Joe team up to execute a series of painful and humiliating Halloween pranks on unsuspecting family, friends and neighbors. While Brian shows Stewie the ropes of trick-or-treating, Meg sets out to attend her first high school Halloween party with high hopes for the evening.
    released: 2010-11-07
    length: 30m
  - name: Baby, You Knock Me Out
    description: When Peter receives tickets to a boxing match as a birthday gift, he volunteers Lois to compete. To everyone's surprise, Lois dominates in the ring, and Peter decides to become her fight promoter. Her frustration with Peter turns into motivation in the ring as the housewife turns champion.
    released: 2010-11-14
    length: 30m
  - name: Brian Writes a Bestseller
    description: Feeling discouraged with the progress of his writing career, Brian decides to throw in the towel until Stewie becomes his manager and one of his books hits the bestseller list. But when the fame goes to his head, Brian gets a wake-up call from Bill Maher (appearing in a live-action scene as himself).
    released: 2010-11-21
    length: 30m
  - name: Road to the North Pole
    description: Stewie's favorite thing after his teddy bear, Rupert, is Christmas. So when he hears that Santa is making an appearance at the mall, he begs Brian to take him so that he can tell Santa in person what he wants for Christmas. Brian begrudgingly takes Stewie to the mall, only to get the brush-off from Santa. As a result, Stewie and Brian travel to the North Pole to find Santa and teach him a lesson in holiday cheer.
    released: 2010-12-12
    length: 30m
  - name: New Kidney in Town
    description: After years of drinking with the guys, Peter's love of the sauce has finally caught up with him and he needs a kidney transplant. Brian offers him one of his, but will a canine kidney be compatible? Meanwhile, Meg and Chris collaborate on a poem to celebrate a very important visitor.
    released: 2011-01-09
    length: 30m
  - name: And I'm Joyce Kinney
    description: Lois becomes friends with Joyce Kinney, the new local news anchor, and Joyce convinces Lois to let her do a story on her as the model American housewife. The television story makes Lois look terrible, and Joyce is unapologetic, leaving Lois no choice but to right a wrong.
    released: 2011-01-16
    length: 30m
  - name: Friends of Peter G
    description: After a public disturbance, Peter and Brian are forced to attend a 12-step meeting to help kick their drinking problems. Unable to recognize his issue, Peter gets a visit from Death, who gives him a glimpse of what life would be like with and without "Mr. Booze" in his bloodstream.
    released: 2011-02-13
    length: 30m
  - name: German Guy
    description: On the search to find a new hobby, Chris meets a puppeteer named Franz, an old friend of Herbert's. Despite Herbert's warnings, Chris and Franz remain friends until Franz's checkered past is suddenly revealed.
    released: 2011-02-20
    length: 30m
  - name: The Hand That Rocks the Wheelchair
    description: When Bonnie goes out of town, Meg offers to check in on Joe, but she soon becomes a little too involved and starts freaking everyone out - especially Joe. Meanwhile, Stewie thinks he's losing his edge as the toughest baby on the block, so he hooks himself up to a machine that is supposed to make him more evil than ever before.
    released: 2011-03-06
    length: 30m
  - name: Trading Places
    description: Chris and Meg think their parents have it easy, and Peter and Lois beg to differ, so in order to teach them a lesson, they all trade roles. Chris goes to work at the brewery while Meg runs the house. While things start off well, it's not long until the stress of running a household and being the sole breadwinner break down Chris and Meg.
    released: 2011-03-20
    length: 30m
  - name: Tiegs for Two
    description: When the local dry cleaner loses Peter's favorite white shirt, he goes ballistic. Meanwhile, Brian tries to score on a date with a new friend, Denise, but ends up striking out. Instead of calling it quits on love, he decides to enlist Quagmire's help, but things get nasty when they start to compete for the affections of each other's old flames, Cheryl Tiegs and Jillian .
    released: 2011-04-10
    length: 30m
  - name: Brothers & Sisters
    description: When Mayor West marries Lois' sister, Carol, they move into the Griffin's house to be one big "happy" family. To make room for everyone, Stewie is bumped out of his room and takes over Chris' room, but not everyone is annoyed by the change. Peter and Mayor West bond and become best friends.
    released: 2011-04-17
    length: 30m
  - name: The Big Bang Theory
    description: Stewie and Brian go back in time to stop Bertram from killing Leonardo da Vinci.
    released: 2011-05-08
    length: 30m
  - name: Foreign Affairs
    description: When Bonnie and Lois take a trip to Paris, Bonnie crosses the line while in the City of Love. Meanwhile, Peter homeschools Chris and Meg using some unorthodox teaching methods.
    released: 2011-05-15
    length: 30m
  - name: 'Episode VI: It''s a Trap'
    description: 'Return to the Griffins'' version of that galaxy far, far away as their freakin'' sweet saga continues with the final installment of the hilarious three-part "Star Wars" satire. Following 2005''s "Family Guy: Blue Harvest" and last year''s "Family Guy: Something, Something, Something Dark Side," the Griffins reprise their intergalactic roles in an outrageous retelling of "Star Wars, Episode VI: Return of the Jedi" .'
    released: 2011-05-22
    length: 60m
