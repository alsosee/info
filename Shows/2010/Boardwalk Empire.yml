name: "Boardwalk Empire, Season 1"
description: >
  Set in Atlantic City, New Jersey, during the Prohibition era, the series follows Enoch "Nucky" Thompson, a corrupt political figure who controls the city and engages in bootlegging. The first season begins with the start of national prohibition in January 1920 and follows Nucky's rise to prominence, his interactions with historical mobsters like Al Capone and Arnold Rothstein, and his relationship with a young widow named Margaret Schroeder.
