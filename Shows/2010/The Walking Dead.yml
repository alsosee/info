name: The Walking Dead
description: >
  An American post-apocalyptic horror television series that follows Rick Grimes, a sheriff's deputy who awakens from a coma to find the world overrun by flesh-eating zombies ("walkers").
  Rick sets out to find his family and joins a group of survivors in Atlanta, adapting to a dangerous new world where the living can be just as deadly as the dead.
