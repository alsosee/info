episodes:
  - name: Pilling Them Softly
    description: Stewie is diagnosed with ADD and prescribed Adderall, which Brian takes to write a 2000-page proposal to pitch to author George R.R. Martin at a book convention. Meanwhile, Quagmire and Peter compete, Iron Chef-style, to determine which of them gets to keep his new cooking show.
    released: 2015-09-27
    length: 30m
  - name: Papa Has a Rollin' Son
    description: For Father's Day, the guys track down Joe's estranged father. But when Joe explains that his dad is intolerant of people with disabilities, Peter steps in and pretends to be Joe. Meanwhile, Stewie's doctor tells him that he'll only grow to be 5'1", so he hangs out with Tiny Tom Cruise to understand what it's like to be short.
    released: 2015-10-04
    length: 30m
  - name: Guy, Robot
    description: Stewie doesn't like Brian's stand-up comedy jokes, so the two of them fight. To get back at Brian and make him jealous, Stewie builds a robot friend. But when the robot outsmarts Stewie and dumps him, Brian and Stewie reunite. Meanwhile, Lois forces Peter to get a new mattress.
    released: 2015-10-11
    length: 30m
  - name: Peternormal Activity
    description: The guys go to an abandoned asylum seeking inspiration for a new horror movie idea, but end up accidentally killing a man they think is keeping them hostage. Wracked with guilt, they each try to pin the murder on someone else. Meanwhile, Stewie is on a mission to destroy Brian's glasses because he's annoyed by how pretentious Brian's been acting when he wears them.
    released: 2015-10-25
    length: 30m
  - name: Peter, Chris, & Brian
    description: Peter gets a check in the mail from the sale of his mother's home and he remembers that all of his old porn is still in there. When he returns to retrieve his stash, he finds a "to Peter from Peter" tape and realizes that his life has amounted to nothing. Reeling from his own failures, Peter then attempts to fix Chris before it's too late, and forces his son to spend time with Brian.
    released: 2015-11-08
    length: 30m
  - name: Peter's Sister
    description: Peter's sister, Karen, visits for Thanksgiving and bullies Peter the same way he treats Meg. At first, Meg is amused, but she soon helps Peter train to defeat his sister in a wrestling match. Meanwhile, to avoid overeating on Thanksgiving, Stewie and Brian go on a cleanse, which Stewie takes one step too far
    released: 2015-11-15
    length: 30m
  - name: Hot Pocket-Dial
    description: Quagmire admits that he is in love with Lois. Unfortunately, he proclaims his love while he has accidentally pocket-dialed Peter. Peter is furious and Brian takes it upon himself to fix the situation.
    released: 2015-11-22
    length: 30m
  - name: Brokeback Swanson
    description: When Joe is trampled in a local running of the bulls and becomes a quadriplegic, the guys find it too difficult to hang around him. Meanwhile, Brian sleeps with a married woman, and when the husband returns home, he pretends to be the family's new dog.
    released: 2015-12-06
    length: 30m
  - name: A Shot in the Dark
    description: When Peter's couch is stolen from his front lawn, the guys form a neighborhood watch group. While on duty, Peter sees someone trying to climb into Cleveland's house and he shoots him. Peter is then arrested and charged with a hate crime.
    released: 2015-12-13
    length: 30m
  - name: Candy, Quahog Marshmallow
    description: Peter, Cleveland and Joe come across an old VHS tape called "Winter/Summer," an Asian soap that Quagmire starred in when he was living in Korea. Unable to find the final tape of the series, the guys travel to Korea to find it and Quagmire is reunited with his old lover. Meanwhile, Stewie worries he might become a redhead.
    released: 2016-01-03
    length: 30m
  - name: The Peanut Butter Kid
    description: When their bank accounts begin to run dry, the Griffins look for ways to make money. Stewie gets cast in a peanut butter commercial and becomes the money maker for the family. Meanwhile, Lois and Peter become crazy show business parents and Brian helps Stewie realize that he does not want to be a child actor.
    released: 2016-01-10
    length: 30m
  - name: Scammed Yankees
    description: Lois and her mom, Babs, have a relaxing spa day, leaving Peter to entertain Lois' father, Carter. The boys fall for an email scam, and have to go to Africa to get their money back. Meanwhile, Brian pursues Meg's friend, Patty.
    released: 2016-01-17
    length: 30m
  - name: An App a Day
    description: Peter learns about phone apps and overloads his phone with them. He buys a new phone with more memory and gives his old phone to Chris, which causes a series of horrible events. Meanwhile, Stewie joins a tennis club and invites Brian to be his tennis partner.
    released: 2016-02-14
    length: 30m
  - name: Underage Peter
    description: Mayor West raises the drinking age to 50. Because of dog years, Brian is the only one old enough to buy alcohol, so Peter makes him buy all of his booze.
    released: 2016-02-21
    length: 30m
  - name: A Lot Going on Upstairs
    description: When Stewie refuses to sleep in his own bed because of nightmares, Peter can't stand it, so he goes to sleep in the attic. Peter turns the attic into a man cave and all of the guys begin hanging out there, which makes Lois incredibly angry. Meanwhile, Brian helps Stewie overcome his fears by building a device to go into his nightmares and defeat his demons.
    released: 2016-03-06
    length: 30m
  - name: The Heartbreak Dog
    description: Meg begins working at a retirement community and starts stealing from the residents. Then Chris finds out and wants in on the heist. When the residents catch them, they blackmail them and force the thieves to listen to all of their boring stories.
    released: 2016-03-13
    length: 30m
  - name: Take a Letter
    description: To pay for Stewie's private school, Lois becomes a postal worker. She finds a letter from Peter that was never sent to his old fling, Gretchen (guest voice Kathryn Hahn), dated a week before their marriage. When Gretchen tries to come between Lois and Peter, Lois has a plan of her own.
    released: 2016-04-17
    length: 30m
  - name: The New Adventures of Old Tom
    description: Peter gets lost in the mall overnight after his family abandons him. Meanwhile, Brian pretends to be a millionaire to win over a girl.
    released: 2016-05-08
    length: 30m
  - name: Run, Chris, Run
    description: To everyone's surprise, Chris wins homecoming king. However, Meg finds out that the cool kids plan to prank him during the homecoming ceremony, so they go to the school to investigate. Meanwhile, Cleveland starts hanging out with Jerome, the bartender. So Peter and the guys try to replace him.
    released: 2016-05-15
    length: 30m
  - name: Road to India
    description: Brian falls in love with a tech support worker in India, so he and Stewie travel there to find her. Meanwhile, Joe invites Peter to his bingo night, but when Peter becomes the new center of attention, Lois helps Joe reclaim the group.
    released: 2016-05-22
    length: 30m
