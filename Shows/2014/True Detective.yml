name: True Detective
series: True Detective
description: >
  Louisiana detectives Rust Cohle and Marty Hart revisit a ritualistic murder investigation through interviews years after the case began.
  The first season moves between 1995 and 2012 as the inquiry exposes the detectives' methods, partnership, and personal damage.
