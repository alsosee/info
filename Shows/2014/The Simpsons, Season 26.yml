episodes:
  - name: Clown in the Dumps
    description: 'In the milestone 26th season opener of THE SIMPSONS, the unthinkable happens: a Springfield resident dies. Also, Krusty retires after he''s offended by a comedy cable channel roast of him, and Lisa tries to protect Homer from getting hurt. Blackboard: ''Spoiler Alert: Unfortunately my dad doesn''t die''.'
    released: 2014-09-28
    length: 30m
  - name: The Wreck of the Relationship
    description: When Bart disrespects Homer's authority, Homer makes a point to try his hand at parenting. This proves fruitless, so Marge signs them up for the Relation Ship, where they'll resolve their conflicts at sea. Meanwhile, Marge is in charge of Homer's fantasy football league, but manages to win despite being the underdog.
    released: 2014-10-05
    length: 30m
  - name: Super Franchise Me
    description: Marge opens a sandwich franchise store after her sandwiches become a huge hit at Springfield Elementary. But running day-to-day at the store proves challenging, especially when the same franchise opens another location across the street.
    released: 2014-10-12
    length: 30m
  - name: Treehouse of Horror XXV
    description: '"Treehouse of Horror XXV" is the 25th installment in the Treehouse of Horror series. -In this Halloween special, Bart and Lisa go to hell and become demons. (This short is titled school in hell.) -Moe''s "Clockwork Orange"-style gang is disrupted when Dum (Homer) falls in love with a girl (Marge). -And, in a parody of The Others, the Simpsons are haunted by a family of ghosts, which turn out the be the family from the shorts, who were murdered and buried in the house.'
    released: 2014-10-19
    length: 30m
  - name: Opposites A-frack
    description: Lisa brings in Assemblywoman Maxine Lombard to put a stop to Mr. Burns' fracking operation, but is taken aback when the two political opponents find themselves attracted to one another.
    released: 2014-11-02
    length: 30m
  - name: Simpsorama
    description: In a special crossover episode, "Futurama's" Planet Express crew comes to present-day Springfield to prevent the Simpsons from destroying the future.
    released: 2014-11-09
    length: 30m
  - name: Blazed and Confused
    description: Bart faces a tough test at school when he gets a new teacher, Mr. Lassen, who vows to crush his spirit.
    released: 2014-11-16
    length: 30m
  - name: Covercraft
    description: Homer has a mid-life crisis, takes up bass guitar and forms a cover band with some of the other dads in town. But the band's modest early success is soon overwhelmed by the breakout potential of their most unlikely star, Apu.
    released: 2014-11-23
    length: 30m
  - name: I Won't Be Home for Christmas
    description: It looks like Homer won't be home for Christmas after he stays too long at Moe's Tavern on Christmas Eve and an irate Marge tells him not to return to their house, so he's left to wander alone around Springfield and lament the effects of Christmas spirits. Blackboard 'Reindeer meat does not taste like chicken'.
    released: 2014-12-07
    length: 30m
  - name: The Man Who Came to Be Dinner
    description: During a trip to "Dizzneeland" the Simpsons board the wrong ride, Rocket To Your Doom, and are transported through the galaxy to Kang and Kodos' home planet, where they are held captive at the local zoo and the inhabitants decide to eat Homer.
    released: 2015-01-04
    length: 30m
  - name: Bart's New Friend
    description: 'Bart has a new accomplice and best friend when Homer is hypnotized at the circus and believes he is a young boy again. Blackboard: ''Snowmen don''t have carrot penises''.'
    released: 2015-01-11
    length: 30m
  - name: The Musk Who Fell to Earth
    description: When inventor Elon Musk lands in Springfield, he and Homer become fast friends and revolutionize the town's nuclear plant. But when Musk goes overboard and Mr. Burns wants him removed, Homer must figure out a way to break up with him.
    released: 2015-01-25
    length: 30m
  - name: Walking Big & Tall
    description: When Lisa learns Springfield's anthem was stolen from another town she writes a replacement. Meanwhile, Homer learns the meaning of "Wide Pride".
    released: 2015-02-08
    length: 30m
  - name: My Fare Lady
    description: 'When Marge gets fed up with the thankless duty of chauffeuring her kids around, she begins working as a driver for a transportation app service. Meanwhile, Homer bankrupts Moe when he watches over the bar for one night, which forces Moe to take a temporary job as a janitor at the nuclear plant. Blackboard: ''Pixel art is not real art''.'
    released: 2015-02-15
    length: 30m
  - name: The Princess Guide
    description: Homer is put in charge of keeping Princess Kemi out of trouble while her father, a Nigerian king, works out a uranium deal with Mr. Burns. When Kemi ends up at Moe's, Moe jumps to the conclusion that she must be related to the Nigerian prince who scammed him over email and schemes to get his money back. But much to his surprise, he finds himself falling for the princess.
    released: 2015-03-01
    length: 30m
  - name: Sky Police
    description: Chief Wiggum is mistakenly delivered a military jet pack, which he gleefully accepts and uses in order to fight crime. But when the jet pack crashes into the church, the congregation, led by Marge, must resort to gambling and counting cards in order to collect money to repair the church.
    released: 2015-03-08
    length: 30m
  - name: Waiting for Duffman
    description: When Duffman undergoes hip replacement surgery and retires, the company sets up a reality show competition to find his replacement. Homer wins the competition, and because the job requires him to stay sober, he learns that beer isn't as necessary as he thought to have a good time.
    released: 2015-03-15
    length: 30m
  - name: Peeping Mom
    description: Bart lies about being involved in a bulldozer crash, so Marge decides to follow him everywhere until he confesses. Meanwhile, Homer ignores Santa's Little Helper when Flanders gets a new dog.
    released: 2015-04-19
    length: 30m
  - name: The Kids Are All Fight
    description: 'When Homer gets an old film roll developed, the family takes a trip down memory lane to see the origins of how Bart and Lisa first started fighting with each other. Blackboard: ''I will not pay my sister to do my punishment''.'
    released: 2015-04-26
    length: 30m
  - name: Let's Go Fly a Coot
    description: The Simpsons learn about Grampa's days in the Air Force, and Bart takes up smoking to impress Milhouse's Dutch cousin, Annika,.
    released: 2015-05-03
    length: 30m
  - name: Bull-E
    description: After Bart gets bullied at the school dance, Marge convinces the town to pass anti-bullying legislation. Homer then gets arrested and sent to rehab for bullying Ned Flanders, only to subsequently leave rehab as a hero.
    released: 2015-05-10
    length: 30m
  - name: Mathlete's Feat
    description: When a modernized Springfield Elementary has a technical meltdown, Lisa transforms it into a Waldorf school. Meanwhile, Groundskeeper Willie becomes the coach of the mathletes.
    released: 2015-05-17
    length: 30m
