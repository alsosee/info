episodes:
  - name: The Simpsons Guy
    description: 'In "The Simpsons Guy" episode of FAMILY GUY, Peter and the Griffins get out of dodge and end up in Springfield, where they are greeted by a friendly stranger named Homer Simpson, who welcomes his new "albino" friends with open arms. The families get along famously: Stewie and Bart make out like bandits when Stewie trades in his mind control device for a good old-fashioned slingshot; Lisa takes Meg under her wing and teaches her the saxophone; and Peter and Homer fight over the best beer in town - Pawtucket vs Duff'
    released: 2014-09-28
    length: 60m
  - name: The Book of Joe
    description: Peter helps Joe realize his dream of publishing a book, but things get out of hand when Peter takes over as the author. Meanwhile, Brian starts exercising to the extreme after experiencing a euphoric runner's high for the first time.
    released: 2014-10-05
    length: 30m
  - name: Baking Bad
    description: Lois and Peter go into business together and open a cookie store, but things get messy when Peter comes up with his own way to get more customers.
    released: 2014-10-19
    length: 30m
  - name: Brian the Closer
    description: After Brian undergoes cosmetic surgery he is faced with a new career---real-estate agent---which leads to trouble with Quagmire.
    released: 2014-11-09
    length: 30m
  - name: Turkey Guys
    description: On Thanksgiving eve, a drunken and ravenous Peter and Brian wolf down the holiday turkey, and then must go on hunt to find a replacement bird. With Peter gone, Chris decides to step up and take over as man of the house.
    released: 2014-11-16
    length: 30m
  - name: The 2000-Year-Old Virgin
    description: Peter is stunned to run into Jesus at the mall, and even more stunned to discover that he is still a virgin, so Peter recruits Quagmire and Cleveland to celebrate Jesus' birthday by finding a way to end his celibacy.
    released: 2014-12-07
    length: 30m
  - name: Stewie, Chris & Brian's Excellent Adventure
    description: To help Chris ace his ninth grade history class, Stewie and Brian employ the time travel machine for educational purposes. Not surprisingly, all three get stuck in the past.
    released: 2015-01-04
    length: 30m
  - name: Our Idiot Brian
    description: Meg convinces Brian to take the SAT's for her, but when he tests poorly, they start to suspect that Brian might not that smart after all. Peter decides to spend the day showing Brian the joys of being stupid and the benefits of having a low IQ.
    released: 2015-01-11
    length: 30m
  - name: This Little Piggy
    description: 'Meg is thrilled to be recruited as a model, but it turns out to be for a very specific type of modeling: the foot-fetish industry. Meanwhile, Brian accompanies Stewie on an open-road adventure when Stewie decides he wants to experience life outside of preschool.'
    released: 2015-01-25
    length: 30m
  - name: Quagmire's Mom
    description: Lois takes Peter to open a checking account, and they discover that his first name is actually Justin, which Peter adopts as the name of his younger "bro"-style alter-ego. Then, Peter/Justin throws a party, during which Quagmire unknowingly gets into some trouble with his mother .
    released: 2015-02-08
    length: 30m
  - name: Encyclopedia Griffin
    description: Peter, Quagmire, Joe and Cleveland form a neighborhood detective agency, and are stunned to discover that Chris is a thief. Meanwhile, Lois is worried about Chris' delusional relationship with his new girlfriend, but also sees it as an opportunity for Peter to copy Chris' romantic gestures.
    released: 2015-02-15
    length: 30m
  - name: Stewie is Enceinte
    description: Brian decides he doesn't want to hang out with Stewie anymore, so Stewie tries to save their relationship by having a baby... or seven... by using Brian's DNA to impregnate himself. Meanwhile, Peter, Joe, Quagmire and Cleveland attempt to make a viral video.
    released: 2015-03-08
    length: 30m
  - name: Dr. C and the Women
    description: Meg gets a new job at the airport, where she's instantly popular for being the hottest employee there. Meanwhile, Cleveland becomes a therapist and starts giving Peter and Lois relationship advice, but Peter quickly becomes frustrated and threatens to tell Donna a big secret about what went down at Cleveland's bachelor party.
    released: 2015-03-15
    length: 30m
  - name: '#JOLO'
    description: Peter becomes a town hero for accidentally finding a missing boy. Meanwhile, Joe decides to live life to the fullest by quitting his job and taking a road trip to Niagara Falls with Peter, Quagmire and Cleveland.
    released: 2015-04-12
    length: 30m
  - name: Once Bitten
    description: After attending obedience school, Brian becomes much more submissive, and Peter realizes he misses his old, feistier pal. Meanwhile, Chris makes a new friend at school, but feels betrayed when he discovers it was all a ploy to get closer to Meg.
    released: 2015-04-19
    length: 30m
  - name: Roasted Guy
    description: Peter befriends a group of mean girls after his feelings are hurt when his so-called friends decide to "roast" him. Lois, all too familiar with the gossipy nature of women, tells Peter they are probably talking about him behind his back, and Peter soon discovers that Lois may be right.
    released: 2015-04-26
    length: 30m
  - name: Fighting Irish
    description: Peter claims he would beat Liam Neeson in a fight, but when he is put to the test, he learns that winning is tougher than it seems. Meanwhile, Stewie becomes jealous when Lois decides to be a class mom and starts paying more attention to the other kids over him.
    released: 2015-05-03
    length: 30m
  - name: Take My Wife
    description: Lois books a fun couple's vacation in the Bahamas, but much to Peter's surprise, it turns out to be a marriage counseling program instead. Meanwhile, Carter watches the kids at home and becomes frustrated that they're too into their electronics to play games the old-fashioned way. So he tries to fix it himself.
    released: 2015-05-17
    length: 30m
