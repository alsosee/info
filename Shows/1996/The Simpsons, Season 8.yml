episodes:
  - name: Treehouse of Horror VII
    description: A Halloween trilogy. This time, Bart meets his "pure evil" Siamese twin; Lisa's science project attacks Bart; aliens Kang and Kodos invade Clinton and Dole's replicas just before the 1996 Presidential election.
    released: 1996-10-27
    length: 30m
  - name: You Only Move Twice
    description: 'In an idyllic planned community, Homer works for a new boss who has trouble with the government. Meanwhile, the rest of the family has difficulty dealing with the bucolic burg. Blackboard: ''I did not learn everything I need to know in kindergarten''.'
    released: 1996-11-03
    length: 30m
  - name: The Homer They Fall
    description: Moe turns Homer into a prizefighter, who meets the champ in a bout called by ring announcer Michael Buffer.
    released: 1996-11-10
    length: 30m
  - name: Burns, Baby Burns
    description: Rodney Dangerfield is the voice of Mr. Burns' illegitimate son, who irritates Burns with his lack of social graces. Homer and Mr. Burn's son hatch a scheme to get Mr. Burns's attention.
    released: 1996-11-17
    length: 30m
  - name: Bart After Dark
    description: While Marge and Lisa are away, Bart becomes the right-hand man for the owner of a burlesque house.
    released: 1996-11-24
    length: 30m
  - name: A Milhouse Divided
    description: Milhouse's parents decide to divorce, prompting Homer to take action to prevent a similar fate for himself and Marge.
    released: 1996-12-01
    length: 30m
  - name: Lisa's Date with Density
    description: Lisa develops a crush on Nelson, and then she tries to change him. Meanwhile, Homer solicits money over the phone using an automatic telephone dialer.
    released: 1996-12-15
    length: 30m
  - name: Hurricane Neddy
    description: Citizens rebuild the Flanders' hurricane-damaged house. But Ned's guilt about criticizing their work sends him to a mental hospital.
    released: 1996-12-29
    length: 30m
  - name: El Viaje de Nuestro Jomer (The Mysterious Voyage of Homer)
    description: Chief Wiggum's chili peppers send Homer on a hallucinatory, spiritual journey that makes him question whether Marge is his soulmate.
    released: 1997-01-05
    length: 30m
  - name: The Springfield Files
    description: 'Homer''s claim of an alien sighting brings FBI agents Scully and Mulder to investigate. Blackboard: ''The truth is not out there''.'
    released: 1997-01-12
    length: 30m
  - name: The Twisted World of Marge Simpson
    description: A smooth talker sells Marge on the pretzel business. But when sales go soft, Homer asks crime boss Fat Tony for help. Blackboard "I am not licensed to do anything".
    released: 1997-01-19
    length: 30m
  - name: Mountain of Madness
    description: On a company mountain retreat, an avalanche traps hiking partners Homer and Mr. Burns in a cabin.
    released: 1997-02-02
    length: 30m
  - name: Simpsoncalifragilisticexpiala (Annoyed Grunt) cious
    description: 'When Marge suffers stress-related hair loss, the Simpsons hire nanny Shary Bobbins, who speaks in song and inspires others to do so. But the Simpsons may prove too much for her. Blackboard: ''I will not hide the teacher''s prozac''.'
    released: 1997-02-07
    length: 30m
  - name: The Itchy & Scratchy & Poochie Show
    description: Itchy and Scratchy creator Roger Myers picks Homer to be the voice of a new canine character---who is roundly rejected by the public.
    released: 1997-02-09
    length: 30m
  - name: Homer's Phobia
    description: Homer's fearful about the potential influence that the Simpsons' new gay friend may have on Bart.
    released: 1997-02-16
    length: 30m
  - name: Brother from Another Series
    description: Murderous convict Sideshow Bob (Kelsey Grammer) is released to work for his brother Cecil (David Hyde Pierce), whom Bob bested at the Krusty-sidekick audition.
    released: 1997-02-23
    length: 30m
  - name: My Sister, My Sitter
    description: Lisa's reputation as a first-rate baby sitter is jeopardized when she's put in charge of Bart, who's determined to make things tough.
    released: 1997-03-02
    length: 30m
  - name: Homer vs. the Eighteenth Amendment
    description: Homer becomes a bootlegger when Springfield decides to enforce a 200-year-old prohibition decree.
    released: 1997-03-16
    length: 30m
  - name: Grade School Confidential
    description: After witnessing a kiss between Skinner and Mrs. Krabappel, Bart becomes their confidante. But rumors of their passion lead to their being fired---until Skinner reveals a secret.
    released: 1997-04-06
    length: 30m
  - name: The Canine Mutiny
    description: 'Bart replaces Santa''s Little Helper with a "limited edition" dog he bought with a fraudulent credit card. Blackboard: ''A fire drill does not demand a fire''.'
    released: 1997-04-13
    length: 30m
  - name: The Old Man and Lisa
    description: Penniless from bad investments, Burns asks for help from Lisa, who turns him into a profitable recycler. But then Burns takes things a nasty step further to increase his dividends.
    released: 1997-04-20
    length: 30m
  - name: In Marge We Trust
    description: Reverend Lovejoy puts Marge in charge of counseling parishioners; Homer finds his likeness is popular in Japan as the symbol for a cleaning product.
    released: 1997-04-27
    length: 30m
  - name: Homer's Enemy
    description: A new plant employee who's had it tough resents Homer's lack of professionalism and his cushy life. Meanwhile, Bart buys an abandoned factory at an auction for a dollar.
    released: 1997-05-04
    length: 30m
  - name: The Simpsons Spin-Off Showcase
    description: 'Three mock spin-offs: "Chief Wiggum, P.I."; "The Love-Matic Grandpa"; and "The Simpson Family Smile-Time Variety Hour," with guest star Tim Conway and a teen stand-in for Lisa.'
    released: 1997-05-11
    length: 30m
  - name: The Secret War of Lisa Simpson
    description: Lisa joins the all-male military school where Bart is sent for discipline. Then comes the hazing.
    released: 1997-05-18
    length: 30m
