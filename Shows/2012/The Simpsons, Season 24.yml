episodes:
  - name: Moonshine River
    description: America's favorite Midwestern family travels to New York City in search of Bart's long-lost love Mary Spuckler who he wants to reconnect with since she has left Springfield and her hillbilly family there to reinvent herself in the big apple. Lisa and Marge look forward to experiencing all the city has to offer but when they realize their budget won't allow a Broadway play they settle for the free "Shakespeare In the Park" which doesn't go as planned.
    released: 2012-09-30
    length: 30m
  - name: Treehouse of Horror XXIII
    description: Destined to be yet another classic Halloween-themed episode of THE SIMPSONS, in the opener of the 23rd annual "Treehouse of Horror," we go back to ancient times when a Mayan Homer and Marge are witnesses to the prediction by ancient calendar makers that 2012 will be the end of the world. In "The Greatest Story Ever Holed," the first of three spine-chilling stories, the Springfield Subatomic Supercollider creates a black hole that terrorizes the city, sucking up everything in its path. Then, in "UNnormal Activity" the Simpsons install cameras all over the house when things start to go bump in the night and Marge discovers it may have to do with an unholy pact she made some years prior. In the final thrilling tale, "Bart & Homer's Excellent Adventure," Bart travels to 1974 to buy a comic book at cover price but inadvertently disrupts Homer and Marge's courtship, leading Marge to end up with Artie Ziff .
    released: 2012-10-07
    length: 30m
  - name: Adventures in Baby-Getting
    description: When Marge's car falls into a sink hole, she buys the perfect replacement to fit her family of five. But she quickly grows to hate it because, as she tells a shocked Homer, the car would be too small if she wanted to have another baby. Meanwhile Bart and his friends are determined to find out what secret Lisa is keeping when Bart finds her cryptic messages and follows her sneaking off downtown for covert meetings after school.
    released: 2012-11-04
    length: 30m
  - name: Gone Abie Gone
    description: 'Grampa escapes from his retirement home, and when Homer and Marge frantically try to track him down, they follow clues that reveal secrets in Grampa''s past. They find that he worked at a local restaurant with Marvin Hamlish and met and fell in love with the restaurant''s singer Rita LaFleur. Meanwhile Lisa tries her hand at online poker, getting tips from the experts, including Jennifer Tilly but is soon gambling with her college fund. Blackboard: ''I will not concede the election until Karl Rove gives me permission''.'
    released: 2012-11-11
    length: 30m
  - name: Penny-Wiseguys
    description: Homer is shocked to discover that his bowling teammate Dan Gillick, is an accountant for Fat Tony and his mob. When the government finally catches up with Fat Tony and he is forced to serve time on a jury, he names Dan as his temporary replacement. Meanwhile, Lisa adds insects to her vegetarian diet after passing out during a saxophone solo, but starts questioning her decision when bugs start pleading for mercy in her dreams. Blackboard ' I want to secede but don't know which state I'm in'.
    released: 2012-11-18
    length: 30m
  - name: A Tree Grows in Springfield
    description: Lisa tries to cheer up a down-in-the-dumps Homer by winning him a "MyPad" at the school auction. But he falls back into a funk when he breaks the magical tablet device - until Ned Flanders discovers a miracle tree in the Simpsons' backyard with bark that spells the word "HOPE".
    released: 2012-11-25
    length: 30m
  - name: The Day the Earth Stood Cool
    description: Homer wants a younger, hipper image. So he starts hanging out with Terrence and Emily, his cool new neighbors from Portland, OR. But Marge finds their trendy parenting methods extreme and Bart quickly realizes their son, T-Rex, is super-pretentious.
    released: 2012-12-09
    length: 30m
  - name: To Cur with Love
    description: When a fire at the retirement home forces Grampa to move back in with the Simpsons, Homer throws out his back on moving day. While "resting" at home, he gets hooked on the super-addictive tablet game, "Villageville." And, in his distraction, he loses the family dog, Santa's Little Helper. Everyone is angry with Homer for not seeming to care about the missing dog, but Grampa tells them the story of Homer's long-lost childhood pup, Bongo,.
    released: 2012-12-16
    length: 30m
  - name: Homer Goes to Prep School
    description: Homer joins the "Springfield Preppers," an off-the-grid survivalist group whose leader has set up a top-secret retreat outside of town to prepare for the end of the world. But Marge grows skeptical of the group's alarmist shenanigans.
    released: 2013-01-06
    length: 30m
  - name: A Test Before Trying
    description: 'When Springfield Elementary is threatened with closure because of low standardized test scores, the fate of the school rests on one student who missed the test, and who must raise the average above the minimum threshold: Bart Simpson. Meanwhile, Homer finds a parking meter at a local dump, and starts deploying it around Springfield to fleece unwitting parkers of their quarters. Blackboard: ''I will obey oscar campaign rules from now on''.'
    released: 2013-01-13
    length: 30m
  - name: The Changing of the Guardian
    description: After surviving a tornado, Marge and Homer seek out guardians for the kids, in case the worst should happen. They first turn to friends and family, including Homer's half-brother, Herb Powell with whom to entrust their kids, but when Bart and Lisa fall in love with a super-cool couple, Mav and Portia, Marge starts to question their potential guardians' true motivations.
    released: 2013-01-27
    length: 30m
  - name: Love is a Many-Splintered Thing
    description: Bart's heart strings are pulled once again when Mary Spuckler returns to Springfield. But his failure to pay her enough attention strains their relationship. Marge, too, puts Homer in the dog house.
    released: 2013-02-10
    length: 30m
  - name: Hardly Kirk-Ing
    description: 'Bart and Milhouse explore the perks of being an adult when a shaving experiment leaves Milhouse looking exactly like his father, Kirk. Also, Marge desperately tries to save Maggie from the dangers of children''s television. Blackboard: ''I will not tweet as the principal''s toilet''.'
    released: 2013-02-17
    length: 30m
  - name: Gorgeous Grampa
    description: Homer's obsession with the TV show "Storage Battles" leads the family to discover Grampa's past identity as "Gorgeous Godfrey," the most feared, villainous man in pro-wrestling history. What's more, he was once revered by a young Montgomery Burns who now convinces Grampa to get back in the ring. But when Bart starts to adopt some of his grandfather's former cheating ways, Grampa must reconcile with his past before it's too late.
    released: 2013-03-03
    length: 30m
  - name: Black-eyed, Please
    description: 'Flanders becomes jealous when his laid-back parents start to prefer Homer''s company over his and he faces unbearable guilt after punching Homer in the eye, as he desperately tries to reconcile with him. Meanwhile, Lisa is distressed by her new substitute teacher, who bullies her for no apparent reason. Blackboard: ''Sorry I broke the blackboard''.'
    released: 2013-03-10
    length: 30m
  - name: Dark Knight Court
    description: Bart is falsely accused of pulling a prank on Easter involving the school marching band and stuffing rotten eggs in the brass section's horns, and Lisa must step in as his attorney to defend her brother. Meanwhile, Mr. Burns attempts to fulfill his lifelong dream of becoming a superhero, Fruit Bat Man,.
    released: 2013-03-17
    length: 30m
  - name: What Animated Women Want
    description: Once again, Homer must save his marriage when Marge gets fed up with his behavior. Meanwhile, after watching "A Streetcar Named Desire," Milhouse takes on a Marlon Brando-inspired bad-boy persona to attract Lisa.
    released: 2013-04-14
    length: 30m
  - name: Pulpit Friction
    description: Homer is recruited to be a church deacon by the trendy new reverend in town. But Bart asks Flanders to help him track down their former pastor, Reverend Lovejoy, when Homer starts to embrace the faith a little too seriously. Meanwhile, Marge finds out her dry cleaners mistakenly swapped her wedding dress with one of Krusty's costumes.
    released: 2013-04-28
    length: 30m
  - name: Whiskey Business
    description: Moe finds a new lease on life when rich venture capitalists take an interest in his homemade whiskey. Then, Grampa injures himself while babysitting Bart, and quickly discovers he prefers being cared for by his grandson than the staff at the nursing home. Also, Lisa takes exception to a "Tupac-at-Coachella"-style hologram of jazz legend Bleeding Gums Murphy and Sonny Rollins appears to ask her not to boycott the record label.
    released: 2013-05-05
    length: 30m
  - name: The Fabulous Faker Boy
    description: Marge encourages Bart to explore his creative side, and his initial reticence quickly subsides when Marge hires Slava's beautiful daughter, Zhenya, as his new piano instructor. Meanwhile, Homer is shocked when he loses the last two remaining hairs on his head, and employs a wide variety of headgear to try and keep his newfound baldness a secret from Marge.
    released: 2013-05-12
    length: 30m
  - name: The Saga of Carl
    description: Homer, Moe, Lenny and Carl win $200,000 in the Springfield Lottery. But when Carl takes off to Iceland - his homeland - with all the winnings, the guys embark on a Nordic adventure to get the cash back. Then, Marge mistakes a swinging Ashley Madison-type website for a Dolly Madison-type cupcake site, not realizing it's a destination for married people seeking liaisons. On the site, she meets the charming "Ben", who pursues her after they learn they share a love for a "Downton Abbey"-type TV series.
    released: 2013-05-19
    length: 30m
  - name: Dangers on a Train
    description: Marge unwittingly gets involved with a Web site for married people seeking affairs, and meets a charming man (voice of Seth MacFarlane) who takes quite an interest in her.
    released: 2013-05-19
    length: 30m
