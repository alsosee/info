episodes:
  - name: Into Fat Air
    description: In the season premiere, the Griffins decide to climb Mount Everest after their competitive family friends announce their ambitious plans to hike the legendary mountain. However, things go awry when the Griffins get stuck on the mountainside in the middle of a massive storm.
    released: 2012-09-30
    length: 30m
  - name: Ratings Guy
    description: On a Halloween-themed night, the Griffins are selected to have their television viewing habits monitored. But Peter takes his participation too far when he tries to control the airwaves.
    released: 2012-10-07
    length: 30m
  - name: The Old Man & the Big 'C'
    description: When Brian discovers that Carter Pewterschmidt's pharmaceutical company is withholding the cure for cancer from the public in order to gain more profit, he and Stewie plot to expose the big secret that could change the world. Meanwhile, Quagmire reveals a hair-raising secret of his own.
    released: 2012-11-04
    length: 30m
  - name: Yug Ylimaf
    description: When Brian uses Stewie's time machine to impress women whom he meets at bars, he accidentally causes time to run in reverse. So he and Stewie must figure out how to restore the forward progress of time before Stewie is unborn. Then, in the FAMILY GUY 200th Episode retrospective, fans will get a behind-the-scenes look at this irreverent comedy's most outrageous moments, through fascinating interviews with creator Seth MacFarlane and voice actors Mila Kunis, Alex Borstein and Seth Green. Additionally, the special will give fans an exclusive glimpse into the cast and crew's 200th episode party in Los Angeles.
    released: 2012-11-11
    length: 30m
  - name: Joe's Revenge
    description: The criminal who, years ago, shot Joe and left him in a wheelchair, becomes a fugitive. So, Quagmire, Joe and Peter team up to hunt the bad guy down.
    released: 2012-11-18
    length: 30m
  - name: Lois Comes Out of Her Shell
    description: Lois experiences a mid-life crisis, and Peter tries to keep up with her new, wild lifestyle. Meanwhile, Stewie finds a turtle at the park and brings him home as his new pet, unaware that the turtle is evil and determined to destroy Stewie's life.
    released: 2012-11-25
    length: 30m
  - name: Friends Without Benefits
    description: When Meg finally gathers the courage to ask out her crush, Kent, she is devastated to learn he's gay. But when Meg discovers that Kent has feelings for Chris, she uses her brother in the worst way to get closer to Kent.
    released: 2012-12-09
    length: 30m
  - name: Jesus, Mary and Joseph!
    description: Peter tells his own version of the Nativity story.
    released: 2012-12-23
    length: 30m
  - name: Space Cadet
    description: To boost Chris' self-esteem, Peter and Lois send him to space camp. When camp ends and the Griffins come to pick Chris up, they accidentally are launched into outer space, and it's up to Chris to land the clan safely back on earth.
    released: 2013-01-06
    length: 30m
  - name: Brian's Play
    description: Brian writes a play that's a hit in Quahog, but his confidence is shaken when he reads a play Stewie wrote that's much better than his. Soon, Stewie's work is Broadway-bound, causing a rift between the two.
    released: 2013-01-13
    length: 30m
  - name: The Giggity Wife
    description: When Peter, Quagmire and Joe visit the Harvard University campus, Quagmire accidentally marries a prostitute. In order to get out of his marriage, Quagmire pretends to be lovers with Peter.
    released: 2013-01-27
    length: 30m
  - name: Valentine's Day in Quahog
    description: Love is in the air on Valentine's Day. Meg dates a guy from the internet, Stewie uses his time machine and falls for a girl in the '60s and Peter and Lois decide to stay in bed all day. Meanwhile, Brian's ex-girlfriends pay him a visit and Quagmire gets in touch with his feminine side.
    released: 2013-02-10
    length: 30m
  - name: Chris Cross
    description: To buy new sneakers, Chris steals money from Lois' purse. When Meg catches him in the act, she forces him to do all of her chores in exchange for keeping mum. But Chris finally tires of the pact, and runs away to live with Herbert. Meanwhile, Stewie and Brian become obsessed with singer Anne Murray, and visit her to find out the true meaning of "Snowbird".
    released: 2013-02-17
    length: 30m
  - name: Call Girl
    description: When the Griffins find themselves in a financial bind, Lois is forced to find a job of her own. She gets discovered by a "voiceover" talent agent named Randy, who actually runs an adult-only phone line and pays his employees generously. As Lois settles into her new gig, she hears Peter's voice on the other end of the line. Peter introduces his pet falcon Xerces that has been trained to retrieve items for him to everyone.
    released: 2013-03-10
    length: 30m
  - name: Turban Cowboy
    description: When Peter, Quagmire and Joe need a jolt in their mundane lives, they decide to go skydiving. But after an unfortunate accident, Peter ends up in the hospital, where he befriends Mahmoud, who convinces Peter to convert to Islam. Quagmire and Joe are suspicious of Mahmoud's intentions and try to stop the friendship from progressing.
    released: 2013-03-17
    length: 30m
  - name: 12 and a Half Angry Men
    description: Bloody murder occurs at Mayor West's mansion, and he is the prime suspect. The mayor is put on trial, and it is up to the citizens of Quahog to determine if he is guilty or not.
    released: 2013-03-24
    length: 30m
  - name: Bigfat
    description: When Peter, Quagmire and Joe fly on a private plane to Canada, they crash in the middle of the wilderness, far from civilization. Peter is chosen to find help, but ends up going missing for two months, only to be found as a feral creature with no ability to communicate intelligently. The Griffins must find a way to bring back Peter to his old self.
    released: 2013-04-14
    length: 30m
  - name: Total Recall
    description: After teddy bear Rupert gets recalled, Stewie stops at nothing to get back his beloved best friend. Meanwhile, Peter falls ill and can't compete in his bowling tournament. So Lois fills in for him. But when she gets a little too close to Peter's teammates, he gets jealous.
    released: 2013-04-28
    length: 30m
  - name: Save the Clam
    description: When the owner of the Clam is killed, the bar closes and Peter, Quagmire and Joe must find a way to save their beloved watering hole. Meanwhile, Meg gets an after-school job at a funeral home.
    released: 2013-05-05
    length: 30m
  - name: Farmer Guy
    description: When the Griffins move to a farm, Peter gets into the illicit drug business, a la "Breaking Bad,".
    released: 2013-05-12
    length: 30m
  - name: Roads to Vegas
    description: 'Stewie and Brian use Stewie''s time machine to go to Las Vegas for a Bette Midler concert, but chaos ensues when the machine malfunctions and creates alt-versions of the pair: a "lucky" version and an "unlucky" one. Then, the Griffins are invited to join the prestigious Barrington Country Club and, of course, get thrown out.'
    released: 2013-05-19
    length: 30m
  - name: No Country Club for Old Men
    description: The Griffins receive an invite to join a posh country club, the Barringtons. Peters father in-law gets jealous because he has been trying to join for years.
    released: 2013-05-19
    length: 30m
