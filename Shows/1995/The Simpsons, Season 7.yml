episodes:
  - name: Who Shot Mr. Burns? (2)
    description: 'Chief Wiggum conducts an investigation into who shot Mr. Burns in an episode that parodies TV dramas, including "Dallas," "Twin Peaks" and "The Fugitive." Blackboard: ''I will not complain about the solution when I hear it''.'
    released: 1995-09-17
    length: 30m
  - name: Radioactive Man
    description: 'Bart auditions for the part of Fallout Boy in the movie "Radioactive Man," being filmed in Springfield. Blackboard: ''Bewitched does not support satanism''.'
    released: 1995-09-24
    length: 30m
  - name: Home Sweet Homediddly-Dum-Doodily
    description: 'Innocent mishaps draw the attention of investigators, who put the Simpson kids in a foster home---the Flanders''. Blackboard: ''No one want''s to hear from my armpits''.'
    released: 1995-10-01
    length: 30m
  - name: Bart Sells His Soul
    description: Bart sells his soul to Milhouse for five bucks; Moe goes after the family crowd. Blackboard 'I am not a lean mean spitting machine.'.
    released: 1995-10-08
    length: 30m
  - name: Lisa the Vegetarian
    description: Vegetarian Lisa ruins Homer's barbecue, but she gets moral support from Apu and his friends, Paul and Linda McCartney.
    released: 1995-10-15
    length: 30m
  - name: Treehouse of Horror VI
    description: 'Halloween 1996: Homer tumbles into another dimension in a story spun off "The Twilight Zone"; Paul Anka helps combat the "Attack of the 50-Foot Eyesores"; and Groundskeeper Willie appears in a spoof of "A Nightmare on Elm Street."'
    released: 1995-10-29
    length: 30m
  - name: King-Size Homer
    description: 'Homer purposely gains weight to qualify for disability, disdaining Marge''s complaints and the fact that she''s losing interest in him physically. Blackboard: ''Indian burns are not our cultural heritage''.'
    released: 1995-11-05
    length: 30m
  - name: Mother Simpson
    description: Homer comes face-to-face with his long-lost mother (voice of Glenn Close)---who reveals why she abandoned him.
    released: 1995-11-19
    length: 30m
  - name: Sideshow Bob's Last Gleaming
    description: 'Sideshow Bob (voice of Kelsey Grammer) steals an atomic bomb and demands that Springfield abolish television. Blackboard: ''Wedgies are unhealthy for children and other living things''.'
    released: 1995-11-26
    length: 30m
  - name: The Simpsons 138th Episode Spectacular
    description: Troy McClure hosts a retrospective featuring Simpsons history and trivia, and series "outtakes," including an alternate ending to the "Who Shot Mr. Burns?" episode and a burping contest between Barney and baseball's Wade Boggs.
    released: 1995-12-03
    length: 30m
  - name: Marge Be Not Proud
    description: 'Busted for shoplifting, Bart manages to keep the incident quiet---until he returns to the store for the Simpsons'' Christmas portrait. And the news is devastating to Marge. Blackboard: ''I will stop talking about the twelve inch pianist''.'
    released: 1995-12-17
    length: 30m
  - name: Team Homer
    description: 'Homer, Moe, Apu and Otto form a bowling team; Bart''s prank leads Springfield Elementary to adopt school uniforms. Blackboard: ''I am not certified to remove asbestos''.'
    released: 1996-01-07
    length: 30m
  - name: Two Bad Neighbors
    description: Homer is irked by his new neighbors, former U.S. President George Bush and Former U.S. First Lady Barbara Bush, especially when Mr. Bush gives Bart a spanking and criticizes Homer's parenting for menacing and ruined to have the outboard motor to damage Former President George Bush's new memoirs that he was working in his autobiography.
    released: 1996-01-14
    length: 30m
  - name: Scenes from the Class Struggle in Springfield
    description: Marge's new designer suit nets her an invitation to the Springfield Country Club, where she finds it's a stress to dress to impress. Meanwhile, "natural" golfer Homer hits the links with Mr. Burns.
    released: 1996-02-04
    length: 30m
  - name: Bart the Fink
    description: Bart inadvertently alerts the IRS to tax fraud by Krusty, whose possessions are auctioned off by the Government.
    released: 1996-02-11
    length: 30m
  - name: Lisa the Iconoclast
    description: Lisa's research on Jebediah Springfield turns up some unknown---and unpopular---facts.
    released: 1996-02-18
    length: 30m
  - name: Homer the Smithers
    description: Homer succumbs to job stress while subbing for Smithers as Burns' assistant.
    released: 1996-02-25
    length: 30m
  - name: The Day the Violence Died
    description: Bart wants justice done after learning that the animator (voice of Kirk Douglas) who created Itchy was ripped off. Lionel Hutz takes the animator's case.
    released: 1996-03-17
    length: 30m
  - name: A Fish Called Selma
    description: Selma dates Troy McClure, whose agent (voice of Jeff Goldblum) reports that being seen in public with a woman is a career boost that could make people forget "that scandal at the aquarium."
    released: 1996-03-24
    length: 30m
  - name: Bart on the Road
    description: Bart drives Milhouse, Martin and Nelson to Tennessee, thanks to his fake ID and Martin's cash from a stock dividend.
    released: 1996-03-31
    length: 30m
  - name: 22 Short Films About Springfield
    description: Interconnecting vignettes depict moments in the lives of Springfield residents, including Apu's partying activities; Smithers' allergic reaction to a bee sting; and Dr. Nick's appearance before a medical review board.
    released: 1996-04-14
    length: 30m
  - name: Raging Abe Simpson and His Grumbling Grandson in "The Curse of the Flying Hellfish"
    description: Mr. Burns tries to kill Grampa Simpson to seize a treasure the two found during World War II as members of the "Flying Hellfish" battalion.
    released: 1996-04-28
    length: 30m
  - name: Much Apu About Nothing
    description: Marge and Homer support a proposal to deport illegal immigrants from Springfield---until they learn it would affect Apu, who buys fraudulent identification documents from Fat Tony (voice of Joe Mantegna).
    released: 1996-05-05
    length: 30m
  - name: Homerpalooza
    description: 'Homer goes on tour with Hullabalooza, a rock concert featuring sideshow acts. His talent: catching a cannonball with his belly.'
    released: 1996-05-19
    length: 30m
  - name: Summer of 4 ft. 2
    description: On vacation, Lisa plays dumb to make friends with the "cool" kids, leaving a jealous Bart all burned up, with Milhouse as his only comrade.
    released: 1996-05-19
    length: 30m
