episodes:
  - name: Peter, Peter, Caviar Eater
    description: The Griffins are movin' on up (to a Newport mansion, specifically), when Lois inherits a "weekend house" from a rich aunt. Robin Leach provides his own voice in a "Lifestyles of the Rich and Famous" spoof.
    released: 1999-09-23
    length: 30m
  - name: Holy Crap
    description: Peter's dour and devout 80-year-old father (voice of Charles Durning) moves in with the Griffins after he retires from the mill where he has worked for 50 years. He's a hellfire-and-damnation man, and he thinks family is heading south.
    released: 1999-09-30
    length: 30m
  - name: DaBoom
    description: The Griffins usher in the Millennium with a bang----a nuclear one. Victoria Principal and Patrick Duffy have cameos (as their "Dallas" characters Pam and Bobby Ewing) in a live-action coda to the program, in which every Y2K bug that can bite Quahog (and the rest of the world) does. But the Griffins survive and head off, "Mad Max"-like, on a sardonic odyssey through post-apocalyptic New England, where Griffin's Law prevails---until Peter shoots himself in the foot.
    released: 1999-12-26
    length: 30m
  - name: Brian in Love
    description: 'Brian is having "accidents" (on rugs and other places) and seeks out a therapist (voice of Sam Waterston) to find out why. The therapist''s conclusion: Brian''s in love. The object of his yearning: Lois.'
    released: 2000-03-07
    length: 30m
  - name: Love Thy Trophy
    description: Peter and his neighbors enter a float in Quahog's annual Harvest Festival Parade. They win, but then the trophy turns up missing and the winners all suspect each other of stealing it. Meanwhile, Meg (voice of Lacey Chabert) needs $1100 for a purse, so she takes a waitress job, and takes Stewie with her---pretending that she's an unwed mother and Stewie is her crack baby.
    released: 2000-03-14
    length: 30m
  - name: Death is a Bitch
    description: Peter survives a health scare but gets a killer bill. So he writes "deceased" next to his name on a form---and is visited by the Grim Reaper himself. How, Peter wonders, did Death get the form? "It was e-mailed to me by your HMO." But Death must take a forced holiday when he sprains his ankle chasing Peter, who has no desire to go gently into that good night.
    released: 2000-03-21
    length: 30m
  - name: The King is Dead
    description: Lois is named artistic director of the Quahog Players and makes Peter the producer of the troupe's upcoming show, "The King and I." She had to find something for him to do---Peter was complaining about a lack of outlets for his "creativity" (and he certainly can't act).
    released: 2000-03-28
    length: 30m
  - name: I Am Peter, Hear Me Roar
    description: Peter's sense of humor is no laughing matter to the woman who sues him for sexual harassment. He can escape the lawsuit, though---by attending a training session on workplace sensitivity. It's a chance for him to get in touch with his feminine side. Candice Bergen provides the voice of feminist lawyer Gloria Ironbachs.
    released: 2000-03-28
    length: 30m
  - name: If I'm Dyin' I'm Lyin'
    description: 'When Peter and Chris''s favorite TV show, "Gumbel 2 Gumbel," is canceled, Peter concocts a plan to get it uncanceled. He goes to the Grant-a-Dream Foundation and says that Chris is dying. His dream: bring back the Gumbels. It''s granted, but Peter''s "white lie" comes back to plague him.'
    released: 2000-04-04
    length: 30m
  - name: Running Mates
    description: 'Peter and school-board candidate Lois have divergent views on an education issue, so Peter decides to run against her. The issue: a wacky old science teacher of Peter''s is fired after the school''s annual "egg drop" experiment because he had the kids drop California-condor eggs. Meanwhile, Chris gets into trouble at school for peeking into the girls'' locker room.'
    released: 2000-04-11
    length: 30m
  - name: A Picture's Worth a Thousand Bucks
    description: A New York art dealer sees a painting of Chris's and immediately christens "Christobel" as the next big thing in art. So the Griffins head for the Big Apple for the launch of his career. Candice Bergen, Faith Ford, Joe Regalbuto and Charles Kimbrough have cameos as their "Murphy Brown" characters.
    released: 2000-04-18
    length: 30m
  - name: Fifteen Minutes of Shame
    description: Everything Lois and Peter do seems to embarrass Meg, and now the Griffins are to be featured on a reality TV show. Not surprisingly, Meg is appalled. To make matters worse for her, the audience-research report comes in and she's the "least popular."
    released: 2000-04-25
    length: 30m
  - name: Road to Rhode Island
    description: 'Hope and Crosby they''re not, but Brian and Stewie do have some odd adventures when they bum their way across the country together after losing their plane tickets. In another plotline, Lois makes Peter watch a video designed to help couples communicate more effectively. Sam Waterston has a cameo as Brian''s analyst. The topic: Brian''s loss of his mother.'
    released: 2000-05-30
    length: 30m
  - name: Let's Go to the Hop
    description: A psychedelic drug craze (licking Colombian toads) hits Quahog's teens, so Peter goes undercover at the high school to stop it, and ends up being the most popular guy in school. Scenes send up John Hughes movies and "Grease."
    released: 2000-06-06
    length: 30m
  - name: Dammit Janet
    description: Lacking excitement in her life, Lois decides to get a job, and Peter steers her toward being a flight attendant (because husbands fly free). Elsewhere, Stewie is dispatched to a day-care center, where he promptly falls in love with a girl named Janet (voice of Tara Charendoff). This rattles him. "I want absolutely nothing to do with the wretched enterprise," he declares, to no avail.
    released: 2000-06-13
    length: 30m
  - name: There's Something About Paulie
    description: Peter finds himself tied to the mob after he buys a car that turns out to be a lemon, and a wiseguy (voice of Jon Cryer) offers lemon aid. Other guest voices include Michael Chiklis (Big Fat Paulie) and Alan King (the Don).
    released: 2000-06-27
    length: 30m
  - name: He's Too Sexy for His Fat
    description: Tired of being overweight, Chris (voice of Seth Green) decides to diet and exercise. That doesn't work, but there's always liposuction and plastic surgery---if not for Chris, then for another Griffin man (Peter---the one with the fat head).
    released: 2000-06-27
    length: 30m
  - name: E. Peterbus Unum
    description: When Peter goes to City Hall for a pool permit, he discovers that the Griffin house is not located in Quahog---or even in the U.S. And so a new nation---Petoria---is born. Not surprisingly, Peter (voice of series creator Seth MacFarlane) proves to be a saber-rattler, and that leads to a cooling in U.S.-Petorian relations.
    released: 2000-07-12
    length: 30m
  - name: The Story on Page One
    description: 'Luke Perry (who provides his own voice) is the subject of Meg''s journalistic excess. Actually, it''s Peter''s: he writes an article "outing" Perry (with no evidence whatsoever), puts Meg''s name on it and submits it to her school newspaper.'
    released: 2000-07-18
    length: 30m
  - name: Wasted Talent
    description: 'The men of Quahog drink themselves into stupors trying to win a contest sponsored by the mysterious brewer Pawtucket Pete. The prize: a tour of his near-mystical brewery (and a lifetime supply of beer). Meanwhile, Lois (voice of Alex Bornstein), a frustrated pianist who competes vicariously through the students she teaches, finds one with real promise just before a big competition.'
    released: 2000-07-25
    length: 30m
  - name: Fore, Father
    description: Chris takes up with Quagmire when he feels neglected by Peter, who coaches Cleveland Jr. to play with him in a golf tournament.
    released: 2000-08-01
    length: 30m
