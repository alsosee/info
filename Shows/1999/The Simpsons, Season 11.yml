  - name: Beyond Blunderdome
    description: 'Mel Gibson brings the Simpsons to Hollywood so Homer can help "tweak" his new film after Homer''s is the sole negative voice at a test screening. First tweak: add action, and lots of it.'
    released: 1999-09-26
    length: 30m
  - name: Brother's Little Helper
    description: A drug for Attention Deficit Disorder makes Bart studious, productive---and paranoid about satellites spying on him. Blackboard 'Pork is not a Verb'.
    released: 1999-10-03
    length: 30m
  - name: Guess Who's Coming to Criticize Dinner
    description: After crashing a food critic's retirement party for the food, Homer ends up taking the lady's place as food critic. He then has Lisa proofread his column and the power goes to his head. The French chef bakes him a very special eclair because of his bad reviews. Blackboard 'I am not the last Don'.
    released: 1999-10-24
    length: 30m
  - name: Treehouse of Horror X
    description: 'A Halloween trilogy: Homer causes a Y2K catastrophe; superheroes Lisa and Bart save actress Lucy Lawless; Marge runs Flanders over, and Homer tries to cover it up. Dick Clark and Tom Arnold also appear as themselves.'
    released: 1999-10-31
    length: 30m
  - name: E-I-E-I-(Annoyed Grunt)
    description: Homer thinks dueling is great and because of that, the Simpsons end up having to move to a old farm and Homer grows a highly addictive crop after fertilizing the field with plutonium.
    released: 1999-11-07
    length: 30m
  - name: Hello Gutter, Hello Fadder
    description: Homer cuts out of work to bowl a perfect game then has trouble staying in the limelight afterwords.
    released: 1999-11-14
    length: 30m
  - name: Eight Misbehavin
    description: Feeling more stressed than blessed after the birth of their octuplets, Apu and Manjula get child-care help in a deal they come to regret.
    released: 1999-11-21
    length: 30m
  - name: Take My Wife, Sleaze
    description: Homer wins a motorcycle and starts his own gang. The he gets entangled with a real motorcycle gang and they kidnap Marge. Blackboard "I can't see dead people".
    released: 1999-11-28
    length: 30m
  - name: Grift of the Magi
    description: Bankrupt Springfield Elementary is taken over by a private outfit whose members' real goal is to mine the kids' minds for toy ideas. Blackboard ' I will not sell my kidney on Ebay.'.
    released: 1999-12-19
    length: 30m
  - name: Little Big Mom
    description: 'With Marge laid up by a skiing (lodge) accident, Lisa tries to run the house and plays a trick on Homer and Bart to get them to help clean. Blackboard: ''I will not create art from dung''.'
    released: 2000-01-09
    length: 30m
  - name: Faith Off
    description: 'After Bart''s successful laying on of hands at a revival meeting, a preacher declares Bart has "the power." So the boy pitches his own tent. Blackboard: ''I will stop phoning it in''.'
    released: 2000-01-16
    length: 30m
  - name: The Mansion Family
    description: The Simpsons have to take care of Mr. Burn's mansion while he is at the Mayo Clinic getting a checkup. Homer takes advantage of it. Blackboard 'Class Clown is not a paid position'.
    released: 2000-01-23
    length: 30m
  - name: Saddlesore Galactica
    description: The band Bachman Turner Overdrive preforms at the State Fair. Bart and Homer rescue a horse from the State fair. Homer then starts racing the horse with Bart as the Jockey. Later, Homer discovers a secret about horse jockeys. Lisa's school band competes in a band contest and the winning school band cheats. Lisa then writes a letter to the President of the USA.
    released: 2000-02-06
    length: 30m
  - name: Alone Again Natura-Diddily
    description: The Simpsons go on a nature hike and Marge discovers that the bird preserve she loves has been turned into a racetrack. During the race a bad accident happens causing someone to pass away, the Simpsons console a grieving friend.
    released: 2000-02-13
    length: 30m
  - name: Missionary Impossible
    description: Homer is forced to become a missionary on a remote island after he pledges a large sum of money to a local PBS station.
    released: 2000-02-20
    length: 30m
  - name: Pygmoelian
    description: Moe wins Duff's "beer-tending" contest but loses out on making their calendar. So he undergoes plastic surgery and lands a soap-opera role that he missed years before.
    released: 2000-02-27
    length: 30m
  - name: Bart to the Future
    description: Bart attempts to sneak into an Indian casino by replacing the ventriloquist dummy and the head of the casino shows him the future when Lisa is President of the United States.
    released: 2000-03-19
    length: 30m
  - name: Days of Wine and D'Ohses
    description: Barney quits drinking to take helicopter-flying lessons, leaving Homer feeling resentful and inferior; Lisa and Bart enter a contest to photograph the cover of the Springfield phone book.
    released: 2000-04-09
    length: 30m
  - name: Kill the Alligator and Run
    description: 'In Florida, Homer gets caught up in spring break partying and accidentally runs over "Captain Jack" a iconic swamp alligator and the family has to go on the lam. Blackboard: "I am not here on a fartball scholarship".'
    released: 2000-04-30
    length: 30m
  - name: Last Tap Dance in Springfield
    description: Bart and Milhouse camp out in a shopping mall for a week and drive Chief Wiggam crazy, while Lisa enrolls in a tap dance school run by a former child star who is full of herself.
    released: 2000-05-07
    length: 30m
  - name: It's a Mad, Mad, Mad, Mad Marge
    description: Otto's girlfriend seems to be usurping Marge's role when she moves in with the family after a dispute over heavy metal.
    released: 2000-05-14
    length: 30m
  - name: Behind the Laughter
    description: A clip show like episode of behinds the scenes as if Simpsons were a real family doing unanimated tv.
    released: 2000-05-21
    length: 30m
