  - name: 'Peggy Hill: The Decline and Fall (2)'
    description: Peggys future hangs by a parachute cord because of a sky diving accident. Bobby is pushed to the brink when he has to take care of Cotton and Didi's new baby.
    released: 1999-09-26
    length: 30m
  - name: Cotton's Plot
    description: Peggy is mesmerized by Cotton's tales of heroics until she realizes they are partly tall tales.
    released: 1999-10-03
    length: 30m
  - name: Bills Are Made to Be Broken
    description: When Bill's football record is broken unfairly, the guys find a way for him to try to get it back.
    released: 1999-10-24
    length: 30m
  - name: Little Horrors of Shop
    description: After Hank volunteers as a shop teacher, he is suspended for supplying his students with so-called weapons.
    released: 1999-10-31
    length: 30m
  - name: Aisle 8A
    description: Kahn and Mihn go out of town and Connie stays with the Hills, Hank then becomes all out of sorts when he has to help Connie with a personal problem.
    released: 1999-11-07
    length: 30m
  - name: A Beer Can Named Desire
    description: Hank must throw a football through a hoop to win $ 1 million during the half time at a Dallas Cowboys game. They drop Bill off at his family plantation in New Orleans on the way to the game.
    released: 1999-11-14
    length: 30m
  - name: The Hank's Giving Episode
    description: The Hill family embarks on a trip to Montana to visit Peggy's mother and gets caught at the airport by severe weather that grounds all the flights. Several of Hank's neighbors also end up at the airport due to their holiday plans.
    released: 1999-11-21
    length: 30m
  - name: Not in My Back Hoe
    description: Hank rents a back hoe to help put a new septic system in for Bill and then meets a guy just like him named Hal at the megalo mart. His back alley buddies get jealous of the time Hank is spending with Hal instead of them.
    released: 1999-11-28
    length: 30m
  - name: To Kill a Ladybird
    description: Bobby friends a raccoon that has been getting into the family's trash and then when Lady Bird defends Hank, they worry that the raccoon may have rabies. Dale gets more paranoid than usual and goes native.
    released: 1999-12-12
    length: 30m
  - name: Hillennium
    description: Hank is the voice of reason at the start of the holiday season as his neighbors and friends start worrying more and more about the Millennial bug causing civilization to collapse.
    released: 1999-12-19
    length: 30m
  - name: Old Glory
    description: Bill requests a American flag that is going to be put to rest at the military base; Bobby has to turn in a essay to a teacher that does not like Peggy.
    released: 2000-01-09
    length: 30m
  - name: Rodeo Days
    description: Bobby drives Hank nuts with his comedy routines when the Rodeo comes to town and he decides that a Rodeo Clown is what he wants to be.
    released: 2000-01-16
    length: 30m
  - name: Hanky Panky (1)
    description: Buck Strickland's wife boots him out of the house because of his womanizing, takes over Strickland Propane and starts flirting with Hank to get even with Buck for his impropriety's.
    released: 2000-02-06
    length: 30m
  - name: High Anxiety (2)
    description: Buck attempts to frame Hank for Debbie's murder in order to protect his wife who he thinks may have killed her, Hank then has to defend himself to both Peggy and Sheriff Mumford.
    released: 2000-02-13
    length: 30m
  - name: Naked Ambition
    description: Bobby accidentally see's Luanne in the shower and when he tells his friend Joseph about it, Joseph convinces Bobby to help him spy on her.
    released: 2000-02-20
    length: 30m
  - name: Movin' on Up
    description: Luanne becomes frustrated with Hank always giving her rules to follow and when a neighbors house goes up for sale, she moves in and gets room mates to help with the bills.
    released: 2000-02-27
    length: 30m
  - name: Bill of Sales
    description: Peggy becomes involved in a pyramid sales scam and ends up getting Bill involved as her star sales representative.
    released: 2000-03-12
    length: 30m
  - name: Won't You Pimai Neighbor?
    description: Buddhist monks arrive in Arlen and Bobby ends up being chosen as their reincarnated Lama instead of who Kahn believes should be chosen.
    released: 2000-03-19
    length: 30m
  - name: Hank's Bad Hair Day
    description: After Hanks regular barber goes nuts, Hank lets Bill cut his hair at the army base then gets a huge bill in the mail from the government for the haircut.
    released: 2000-04-09
    length: 30m
  - name: Meet the Propaniacs
    description: Bobby creates a singing group for Strickland Propane in order to entertain unruly crowd at a sale.
    released: 2000-04-16
    length: 30m
  - name: Nancy Boys
    description: Nancy and Dale rekindle the romance in their marriage, leaving Nancy's former lover John Redcorn out in the cold.
    released: 2000-04-30
    length: 30m
  - name: Flush with Power
    description: During a drought, Arlen goes on water rationing and the town council votes to convert all toilets to low-flow toilets. Hank and his family discover a major problem with them and Hank tries to get the council to strike the low-flow law off the books.
    released: 2000-05-07
    length: 30m
  - name: 'Transnational Amusements Presents: Peggy''s Magic Sex Feet'
    description: When Hank and Peggy go bowling, Peggy has a big problem with the size of her feet. She then becomes unknowingly involved with a film maker who is running a fetish web site for feet.
    released: 2000-05-14
    length: 30m
  - name: Peggy's Fan Fair
    description: Using Peggy's suggestion, her church group goes to a festival in Nashville, Tennessee where she hears country music star Randy Travis singing a song that she wrote and sent into him without giving her credit.
    released: 2000-05-21
    length: 30m
