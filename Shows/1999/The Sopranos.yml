name: The Sopranos
series: The Sopranos
description: >
  New Jersey mob captain Tony Soprano begins seeing psychiatrist Dr. Jennifer Melfi after panic attacks expose the strain of balancing organized crime, family life, and his volatile mother.
  The first season follows Tony's therapy, crew politics, and the tensions that grow between his household and the DiMeo crime family.
