    released: 1999-05-02
    length: 30m
  - name: They Saved Lisa's Brain
    description: 'Lisa is invited to join local members of Mensa, who take a complaint to City Hall---and wind up running it. Blackboard: ''No one wants to hear from my armpits.''.'
    released: 1999-05-09
    length: 30m
  - name: 30 Minutes Over Tokyo
    description: 'After getting tips on thrifty living, the family takes a vacation to Japan, where they appear on a game show to win plane tickets back home. Blackboard: ''I''m so very tired''.'
    released: 1999-05-16
    length: 30m
