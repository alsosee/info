    description: Homer discovers a cool Tv character with his name and then they turn the character into a dummy and Homer becomes mortified. He then changes his name and a lot of things change for him.
    released: 1999-02-07
    length: 30m
  - name: I'm with Cupid
    description: Apu invites Homer and Marge over to his house for dinner and Manjula finds out that most American men do not work 7 days a week 12 plus hours a day and flips out. Apu then begins a series of daily gifts leading up to Valentines day for Manjula which causes all the other wives in Springfield to get Jealous of the attention she is getting from Apu. This causes the men of Springfield to be in the doghouse with their wives and them to be mad at Apu.
    released: 1999-02-14
    length: 30m
  - name: 'Marge Simpson in: "Screaming Yellow Honkers"'
    description: 'Marge gets a new sports utility vehicle and develops a bad case of road rage. She then has to go to driving school. Blackboard: ''Grammar is not a time of waste''.'
    released: 1999-02-21
    length: 30m
  - name: Make Room for Lisa
    description: 'Homer damages the bill of rights at the museum and gives away Lisa''s room to compensate for it. Lisa has to move in with Bart. Marge discover that Maggie''s baby monitor is picking up local phone calls. Blackboard: ''I do not have diplomatic immunity''.'
    released: 1999-02-28
    length: 30m
  - name: Maximum Homerdrive
    description: Truck drivers target Homer after he blabs about an industry scam while filling in for a recently deceased driver.
    released: 1999-03-28
    length: 30m
  - name: Simpsons Bible Stories
    description: The family's biblical dreams include Homer and Marge as Adam and Eve, with Flanders as God; Milhouse as Moses; and Bart as David battling Goliath's son ("this time, it's personal").
    released: 1999-04-04
    length: 30m
  - name: Mom and Pop Art
    description: 'Isabella Rossellini plays a gallery owner who sees art in the concrete mess that results from Homer''s attempt at building a barbeque. After the piece sells, she arranges a one-man show. Blackboard: ''A trained ape could not teach gym''.'
    released: 1999-04-11
    length: 30m
  - name: The Old Man and the "C" Student
    description: Bart puts on a show that causes Springfield to loose hosting the Olympic Games. For punishment, he is forced to volunteer at Grandpa's retirement home.
    released: 1999-04-25
    length: 30m
  - name: Monty Can't Buy Me Love
