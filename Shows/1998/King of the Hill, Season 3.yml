episodes:
  - name: Death of a Propane Salesman (2)
    description: Hank and Luanne survive the Mega Lo Mart explosion, but Buckley is no more. Hank finds that he is scared of propane, and tries to figure out how to deal with his fear of dying. Meanwhile, Luanne, who lost all her hair in the explosion, decides to become an activist like Sinead O'Connor.
    released: 1998-09-15
    length: 30m
  - name: And They Call It Bobby Love
    description: Bobby starts dating Marie, a girl who's two years older than him. Bobby takes the relationship more seriously than Marie does, and is heartbroken when she dances with other guys. Marie decides to "move on" leaving Bobby an emotional wreck. Meanwhile, Hank and the guys find an abandoned couch in the alley, and grow to depend on it.
    released: 1998-09-22
    length: 30m
  - name: Peggy's Headache
    description: When Peggy starts writing "musings" for the local newspaper, the pressure gives her a headache, so she goes to John Redcorn for a theraputic massage. When she finds out that Dale's wife Nancy is having an affair with John Redcorn, she is so horrified that she decides to tell Dale about it.
    released: 1998-10-06
    length: 30m
  - name: Pregnant Paws
    description: Peggy starts going ballistic during Hanks attempts to get Lady Bird pregnant; Dale becomes a bounty hunter.
    released: 1998-10-13
    length: 30m
  - name: Next of Shin
    description: Hank and Peggy decide to try and have another child; Didi informs Cotton that she is pregnant and it becomes too much for him to handle and he takes off to Las Vegas.
    released: 1998-11-03
    length: 30m
  - name: Peggy's Pageant Fever
    description: Peggy competes in a beauty contest for the grand prize and is forced to make a tough decision.
    released: 1998-11-10
    length: 30m
  - name: Nine Pretty Darn Angry Men
    description: Hank and the guys join a lawn mower focus group, which is disrupted by a minister and a car salesman.
    released: 1998-11-17
    length: 30m
  - name: Good Hill Hunting
    description: Hank with Peggy's help, decides to take Bobby hunting only to find out that there are no more hunting permits available.
    released: 1998-12-01
    length: 30m
  - name: Pretty, Pretty Dresses
    description: Hank and the guys stand watch over Bill when he becomes extremely depressed at Christmas time about Lenore leaving him and starts to consider suicide.
    released: 1998-12-15
    length: 30m
  - name: A Fire Fighting We Will Go
    description: Trouble ensues when Hank, Bill, Dale and Boomhauer become volunteer fireman.
    released: 1999-01-12
    length: 30m
  - name: To Spank with Love
    description: Peggy impresses the principal of Bobby's school when she substitutes for a teacher and disciplines the class.
    released: 1999-01-19
    length: 30m
  - name: Three Coaches and a Bobby
    description: Bobby pleases his assistant coach father by joining the football team.
    released: 1999-01-26
    length: 30m
  - name: De-Kahnstructing Henry
    description: Hank sees a top secret project underway at the military lab where Kahn works and then tells the Alley guys about it.
    released: 1999-02-02
    length: 30m
  - name: The Wedding of Bobby Hill
    description: Hank, Peggy and Luanne teach Bobby a lesson when he switches Luanne's birth control pills with candy when they start a get even with each other war.
    released: 1999-02-09
    length: 30m
  - name: Sleight of Hank
    description: Hank and Peggy go to a magic show where Peggy gets to be the volunteer in the best trick. Hank tries to figure out how the trick was done, and Peggy won't tell him. Meanwhile, Bobby is looking for a way to liven up his Sunday School report on Jesus, and when he sees the magician, he incorporates some of the tricks and patter into the report, calling it "The Amazing Jesus."
    released: 1999-02-16
    length: 30m
  - name: 'Jon Vitti Presents: Return to La Grunta'
    description: A lusty dolphin tries to mate with Hank in a send-up of "When Animals Attack".
    released: 1999-02-23
    length: 30m
  - name: Escape from Party Island
    description: Hank chaperons his elderly mother and her friends in a town filled with riotous students on spring break. While Hank is gone, Bill becomes a thorn in Peggy's side.
    released: 1999-03-16
    length: 30m
  - name: Love Hurts and So Does Art
    description: Bobby becomes a deli food aficionado and starts to develop gout when he is supposed to take Connie to a school dance; a X-ray of Hanks colon makes an appearance in a public place.
    released: 1999-03-23
    length: 30m
  - name: Hank's Cowboy Movie
    description: Hank wants the Dallas Cowboys training camp to relocate to Arlen and he involves everyone into a effort to bring them to the town.
    released: 1999-04-06
    length: 30m
  - name: Dog Dale Afternoon
    description: Fed up with the way Dale takes care of things he borrows, the guys steal Dale's new riding lawnmower to teach him a lesson which sends him over the edge and up into a clock tower.
    released: 1999-04-13
    length: 30m
  - name: Revenge of the Lutefisk
    description: When the congregation welcomes it's new female minister with a potluck dinner, Bobby accidentally incinerates the church.
    released: 1999-04-20
    length: 30m
  - name: Death and Texas
    description: Peggy unknowingly smuggles drugs into death row when tutoring an inmate.
    released: 1999-04-27
    length: 30m
  - name: Wings of the Dope
    description: The town becomes angel-crazy after Luanne thinks she see's Buckley's angel bouncing on Kahn's trampoline.
    released: 1999-05-04
    length: 30m
  - name: Take Me Out of the Ball Game
    description: Hank doesn't give Peggy the credit she's due when she becomes the star pitcher of his company's softball team.
    released: 1999-05-11
    length: 30m
  - name: As Old as the Hills (1)
    description: Hank and Peggy decide to go parachuting when Peggy gets upset on their anniversary; Didi starts to have her baby when only Bobby is there to help her.
