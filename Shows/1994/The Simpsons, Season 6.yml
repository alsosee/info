    description: 'Bart winds up in the hospital as a result of eating Krusty cereal, and when Lisa comes to visit him, she is reunited with her sax idol, who recounts his big break on "The Tonight Show.". Blackboard: ''Nerve gas is not a toy''.'
    released: 1995-04-30
    length: 30m
