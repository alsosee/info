name: Peacemaker
description: >
  After recovering from his mission with the Suicide Squad, Christopher Smith is
  forced into a new black-ops assignment called Project Butterfly. Working with a
  team of A.R.G.U.S. agents, he confronts alien threats, family trauma, and the
  violent contradictions behind his idea of peace.
