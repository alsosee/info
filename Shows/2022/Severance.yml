name: Severance
description: >
  Employees of Lumon Industries have undergone a procedure that surgically
  divides their memories between work and personal life, creating two distinct
  identities: an "innie" aware only of the office, and an "outie" with no
  recollection of work. When a new hire joins the Macrodata Refinement team,
  it sets off a search for the truth about their jobs, the company, and
  themselves.
