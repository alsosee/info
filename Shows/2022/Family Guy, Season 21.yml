    length: 30m
  - name: The Stewaway
    description: During a game of "hide and seek," Stewie takes refuge in Quagmire's suitcase, only to wind up in Paris. Meanwhile, Peter and Lois take a getaway to Vermont, where Lois is intent on breaking Bonnie's Instagram "like" record.
    released: 2022-11-13
    length: 30m
  - name: Get Stewie
    description: Stewie finds himself in public disgrace after a popstar unleashes her fan base on him for a benign comment. Meanwhile, Peter gets lap band surgery and enjoys the merriment of excess skin.
    released: 2022-11-20
    length: 30m
  - name: Carny Knowledge
    description: Peter and Chris finish last in a "Generation Gap" game at a carnival, forcing them to try to reconnect. Meanwhile, Brian starts to date a carny, whom he can't break up with even after witnessing some of her crude habits.
    released: 2022-12-04
    length: 30m
  - name: The Candidate
    description: Stewie and Doug compete for the honor of class "snack captain".
    released: 2022-12-11
    length: 30m
  - name: Love Story Guy
    description: The guys recount their first true love stories, leading to parodies of Castaway, Dirty Dancing, and various Meg Ryan rom-coms.
    released: 2023-01-08
    length: 30m
  - name: Old West
    description: The guys try to help Mayor Wild West reconnect with his estranged father, Old West.
    released: 2023-02-19
    length: 30m
  - name: Single White Dad
    description: Peter is mistaken for being a single parent, and relishes in the perks that come with it.
    released: 2023-02-26
    length: 30m
  - name: White Meg Can't Jump
    description: Meg joins the Adam West High School basketball team, and her play is fueled by Peter's lambasting from the crowd. Meanwhile, Stewie goes down a rabbit hole of conspiracies, which ultimately ends with him developing multiple personalities.
    released: 2023-03-05
    length: 30m
  - name: Adoptation
    description: To restore his public image, Carter adopts a young girl from an orphanage, drawing jealousy from Lois.
    released: 2023-03-12
    length: 30m
  - name: The Bird Reich
    description: To take advantage of a work policy granting leave in the event of a pet's death, Peter adopts the oldest bird he can find... and realizes it used to belong to Hitler. Meanwhile, after giving Stewie a signed copy of his book, Brian finds it in a free library, causing Brian to give up writing.
    released: 2023-04-16
    length: 30m
  - name: A Bottle Episode
    description: Lois is blocked from a vacation rental app and accused of stealing after the family's trip to Nantucket. Meanwhile, Stewie and Brian buy saltwater taffy in bulk, and try their hands at door-to-door sales in the community.
    released: 2023-04-16
    length: 30m
  - name: Vat Man and Rob 'Em
    description: When Peter gets a job as the new night watchman, he and the guys turn Pawtucket Brewery into an after-hours bar. Meanwhile, Stewie and Brian's plan to collect "lost dog" return money backfires when Brian is used for a dangerous TikTok stunt.
    released: 2023-04-23
    length: 30m
  - name: From Russia with Love
    description: After Brian's Instagram is hacked, Meg takes Stewie and Brian to Russia, only to realize she'd rather stay there. Meanwhile, Lois reverts to her tormented teenage self when Quagmire starts dating her high school bully.
    released: 2023-04-30
    length: 30m
  - name: Adult Education
    description: Meg gets married in Russia but returns home after discovering she was used for a green card marriage. Meanwhile, Chris, in need of an extracurricular activity, joins Principal Shepherd in shooting pornos at the high school.
    released: 2023-05-07
    length: 30m
