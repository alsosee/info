name: The Wire
series: The Wire
description: >
  A Baltimore homicide detective pushes his department into investigating the Barksdale drug organization, creating a wiretap case shaped by bureaucracy, street-level survival, and competing loyalties.
  The first season focuses on the collision between police institutions and the West Baltimore drug trade.
