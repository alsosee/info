episodes:
  - name: Get Your Freak Off
    description: Hank stops Bobby from listening to some of the modern music he considers to be trash and ends up giving his approval to a boy band until he see's Bobby doing very suggestive dance moves at a concert.
    released: 2002-11-03
    length: 30m
  - name: The Fat and the Furious
    description: Bill gets wrapped up in food eating contests when he becomes the center of attention. Peggy does everything she can to keep Bobby from finding out there are food contests out there.
    released: 2002-11-10
    length: 30m
  - name: Bad Girls, Bad Girls, Whatcha Gonna Do
    description: Bobby meets a tough gal cousin of Connie's and gets drawn in to helping her make drugs thinking it is candy for a school science fair.
    released: 2002-11-17
    length: 30m
  - name: Goodbye Normal Jeans
    description: Hank is discouraged when Bobby takes a home economics course, until he starts to reap the benefits. Bobby learns to cook, clean and sew better than Peggy, causing a jealous streak that leaves Peggy a bit unstable during the holidays. After she takes off with the raw Thanksgiving turkey on Bobby's bike, Hank realizes that he needs to make ammends.
    released: 2002-11-24
    length: 30m
  - name: Dances with Dogs
    description: 'Hank and Bobby go head to head in a craze imported from Canada: dog dancing. Hank catches Bobby Dog Dancing with LadyBird, and he is furious. He demands that Bobby stop. Bobby takes on Connie''s dog, ''Doggie'' as his next partner, and they begin to train. Meanwhile, LadyBird lets Hank know that she wants to dance, so the competition begins, Old school vs. New age. When a competition comes to town, they showcase their talents, along with Bill, who purchased a Rottweiller that hates him.'
    released: 2002-12-01
    length: 30m
  - name: The Son Also Roses
    description: Hank becomes obsessed with Bobby's new project of growing roses for show.
    released: 2002-12-08
    length: 30m
  - name: The Texas Skilsaw Massacre
    description: Hank discovers that Dale has dug a tunnel all the way from his home to under Hanks kitchen when he falls through the floor. He has to move out of his house until the floor is safe again and stays with the Gribbles. He is then cutting the wood and Dale puts his hand in front of the skill saw not paying attention and Hank cuts a finger off. Hank then has to take a anger management course when Gribble files charges.
    released: 2002-12-15
    length: 30m
  - name: Full Metal Dust Jacket
    description: Peggy persuades Hank to take over the lease for a local bookstore that is closing so she can be part of a exclusive book club.
    released: 2003-01-05
    length: 30m
  - name: Pigmalion
    description: Peggy forces Luanne to quit her job as a waitress, and then signs her up for a course on enterpreneurism. There she meets Trip Larsen, head of Larsen Pork Products. Trip takes an interest in Luanne, and she soon becomes his girlfriend. Peggy suspects that Trip may be crazy, but when she orders Luanne to break up with him, Luanne refuses and moves in with Trip at his mansion. Trip forcibly dyes Luanne's hair red and makes her dress in a milkmaid's outfit. Luanne discovers that he is trying to turn her into the Larsen Pork Products Girl, an advertising character his grandfather created.
    released: 2003-01-12
    length: 30m
  - name: Megalo Dale
    description: The Mega Lo Mart has a pest-control problem, and the manager asks Hank to recommend an exterminator. Though fearing that Dale will screw it up, Hank reluctantly recommends him for the job, because he needs the work. The extermination process begins, and he soon suspects that the real culprit is not rats, not mice, but Mega Lo Mart spokesman Chuck Mangione. With hank's reputation on the line, he takes matters into his own hands.
    released: 2003-01-12
    length: 30m
  - name: Boxing Luanne
    description: Buck Strickland and his brother puts LuAnne into show fights, she is unaware that the fights are rigged. Peggy convinces Luanne to fight George Foreman's daughter Freeda in the ring.
    released: 2003-02-02
    length: 30m
  - name: Vision Quest
    description: John Redcorn worry's about Dales ability to raise Joseph and attempts to teach him in a round about way of his heritage. Dale decides that he is a Native American after having a vision.
    released: 2003-02-09
    length: 30m
  - name: Queasy Rider
    description: Hank makes weekend plans without consulting Peggy, and the fallout drives them to a marriage counselor. The therapist learns that one of the couple's dreams is to own his-and-hers motorcycles, and suggests they buy one and share it in an effort to bring them together. His plan backfires when, on the advice of a middle-aged biker couple, the pair head to Sturgis, S.D., for an annual biker gathering. Hank refuses to share the driving with Peggy, fearing that he will be mocked, but when Hanks glasses get trampled, and he can't see...he has no alternative but to take a back seat.
    released: 2003-02-16
    length: 30m
  - name: Board Games
    description: Peggy, Minh and Nancy resolve to save an after-school program from being shut down, but political back-stabbing ensues when all three of them want to run for a seat on the school board. Each one turns on the other, and in the course of all of the trickery, they lose sight of what is important.
    released: 2003-03-02
    length: 30m
  - name: An Officer and a Gentle Boy
    description: Hank gets frustrated with Bobby not doing what he is told and sends him to the Military Academy that Cotton Hill went to as a cadet.
    released: 2003-03-09
    length: 30m
  - name: The Miseducation of Bobby Hill
    description: Hank introduces Bobby to the world of propane and propane accessories, meanwhile, Bill straps weather balloons to a chair and attempts to fly with the assistance of Gribble and Boomhauer.
    released: 2003-03-16
    length: 30m
  - name: The Good Buck
    description: Buck Strickland loses Strickland North because of his gambling and his wife leaves him. Hank then turns him on to Jesus and Buck ends up with Luanne as his bible teacher much to Hank and Peggy's distress. Bobby becomes a food fancier while doing track.
    released: 2003-03-30
    length: 30m
  - name: I Never Promised You an Organic Garden
    description: Peggy takes over teaching the schools organic garden, then Hank gets involved. Meanwhile, Dale, Bill and Boomhauer get involved with collecting compost and Dale figures Bat guano will be perfect.
    released: 2003-04-13
    length: 30m
  - name: Be True to Your Fool
    description: The guys boot Bill out of the group after catching head lice from him, Bill ends up in jail and Hank tries to help him.
    released: 2003-04-27
    length: 30m
  - name: Racist Dawg
    description: After Ladybird attacks a black plumber, the man accuses the dog and Hank of being racist. Hank then sets out to prove that he is not racist and has to figure out why Ladybird attacked the man in the first place.
    released: 2003-05-04
    length: 30m
  - name: Night and Deity
    description: Dale calls upon a master exterminator when he has problems with pigeons in the neighborhood and can not get rid of them, Nancy starts to get jealous when they hit it off so well.
    released: 2003-05-11
    length: 30m
  - name: Maid in Arlen
    description: Kahn's mother starts doing maid work for people in the neighborhood and Kahn is aghast.
    released: 2003-05-18
    length: 30m
  - name: The Witches of East Arlen
    description: Hank is enthusiastic about Bobby's new hobby of cards, envisioning his son as an aspiring poker shark. But they're really tarot cards, and Bobby's fortune-telling brings him to a coven led by a nerdy thirtysomething who urges him to focus his energies on developing otherworldly powers and defying his father.
    released: 2003-05-18
    length: 30m
