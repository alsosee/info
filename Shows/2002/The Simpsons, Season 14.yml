  - name: Treehouse of Horror XIII
    description: '"Treehouse of Horror XIII" finds Homer cloned; Dr. Hibbert turning the family into half animals; and Springfield invaded by zombie cowboys.'
    released: 2002-11-03
    length: 30m
  - name: How I Spent My Strummer Vacation
    description: Mick Jagger, Keith Richards, Tom Petty, Elvis Costello, Lenny Kravitz and Brian Setzer are the teachers when Homer attends a rock-and-roll fantasy camp.
    released: 2002-11-10
    length: 30m
  - name: Bart vs. Lisa vs. 3rd Grade
    description: After testing, Lisa is moved up a grade and Bart is held back so they are both in the 3rd grade together. The teacher thinks Bart is the smarter of the two since he already knows everything. They go on a field trip to Capital City and get left behind and lost. Blackboard 'Fish do not like Coffee'.
    released: 2002-11-17
    length: 30m
  - name: Large Marge
    description: Marge gets breast implants meant for Mayor Quimby's young girlfriend; Bart and Milhouse spot Krusty the Clown on a old episode of Batman.
    released: 2002-11-24
    length: 30m
  - name: Helter Shelter
    description: 'The Simpsons end up with termites after going to a hockey game and have to stay out of their house for 6 months. They end up on a reality series where they live in a 1880''s type house and life style. Blackboard: ''Milhouse did not test cootie positive''.'
    released: 2002-12-01
    length: 30m
  - name: The Great Louse Detective
    description: 'Someone''s trying to kill Homer, so Chief Wiggum consults an expert: Sideshow Bob, who moves in with the Simpsons to shadow Homer.'
    released: 2002-12-15
    length: 30m
  - name: Special Edna (a.k.a. Love and Marking)
    description: Bart feels sorry for Mrs. Krabappel after she is stood up by Principle Skinner, so he nominates her for an award.
    released: 2003-01-05
    length: 30m
  - name: The Dad Who Knew Too Little
    description: Homer feels bad because he does not know much about Lisa so he hires a private detective to spy on her. He then becomes a big hit with her because of the information.
    released: 2003-01-12
    length: 30m
  - name: The Strong Arms of the Ma
    description: After she is mugged, Marge retreats to the basement to lift weights. She then becomes obsessed with body building. Marge starts entering contests and her disposition changes as she gets stronger. Blackboard reads 'This school does not need a "regime change"'.
    released: 2003-02-02
    length: 30m
  - name: Pray Anything
    description: Jealous of Ned Flanders winning money at a sports event, Homer starts praying to God for good things to happen then develops a hedonistic lifestyle. Blackboard reads 'Spongebob is not a contraceptive'.
    released: 2003-02-09
    length: 30m
  - name: Barting Over
    description: While doing spring cleaning, Lisa comes across a video cassette of a add Bart did as baby "Stink Breath". Bart gets so mad about Homer having spent his earnings from the add that he asks the court to emancipate him from the family. Blackboard reads 'I will not'.
    released: 2003-02-16
    length: 30m
  - name: I'm Spelling As Fast As I Can
    description: Spelling champ Lisa makes the Spellympics, where host George Plimpton proposes a deal; Homer joins a traveling fan club for a new Krusty food product.
    released: 2003-02-16
    length: 30m
  - name: A Star is Born Again
    description: Ned becomes lonely when all the Springfield family's spend a day at the beach with their significant others and ends up dating an actor.
    released: 2003-03-02
    length: 30m
  - name: Mr. Spritz Goes to Washington
    description: Hoping to reroute air traffic over their house, the Simpsons ask Krusty to run for Congress, where the successful clown finds more of his kind.
    released: 2003-03-09
    length: 30m
  - name: C. E. D'oh
    description: Homer's stint in a success workshop gives him new initiative, but Mr. Burns' lack of appreciation prompts Homer to plot revenge, which results in a takeover of the power plant.
    released: 2003-03-16
    length: 30m
  - name: '''Scuse Me While I Miss the Sky'
    description: Lisa searches for a steady career after a British filmmaker makes her feel inadequate and decides on astronomy.
    released: 2003-03-30
    length: 30m
  - name: Three Gays of the Condo
    description: While looking for a puzzle piece, Homer comes across a letter Marge wrote about how upset she was with Homer right before they were married. He thinks she married him because she became pregnant with Bart and moves out.
    released: 2003-04-13
    length: 30m
  - name: Dude, Where's My Ranch?
    description: Musician David Byrne offers to produce the song that Homer wrote about how much he dislikes his neighbor Ned Flanders. The Simpsons then go to a Dude Ranch where Lisa meets a special boy.
    released: 2003-04-27
    length: 30m
  - name: Old Yeller-Belly
    description: When Homer is trapped, the dog ignores him and he is saved by the cat. Homer then says he has no dog. H.K. Duff, owner of Duff beer makes the Simpsons dog, Santa's Little Helper the Duff mascot. Blackboard reads 'my pen is not a booger launcher'.
    released: 2003-05-04
    length: 30m
  - name: Brake My Wife, Please
    description: Homer has his drivers license revoked by Judge Harm which forces Marge to do all the driving for the family.
    released: 2003-05-11
    length: 30m
  - name: The Bart of War
    description: Busted for a prank gone awry, Milhouse and Bart are enrolled in different youth groups that become heated rivals. Blackboard reads 'sandwiches should not contain sand'.
    released: 2003-05-18
    length: 30m
  - name: Moe Baby Blues
    description: Homer and Marge permit Moe to baby sit Maggie and she takes a shine to Moe, which causes Homer to become jealous.
    released: 2003-05-18
    length: 30m
