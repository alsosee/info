  - name: A Rover Runs Through It
    description: Peggy returns home to Montana after receiving a phone call from her mother, only to discover that the family may lose the land because of taxes and Henry Winkler.
    released: 2004-11-07
    length: 30m
  - name: Ms. Wakefield
    description: With Christmas just around the corner, the Hills are just starting to get things rolling for the Holiday season and they receive a visit from elderly Ms. Wakefield who lived in their house as a child.
    released: 2004-12-19
    length: 30m
  - name: Death Buys a Timeshare
    description: Hank cleans up Cotton's mess when, after he inherits $ 10,000 Cotton is suckered into buying a time share down in Mexico.
    released: 2005-01-16
    length: 30m
  - name: Yard, She Blows!
    description: Hanks wish is granted when Bobby accidentally shoots a garden gnome Peggy put in the front yard.
    released: 2005-01-23
    length: 30m
  - name: Dale to the Chief
    description: Hank battles through a mountain of red tape to get his new drivers license corrected; Dale becomes pro-U.S. after losing a belief in conspiracies.
    released: 2005-01-30
    length: 30m
  - name: The Petriot Act
    description: Right before they due to leave for vacation, Hank agrees to serve his country by caring for a soldiers pet after seeing Bill with a nice Golden Retriever.
    released: 2005-02-13
    length: 30m
  - name: Enrique-cilable Differences
    description: Hank becomes very uncomfortable when his co-worker Enrique starts having problems at home and forces his way into Hanks personal life.
    released: 2005-02-20
    length: 30m
  - name: Mutual of OmAbwah
    description: Hank discovers that their homeowners insurance has lapsed and they declare a state of emergency to protect the house from disasters. Dale plays with bee's.
    released: 2005-03-06
    length: 30m
  - name: Care-Takin' Care of Business
    description: When the Tom Landry Middle School football team has to forfeit a game due to poor field maintenance, the booster club resolves to replace the school's elderly groundskeeper, Smitty, and Hank resolves to help him keep his job by secretly doing upkeep on the field. Meanwhile, Luanne starts dating a redneck named Lucky, much to Peggy's dismay.
    released: 2005-03-13
    length: 30m
  - name: Arlen City Bomber
    description: 'To pay off her credit card debt, Luanne takes a second job: skating with a roller derby team. Peggy ends up joining the team as well and the two of them get in even more financial trouble when they try to start their own team on borrowed money.'
    released: 2005-03-27
    length: 30m
  - name: Redcorn Gambles with His Future
    description: Buck Strickland chooses Hank to plan the companys big event and John Redcorn tries to talk Hank into hiring his hard rock band. When he is turned down, Redcorn decides to have a casino built as a venue for his band to play at, however he is unaware of Texas law relating to gambling.
    released: 2005-04-10
    length: 30m
  - name: Smoking and the Bandit
    description: In an effort to both impress Joseph and to protest a smoking ban in Arlen, Dale goes from bar to bar disguised as the Smoking Bandit.
    released: 2005-04-17
    length: 30m
  - name: Gone with the Windstorm
    description: When Nancy Gribbles weather report is wrong, the station gets new equipment in and replaces her as weather girl with a knowledgeable meteorologist. She then goes to extreme measures to remain as part of the news team. Bobby is hassled by a fellow student who finds numerous strange ways to scare him.
    released: 2005-05-01
    length: 30m
  - name: Bobby on Track
    description: Hank encourages Bobby to join the track team but the coach uses Bobby to motivate the other runners.
    released: 2005-05-08
    length: 30m
  - name: It Ain't Over Till the Fat Neighbor Sings
    description: Bill ends up joining an all male chorus and the guys support him until he becomes obsessed with the group and stops reporting for duty at the Army base.
    released: 2005-05-15
    length: 30m
