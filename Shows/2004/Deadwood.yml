name: Deadwood
series: Deadwood
description: >
  Former marshal Seth Bullock arrives in the lawless gold-mining camp of Deadwood, where saloon owner Al Swearengen already controls much of the settlement's violent economy.
  The first season follows a frontier community forming its own unstable order before formal law arrives.
