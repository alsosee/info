  - name: Undercover Burns
    description: Mr. Burns goes undercover as "Fred" at the nuclear power plant and becomes friends with Homer and the gang. Burns implements all sorts of amenities to improve his employees' lives, but a jealous Smithers plots to bring the old, bitter Burns back and destroy Fred.
    released: 2020-09-27
    length: 30m
  - name: I, Carumbus
    description: At a museum exhibit of Ancient Rome, Marge and Homer get into an argument about Homer's lack of ambition. They then imagine a Roman version of what would happen if Homer was more career-driven.
    released: 2020-10-04
    length: 30m
  - name: Now Museum, Now You Don't
    description: Lisa stays home from school to explore the wonders of Western art. She appears as Lisanardo, while Bart takes the shape of a French impressionist, Homer and Marge as Diego Rivera and Frida Kahlo, and Maggie as a warrior Cupid.
    released: 2020-10-11
    length: 30m
  - name: Treehouse of Horror XXXI
    description: 'Don''t miss the annual terror-themed trilogy, including a frightening look at the 2020 election, parodies of Pixar and Spider-Man: Into the Spider-Verse and a ninth birthday Lisa just can''t get over.'
