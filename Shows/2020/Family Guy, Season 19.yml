episodes:
  - name: Stewie's First Word
    description: Stewie finally says his first word, and it's a swear. When Lois is shunned by the other moms, she tries to figure out where Stewie could have possibly learned it.
    released: 2020-09-27
    length: 30m
  - name: The Talented Mr. Stewie
    description: Stewie "breaks up with" Rupert after learning that he used to belong to Chris. Unable to get over his feelings of betrayal, Stewie decides to take action.
    released: 2020-10-04
    length: 30m
  - name: Boys & Squirrels
    description: When Peter injures himself and a family of squirrels in a chainsaw accident, Chris and Stewie take in one of the injured rodents to nurse it back to health. Meanwhile, a chiropractor fixes Peter's injury by realigning his spine - and restoring him to his "true height" of 6'5".
    released: 2020-10-11
    length: 30m
  - name: Cutawayland
    description: Peter and Lois accidentally set up a cutaway gag together, which somehow transports them into the cutaway itself.
    released: 2020-11-01
    length: 30m
  - name: La Famiglia Guy
    description: When Joe asks Peter to be the godfather to his daughter, Peter commits to his mistaken interpretation of the role so much that he becomes a real gangster.
    released: 2020-11-08
    length: 30m
  - name: Meg's Wedding
    description: Meg plans her wedding to an unexpected Quahog resident. Meanwhile, Peter finds a new vest and on one of many adventures fitting for his new attire, his arms are torn off and he is left with tiny hands that have yet to grow back.
    released: 2020-11-15
    length: 30m
  - name: Wild Wild West
    description: Lois and Peter are divided by differing views on who the next Mayor of Quahog should be. Upset at Lois' first choice, Peter seeks out the late Mayor Adam West's cousin, Wild Wild West.
    released: 2020-11-22
    length: 30m
  - name: Pawtucket Pat
    description: Brian's new job as a journalist leads him to uncover that Pawtucket Pat, Quahog's hero and brewery founder, took part in racist actions against Native Americans. The town becomes divided on whether or not to remove the statue that commemorates him.
    released: 2020-12-06
    length: 30m
  - name: The First No L
    description: When the family fails to help Lois with the Christmas shopping, she walks out on the family and the Griffins must try to save Christmas on their own.
    released: 2020-12-13
    length: 30m
  - name: Fecal Matters
    description: When Peter makes it through a bad flu season without getting sick, the hospital asks him to volunteer as a nurse, but he finds himself at a crossroads when his mortal enemy, The Giant Chicken, is admitted to the ER. Meanwhile, Brian receives his genetic test results and learns he is part cat, causing him to have an identity crisis.
    released: 2021-01-17
    length: 30m
  - name: Boy's Best Friend
    description: While Brian bonds with the son of his new girlfriend. Meanwhile, Peter, Quagmire and Cleveland take a joy ride in Joe's new classic corvette.
    released: 2021-02-21
    length: 30m
  - name: And Then There's Fraud
    description: After attending a baseball game, Peter and Chris are inspired to start a memorabilia business. Meanwhile, Stewie tries to combat aging by getting plastic surgery, but ends up taking it too far.
    released: 2021-02-28
    length: 30m
  - name: PeTerminator
    description: Stewie designs a "Terminator" Peter robot to destroy Lois for trying to feed him broccoli, but when things don't go according to plan, Stewie and Brian must go on a Terminator-esque mission to save Stewie's life.
    released: 2021-03-07
    length: 30m
  - name: The Marrying Kind
    description: Stewie gets a mail order bride from Ukraine and experiences domestic life. Meanwhile, Peter and Chris become addicted to free hotel breakfast buffets.
    released: 2021-03-14
    length: 30m
  - name: Customer of the Week
    description: After feeling unappreciated by her family, Lois taps into her villainous side and attempts to win "Best Customer" at her favorite coffee shop.
    released: 2021-03-28
    length: 30m
  - name: Who's Brian Now?
    description: Brian has a microchip that reveals he had a family before the Griffins, when he then seeks out. After meeting the richer, smarter Hendersons, Brian struggles to enjoy his life with the Griffins as much as he once did.
    released: 2021-04-11
    length: 30m
  - name: The Young Parent Trap
    description: Lois and Peter are mistaken for "young parents" by another couple at Stewie's school and invited to live in a millennial apartment complex, leaving Meg and Chris home alone.
    released: 2021-04-18
    length: 30m
  - name: Meg Goes to College
    description: Meg deals with a college admissions scandal, while Brian embarks on a fitness journey.
    released: 2021-05-02
    length: 30m
  - name: Family Cat
    description: Brian tries to convince The Griffins that their new adopted cat, Pouncy, is evil.
    released: 2021-05-09
    length: 30m
  - name: Tales of Former Sports Glory
    description: The guys regale each other with stories of youthful athletic accomplishments. Cleveland was a teenage baseball player from Cuba, Quagmire was a bad boy tennis superstar from New York and Peter was an underdog boxer from Philadelphia.
    released: 2021-05-16
    length: 30m
