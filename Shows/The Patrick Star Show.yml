name: The Patrick Star Show
series: SpongeBob SquarePants
description: >
  The Patrick Star Show follows Patrick Star as he hosts a variety-style program
  from his family home. The spin-off pushes SpongeBob's surreal comedy into
  sketch segments, time travel, commercials, and side stories about the Star
  family and other Bikini Bottom residents.
