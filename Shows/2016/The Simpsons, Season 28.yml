episodes:
  - name: Monty Burns' Fleeing Circus
    description: 'When Springfield is burned to the ground, the Simpsons beg Mr. Burns to fund its rebuilding. Burns agrees – with one condition: he gets to put on a variety show at the Springfield Bowl. Blackboard: ''This arm needs Tommy John surgery''.'
    released: 2016-09-25
    length: 30m
  - name: Friends and Family
    description: 'Mr. Burns hires the Simpsons to play his live-in virtual reality family, but excludes Homer so that he may play dad. Now alone, Homer finds a new best friend in girl-next-door Julia, who eats, drinks and thinks like him. Blackboard: ''I will stop losing 50% of my NFL lead-in''.'
    released: 2016-10-02
    length: 30m
  - name: The Town
    description: After Homer catches Bart rooting for Springfield's football rival, the Boston Americans, he plans a family "hate-cation" trip to Boston in an attempt to show Bart that Boston is a terrible city.
    released: 2016-10-09
    length: 30m
  - name: Treehouse of Horror XXVII
    description: In the midst of a major drought, Mr. Burns introduces a Hunger Games-style contest in which Springfield's children fight each other for a day in Burns' personal reservoir. Meanwhile, Lisa's imaginary best friend, Rachel, is jealous of Lisa's real best friends and starts killing them. Moe tells Bart that the barflies are actually covert agents and that he wants Bart join their team in Homer's place.
    released: 2016-10-16
    length: 30m
  - name: Trust But Clarify
    description: 'Lisa and Bart investigate Krusty''s suspicious new "Krustaceans" candy. Meanwhile, Homer wants a promotion at the nuclear plant and asks Marge to help him dress the part, and news anchor Kent Brockman struggles to find his feet in the changing media world. Blackboard: ''The first episode of the second 600''.'
    released: 2016-10-23
    length: 30m
  - name: There Will Be Buds
    description: 'Homer gets roped into coaching the kids'' lacrosse team with Milhouse''s dad, Kirk, who is in desperate need of a friend. When Kirk gets too clingy, Homer vents about how much of a loser he is. Kirk overhears his rant and disappears, right when the team needs him most: the championship game.'
    released: 2016-11-06
    length: 30m
  - name: Havana Wild Weekend
    description: 'When the Retirement Castle and the V.A. Hospital can''t solve Grampa''s health issues, the Simpsons decide to take a family trip to Cuba to get him cheap medical care. Blackboard: ''Being right sucks''.'
    released: 2016-11-13
    length: 30m
  - name: Dad Behavior
    description: 'Homer finds a new app that makes his life much easier and outsources his father-son bonding. Meanwhile, Grampa finds that he is about to be a father again. Blackboard: ''I will watch all 600 episodes without sleeping''.'
    released: 2016-11-20
    length: 30m
  - name: The Last Traction Hero
    description: A workplace accident leaves Homer in a cast, and in a position to sue Mr. Burns. This leaves Marge unfulfilled, so she turns to an unexpected source for romance. Meanwhile, Lisa is made "Bus Monitor" and tries to keep the peace.
    released: 2016-12-04
    length: 30m
  - name: The Nightmare After Krustmas
    description: Krusty tries to impress his daughter as they spend Christmas with the Simpsons. Meanwhile, Reverend Lovejoy seeks converts after church attendance plummets, and Maggie is haunted by a spooky Christmas toy.
    released: 2016-12-11
    length: 30m
  - name: Pork & Burns
    description: When Marge becomes obsessed with a Japanese style of living, the Simpsons must part with any item that no longer brings them joy. For Homer, this means finding a new home for the family pig. For Lisa, it means saying goodbye to her beloved sax.
    released: 2017-01-08
    length: 30m
  - name: The Great Phatsby, Part One
    description: Mr. Burns tries to relive his glory days, and crosses paths with a mysterious music mogul. After being conned by him and reduced to bankruptcy, Mr. Burns seeks revenge on the music producer with the help of Homer, Bart, rapper Jazzy James and the mogul's ex-wife, Praline. Also, Lisa is courted by the richest kid in town, Smithers begins a perilous journey and Marge opens an obscure boutique store.
    released: 2017-01-15
    length: 60m
  - name: The Great Phatsby, Part Two
    description: Mr. Burns tries to relive his glory days, and crosses paths with a mysterious music mogul. After being conned by him and reduced to bankruptcy, Mr. Burns seeks revenge on the music producer with the help of Homer, Bart, rapper Jazzy James and the mogul's ex-wife, Praline. Also, Lisa is courted by the richest kid in town, Smithers begins a perilous journey and Marge opens an obscure boutique
    released: 2017-01-15
    length: 30m
  - name: Fatzcarraldo
    description: 'When all the fast food restaurants in Springfield become healthy, Homer turns to the last bastion of greasy food for comfort; Lisa must find a good news story when her school radio station is in jeopardy. Blackboard: ''If we''re so good at predicting how come my dad bet on Atlanta''.'
    released: 2017-02-12
    length: 30m
  - name: The Cad and the Hat
    description: When Bart betrays Lisa, he has to deal with his guilt – literally. Meanwhile, Springfield is in awe when Homer is revealed to be a chess savant.
    released: 2017-02-19
    length: 30m
  - name: Kamp Krustier
    description: 'When Bart and Lisa return home abruptly after a traumatic incident at Kamp Krustier, they put an end to Homer and Marge''s romantic encounters. Without sex to distract him, Homer becomes a more productive worker and caring husband, but Marge misses the old Homer. Then, Bart and Lisa return to camp to confront the source of their trauma. Blackboard: ''We''re the only house where the Christmas tree is still up''.'
    released: 2017-03-05
    length: 30m
  - name: 22 for 30
    description: In this parody of a cable sports show, Bart goes from delinquent with detention to the star basketball player at Springfield Elementary. Lisa covers Bart's success for the school paper, and Homer becomes the team's coach. Things go awry when Bart gets involved with the mafia.
    released: 2017-03-12
    length: 30m
  - name: A Father's Watch
    description: Worried that Bart is destined for failure, Marge turns to a series of parenting "experts" for advice. Homer decides to cash in on one expert's advice by opening up a trophy store in Springfield. Meanwhile, Bart finds some needed encouragement from Grampa, who gives him a precious watch coveted by Homer.
    released: 2017-03-19
    length: 30m
  - name: Caper Chase
    description: Disappointed in Yale, Mr. Burns decides to start his own for-profit university and Homer is hired as a professor.
    released: 2017-04-02
    length: 30m
  - name: Looking for Mr. Goodbart
    description: Bart gets in trouble on Grandparents Day at school and is forced to hang out with Skinner's mother as punishment. After spending time with various grandmas in the neighborhood, he learns the benefits of hanging out with the elderly, but eventually recognizes the dangers of taking advantage of them. Meanwhile, Peekimon Get has taken over the town of Springfield.
    released: 2017-04-30
    length: 30m
  - name: Moho House
    description: Homer and Marge attempt to work on their marriage, not knowing that Mr. Burns and Nigel have a bet on whether Nigel can break them apart. With the successful, albeit unconventional, help of Moe, the couple gets back their mojo.
    released: 2017-05-07
    length: 30m
  - name: Dogtown
    description: When Homer's court case determines that a dog's life is more valuable than a human's is, the status of man's best friend rises in Springfield. When the dogs recognize their new position of power, they assert their dominance over the humans.
    released: 2017-05-21
    length: 30m
