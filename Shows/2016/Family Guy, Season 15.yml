episodes:
  - name: The Boys in the Band
    description: Stewie and Brian form a children's band that quickly rises to fame until they let a girl get between them and drive the band apart. Meanwhile, Peter and Lois insist that Chris gets a job so he takes a job managing Quagmire's sex life as his personal assistant.
    released: 2016-09-25
    length: 30m
  - name: Bookie of the Year
    description: Brian and Lois decide it's time for Chris to work out his anger management issues by taking up a sport. Chris surprises everyone and becomes a star baseball pitcher, which turns Peter into a gambling father, as he bets on his son's baseball games. Meanwhile, Stewie, Brian and Frank Sinatra Jr. attempt to open an Italian restaurant.
    released: 2016-10-02
    length: 30m
  - name: American Gigg-olo
    description: After the local airline pilots go on strike, Quagmire looks for new work and becomes a gigolo. When his clients begin to avoid paying for his services, he asks Peter for help getting his money. Meanwhile, Brian is kicked off Peter's health insurance, so he gets a job at a hardware store, until Stewie gets him fired and things get medical.
    released: 2016-10-16
    length: 30m
  - name: Inside Family Guy
    description: FAMILY GUY takes viewers behind the scenes of a regular FAMILY GUY production week, with James Woods as the guide. See the ins-and-outs of what goes into the making of a FAMILY GUY episode and watch the drama unfold as Peter is replaced and ends up in the office of Fox Television Group Chairmen and CEOs Dana Walden and Gary Newman to pitch his very own new series.
    released: 2016-10-23
    length: 30m
  - name: Chris Has Got a Date, Date, Date, Date, Date
    description: Taylor Swift agrees to go to a homecoming dance with Chris after he asks her via online video. However, when she starts to fall for him, her music takes a hit. Meanwhile, Peter decides to try a new profession and sees firsthand what it's like to be an Uber driver.
    released: 2016-11-06
    length: 30m
  - name: Hot Shots
    description: In order to "save" Stewie from autism, Peter and Lois decide not to vaccinate him and then proceed to convince the rest of Quahog to follow suit. Stewie runs away to save himself from diseases until Sean Penn (guest-voicing as himself) swoops in to save the day and brings vaccines to the whole town.
    released: 2016-11-13
    length: 30m
  - name: High School English
    description: 'In an anthology episode, the cast reenacts three classic pieces of literature commonly taught in high school: "The Great Gatsby," "The Adventures of Huckleberry Finn" and "Of Mice and Men".'
    released: 2016-11-20
    length: 30m
  - name: Carter and Tricia
    description: Carter buys the Pawtucket Patriot brewery and decides to cut some corners to save a few bucks. Peter overhears the plan and runs and tells investigative journalist Tricia Takanawa about Carter's plan to use toxic chemicals in the beer cans. Meanwhile, Brian's drivers' license has expired and he enlists Stewie as an instructor.
    released: 2016-12-04
    length: 30m
  - name: How the Griffin Stole Christmas
    description: Peter is asked to fill in for the mall Santa, until he gets drunk on the power when he realizes that Santa can get away with anything. Meanwhile, Stewie and Brian crash holiday office parties for the free food, drama and women.
    released: 2016-12-11
    length: 30m
  - name: Passenger Fatty-Seven
    description: Quagmire scores free friends-and-family plane tickets for a guys' trip to San Francisco. However, after seeing the auto-pilot function, the boys doubt Quagmire's flying skills. Then, unforeseen events in the air put Quagmire's abilities to the test.
    released: 2017-01-08
    length: 30m
  - name: Gronkowsbees
    description: Rob Gronkowski, of the New England Patriots, moves into the house behind the Griffins, and the guys enjoy partying with him until his antics become overwhelming. Meanwhile, Stewie begins beekeeping and gives his bees steroids to produce more honey, but instead they become aggressive.
    released: 2017-01-15
    length: 30m
  - name: Peter's Def Jam
    description: The guys try to start a podcast, but Peter goes solo and branches out as a DJ. Meanwhile, back at the Griffin home, Lois' allergy forces Brian to move into Stewie's bedroom and the two have roommate difficulties.
    released: 2017-02-12
    length: 30m
  - name: The Finer Strings
    description: The guys decide to form a string quartet, but Peter doesn't make the cut. Meanwhile, Brian is forced to be Carter's seeing eye dog and enjoys the life of luxury a little too much.
    released: 2017-02-19
    length: 30m
  - name: The Dating Game
    description: Quagmire discovers the "dating" app Tinder, forcing Peter, Joe and Cleveland to intervene and save him from his soul-sucking hedonism. Meanwhile, Stewie finds out that he has scoliosis and learns the perks of his latest diagnosis.
    released: 2017-03-05
    length: 30m
  - name: Cop and a Half-Wit
    description: Peter helps Joe out with several crime cases, but when Joe tries to take all the credit, Peter gets extremely angry. Meanwhile, Brian convinces Stewie to join a football team and panics when he gets a concussion.
    released: 2017-03-12
    length: 30m
  - name: Saturated Fat Guy
    description: In an attempt to avoid eating the healthy food that Lois forces him to eat, Peter opens up his own food truck with fattening foods. Meanwhile, Meg joins a roller derby team, despite Chris thinking it's too dangerous.
    released: 2017-03-19
    length: 30m
  - name: Peter's Lost Youth
    description: Peter gets jealous of Lois when she upstages him at a Red Sox fantasy baseball camp. Meanwhile, Stewie runs away from home when Meg is left to babysit him.
    released: 2017-03-26
    length: 30m
  - name: The Peter Principal
    description: Peter becomes the temporary principal at the high school, and Meg uses his new power to get even with her bullies. Meanwhile, Brian and Stewie open a bed & breakfast that quickly turns into a brothel.
    released: 2017-04-30
    length: 30m
  - name: Dearly Deported
    description: When Chris' Mexican girlfriend, Isabella, gets deported, he volunteers to take care of her twin babies. After learning that Isabella can't come back to the U.S., the Griffins go to Mexico to return her children. Then, Peter's past as a sperm donor catches up to him when many of his children show up unannounced to his house.
    released: 2017-05-21
    length: 30m
  - name: A House Full of Peters
    description: Peter's past as a sperm donor catches up to him when many of his children show up unannounced to his house
    released: 2017-05-21
    length: 30m
