name: House of Cards
description: >
  Set in Washington, D.C., the series follows Frank Underwood, a ruthless Democratic Congressman and House Majority Whip.
  After being passed over for a promised appointment as Secretary of State, Underwood embarks on a calculated quest for power and revenge against those who betrayed him.
released: 2013-02-01
genres:
  - drama
  - political drama
network: Netflix
wikipedia: https://en.wikipedia.org/wiki/House_of_Cards_(season_1)
imdb: https://www.imdb.com/title/tt1856010
tmdb: https://www.themoviedb.org/tv/1413-house-of-cards/season/1
creators: Beau Willimon
characters:
  - name: Francis J. Underwood
    actor: Kevin Spacey
  - name: Claire Underwood
    actor: Robin Wright
  - name: Zoe Barnes
    actor: Kate Mara
  - name: Peter Russo
    actor: Corey Stoll
  - name: Douglas "Doug" Stamper
    actor: Michael Kelly
  - name: Linda Vasquez
