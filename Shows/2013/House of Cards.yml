episodes:
  - name: Chapter 1
    description: >
      Congressman Frank Underwood begins a ruthless quest for power after being passed over for a promised cabinet position.
    released: 2013-02-01
    directors: David Fincher
    writers: Beau Willimon
  - name: Chapter 2
    description: >
      Frank starts to manipulate the legislative process and uses journalist Zoe Barnes to leak damaging information about a rival.
    released: 2013-02-01
    directors: David Fincher
    writers: Beau Willimon
  - name: Chapter 3
    description: >
      A local crisis in his home district forces Frank to leave Washington, while Claire hires a new employee for her non-profit.
    released: 2013-02-01
    directors: James Foley
    writers:
      - Keith Huff
      - Beau Willimon
  - name: Chapter 4
    description: >
      Frank orchestrates a political coup within the House to gain leverage, and Zoe's career continues to rise as she works with Frank.
    released: 2013-02-01
    directors: James Foley
    writers:
      - Rick Cleveland
      - Beau Willimon
  - name: Chapter 5
    description: >
      Tensions rise between Frank and a powerful lobbyist over the education bill, while Peter Russo struggles with his personal demons.
    released: 2013-02-01
    directors: Joel Schumacher
    writers: Sarah Treem
  - name: Chapter 6
    description: >
      Frank engages in a high-stakes battle with the teachers' union, using a public incident to force a resolution.
    released: 2013-02-01
    directors: Joel Schumacher
    writers: Sam Forman
  - name: Chapter 7
    description: >
      With the education bill passed, Frank turns his attention to the Vice President and begins grooming Peter Russo for a new role.
    released: 2013-02-01
    directors: Charles McDougall
    writers:
      - Kate Barnow
      - Beau Willimon
  - name: Chapter 8
    description: >
      Frank returns to his old military college for a library dedication, while Peter Russo attempts to win over voters in Pennsylvania.
    released: 2013-02-01
    directors: Charles McDougall
    writers: Beau Willimon
  - name: Chapter 9
    description: >
      Peter Russo's campaign faces challenges on the road, and Frank deals with internal dissent regarding a new environmental bill.
    released: 2013-02-01
    directors: James Foley
    writers:
      - Beau Willimon
      - Rick Cleveland
  - name: Chapter 10
    description: >
      Claire's actions cause a rift with Frank, leading to unexpected consequences for Peter Russo's campaign.
    released: 2013-02-01
    directors: Carl Franklin
    writers: Sarah Treem
  - name: Chapter 11
    description: >
      Frank makes a bold move to secure the Vice Presidency, while Peter Russo's downward spiral reaches a breaking point.
    released: 2013-02-01
    directors: Carl Franklin
    writers:
      - Keith Huff
      - Kate Barnow
      - Beau Willimon
  - name: Chapter 12
    description: >
      Frank travels to meet a mysterious billionaire who has significant influence over the President's decisions.
    released: 2013-02-01
    directors: Allen Coulter
    writers:
      - Gina Gionfriddo
      - Beau Willimon
  - name: Chapter 13
    description: >
      As Frank nears his ultimate goal, Zoe and her colleagues begin to uncover the dark truth behind his rise to power.
    released: 2013-02-01
    directors: Allen Coulter
    writers: Beau Willimon
