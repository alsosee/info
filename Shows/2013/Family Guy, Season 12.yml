episodes:
  - name: Finders Keepers
    description: Peter is convinced that a restaurant placemat is a treasure map. Word quickly spreads about the alleged cache, sparking a city-wide search and turning the citizens of Quahog against each other.
    released: 2013-09-29
    length: 30m
  - name: Vestigial Peter
    description: Peter discovers that he has a vestigial twin, whom he names Chip, growing out of his neck. It's not long before Peter resents the fact that everyone seems to love Chip more than him, so he decides to amputate his twin. However, when Peter gets into trouble, he realizes he needs Chip more than ever.
    released: 2013-10-06
    length: 30m
  - name: Quagmire's Quagmire
    description: When Quagmire meets a woman named Sonja who is as sexually insatiable as he is, he is thrilled to finally be with someone who won't judge him. However, things take a turn for the worse when Sonja abducts Quagmire, intending to make him her sex slave. It is up to Peter, Joe and Quagmire's dad to explore the seedy underbelly of Quahog to find and rescue Quagmire. Meanwhile, a love triangle emerges between Stewie, Brian and Stewie's teddy bear, Rupert,.
    released: 2013-11-03
    length: 30m
  - name: A Fistful of Meg
    description: Meg spills her lunch on the new kid, Michael, who is appropriately nicknamed "Mental Mike." When he sets the date for her end on Friday, Meg tries to get out of it. Meanwhile, Peter continually harasses Brian in the nude until it escalates to the breaking point.
    released: 2013-11-10
    length: 30m
  - name: Boopa-dee Bappa-dee
    description: The Griffins take a trip to Italy and are forced to deal with annoying immigration laws after Peter destroys the family's passports.
    released: 2013-11-17
    length: 30m
  - name: Life of Brian
    description: When Stewie and Brian travel back to 17th century Jamestown, via Stewie's time machine, they encounter too many close calls with altering the course of mankind. Stewie decides to destroy his time machine, but immediately regrets his decision when an unthinkable event happens and he is unable to go back in time.
    released: 2013-11-24
    length: 30m
  - name: Into Harmony's Way
    description: When Peter and Quagmire discover that their singing voices create beautiful harmony together, they form a singing/songwriting team, in the vein of Simon and Garfunkel. However, tensions run high when fame gets to Peter's head.
    released: 2013-12-08
    length: 30m
  - name: Christmas Guy
    description: When Carter Pewterschmidt cancels the annual Quahog Christmas carnival, because he hates the holiday, Peter must transform his father-in-law from a Scrooge into a hometown hero in order to salvage the event. Meanwhile, Stewie devises a master plan to get the one and only thing he wants for Christmas.
    released: 2013-12-15
    length: 30m
  - name: Peter Problems
    description: When Peter finds he can't perform his, um, er, uh, manly duties, he enlists Quagmire and Joe to help him get his mojo back.
    released: 2014-01-05
    length: 30m
  - name: Grimm Job
    description: From Grimm to Griffin, three classic fairy tales get a new Quahog spin, including "Jack and the Beanstalk," "Little Red Riding Hood," and "Cinderella".
    released: 2014-01-12
    length: 30m
  - name: Brian's a Bad Father
    description: When Brian's neglected son Dylan shows up in town as a teen TV star, Brian jumps at the opportunity to be hired on the show's writing staff - instead of being a good father. Meanwhile, after Peter accidentally shoots Quagmire on a hunting trip, the two friends clash and Joe must choose a side.
    released: 2014-01-26
    length: 30m
  - name: Mom's the Word
    description: After Peter's mother passes away, he forms a special friendship with her longtime pal, Evelyn, who attempts to seduce Peter. Meanwhile, Stewie is distraught when he understands the reality of death for the first time.
    released: 2014-03-09
    length: 30m
  - name: 3 Acts of God
    description: Peter grows frustrated when players on opposing teams continue to thank God after defeating his beloved New England Patriots football team, so he and the guys embark on a global quest to find God and ask Him to stop interfering with the outcome of professional football games.
    released: 2014-03-16
    length: 30m
  - name: Fresh Heir
    description: When Chris learns that he is the heir to Carter's fortune - but refuses to take the money - Peter takes drastic measures to keep the wealth in the family.
    released: 2014-03-23
    length: 30m
  - name: Secondhand Spoke
    description: Peter takes up smoking cigarettes, and is approached by Mr. Stone, an advertising executive who wants Peter to be the face of his anti-smoking campaign under the caveat that Peter continues to smoke. Meanwhile, Stewie helps Chris battle bullies at school.
    released: 2014-03-30
    length: 30m
  - name: Herpe the Love Sore
    description: Brian gives Stewie an STD. Meanwhile, Peter and the guys fight back when another group claims their booth at The Drunken Clam.
    released: 2014-04-06
    length: 30m
  - name: The Most Interesting Man in the World
    description: When Peter takes Stewie to the park for some quality father-son time, he mistakenly takes the wrong baby home, prompting Lois to call him an idiot. Determined to prove to her that he's a responsible adult, Peter goes on a business trip to Chicago and returns as an intelligent, classy person.
    released: 2014-04-13
    length: 30m
  - name: Baby Got Black
    description: When Chris begins to date Jerome's daughter, Pam, Jerome forbids it. But when Chris and Pam run away together, Jerome and Peter must work together to find their kids.
    released: 2014-04-27
    length: 30m
  - name: Meg Stinks!
    description: Meg has fun partying with Peter when he takes her to a college for an interview. Brian must learn how to live in the wild when he gets sprayed by a skunk and is prohibited from entering the house.
    released: 2014-05-04
    length: 30m
  - name: He's Bla-ack!
    description: Cleveland returns to town, but is instantly banned from spending time with Peter when Lois and Donna get into a big fight over parenting.
    released: 2014-05-11
    length: 30m
  - name: Chap Stewie
    description: When Peter and Chris interrupt Stewie's TV time, the angry baby goes back in time to break up Peter and Lois, so he's never conceived. But instead, he is reborn into a "Downton Abbey"-esque British household.
    released: 2014-05-18
    length: 30m
