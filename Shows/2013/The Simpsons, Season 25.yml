episodes:
  - name: Homerland
    description: In a nod to the hit cable series "Homeland," Lisa suspects Homer may have been "turned" when he returns a changed man from a nuclear power plant operating convention. So she enlists the services of Annie, an intense, jumpy FBI agent to help her unravel the truth.
    released: 2013-09-29
    length: 30m
  - name: Treehouse of Horror XXIV
    description: The opener of the 24th annual "Treehouse of Horror" is from Guillermo del Toro and features monsters and classic characters from horror films throughout history. In "Oh The Places You'll D'oh," the first of three spine-tingling stories, Homer rides around Springfield wreaking havoc as "The Fat in The Hat" in a rhyming Dr. Seuss-ian tale. In "Dead and Shoulders," Bart is beheaded during a kite accident, his head is attached to Lisa's body and they must live together as one. The final terrifying tale, "Freaks no Geeks," features Mr. Burns' traveling circus, The Burnsum and Bailey Circus, which has stopped in Springfieldland in the 1930s. Trapeze artist Marge and Strong Man Homer are performers and things go awry when circus freak Moe starts to make advances towards Marge.
    released: 2013-10-06
    length: 30m
  - name: Four Regrettings and a Funeral
    description: 'Four Springfielders are prompted to try to right past regrets following the funeral of a beloved neighbor. Homer regrets selling his Apple stock to buy a bowling ball, Marge worries she caused Bart''s rebellious streak, Mr. Burns reminisces about a romance he gave up with a beautiful Parisian woman and Kent Brockman admits he was too afraid to leave local news and follow his former partner Rachel Maddow to cable news. Blackboard: ''We''ll really miss you mrs. K.'''
    released: 2013-11-03
    length: 30m
  - name: YOLO
    description: 'Marge encourages Homer to embrace his "You-Only-Live-Once" spirit by inviting an old pen pal to stay with him and cross items off of his "to-do" list from when he was a 10-year old. Meanwhile, Lisa institutes a new honor code at Springfield Elementary. Blackboard: ''My school schedule does not include a bye week''.'
    released: 2013-11-10
    length: 30m
  - name: Labor Pains
    description: 'Homer remembers his Lamaze skills when he''s forced to deliver a baby in an elevator. When the mother names the child Homer Jr., he quickly develops a deep emotional bond with the kid. Meanwhile, Lisa is recruited by the cheerleaders of the local pro football team, the Springfield Atoms. Blackboard: ''Rocktober is not followed by blowvember''.'
    released: 2013-11-17
    length: 30m
  - name: The Kid is All Right
    description: Lisa finally makes a new best friend, Isabel Gutierrez, only to discover that she's a Republican and her opponent in the campaign for second grade class representative. Also guest-voicing is Anderson Cooper as himself.
    released: 2013-11-24
    length: 30m
  - name: Yellow Subterfuge
    description: 'Principal Skinner promises the students that the best-behaved among them can take a ride in a submarine. When Skinner gives all the kids a clean slate, Bart believes even his own past indiscretions will be forgotten if he doesn''t get into any more trouble. Meanwhile Lisa tries to help a cash-poor Krusty to turn things around by suggesting he sell the foreign rights to his shows. Blackboard: ''I will stop asking when Santa goes to the bathroom''.'
    released: 2013-12-08
    length: 30m
  - name: White Christmas Blues
    description: 'Springfield is inundated with holiday revelers after the nuclear power plant springs a radiation leak, causing snow to fall all over town. When the tourists drive up Christmas shopping prices, Marge opens up the Simpsons'' house to boarders. Blackboard: ''I will not call my teacher "prancer" and "vixen".''.'
    released: 2013-12-15
    length: 30m
  - name: Steal This Episode
    description: Homer becomes annoyed with movie theaters, so Bart teaches him how to download movies illegally. Homer is delighted with his discovery of free movies until he's caught for piracy.
    released: 2014-01-05
    length: 30m
  - name: Married to the Blob
    description: 'Comic Book Guy realizes his comics are nothing if he can''t share them with anyone. Then he meets Kumiko, a Japanese woman writing an autobiographical manga, and he seeks out Homer''s advice on how to date her, ending happily for everyone. Blackboard: ''If you haven''t broken your Christmas presents yet, you''re not trying''.'
    released: 2014-01-12
    length: 30m
  - name: Specs and the City
    description: 'Mr. Burns gives high-tech eyeglasses to all of his employees in order to spy on them. Homer loves the enhanced reality of his new gadget - that is, until Marge tries them on and he finds out she''s seeing a marriage counselor. Meanwhile, Bart takes a stand against buying Nelson a Valentine''s Day card, despite buying one for every other kid in class, and Nelson delivers him an ultimatum: find him the best Valentine''s Day gift ever or be fed to the classroom electric pencil sharpener.'
    released: 2014-01-26
    length: 30m
  - name: Diggs
    description: 'Bart is rescued from a confrontation with Springfield Elementary''s bullies by Diggs, a recent transfer student and aspiring champion in the niche sport of falconry. But, Bart soon discovers that Diggs wants to do more than just wrangle falcons: he wants to take to the sky himself.'
    released: 2014-03-09
    length: 30m
  - name: The Man Who Grew Too Much
    description: On a research trip, Lisa is shocked to discover that Sideshow Bob is now the chief scientist at a massive chemical engineering company, but her fears are allayed as she becomes enamored with his likeminded appreciation of high-culture. Meanwhile, Marge's attempt to preach healthy sexual practices to a teen church group goes awry.
    released: 2014-03-09
    length: 30m
  - name: The Winter of His Content
    description: Marge invites Grampa and two other octogenarians to live at the Simpsons' house after the Retirement Castle is closed for health violations, but she quickly becomes frustrated with Homer when he starts embracing the "old person lifestyle." Meanwhile, at Springfield Elementary, Bart defends Nelson's affinity for hand-me-down underwear, leading Nelson to befriend Bart. Blackboard 'My Dad's already drunk for St. Patrick's'.
    released: 2014-03-16
    length: 30m
  - name: The War of Art
    description: 'After Lisa''s new pet guinea pig destroys the Simpsons'' living room art, Marge falls in love with a beautiful painting at the Van Houten''s yard sale, which Homer snaps up for 20 bucks. But, when Lisa reveals it''s by a famous early 20th century painter and could be worth $100,000, Marge and Homer face a dilemma: split the money with the Van Houtens, or keep the cash as a "cushion" for their kids.'
    released: 2014-03-23
    length: 30m
  - name: You Don't Have to Live Like a Referee
    description: Homer is recruited as a World Cup referee after Lisa extolls his integrity on the youth soccer field in a Springfield Elementary speech contest. But when the Simpsons travel to Brazil, Homer finds his honesty tested by one of South America's slickest gangsters in the soccer match-bribing business.
    released: 2014-03-30
    length: 30m
  - name: Luca$
    description: Marge is concerned that Lisa is dating below her station when she brings home competitive eater-in-training Lucas Bortner, and she enlists Homer to help Lisa explore other options. Meanwhile, Bart is thrilled to receive free gifts from Snake Jailbird after he helps the convict escape from a jam, but when a betrayal from Milhouse puts Snake back in jail, Bart must forge a plan to set him free.
    released: 2014-04-06
    length: 30m
  - name: Days of Future Future
    description: Set in the future, Homer has a new clone for every time he dies. Lisa is married to a zombie version of Milhouse, while Bart deals with custody issues with his ex-wife, Jenda. Each defines what love means to them.
    released: 2014-04-13
    length: 30m
  - name: What to Expect When Bart's Expecting
    description: Bart can't stand art class. So he makes a voodoo doll of his art teacher. But when his spell makes her pregnant instead, he becomes a savior to Springfield couples trying to conceive. Then, he's kidnapped to help conceive a thoroughbred race horse. Blackboard 'You can't play April Fool's jokes on April 27th'.
    released: 2014-04-27
    length: 30m
  - name: Brick Like Me
    description: Homer wakes up in a world where his family and everyone in Springfield are made of Legos. Can he "put together" how he got there, and figure out how to get home before he's stuck in a world of bricks forever? Find out.
    released: 2014-05-04
    length: 30m
  - name: Pay Pal
    description: Marge swears off befriending any more couples when Homer offends their charming new British neighbors. But when Lisa declares that she, too, doesn't need friends, Marge reconsiders.
    released: 2014-05-11
    length: 30m
  - name: The Yellow Badge of Cowardge
    description: Bart is plagued with guilt when he wins the annual "Race Around the School," with an assist from Nelson, who beats up frontrunner Milhouse. Meanwhile, Homer tries to bring back the annual 4th of July fireworks display after it's canceled for budget reasons. Guest voice Glenn Close returns as Mona Simpson and Olympian Edwin Moses guest-voices as himself.
    released: 2014-05-18
    length: 30m
