name: "Luther, Season 3"
description: >
  DCI John Luther is back under investigation as a retired detective, George Stark, 
  leads a crusade to expose his unorthodox methods. While dealing with this internal 
  threat, Luther must hunt a fetishistic murderer who is re-enacting historical crimes 
  and a vigilante killer who is executing criminals. During this time, Luther also 
  begins a new relationship with Mary Day.
