name: The Americans
series: The Americans
description: >
  Married KGB officers Elizabeth and Philip Jennings live undercover as suburban Washington, D.C. travel agents during the Cold War.
  The first season follows their espionage work, family life, and the threat posed by an FBI counterintelligence agent moving in next door.
