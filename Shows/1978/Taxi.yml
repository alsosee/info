name: Taxi
description: >
  The lives of a group of New York City taxi drivers working the night shift at the Sunshine Cab Company.
  While most of the drivers view the job as a temporary stepping stone to their true dreams, Alex Reiger is the disillusioned "pro" who serves as the group's level-headed core.
  They must contend with their unsatisfying lives and the constant verbal abuse of their despotic dispatcher, Louie De Palma.
