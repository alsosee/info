    description: A man vows revenge when Hank accidentally takes his wallet, Bobby is falsely accused of a crime at school. Dale comes up with a plan to get money by working at a "Hooters" type restaurant.
    released: 2008-05-04
    length: 30m
  - name: It Came from the Garage
    description: When Bobby want's to help his dad build a boat, Hank ditches his old team of Bill, Dale and Boomhauer for the Regatta boat-building competition.
    released: 2008-05-11
    length: 30m
  - name: 'Life: A Loser''s Manual'
    description: Peggy's brother Hoyt, a two strike felon, comes to town and commits another crime; Luanne's husband Lucky feels sorry for Hoyt and takes the blame.
    released: 2008-05-18
    length: 30m
