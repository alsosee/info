    description: Hank encourages Bobby when he is asked to cheerleader for the girls in the school's annual Powder Puff game. Bobby soon learns that there is a tradition and Hank, Bill, Dale and Principal Moss were once "Powder Puff Boys" themselves. However, the boys learn that Peggy and the PTA Are trying to put a stop to the tradition.
    released: 2007-10-07
    length: 30m
  - name: Four Wave Intersection
    description: Bobby and Joseph are bullied when Hank takes them to a local water park and gets them summer passes. Boomhauer tries to save the day. Bill becomes the Heat Waver by accident.
    released: 2007-10-14
    length: 30m
