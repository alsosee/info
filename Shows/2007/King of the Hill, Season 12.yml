    description: Cotton volunteers to baby-sit Bobby so Hank and Peggy can go to an upscale restaurant.
    released: 2007-11-11
    length: 30m
  - name: Raise the Steaks
    description: After buying unsavory steaks, Hank visits the town co-op in search of better meat to cook.
    released: 2007-11-18
    length: 30m
  - name: Tears of an Inflatable Clown
    description: The planning committee cancels the schools carnival, enraging the student body; Lucky catches a flying disk made of barbed wire.
    released: 2007-11-25
    length: 30m
  - name: The Minh Who Knew Too Much
    description: Dale makes himself a land canoe and then runs into Kahn and Minh's rose bushes;. They then decide to ditch their hillbilly neighbors. Minh then practices shooting with Dale's gun club so her family can join the Nine Rivers Country Club.
    released: 2007-12-09
    length: 30m
  - name: Dream Weaver
    description: Peggy and Nancy are discussing Dale and Peggy ropes Hank into accompanying Dale on a vacation to learn different trades; Peggy, Bill and Khan try to create a internet video while Hank and Dale are gone.
    released: 2007-12-16
    length: 30m
  - name: Doggone Crazy
    description: Hank comes home from Bobby's ball game and discovers that the house has been destroyed. He then finds out the reason for it and seeks the help of a spiritualist to help with the problem.
    released: 2008-01-06
    length: 30m
  - name: Trans-Fascism
    description: Hank takes action when the city's council puts a ban on the sale of food that contains trans fats, which forces Sugarfoot's Restaurant out of business. Buck and the other employee's of Strickland's starts a food truck then gets in a war with another service.
    released: 2008-02-10
    length: 30m
  - name: Three Men and a Bastard (A.K.A. The Untitled Blake McCormick Project)
    description: Bill becomes involved with a single mother, Charlene, who has returned to Arlen after a few years. Dale decides there is something strange about Charlene's daughter.
    released: 2008-02-17
    length: 30m
  - name: The Accidental Terrorist
    description: When Hank learns he has overpaid for every car he has ever bought since he started driving, his bid for justice ends with exploding cars and an arrest.
    released: 2008-03-02
    length: 30m
  - name: Lady and Gentrification
    description: Hank reluctantly agrees to speak at Inez's quinceanera; Enrique blames Peggy for the gentrification of his neighborhood when she sells property to hipsters.
    released: 2008-03-09
    length: 30m
  - name: Behind Closed Doors
    description: Relationship expert Stephens Davies makes an example of Peggy by questioning her parenting skills. Dale decides everyone needs a soundtrack when they do things.
    released: 2008-03-16
    length: 30m
  - name: Pour Some Sugar on Kahn
    description: Khan's father-in-law visits the family and makes him feel like a failure.
    released: 2008-03-30
    length: 30m
  - name: Six Characters in Search of a House
    description: Peggy hires a "Hollywood" family to replace the strange occupants of a house she needs to sell within 2 weeks.
    released: 2008-04-06
    length: 30m
  - name: The Courtship of Joseph's Father
    description: Dales son becomes the star quarterback for Landry High School.
    released: 2008-04-13
    length: 30m
