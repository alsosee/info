episodes:
  - name: Blue Harvest
    description: When the power goes out in the Griffin home, Peter decides to educate his family and pass along the greatest story ever told- the story of Star Wars! After Princess Leia comes under siege by Darth Vader and his evil Storm Troopers, C-3PO and R2-D2 escape to find the only person who can help the Rebel Alliance. On their quest thorough the desert planet of Tatooine, C-3PO and R-2D2 find extra help in Obi-Wan Kenobi, Luke Skywalker, Han Solo and Chewbacca and head back to battle the Death Star in an epic intergalactic fight to the death.
    released: 2007-09-23
    length: 60m
  - name: Movin' Out
    description: When Peter convinces Brian to move in with his dense girlfriend Jillian, she ends up smothering him, but he keeps her around for the lovin'. Stewie moves in with them to help pay the rent, but he tries to get Brian back on the playing field by throwing him a drunken party and interfering with their relationship. Meanwhile, Meg gets a job at the local convenience store, as does Chris, who gets chummy with the manager, Carl. While Chris and Carl talk about their favorite movies, Meg is saddled with all the hard work. She eventually stands up for herself and as a result gets fired.
    released: 2007-09-30
    length: 30m
  - name: Believe It or Not, Joe's Walking on Air
    description: After Bonnie tells Joe that she is tired of being married to a handicapped person, Joe decides to get a leg transplant. Excited about his new ability to walk, Joe dives head first into extreme sports and begins to hang around more active friends. Meanwhile, Peter and the guys are upset at how Joe is acting and decide to teach him a lesson. In doing so, they re cripple him and he is back to normal.
    released: 2007-10-07
    length: 30m
  - name: Stewie Kills Lois
    description: In the 100th episode, Lois and Peter go on a cruise, leaving Stewie and the family behind. Upset with Lois for leaving him at home, Stewie vows to carry out a diabolical plan. When Brian challenges him to actually do it, Stewie stows away on the ship, finds Lois and - well - the title of the episode says it all.
    released: 2007-11-04
    length: 30m
  - name: Lois Kills Stewie
    description: While all of Quahog assumes she's dead, Lois returns from the wilderness and names Stewie as her killer, but he goes on the run while Joe leads a manhunt around Quahog. Then, Stewie tries to take over the world and in the interim auditions for the AMERICAN IDOL judges Simon Cowell, Randy Jackson and Paula Abdul. Meanwhile, Lois realizes that she must stop Stewie.
    released: 2007-11-11
    length: 30m
  - name: Padre de Familia
    description: Peter starts an anti-immigration group after being caught up in the pro-American sentiment at a Veterans' Day parade, but his tune quickly changes when he finds out he was born in Mexico. Unable to prove his citizenship, pass the naturalization test or convince investigators that his marriage to Lois is for real, he ends up working as a groundskeeper on his father-in-law's estate and leading the fight for immigrant rights .
    released: 2007-11-18
    length: 30m
  - name: Peter's Daughter
    description: When a flood hits Quahog, Meg winds up in the hospital in a coma, but she wakes up to a cute med student and they immediately hit it off. After Meg recovers, Peter is very protective of her, so he drives "McCutie" away. But when Meg reveals to the family that she is pregnant, Peter forces them to get married.
    released: 2007-11-25
    length: 30m
  - name: McStroke
    description: Peter decides to grow a moustache, but then he's mistaken for a fireman, so he lends a hand when a fire breaks out at a local fast food restaurant. The owner gives him unlimited burgers as a "thank you" but he eats so many that he eventually has a stroke. When Peter recovers, he vows to expose the fast-food company and becomes friends with a genetically engineered cow he meets after infiltrating the McBurgertown warehouse.
    released: 2008-01-13
    length: 30m
  - name: Back to the Woods
    description: James Woods returns after being locked in a crate to seek revenge against Peter. First, James steals Peter's identity and moves in as head of the Griffin household. Then, Peter goes out and ruins James career and image.
    released: 2008-02-17
    length: 30m
  - name: Play It Again, Brian
    description: Peter and Lois's marriage is on the rocks, but when Brian wins the New England Rising Writer's award, the three of them head to Martha's Vineyard for a relaxing vacation. As Peter's drinking spirals out of control, so does Brian's self restraint as he professes his undying love for Lois. Peter and Brian test their friendship over the woman of their dreams.
    released: 2008-03-02
    length: 30m
  - name: The Former Life of Brian
    description: When Brian is afraid that he has lost his chance at love, he goes in search of a former flame Tracy only to discover he is the father of her unruly son, Dylan. After Brian's surprise visit, Tracy drops Dylan off at the Griffin's so Brian can raise him. Subsequently, his new little angel begins terrorizing the Griffin household and Brian's self-important attitude toward parenting infuriates Peter and Lois.
    released: 2008-04-27
    length: 30m
  - name: Long John Peter
    description: Yo ho ho! It's a pirate's life for Peter when he gets a pet parrot. But after raising hell in Quahog and terrorizing the neighbors, Peter accidentally kills his beloved pet. Meanwhile, Chris goes with Brian to the vet and falls for the lovely intern Anna.
    released: 2008-05-04
    length: 30m
