  - name: Homer's Crossing
    description: Feeling worthless at work, Homer volunteers to be a school crossing guard. But when his safety squad receives too much funding, the crossing guards become a force to be feared.
    released: 2023-10-01
    length: 30m
  - name: A Mid-Childhood Night's Dream
    description: Marge feels an overwhelming dread of the empty nest.
    released: 2023-10-08
    length: 30m
  - name: McMansion & Wife
    description: When a new neighbor showers him with kindness, Homer thinks he's being tricked into buying a sports car at the dealership where the neighbor works, but the truth turns out to be even more sinister; Lisa neutralizes Nelson after he goes on a bullying spree.
    released: 2023-10-22
    length: 30m
  - name: 'Thirst Trap: A Corporate Love Story'
    description: In a parody documentary, a young college-dropout CEO embraces the Silicon Valley "fake it until you make it" philosophy and bewitches Mr. Burns into funding her highly dubious dream project.
    released: 2023-10-29
    length: 30m
  - name: Treehouse of Horror XXXIV
    description: Bart is turned into an NFT and Marge must fight through the Blockchain to rescue him; Lisa turns to a murderer from her past; an outbreak transforms Springfielders into a plague of lazy, beer-loving oafs.
    released: 2023-11-05
    length: 30m
  - name: Iron Marge
    description: When Marge's heart is broken by a bad birthday present, Bart and Lisa must dig into their mom's past to show that they really know her. Homer becomes a neighborhood fear-monger.
    released: 2023-11-12
    length: 30m
  - name: It's a Blunderful Life
    description: Lisa recounts the story of how Homer was scapegoated for a power outage that plunged Springfield into darkness days before Thanksgiving.
    released: 2023-11-19
    length: 30m
  - name: Ae Bonny Romance
    description: When Groundskeeper Willie is kidnapped to Scotland, Bart and the Simpsons follow - only to discover that what awaits is Homer's worst nightmare.
    released: 2023-12-03
    length: 30m
  - name: Murder, She Boat
    description: Lisa must solve a closed-boat mystery when Comic Book Guy's million-dollar action figure is "murdered" on a pop culture cruise.
    released: 2023-12-17
    length: 30m
  - name: Do The Wrong Thing
    description: Homer and Bart become kings of the blue-collar sports circuit, but Marge suspects something dishonest at the core of their father-son bond.
    released: 2023-12-24
    length: 30m
  - name: Frinkenstein's Monster
    description: Professor Frink believes he's created a monster when he helps Homer land a high-level position at a state-of-the-art nuclear plant in Shelbyville.
    released: 2024-02-18
    length: 30m
  - name: Lisa Gets an F1
    description: Lisa feels a need for speed as well a need for control of her anxiety when she becomes a pro kid go-cart racer.
    released: 2024-02-25
    length: 30m
  - name: Clan of the Cave Mom
    description: A parenting disagreement between Marge and Luann Van Houten escalates into a life-or-death struggle for survival.
    released: 2024-03-24
    length: 30m
  - name: Night of the Living Wage
    description: Marge gets a job in a high-pressure ghost kitchen, but when she tries to start a union, she gets more than she collectively bargained for.
    released: 2024-04-07
    length: 30m
  - name: Cremains of the Day
    description: When someone in Homer's life passes away, he and guys from Moe's go on a road trip to scatter the ashes... but will their friendship die as well?
    released: 2024-04-21
    length: 30m
  - name: The Tell-Tale Pants
    description: Marge comes upon a surprising windfall and, angry with Homer, spends it secretly on herself.
    released: 2024-05-05
    length: 30m
