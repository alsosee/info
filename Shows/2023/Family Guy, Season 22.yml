episodes:
  - name: Fertilized Megg
    description: Meg agrees to be Bruce and Jeffery's surrogate causing a pregnant Meg to annoy her family. But, when the couple fails to pick up the baby, the Griffin's must take care of their new family member.
    released: 2023-10-01
    length: 30m
  - name: Supermarket Pete
    description: With the brewery under construction, Lois implores Peter to take a new job, but grows irate when he begins work at the grocery store. Meanwhile, armed with his police stories, Joe and Brian team up to write their own true crime novel.
    released: 2023-10-08
    length: 30m
  - name: A Stache From the Past
    description: When Peter loses the Griffins' home in a reverse mortgage, he and Mayor West travel to confront the man advertising the scheme, Tom Selleck. Meanwhile, Stewie and Brian open a booth at the flea market, leading to a rivalry with Bruce.
    released: 2023-10-22
    length: 30m
  - name: Old World Harm
    description: Peter and Lois vacation in Florida, only to discover they've rented a condo in a retirement community. Back at home, Brian helps Stewie take his first shower.
    released: 2023-11-05
    length: 30m
  - name: Baby, It's Cold Inside
    description: Peter is emasculated when, on their anniversary, he abandons Lois amidst a shark attack. Meanwhile, Stewie finds a mini fridge and lives the dorm lifestyle.
    released: 2023-11-12
    length: 30m
  - name: Boston Stewie
    description: Stewie tries to civilize his half-brother, Boston Stewie, so that he may be adopted. Meanwhile, Meg and Chris start a venture in which people online pay Chris to sit on and smash cupcakes.
    released: 2023-11-19
    length: 30m
  - name: Snap(ple) Decision
    description: Winner of a Snapple contest, Lois uses her winnings to take Meg on a tropical vacation. Flaunting their wealth, the two are kidnapped. Meanwhile, Stewie and Brian undergo "friendship therapy".
    released: 2023-11-26
    length: 30m
  - name: Baking Sad
    description: Meg discovers her tears produce delicious cookies, and her, along with her siblings, enjoy a profit until the success makes her too happy to cry. Meanwhile, Peter and the guys launch a "male talk show".
    released: 2023-12-03
    length: 30m
  - name: The Return of the King (of Queens)
    description: Lois decides to sell the family's TV to help pay for Christmas presents; Kevin James gets upset over losing Peter as a viewer.
    released: 2023-12-17
    length: 30m
  - name: Cabin Pressure
    description: When the Griffins win a trip to Maine at Peter's company picnic, they decide to invite their friends on the vacation; tensions run high and things soon spiral out of control when the cabin burns down.
    released: 2024-03-06
    length: 30m
  - name: Teacher's Heavy Pet
    description: Lois joins Chris' school as a substitute teacher.
    released: 2024-03-13
    length: 30m
  - name: Take This Job and Love It
    description: Peter and his friends wonder about what their dream jobs would be; Peter enters a sequence featuring himself as a James Bond-type; Quagmire reflects on his job as an aerobics instructor; Cleveland and Joe take part in a "Lethal Weapon" sequence.
    released: 2024-03-20
    length: 30m
  - name: Lifeguard Meg
    description: Stewie and Brian become overwhelmed after winning a coffee shop; Peter and his friends annoy Meg at her new lifeguard job when they don't follow the pool rules.
    released: 2024-03-27
    length: 30m
  - name: Fat Actor
    description: Peter tries to protest Hollywood after learning that Brad Pitt was cast in a biopic about a politician. After Pitt injures himself on set, Peter must act out the role himself.
    released: 2024-04-10
    length: 30m
  - name: Faith No More
    description: Brian becomes romantically interested in someone and it inspires him to use Stewie's time machine. Strange consequences result from their journey.
    released: 2024-04-17
    length: 30m
