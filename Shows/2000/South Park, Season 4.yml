episodes:
  - name: The Tooth Fairy's TATS 2000
    description: Cartman impersonates the Tooth Fairy when he learns there's money to be made from harvesting the teeth of underprivileged kids. However, the leader of a dentists' organization sets out to stop him.
    released: 2000-04-05
    length: 30m
  - name: Cartman's Silly Hate Crime 2000
    description: Cartman is sentenced to juvenile hall and his friends plan to get him out. Meanwhile, he begins to adjust to life on the inside.
    released: 2000-04-12
    length: 30m
  - name: Timmy! 2000
    description: Mr. Mackey excuses Timmy from homework when he mistakenly thinks the boy is suffering from Attention Deficit Disorder; then Cartman and his friends try to develop the same affliction.
    released: 2000-04-19
    length: 30m
  - name: Quintuplets 2000
    description: The South Park media showers attention on a family with quintuplets that moves into the area, and Cartman befriends one of the new residents. Meanwhile, Kenny's mom tries to cash in on the excitement by planning a multiple birth of her own.
    released: 2000-04-26
    length: 30m
  - name: Cartman Joins NAMBLA
    description: Cartman seeks online companionship from older users after deciding that Stan, Kenny and Kyle aren't mature enough.
    released: 2000-06-21
    length: 30m
  - name: Cherokee Hair Tampons
    description: Kyle suffers from a rare kidney disease and Cartman may be the only one who can save him, but at a high price.
    released: 2000-06-28
    length: 30m
  - name: Chef Goes Nanners
    description: Chef protests against the South Park flag and ignites a town debate that even divides the kids. Meanwhile, Wendy becomes attracted to Cartman.
    released: 2000-07-05
    length: 30m
  - name: Something You Can Do with Your Finger (a.k.a. Fingerbang)
    description: Stan, Kyle, Kenny and Cartman form their own band and hold tryouts for a fifth member.
    released: 2000-07-12
    length: 30m
  - name: Do the Handicapped Go to Hell? (1)
    description: The boys, scared by Priest Maxi's threats of eternal damnation, scramble to take part in Holy Communion and their first Confession in order to "save" themselves.
    released: 2000-07-19
    length: 30m
  - name: Probably (2)
    description: Satan can't decide between his new boyfriend and his former beau, Saddam Hussein. Meanwhile, Cartman has discovered his evangelical side and tries to ensure the gang a passage to heaven.
    released: 2000-07-26
    length: 30m
  - name: Fourth Grade
    description: The fearful boys speculate on the identity of their teacher as they begin the fourth grade, leading them to build a time machine to take them back to the safety of third grade.
    released: 2000-11-08
    length: 30m
  - name: Trapper Keeper
    description: Mr. Garrison orders a recount when the race for kindergarten president is too close to call. Meanwhile, a life form from the future appears in the school yard at South Park Elementary.
    released: 2000-11-15
    length: 30m
  - name: Helen Keller! The Musical
    description: The boys work on a Thanksgiving pageant about Helen Keller and decide to use a turkey instead of a dog.
    released: 2000-11-22
    length: 30m
  - name: Pip (a.k.a. Great Expectations)
    description: The boys' British classmate, Pip, stars in this spoof of Dickens' classic "Great Expectations," set in London.
    released: 2000-11-29
    length: 30m
  - name: Fat Camp
    description: Cartman is sent to a camp for obese youngsters by concerned family and friends. Meanwhile, Kenny has his own hit TV show, "Krazy Kenny." Also, Chef talks to the boys about prostitution.
    released: 2000-12-06
    length: 30m
  - name: The Wacky Molestation Adventure
    description: Cartman becomes South Park's mayor when the kids take over the town.
    released: 2000-12-13
    length: 30m
  - name: A Very Crappy Christmas
    description: The boys make a video Christmas card when Mr. Hankey's visit is delayed.
    released: 2000-12-20
    length: 30m
