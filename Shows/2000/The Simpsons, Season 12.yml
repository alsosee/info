episodes:
  - name: Treehouse of Horror XI
    description: In the 11th annual Halloween trilogy, a ghostly Homer tries to perform a good deed on Earth; Bart and Lisa are trapped in a fairy-tale forest; and dolphins revolt against humans after Lisa frees their king from the Springfield Marine Park.
    released: 2000-11-01
    length: 30m
  - name: A Tale of Two Springfields
    description: Homer gets frustrated because Springfield now has to area codes for phone calls and he divides the Town, becomes mayor of New Springfield. He then wages war against Olde Springfield and it is up to The Who to reunite the town.
    released: 2000-11-05
    length: 30m
  - name: Insane Clown Poppy
    description: While Krusty is signing autographs, Bart meets a girl who turns out to be Krusty's daughter. Krusty then spends a day at the beach with her and later that night he gambles away his daughter Sophie's violin. He then recruits Homer to help him get it back from Fat Tony and the Mob. Blackboard 'I will not surprise the incontinent'.
    released: 2000-11-12
    length: 30m
  - name: Lisa the Treehugger
    description: Joshua Jackson plays a committed---and cute---teen environmentalist who inspires Lisa to take up residence in a redwood tree to save it from destruction. Blackboard 'I am not the acting President'.
    released: 2000-11-19
    length: 30m
  - name: Homer vs. Dignity
    description: With Smithers away, Burns hires a cash-hungry Homer as his "prank monkey" to perform stunts that ultimately damage Homer's dignity. Leeza Gibbons has a cameo. Blackboard 'I was not the sixth Beattle'.
    released: 2000-11-26
    length: 30m
  - name: The Computer Wore Menace Shoes
    description: After having to go to work because he did not get the email about the day off, Homer buys a computer and starts a tell all web page. He then wins a award for the web site. Blackboard 'I will only provide a urine sample when asked'.
    released: 2000-12-03
    length: 30m
  - name: The Great Money Caper
    description: Homer and Bart turn into a couple of con artists in order to pay for a really high car repair bill. Blackboard 'The nurse is not dealing'.
    released: 2000-12-10
    length: 30m
  - name: Skinner's Sense of Snow
    description: A blizzard traps Skinner and Groundskeeper Willie with an assortment of students at Springfield Elementary. Bart (of course) leads the revolt.
    released: 2000-12-17
    length: 30m
  - name: HOMR
    description: Researchers find and fix the cause of Homer's "subnormal" intelligence, but Homer finds life as a brain is a drain on his popularity. Blackboard 'Network TV is not dead'.
    released: 2001-01-07
    length: 30m
  - name: Pokey Mom
    description: Homer hurts his back at a prison rodeo, where Marge meets an artistic inmate whom she takes under her wing. Blackboard 'I will not "Let The Dogs Out!"''
    released: 2001-01-14
    length: 30m
  - name: Worst Episode Ever
    description: Bart and Milhouse are at the Android Dungeon and end up being banned from the store for a lifetime. After Comic Book Guy has a heart attack, Bart and Milhouse take over running the store for him. Once Comic Book Guy recovers, he starts dating Principle Skinners mother. Blackboard 'I will not hide the teacher's medication'.
    released: 2001-02-04
    length: 30m
  - name: Tennis the Menace
    description: The Simpsons win points for their new tennis court, but constantly lose on Homer's poor play. Blackboard 'I will not publish the principal's credit report'.
    released: 2001-02-11
    length: 30m
  - name: Day of the Jackanapes
    description: Sideshow Bob talks his way out of prison and into a job at the school. There, he hypnotizes Bart---to make him kill Krusty, who plans a final show after growing sick of network interference. Blackboard 'The hamster did not have "A Full Life"'.
    released: 2001-02-18
    length: 30m
  - name: New Kids on the Blecch
    description: After Bart pulls a stunt during the Springfield Marathon, Lt. Smash boy-band creator recruits Bart, Nelson, Milhouse and Ralph to create a boy band. NSYNC visit's Springfield. Blackboard 'I will not buy a presidential pardon'.
    released: 2001-02-25
    length: 30m
  - name: Hungry Hungry Homer
    description: The family goes to Blocko land, Homer stands up to a guy for Lisa. Homer then proceeds to go on a hunger strike protesting a decision the Springfield Isotopes baseball teams owner is in the process of making.
    released: 2001-03-04
    length: 30m
  - name: Bye Bye Nerdy
    description: 'A new girl joins the elementary class and Lisa tries to figure out why she is bullying everyone. Homer goes on a mission to baby proof Springfield. Blackboard: ''I will not scare the vice president''.'
    released: 2001-03-11
    length: 30m
  - name: Simpsons Safari
    description: 'Hungry Homer rips into a 30 year old box of animal crackers and finds a winning ticket for a trip to Africa. He then demands his prize. Blackboard: ''I will not flush evidence''.'
    released: 2001-04-01
    length: 30m
  - name: Trilogy of Error
    description: 'Homer''s severed thumb, Lisa''s science project and Bart''s discovery of fireworks prompt separate but simultaneous adventures that conclude with an encounter with mobster Fat Tony. Blackboard: ''Fire is not the cleanser''.'
    released: 2001-04-29
    length: 30m
  - name: I'm Goin' to Praise Land
    description: 'With Homer''s help, Ned Flanders tries to establish a Christian theme park based on drawings in his deceased wife''s sketch book. Blackboard: ''Genetics is not an excuse''.'
    released: 2001-05-06
    length: 30m
  - name: Children of a Lesser Clod
    description: Homer opens a day-care center in the house, prompting envy in Lisa and Bart when he treats other kids better than he treats them. Blackboard 'Today is not Mothra's day'.
    released: 2001-05-13
    length: 30m
  - name: Simpsons Tall Tales
    description: 'Folk-tale parodies abound, with Homer as Paul Bunyan; Lisa as Connie Appleseed; and Bart as Tom Sawyer, helping to save Huck Finn from a shotgun marriage to Becky Thatcher. Blackboard: ''I should not be twenty-one by now''.'
    released: 2001-05-20
    length: 30m
