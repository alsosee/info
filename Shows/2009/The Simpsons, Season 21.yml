episodes:
  - name: Homer the Whopper
    description: 'Comic Book Guy casts Homer as the lead in "Everyman," a feature film based on a new comic book superhero who possesses the ability to take on the powers of every superhero in every comic he touches. To whip Homer into superhero shape, the movie studio hires celebrity fitness trainer Lyle McCarthy, but Homer has trouble sticking to his new healthy regimen. Blackboard: ''The class hamster isn''t just sleeping''.'
    released: 2009-09-27
    length: 30m
  - name: Bart Gets a 'Z'
    description: 'When Mrs. Krabappel confiscates student''s cell phones, the class, organized by Bart, decides to teach her a lesson by spiking her coffee and watching her make a drunken fool of herself. Principal Skinner fires Mrs. Krabappel and replaces her with a cool new teacher, Zachary Vaughn, who impresses Bart and his friends with a hip attitude and love of texting, blogging and using Twitter and Facebook. Torn by his affection for Mr. Vaughn, yet plagued by guilt, Bart makes his way to Skinner''s office to tell him the truth and get Mrs. Krabappel''s job back. Blackboard: ''Chalkboarding is not torture''.'
    released: 2009-10-04
    length: 30m
  - name: The Great Wife Hope
    description: The men and boys of Springfield become obsessed with Mixed Martial Arts, a violent sport where fighters inflict severe pain on one another. When Marge and her friends stage a protest, the show's promoter embraces the controversy and challenges Marge to a match, promising to shut down the competition if she wins.
    released: 2009-10-11
    length: 30m
  - name: Treehouse of Horror XX
    description: In the 20th anniversary of THE SIMPSONS annual "Treehouse of Horror" Halloween special, three chilling tales of Halloween horror unwind. First, Lisa becomes livid with Miss Hoover, and in a series of homages to classic Hitchcock sets out for deadly revenge. Next, Krusty's latest fast-food sandwich transforms news anchor Kent Brockman into an enraged zombie and twenty-eight days later, cannibal zombies have overrun Springfield. In the final frightening fable, Homer accidentally falls through a trapdoor in Moe's tavern and impales himself on the pipes of Moe's microbrewery. Moe serves the barflies a glass of delicious beer flavored with Homer's blood and Homer, now half-man, half-brewing apparatus, returns for vengeance.
    released: 2009-10-18
    length: 30m
  - name: The Devil Wears Nada
    description: 'In an effort to raise money for charity, Marge and "Philanthro-Chicks" decide to pose for a calendar. At the photo studio, Marge is a bit reluctant to reveal any skin, but the photographer loosens her up with wine and before long, Marge and her pin-up poses are the talk of Springfield. Blackboard: ''I do not have the hots for my mom''.'
    released: 2009-11-15
    length: 30m
  - name: Pranks and Greens
    description: 'Fed up with Bart''s constant pranks, Principal Skinner tells Bart that there is a former Springfield Elementary student hailed as the best prankster ever - even better than Bart - but he won''t divulge the legendary student''s name. Bart finally gets Groundskeeper Willie to reveal the prankster''s identity: Andy Hamilton. Bart tracks down Andy, who is now 19 years old and hasn''t grown out of his pranking days. Bart and Andy become fast friends until Bart gets Andy a job working for the ultimate clown.'
    released: 2009-11-22
    length: 30m
  - name: Rednecks and Broomsticks
    description: After getting lost in a game of hide-and-seek, Lisa wanders into the field and discovers three teenage girls, including Cassandra, who are practicing Wiccans. Though she is skeptical of their spells, the girls assure Lisa that they never hurt anyone and ask her to join their coven. Just before Lisa is inducted into their pact, Chief Wiggum arrives and arrests the three girls for witchcraft and Lisa becomes the star witness in the trial. Meanwhile, Homer starts hanging out with Cleatus and his hillbilly friends when he discovers that they make moonshine.
    released: 2009-11-29
    length: 30m
  - name: O Brother, Where Bart Thou?
    description: One snowy day in Springfield, Lisa informs Bart that she and Maggie share a bond that Bart will never understand because he doesn't have a brother, so Bart asks Homer for a baby brother. When Homer denies Bart's request, Bart makes his way to the Springfield Orphanage to find what he thinks he's missing.
    released: 2009-12-13
    length: 30m
  - name: Thursdays with Abie
    description: Grampa is sitting on a bench waiting for his family when a thoughtful-looking man named Marshall Goldman approaches him and asks to hear about his life. Grampa tells Goldman about the time he was on a World War II battleship, which was hit by an enemy torpedo, and Goldman, a human-interest columnist, publishes it in The Springfield Shopper. Later, Grampa meets Mitch Albom and shares another story with Goldman for a follow-up article. Homer becomes jealous of Grampa's newfound fame and seeks a surrogate father. But when Homer discovers a draft of Goldman's third story, he must race to find Grampa before it is published and his life is changed forever.
    released: 2010-01-03
    length: 30m
  - name: Once Upon a Time in Springfield
    description: In the landmark 450th episode of THE SIMPSONS, Krusty is approached by two network executives who want to bring on female co-star Princess Penelope to increase the show's female demographic. The onstage and behind-the-scenes rapport between Krusty and Princess Penelope grows, and before long, Krusty asks for his co-star's hand in marriage. Meanwhile, when Mr. Burns puts a stop to the free donuts at the plant to cut costs, Homer, Lenny and Carl decide to meet with a headhunter who specializes in nuclear workers and opens their eyes to opportunities free of draconian donut-cutting measures.
    released: 2010-01-10
    length: 30m
  - name: Million Dollar Maybe
    description: Homer blows off Marge to buy a lottery ticket and winds up winning the million-dollar jackpot. Fearing how Marge will react if she finds out the reason Homer missed their date, Homer keeps his newly inherited fortune a secret and spoils his family with "anonymous" gifts. When Bart finds out, he and Homer spend the money like it's going out of style, including buying front-row to tickets to see Coldplay in concert,.
    released: 2010-01-31
    length: 30m
  - name: Boy Meets Curl
    description: Homer takes Marge out for a romantic evening of ice skating and hand-holding, but upon entering the rink, they encounter a curling team practicing. Marge and Homer take to the ice and discover their love for the sport, and soon after, join the curling team and compete with them in the Olympic trials. Team Springfield claims the win and moves on to the 2010 Vancouver Games where Bob Costas covers the action. Meanwhile, sleazy vendors introduce Lisa to the world of collecting Olympic pins, and before long, Lisa is hopelessly addicted.
    released: 2010-02-14
    length: 30m
  - name: The Color Yellow
    description: When Miss Hoover asks her students to research their family history, Lisa is horrified to discover that most of her ancestors were bad people - a motley crew of horse thieves and deadbeats. But while rummaging through the attic, Lisa happens upon a diary kept by her ancestor, Eliza Simpson. As Eliza's story unfolds, Lisa learns that her family was part of the Underground Railroad, a group that helped slaves escape to freedom. Eliza recounts liberating a slave named Virgil, but when Lisa presents her findings at school, some of her classmates refute it, leaving Lisa determined to exonerate her family's name.
    released: 2010-02-21
    length: 30m
  - name: Postcards from the Wedge
    description: When Bart fails to turn in his homework, Mrs. Krabappel sends a letter home about Bart's behavior. Despite Bart's best efforts to intercept it, Homer reads the letter, and he and Marge visit Principal Skinner for a parent-teacher conference. Furious, Homer punishes him, but Marge takes a more sympathetic approach. When Bart realizes he can pit Homer and Marge against each other to his benefit, his scheming reaches new heights.
    released: 2010-03-14
    length: 30m
  - name: Stealing First Base
    description: Principal Skinner announces that Mrs. Krabappel was called out of town and budget cuts dictate that, until she returns, the school's two fourth grade classes will merge. Bart reluctantly shares a desk with Nikki and develops a flirtatious rapport. Bart talks to Grampa about his new crush, and at Grampa's suggestion, gives Nikki a kiss. But when Nikki starts sending Bart mixed signals, he swears off women forever. Meanwhile, Lisa's classmates ostracize her for being an overachiever, and First Lady Michelle Obama, a self-professed nerd, comes to Lisa's defense.
    released: 2010-03-21
    length: 30m
  - name: The Greatest Story Ever Doh'd
    description: When Homer is playing noisily in the yard, it disrupts Flanders' bible-study group. Coaxed by the reverend, a frustrated Flanders takes it upon himself to redeem Homer by inviting the Simpson family on his church retreat to Jerusalem. Unappreciative of the history and culture, Homer would rather hang out at the hotel's breakfast buffet rather than tour the city. But when an eccentric tour guide takes the group to famous monuments, including the Dome of the Rock and the Wailing Wall, Homer finally proves he is not beyond salvation.
    released: 2010-03-28
    length: 30m
  - name: American History X-cellent
    description: When the police are called to diffuse a rowdy crowd at Mr. Burns' estate, one of the officers recognizes priceless stolen paintings on the walls, and the maniacal billionaire is taken downtown for questioning. With Mr. Burns gone, Smithers takes charge of the power plant. But when employees take advantage of his good nature, he exacts revenge by forcing the employees to work night and day. These unfair working conditions prompt Homer and his crew to devise a plan to bust out Mr. Burns. Blackboard 'Hot dogs are not bookmarks'.
    released: 2010-04-11
    length: 30m
  - name: Chief of Hearts
    description: Homer is completing his court-ordered community service when he befriends his supervisor, Chief Wiggum, by offering him one of his sandwiches. Touched by the act of kindness, Wiggum assigns the other convicts unpleasant tasks, but allows Homer to join him at the picnic table. They continue to grow close, but when the Chief gets injured during a botched bank robbery, Homer doesn't come through when Wiggum needs him the most. Meanwhile, Bart becomes addicted to Battle Ball, a Japanese game made up of plastic balls and magnetic cards, and his family and teachers try to help him kick the habit.
    released: 2010-04-18
    length: 30m
  - name: The Squirt and the Whale
    description: 'The Simpsons decide to embrace a cheaper, alternate source of energy by erecting a wind turbine in their backyard. But when Homer realizes some of the power is being directed to the local electric company, he decides to remove his home from the grid and becomes completely dependent upon an unreliable source of power. Meanwhile, a storm erupts, trapping a magnificent 150-foot-long blue whale ashore, and Lisa and Homer attempt to help the poor creature. Blackboard: ''Je Ne Suis Pas Francais''. English translation: ''I''m Not French''.'
    released: 2010-04-25
    length: 30m
  - name: To Surveil with Love
    description: Bomb squad mistakenly blows up Homer's unattended gym bag, releasing radiation into the city and authorities react by suspending civil liberties. Wiggum and his men install surveillance cameras around Springfield and round up suspected terrorists, including groundskeeper Willie, but when monitoring the nonstop flow of video imagery proves to be too much, Wiggum enlists concerned citizens to help keep the city safe. Meanwhile, Lisa becomes fed up with being blonde, so she dyes her hair a dark color.
    released: 2010-05-02
    length: 30m
  - name: Moe Letter Blues
    description: As Mother's Day approaches, Moe narrates an episode in which he writes a letter to Homer, Apu and Reverend Lovejoy, who are vacationing with their children, and threatens to run away with one of their wives. While the trio tries to determine whose wife Moe is referring to, Homer, Lovejoy and Apu flashback to the intimate moments they initially ignored between Moe and Marge, Manjula and Helen Lovejoy. But when the boys return from their trip, they're in for the surprise of their lives.
    released: 2010-05-09
    length: 30m
  - name: The Bob Next Door
    description: Bart becomes convinced that his new neighbor, Walt, is his archenemy, Sideshow Bob, disguised and back for revenge. But when Marge tries to convince Bart otherwise by taking him to visit the state penitentiary, a disturbing truth is revealed.
    released: 2010-05-16
    length: 30m
  - name: Judge Me Tender
    description: When Moe discovers a hidden talent for judging contests, he is approached by a television agent to join the AMERICAN IDOL judges' panel. Moe flies to Los Angeles where he tours the Fox lot and receives some sage career advice. Meanwhile, Homer drives Marge crazy when he begins hanging around the house.
    released: 2010-05-23
    length: 30m
