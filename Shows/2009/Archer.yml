episodes:
  - name: Mole Hunt
    description: Archer attempts to cover up discrepancies in his ISIS expense account; Cyril and Lana's Friday night dinner is interrupted by work.
    released: 2009-09-17
    length: 30m
  - name: Training Day
    description: Malory promotes Cyril to field agent and Archer trains his new competition as only he can; Malory frets over her own past and her son's future.
    released: 2010-01-14
    length: 30m
  - name: Diversity Hire
    description: A new field officer makes a splash at ISIS, however Archer and Lana suspect there may be something all too perfect about their new hire.
    released: 2010-01-21
    length: 30m
  - name: Killing Utne
    description: Malory hosts a dinner party in an effort to get a new weapons contract for ISIS; a group of rival assassins targets Mr. Utne.
    released: 2010-01-28
    length: 30m
  - name: Honeypot
    description: Malory's career is threatened when a sensitive video falls into the hands of a rogue Cuban agent.
    released: 2010-02-04
    length: 30m
  - name: Skorpio
    description: Archer must rescue Lana from the clutches of Skorpio; Cyril not only fears for his girlfriend's life but she may be succumbing to Archer's heroics.
    released: 2010-02-11
    length: 30m
  - name: Skytanic
    description: Archer and the ISIS crew battle the clock and each other, when a bomb threatens the maiden voyage of the luxury airship Excelsior.
    released: 2010-02-18
    length: 30m
  - name: The Rock
    description: ISIS loses yet another contract to ODIN, so Malory assigns Archer and Lana to steal a priceless diamond from ODIN's biggest client in order to embarrass the rival spy agency.
    released: 2010-03-04
    length: 30m
  - name: Job Offer
    description: Archer takes a higher paying job at a rival agency ODIN; Malory will stop at nothing to get Archer back at ISIS.
    released: 2010-03-11
    length: 30m
  - name: Dial M for Mother
    description: Questions about the true identity of Archer's father lead him into a perilous trap; Archer and Malory have an explosive confrontation.
    released: 2010-03-18
    length: 30m
