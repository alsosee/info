name: Infinity Train
subtitle: "Book One: The Perennial Child"
description: >
  The first season follows Tulip Olsen, a young aspiring game designer who
  boards a mysterious train while trying to reach camp and must learn how its
  strange cars and glowing passenger numbers work.
released: 2019-08-05
genres:
  - animation
  - adventure
  - anthology
  - comedy drama
  - fantasy
  - mystery
  - science fiction
network: Cartoon Network
wikipedia: https://en.wikipedia.org/wiki/Infinity_Train
imdb: https://www.imdb.com/title/tt8146754/episodes/?season=1
tmdb: https://www.themoviedb.org/tv/91425-infinity-train/season/1
rotten_tomatoes: https://www.rottentomatoes.com/tv/infinity_train/s01
