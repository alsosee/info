    voice: Lena Headey
episodes:
  - name: The Grid Car
    description: >
      Tulip runs away after a family conflict and wakes on a strange train
      where each car contains its own world.
    released: 2019-08-05
    length: 11m
    writers:
      - Lindsay Katai
      - Madeline Queripel
      - Owen Dennis
      - Cole Sanchez
  - name: The Beach Car
    description: >
      Tulip and One-One explore a beach car and meet the Cat while Tulip tries
      to understand the number on her hand.
    released: 2019-08-05
    length: 11m
    writers: Alex Horab
  - name: The Corgi Car
    description: >
      Tulip and One-One enter Corginia, where King Atticus asks for help with a
      threat affecting his kingdom.
    released: 2019-08-06
    length: 11m
    writers:
      - Owen Dennis
      - Justin Michael
  - name: The Crystal Car
    description: >
      Tulip, Atticus, and One-One search for the exit in a crystal forest car
      whose door responds to personal expression.
    released: 2019-08-06
    length: 11m
    writers: Lindsay Katai
  - name: The Cat's Car
    description: >
      The Cat shows Tulip a memory tape that forces her to revisit moments from
      her family life.
    released: 2019-08-07
    length: 11m
    writers: Justin Michael
  - name: The Unfinished Car
    description: >
      One-One tries to fix a car full of impossible logic while Tulip helps him
      understand his role in the train.
    released: 2019-08-07
    length: 11m
    writers: Alex Horab
  - name: The Chrome Car
    description: >
      Tulip encounters her reflection in a mirrored car and learns that the
      mirror world has its own rules.
    released: 2019-08-08
    length: 11m
    writers: Lindsay Katai
  - name: The Ball Pit Car
    description: >
      Tulip's group tries to relax in a ball pit car before the Conductor's
      pursuit catches up with them.
    released: 2019-08-08
    length: 11m
    writers: Alex Horab
  - name: The Past Car
    description: >
      Tulip uses a memory tape to investigate Amelia's past and the identity of
      the train's Conductor.
    released: 2019-08-09
    length: 11m
    writers: Justin Michael
  - name: The Engine
    description: >
      Tulip reaches the front of the train and confronts Amelia while trying to
      help her friends.
    released: 2019-08-09
    length: 11m
    writers: Lindsay Katai
