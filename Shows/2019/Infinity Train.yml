characters:
  - name: Tulip Olsen
    voice: Ashley Johnson
  - name: Glad-One
    voice: Jeremy Crutchley
  - name: Sad-One
    voice: Owen Dennis
  - name: Atticus
    voice: Ernie Hudson
  - name: The Cat
    voice: Kate Mulgrew
