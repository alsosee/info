episodes:
  - name: The Winter of Our Monetized Content
    description: When a video of Bart and Homer fighting goes viral, they begin a journey as social media celebrities. Meanwhile, Lisa battles the school's new industrialized detention system.
    released: 2019-09-29
    length: 30m
  - name: Go Big or Go Homer
    description: Homer is demoted to supervising interns, among whom is go-getter millennial Mike, a 35-year-old who asks Homer to be his mentor. However, when Homer inspires Mike to start a business of his own, the two find themselves being chased by the mob.
    released: 2019-10-06
    length: 30m
  - name: The Fat Blue Line
    description: During the San Castellanta street festival, much of the town realizes their wallets have been pickpocketed. After the state investigator puts the wrong man in jail, Chief Wiggum sets out to clear his name, catch the real criminal and show he's still up for police work.
    released: 2019-10-13
    length: 30m
  - name: Treehouse of Horror XXX
    description: The 30th Treehouse of Horror features a demon Maggie, a mission to rescue Milhouse from another dimension, dead-Homer's spirit trying on some new bodies for size and Selma finally finding love in an unlikely place – the alien in the basement.
    released: 2019-10-20
    length: 30m
  - name: Gorillas on the Mast
    description: After a trip to Aquatraz Water Park, Lisa becomes determined to set free Springfield's most vicious animals in captivity. Meanwhile, Homer fulfills a lifelong dream of buying a boat, and quickly realizes boat ownership sucks.
    released: 2019-11-03
    length: 30m
  - name: Marge the Lumberjill
    description: When Marge realizes that everyone views her as boring, she takes up competitive lumber-jacking as a hobby (and has a real gift for it). The circuit of competitive timbersports takes her on a month-long retreat to Portland with her trainer, Paula, whom Homer worries is going to steal her away forever.
    released: 2019-11-10
    length: 30m
  - name: Livin La Pura Vida
    description: The Simpsons join other Springfield families on the Van Houten's annual trip to Costa Rica, which they obviously can't afford. While there, Homer befriends Patty's new girlfriend, Evelyn, and Lisa tracks down the real reason the Van Houtens can go on this trip every year.
    released: 2019-11-17
    length: 30m
  - name: Thanksgiving of Horror
    description: In a special Thanksgiving edition of "Treehouse of Horror," the Simpsons are forced to face various Thanksgiving nightmares, including the first Thanksgiving, an A.I. mishap and a dangerous space mission complicated by a sentient cranberry sauce.
    released: 2019-11-24
    length: 30m
  - name: Todd, Todd, Why Hast Thou Forsaken Me?
    description: In this Flanders family-focused episode, Todd blames God for the death of his mother and rejects his faith – causing great distress for Ned, who sends him to live with the Simpsons in an attempt to scare him back into God's arms.
    released: 2019-12-01
    length: 30m
  - name: Bobby, It's Cold Outside
    description: Sideshow Bob gets contracted as this year's mall Santa. Meanwhile, someone is stealing all the Christmas packages off people's front porches.
    released: 2019-12-15
    length: 30m
  - name: Hail to the Teeth
    description: Homer and Marge attend Artie Ziff's wedding and become quite uncomfortable when they realize that his bride-to-be is a clone of Marge. Meanwhile, Lisa grapples with the misogynistic implications of the immediate popularity she receives after getting her new Invisalign braces.
    released: 2020-01-05
    length: 30m
  - name: The Miseducation of Lisa Simpson
    description: The sea captain finds a treasure he's been searching for all his life, but it's taken from him by the townspeople. Marge convinces the people of Springfield to build a S.T.E.M. school with the money.
    released: 2020-02-16
    length: 30m
  - name: Frinkcoin
    description: Homer and Marge compete to be the topic of Lisa's "Most Interesting Person I Know" essay. Lisa instead chooses Professor Frink. While Lisa works on the essay, Frink develops a cryptocurrency, overtaking Mr. Burn's title of richest man in Springfield. With new fame, Frink struggles to know who his real friends are, while Mr. Burns schemes to take his title back.
    released: 2020-02-23
    length: 30m
  - name: Bart the Bad Guy
    description: 'Bart accidentally sees a brand-new superhero movie a month before it comes out.. and the world cowers before his newfound plot-spoiling powers. Thus, a new super-villain is born: Spoiler Boy! Can heroic movie executives stop Bart before he succumbs to the temptations of ultimate evil? Find out.'
    released: 2020-03-01
    length: 30m
  - name: Screenless
    description: Marge implements a screen time limit for the whole family, all of whom all easily adjust to the new lifestyle. However, Marge realizes that she is the one addicted - not her husband and children.
    released: 2020-03-08
    length: 30m
  - name: Better Off Ned
    description: Bart bonds with Ned Flanders, which leaves Homer jealous, so he retaliates by mentoring Nelson Muntz. Then, a heroic act by Homer makes Bart look up to him again.
    released: 2020-03-15
    length: 30m
  - name: Highway to Well
    description: When Maggie goes to pre-school, Marge decides to get a job to pass the time and ends up working at an upscale weed dispensary. Then, Homer decides to open his own dispensary that mimics a sketchy drug deal, putting their two businesses at odds.
    released: 2020-03-22
    length: 30m
  - name: The Incredible Lightness of Being a Baby
    description: Cletus becomes a helium tycoon. Meanwhile, Marge reunites with baby Hudson from Playdate with Destiny.
    released: 2020-04-19
    length: 30m
  - name: Warrin' Priests
    description: When Bode, a young charismatic new preacher, comes to town and shakes things up at church, Reverend Lovejoy investigates his mysterious past.
    released: 2020-04-26
    length: 30m
  - name: Warrin' Priests Part Two
    description: In Michigan, Reverend Lovejoy uncovers the reason why Bode left and came to Springfield. When the congregation learns of his crime, they must decide whether to banish their new priest.
    released: 2020-05-03
    length: 30m
  - name: The Hateful Eight-Year-Olds
    description: Lisa makes a new friend who loves horses, but then becomes part of a circle of snooty young rich girls. Meanwhile, Homer takes Marge on a romantic cruise.
    released: 2020-05-10
    length: 30m
  - name: The Way of the Dog
    description: After the Simpsons' dog bites Marge, the family explores the tragic past of Santa's Little Helper.
    released: 2020-05-17
    length: 30m
