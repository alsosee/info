name: Chernobyl
description: >
  The 1986 explosion at the Chernobyl Nuclear Power Plant forces Soviet scientists, officials, firefighters, and miners into a desperate containment effort.
  The miniseries dramatizes the disaster's immediate human cost and the political pressure surrounding the investigation.
