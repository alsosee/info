episodes:
  - name: Yacht Rocky
    description: When the brewery announces it will be firing one employee, Peter is nervous he will be the one let go. In order to calm his nerves, the family departs on a Yacht Rock cruise that doesn't go as expected.
    released: 2019-09-29
    length: 30m
  - name: Bri-Da
    description: Peter and his friends are sick of forgetting the million-dollar business ideas they come up with while drinking, so they strap on Joe's police body cams to record their every move. Meanwhile, Quagmire is trying to come to terms with an unexpected family development.
    released: 2019-10-06
    length: 30m
  - name: Absolutely Babulous
    description: When Stewie receives a participation medal in his school's toddler games, he begins to question everything he has ever won. Meanwhile, Peter causes a fight between Lois' parents and must repair the damage he caused.
    released: 2019-10-13
    length: 30m
  - name: Disney's the Reboot
    description: The network decides that it's time to explore some unique ways to reboot the series. When three versions of the reboots are shown to a focus group, the feedback takes some surprising turns.
    released: 2019-10-20
    length: 30m
  - name: Cat Fight
    description: When Quagmire opens a cat café in town, Brian decides to take a stand to get the café shut down. Meanwhile, when Meg and Brian get in trouble at school, Lois becomes nervous and decides they need to go to church camp in order to find their way.
    released: 2019-11-03
    length: 30m
  - name: Peter & Lois' Wedding
    description: The Wi-Fi goes out in the Griffin house, leaving the family with nothing to do for the evening. In order to keep the family entertained, Peter and Lois decide to tell the kids the story of how they met and fell in love in the '90s.
    released: 2019-11-10
    length: 30m
  - name: Heart Burn
    description: In celebration of Peter and Lois' anniversary, the Griffins recount their own versions of three well-known love stories.
    released: 2019-11-17
    length: 30m
  - name: Shanksgiving
    description: When Lois hosts a special Thanksgiving dinner for her family, Peter decides the best way to avoid it is to get arrested. Meanwhile, a secret that Stewie has been keeping from everyone is revealed.
    released: 2019-11-24
    length: 30m
  - name: Christmas is Coming
    description: When Meg takes Stewie to the mall to meet Santa, she has a surprising response. Meanwhile, Stewie is entirely scarred from the same experience and Brian tries to help him process.
    released: 2019-12-15
    length: 30m
  - name: Connie's Celica
    description: When Lois gets a job as the music teacher at Chris and Meg's school, a mean student, Connie, decides to make Lois the target of her antics.
    released: 2020-01-05
    length: 30m
  - name: Short Cuts
    description: When Brian accidentally becomes a local hero, an old street pal - and now a successful millionaire dog - reaches out and tries to convince him to get neutered. Meanwhile, Lois gets a pixie cut against Peter's wishes, so Peter retaliates by trying to out-embarrass her.
    released: 2020-02-16
    length: 30m
  - name: Undergrounded
    description: Peter secretly gets a credit card and overspends the family money, so Lois grounds him. To plan the perfect escape, he builds a tunnel leading directly to The Drunken Clam.
    released: 2020-02-23
    length: 30m
  - name: Rich Old Stewie
    description: Stewie's future life could not be going any better, living as a wealthy, old Mr. Burns-type man, until his retirement is interrupted by Brian, who brings news that Peter is dying.
    released: 2020-03-01
    length: 30m
  - name: The Movement
    description: When Peter starts coaching for Quahog's minor league baseball team, he gets constipated during the national anthem and must kneel, unintentionally becoming the face of racial justice.
    released: 2020-03-08
    length: 30m
  - name: Baby Stewie
    description: Stewie builds a DNA-altering machine that will allow him to remain smart forever, but the invention has the adverse effect and he instead transforms into what he should have always been - an actual baby -.
    released: 2020-03-15
    length: 30m
  - name: Start Me Up
    description: Peter's non-stop sweating becomes a liability at his company, so his boss tells him to work from home. Meanwhile, after Stewie and Chris cause thousands of dollars in damage to an electronics store, the two create a fake Kickstarter campaign with Brian to pay back the money.
    released: 2020-04-19
    length: 30m
  - name: Coma Guy
    description: With a newfound love for rocking out to Van Halen, Peter gets in a car accident and falls into a coma.
    released: 2020-04-26
    length: 30m
  - name: Better Off Meg
    description: When Meg is erroneously reported to have died in a car crash, she goes along with the story to start a new life elsewhere. Meanwhile, the Griffins experience a life without Meg.
    released: 2020-05-03
    length: 30m
  - name: Holly Bibble
    description: Cooped up in a hotel room due to a big storm, the Griffins pass the time by reimagining three stories from the Bible.
    released: 2020-05-10
    length: 30m
  - name: Movin' In (Principal Shepherd's Song)
    description: Principal Shepherd moves in with the Griffins after he is fired for fat-shaming Chris at school. Meanwhile, Brian sues Stewie for writing a series of children's books which portray him as an idiot.
    released: 2020-05-17
    length: 30m
