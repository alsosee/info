name: "Frank Herbert's Children of Dune"
description: >
  Set several years after the events of the first miniseries, the story follows the continued struggle for control over the desert planet Arrakis and the precious spice melange. As Paul Atreides' empire faces internal conspiracies and external threats from rival houses, his sister Alia serves as regent while his young twin children, Leto II and Ghanima, grow into their own destinies. The series explores themes of political intrigue, religious fundamentalism, and the heavy burden of prescience as the next generation of House Atreides attempts to secure a future for humanity.
