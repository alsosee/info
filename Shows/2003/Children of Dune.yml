episodes:
  - name: "Part One: Messiah"
    released: 2003-03-16
    length: 1h28m
    description: >
      Emperor Paul Atreides faces a conspiracy to overthrow him while dealing with the birth of his twins, Leto II and Ghanima, and the loss of his prescient vision.
  - name: "Part Two: The Children"
    released: 2003-03-17
    length: 1h28m
    description: >
      Paul's sister Alia sinks into madness as the twins grow up and House Corrino plots to assassinate them.
  - name: "Part Three: The Golden Path"
    released: 2003-03-18
    length: 1h28m
    description: >
      Leto II accepts his destiny and undergoes a physical transformation to save humanity, leading to the final confrontation with Alia.
