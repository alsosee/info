episodes:
  - name: Treehouse of Horror XIV
    description: A Halloween trilogy (XIV), with Jennifer Garner, Oscar De La Hoya and Jerry Lewis as Professor Frink's father, who goes on a rampage after being brought back from the dead. Homer kills death in the first tale and has to become the grim reaper; In the Second tale Professor Frink wins a Nobel prize and then brings his father back from the dead in a Frankenstein parody; in the 3rd tale Bart gets access to a watch that changes the fabric of existence and along with Milhouse they cause trouble in Springfield.
    released: 2003-11-02
    length: 30m
  - name: My Mother the Carjacker
    description: Surfacing to see her son, Homer's fugitive mom is caught and tried for sabotaging a lab owned by Mr. Burns, who's loath to let a grudge die.
    released: 2003-11-09
    length: 30m
  - name: The President Wore Pearls
    description: Lisa is made to look like Eva Peron in this loose parody as faculty members undermine her student-body presidency.
    released: 2003-11-16
    length: 30m
  - name: The Regina Monologues
    description: Prime Minister Tony Blair welcomes the Simpsons to England, where they run into author J.K. Rowling and actor Ian McKellan.
    released: 2003-11-23
    length: 30m
  - name: The Fat and the Furriest
    description: Homer goes on a mission of revenge against a bear that attacked him during a visit to the dump and creates a home made bear-fighting suit. Blackboard 'My pen is not a booger launcher'.
    released: 2003-11-30
    length: 30m
  - name: Today I Am a Klown
    description: Krusty's rabbi father helps him prepare for his bar mitzvah, which includes Mr. T; Homer guest hosts for Krusty and is a hit. Dan Castellaneta, Blackboard reads 'over forty & single is not funny'.
    released: 2003-12-07
    length: 30m
  - name: '''Tis the Fifteenth Season'
    description: A version of "A Christmas Carol" causes Homer to go from greedy to giving, prompting jealousy in Flanders, who gives gifts to everyone in town.
    released: 2003-12-14
    length: 30m
  - name: Marge vs. Singles, Seniors, Childless Couples and Teens, and Gays
    description: Maggie is among the babies who riot at a kiddie concert, prompting a backlash by single childless citizens, who organize against kids and families.
    released: 2004-01-04
    length: 30m
  - name: I, (Annoyed Grunt)-Bot
    description: Unable to build Bart a working robot for TV's "Robot Rumble," Homer becomes the robot by hiding inside, taking beatings, but giving better.
    released: 2004-01-11
    length: 30m
  - name: Diatribe of a Mad Housewife
    description: Tom Clancy, Thomas Pynchon and the Olsen twins have cameos as Marge writes a novel that casts Homer in a bad light, and Flanders in a good one.
    released: 2004-01-25
    length: 30m
  - name: Margical History Tour
    description: Marge talks history, with Homer as Henry VIII, Lenny and Carl as Lewis and Clark, Lisa as an opinionated Sacagawea and Bart as Mozart.
    released: 2004-02-08
    length: 30m
  - name: Milhouse Doesn't Live Here Anymore
    description: Bart bonds with Lisa after Milhouse and his mom move to Capital City; Homer panhandles to buy Marge's anniversary gift.
    released: 2004-02-15
    length: 30m
  - name: Smart & Smarter
    description: Simon Cowell plays an admissions interviewer at a prestigious pre-nursery school where Maggie's IQ is found to surpass Lisa's, causing an identity crisis for the older sister.
    released: 2004-02-22
    length: 30m
  - name: The Ziff Who Came to Dinner
    description: Lisa finds Arte Ziff living in their attic after seeing a horror movie with Homer and Bart. Artie moves in because he owes massive amounts of money to his company shareholders. Blackboard reads 'I will not speculate on how hot teacher used to be'.
    released: 2004-03-14
    length: 30m
  - name: Co-Dependent's Day
    description: After a winery tour, Marge and Homer become drinking pals, until a driving mishap prompts one to pull a fast one on the other.
    released: 2004-03-21
    length: 30m
  - name: Wandering Juvie
    description: Sarah Michelle Gellar plays a delinquent whom Bart meets in a juvenile-correction facility that's not strong enough to hold them.
    released: 2004-03-28
    length: 30m
  - name: My Big Fat Geek Wedding
    description: Skinner's cold feet near the altar also give Edna second thoughts, leading her into a rebound romance.
    released: 2004-04-18
    length: 30m
  - name: Catch 'Em If You Can
    description: Grandpa, Bart and Lisa Simpson take off on a cross country journey when Homer and Marge just want to spend a bit of kid free time.
    released: 2004-04-25
    length: 30m
  - name: Simple Simpson
    description: Avenging a slight to Lisa turns Homer into the city's new crusader for justice, a masked man whose weapon of choice is a pie in the face.
    released: 2004-05-02
    length: 30m
  - name: The Way We Weren't
    description: After Bart and Milhouse play a game of Spin the Bottle in the tree house, Homer tells the story of his and Marge's first kiss. Marge and Homer then learn they were destined to be together.
    released: 2004-05-09
    length: 30m
  - name: Bart-Mangled Banner
    description: Marge and Homer work hard to get Bart to the doctor for a shot, he then goes deaf as a side effect. Later he is bending over doing a full moon and accidentally moons the American Flag and the Dante basket ball classic during the national anthem.
    released: 2004-05-16
    length: 30m
  - name: Fraudcast News
    description: Mr. Burns buys all the media outlets in town after everyone thinks he is dead and does not care. Lisa starts her own newspaper and ends up in a war with Burns.
    released: 2004-05-23
    length: 30m
