    description: Hank is looking forward to being on the parade of homes until his latest project ends up with the house being declared uninhabitable.
    released: 2003-12-07
    length: 30m
  - name: Livin' on Reds, Vitamin C and Propane
    description: Hank and Bobby hit the road in an 18 wheeler to deliver a load of his mothers furniture out to Arizona for her. The guys stow away in the back of the trailer without Hanks knowedge. Meanwhile, Peggy and Luanne write a Christmas carol to make money.
    released: 2003-12-14
    length: 30m
  - name: Rich Hank, Poor Hank
    description: After becoming inquisitive about how much money the family makes, Bobby decides that he will do some investigating of his own. After seeing some old paperwork in the garage, Bobby determines that Hank is a rich miser. Feeling that Hank is just being greedy, he goes on a shopping spree with Hank's emergency credit card. Meanwhile, news of Hank's hidden wealth spread through the alley and out about town.
    released: 2004-01-04
    length: 30m
  - name: Ceci N'est Pas Une King of the Hill
    description: Peggy designs art for Strickland Propane when Hank can't find anything decent at the local art shops then her work is picked up by a art dealer. Dale discovers the joy of owning a suit of armor.
    released: 2004-01-25
    length: 30m
  - name: That's What She Said
    description: Hank gets rattled by a new co-workers smutty comments; Dale quits smoking but takes up chewing tobacco.
    released: 2004-02-08
    length: 30m
  - name: My Hair Lady
    description: Bill poses as a gay man at a hair salon to help Luanne with her new job.
    released: 2004-02-15
    length: 30m
  - name: Phish and Wildlife
    description: Hank with the family and the guys go on their annual camping trip where he tries to teach Bobby how to live off the land. Hank then has to deal with a Horde of hippies and the guys craving for hamburgers. Then Bill goes native.
    released: 2004-02-22
    length: 30m
  - name: Cheer Factor
    description: Peggy overcomes obstinate coach Jo Rita to lead the cheerleading squad and fulfill her dream.
    released: 2004-03-07
    length: 30m
  - name: Dale Be Not Proud
    description: Hank's hero, NHRA driver John Force, needs a organ transplant and Dale has a compatible kidney. Bobby does comedy morning announcements over the school's PA with Peggy's help.
    released: 2004-03-14
    length: 30m
  - name: Après Hank, le Deluge
    description: Arlen is hit by rains and flash floods, during the heavy rain Hank must save Arlen at the dam; Bill enjoys newfound confidence when he becomes a emergency leader.
    released: 2004-03-21
    length: 30m
  - name: Daletech
    description: Peggy gets frustrated when Cotton is left at the Hill's house; When Cotton becomes head of the new neighborhood watch program C.O.P.S. he becomes a threat to Dales new security company.
    released: 2004-03-28
    length: 30m
  - name: How I Learned to Stop Worrying and Love the Alamo
    description: After Tom Landry Middle Schools new history books leave out the Alamo, Hank helps plan a re-enactment of the Battle of the Alamo so Bobby can get the credits he needs to not take summer school. Meanwhile, Peggy takes Flat Stanley on a photographic adventure.
    released: 2004-04-18
    length: 30m
  - name: Girl, You'll Be a Giant Soon
    description: When Hank tries to enter the Texas State Grill Off, he discovers that they do not allow the use of propane. Hank then starts a protest with Louanne's help. Meanwhile, Peggy, Nancy and Minh try to get into a house that is for sale to see where a murder was committed.
    released: 2004-04-25
    length: 30m
  - name: Stressed for Success
    description: Hank gets flustered because of Bobby watching so much TV. Bobby's knowledge of pop culture then leads him to being chosen to be a member of the school Quiz Bowl team and he helps to take them to the Championships. Bobby then begins to buckle under the stress.
    released: 2004-05-02
    length: 30m
  - name: Hank's Back
    description: Hank has major back pain that prevents him from working and ends up getting disability for not being able to work. The agent believes he is faking his injury in order to stiff the government.
    released: 2004-05-09
    length: 30m
  - name: The Redneck on Rainey Street
    description: Kahn decides to be a beer drinking, El Camino driving, ATV riding redneck when Connie is rejected by a prestigious school.
    released: 2004-05-16
    length: 30m
  - name: Talking Shop!
    description: Given the choice between shop class and counseling his peers, Bobby opts for the counseling sessions in hopes of meeting girls.
    released: 2004-05-23
    length: 30m
