    length: 30m
  - name: The Incredible Hank
    description: Hank is ran ragged at work because of fellow employee call offs and Peggy, not listening to him decides that he has low testosterone after they take Bobby to the Doctor. She secretly slips Hank doses of testosterone and he starts going through puberty again.
    released: 2003-11-23
    length: 30m
  - name: Flirting with the Master
    description: Peggy accepts a tutoring job in Mexico helping actor Monsignor Martinez's children prepare for the SAT's; Luanne takes on Peggy's homemaker duties while she is gone and drives Hank nuts.
    released: 2003-11-30
    length: 30m
