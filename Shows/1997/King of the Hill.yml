episodes:
  - name: Pilot
    description: Bobby is accidentally given a black eye when he is not paying attention in a ball game and then he gives Peggy a black eye throwing his baseball in the house and Hank is turned into child protection services for abuse.
    released: 1997-01-12
    length: 30m
  - name: Square Peg
    description: When Peggy is recruited to teach a sex education class at school, Dale makes anonymous call to the Hill house trying to get her to drop the class. Hank gets bent out of shape about Bobby taking the class.
    released: 1997-01-19
    length: 30m
  - name: The Order of the Straight Arrow
    description: When Hank tries to introduce Bobby to one of his fond childhood memories by taking him on a Straight Arrow scout troop camping weekend, things don't go quite as planned. He has a run in with environmentalists, the park police and a friend turned traitor. While the guys are off having their misadventure, Peggy goes off to her special store for some foot care.n
    released: 1997-02-02
    length: 30m
  - name: Hank's Got the Willies
    description: Bobby messes with Hanks guitar and gets him upset, then Hank hits Willie Nelson with a golf ball at the local golf course.
    released: 1997-02-09
    length: 30m
  - name: Luanne's Saga
    description: Luanne breaks up with Buckley and Hank helps her through the breakup despite Peggy telling him how to handle her and what not to do. She then moves out and moves in with Boomhauer.
    released: 1997-02-16
    length: 30m
  - name: Hank's Unmentionable Problem
    description: When Hank suffers irregularity, he must tolerate the embarrassment of a visit to the doctor and questions from his friends.
    released: 1997-02-23
    length: 30m
  - name: Westie Side Story
    description: Hank and Peggy are happy at first, to meet their new Laotian neighbors. That is, until Khan's dog mates with Lady Bird then disappears. Peggy encounters conflict with Minh as well.
    released: 1997-03-02
    length: 30m
  - name: Shins of the Father
    description: Hank must confront his visiting, war-veteran father when Bobby begins imitating Cotton's chauvinistic behavior.
    released: 1997-03-23
    length: 30m
  - name: Peggy the Boggle Champ
    description: Peggy competes in a Boggle tournament against urban snobs in Dallas while Hank and the guys plan on visiting a riding lawn mower convention.
    released: 1997-04-13
    length: 30m
  - name: Keeping Up with Our Joneses
    description: Hank's anti-smoking lesson for Bobby leads to him and Peggy smoking again and becoming addicted to cigarettes once more.
    released: 1997-04-27
    length: 30m
  - name: King of the Ant Hill
    description: Hank's relationship with Dale becomes strained when Hank tries to compete with Khan for best lawn on the block and fires Dale as his exterminator.
    released: 1997-05-04
    length: 30m
  - name: Plastic White Female
    description: Bobby practices his kissing technique before his first coed party on Luanne's beauty class head and Hank goes balistic.
    released: 1997-05-11
    length: 30m
