episodes:
  - name: Cartman Gets an Anal Probe
    description: Aliens wreak havoc in the Rockies, first by subjecting Cartman to an anal probe, and then by abducting Kyle's baby brother.
    released: 1997-08-13
    length: 30m
  - name: Weight Gain 4000
    description: Cartman tries to slim down when he learns a TV talk-show host is coming to town to give him an award, but he bulks up instead. Meanwhile, Mr. Garrison hatches a plan to murder the visiting celeb.
    released: 1997-08-20
    length: 30m
  - name: Volcano
    description: A volcanic eruption interrupts the boys' camping trip.
    released: 1997-08-27
    length: 30m
  - name: Big Gay Al's Big Gay Boat Ride
    description: When his pup explores his sexuality, Stan gets so upset that he inadvertently threatens to blow the school's homecoming-game victory.
    released: 1997-09-03
    length: 30m
  - name: An Elephant Makes Love to a Pig
    description: After a botched genetic experiment, Stan's clone is let loose in the town. Voices include Trey Parker and Matt Stone.
    released: 1997-09-10
    length: 30m
  - name: Death
    description: The boys summon the Grim Reaper.
    released: 1997-09-17
    length: 30m
  - name: Pinkeye
    description: A pinkeye epidemic interrupts the boys' plans to win a Halloween-costume contest; and Kenny has a run-in with a Russian space station when it falls to Earth.
    released: 1997-10-29
    length: 30m
  - name: Starvin' Marvin
    description: After the boys contact an agency that helps starving children, Government authorities send Cartman to Ethiopia. Meanwhile, the town holds a drive for canned goods; and turkeys revolt against a genetic engineer.
    released: 1997-11-19
    length: 30m
  - name: Mr. Hankey, the Christmas Poo
    description: Because he's Jewish, Kyle is denied involvement in the Nativity play and excluded from trips to see Santa. Meanwhile, South Park residents try to plan a politically correct celebration; and Mr. Hankey visits Kyle.
    released: 1997-12-17
    length: 30m
  - name: Damien
    description: As Cartman celebrates his birthday, Jesus Christ and Satan duke it out on a pay-per-view TV special. Meanwhile, Satan's son Damien tries to fit in with the crowd after making a violent first impression.
    released: 1998-02-04
    length: 30m
  - name: Tom's Rhinoplasty
    description: Mr. Garrison takes a leave of absence to have a nose job and is replaced by Miss Ellen, a substitute who threatens Stan and Wendy's relationship.
    released: 1998-02-11
    length: 30m
  - name: Mecha-Streisand
    description: The future of the world is at stake after the boys unearth a prehistoric relic that spawns a monster.
    released: 1998-02-18
    length: 30m
  - name: Cartman's Mom is a Dirty Slut
    description: When Cartman begins to exhibit odd behavior, a counselor suggests that finding his father may solve his problems.
    released: 1998-02-25
    length: 30m
