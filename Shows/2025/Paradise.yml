name: Paradise
description: >
  Set in a massive, city-sized underground bunker in Colorado three years
  after a global doomsday event, the series follows Xavier Collins, a
  high-ranking U.S. Secret Service agent, who becomes the lead suspect in the
  murder of the President of the United States.
released: 2025-01-26
rating: TV-MA
genres:
  - political thriller
  - science fiction
network: Hulu
wikipedia: https://en.wikipedia.org/wiki/Paradise_(TV_series)
imdb: https://www.imdb.com/title/tt27214470
tmdb: https://www.themoviedb.org/tv/223793-paradise
creators: Dan Fogelman
characters:
  - name: Xavier Collins
    actor: Sterling K. Brown
  - name: President Cal "Wildcat" Bradford
    actor: James Marsden
  - name: Samantha "Sinatra" Redmond
    actor: Julianne Nicholson
  - name: Dr. Gabriela Torabi
    actor: Sarah Shahi
  - name: Special Agent Jane Driscoll
    actor: Nicole Brydon Bloom
episodes:
  - name: Wildcat Is Down
    description: >
      Agent Xavier Collins discovers the President has been murdered and
      begins a high-stakes investigation.
    released: 2025-01-26
  - name: Sinatra
    description: >
      Xavier is interrogated while Samantha "Sinatra" Redmond reflects on the
      origins of the Paradise bunker.
    released: 2025-01-28
  - name: The Architect of Social Well-Being
    description: >
      Isolated and under suspicion, Xavier turns to Dr. Gabriela Torabi for
      answers.
    released: 2025-01-28
  - name: Agent Billy Pace
    description: >
      During the annual carnival, Xavier and Billy delve deeper into the
      conspiracy while Billy's tragic past is revealed.
    released: 2025-02-04
  - name: In the Palaces of Crowned Kings
    description: >
      Xavier faces the fallout of his investigation while the show explores
      Cal’s family history and final days.
    released: 2025-02-11
  - name: You Asked for Miracles
    description: >
      Xavier and Agent Robinson put their plans into motion as Sinatra
      struggles to maintain control.
    released: 2025-02-18
  - name: The Day
    description: >
      Flashbacks reveal the harrowing events of the day the world ended and
      the survivors arrived in Paradise.
    released: 2025-02-25
  - name: The Man Who Kept the Secrets
    description: >
      The season finale reveals the identity of the President's killer and
      sets the stage for Season 2.
    released: 2025-03-04
