  - name: Thrifty Ways to Thieve Your Mother
    description: When Lisa starts wearing Marge's "vintage" clothes from the 90's, she's welcomed into the school's super-elite fashion club. But as they run out of retro looks, the funky fashionistas become obsessed with getting more.. by hook or by crook.
    released: 2025-09-28
    length: 30m
  - name: Keep Chalm and Gary On
    description: Homer gets Superintendent Chalmers a job at the power plant. There, Chalmers discovers huge mutated snails that produce valuable slime launching his new career as a man-o-sphere guru.
    released: 2025-10-05
    length: 30m
  - name: Treehouse of Horror XXXVI
    description: In this year's installment of the annual fright-fest, the town is menaced by a mysterious murdering monster from out of the sewers, Krusty has a demonic special guest on his live Halloween special, and we go a thousand years into Springfield's poseable plastic post-apocalyptic future.
    released: 2025-10-19
    length: 30m
  - name: Men Behaving Manly
    description: Springfield's men are in crisis.
    released: 2025-10-26
    length: 30m
  - name: Bad Boys... For Life?
    description: Is Bart Simpson truly a bad seed? Homer and Marge must find out once and for good.
    released: 2025-11-02
    length: 30m
  - name: Bart 'N' Frink
    description: When Bart becomes Professor Frink's lab assistant, the Simpsons are thrown into a world of tech billionaires determined to live forever, with the future of the internet at stake.
    released: 2025-11-09
    length: 30m
  - name: Sashes to Sashes
    description: Bart runs against Mayor Quimby's son for student council president, while Lisa learns troubling secrets about the Quimby clan.. and about the Simpsons.
    released: 2025-11-16
    length: 30m
  - name: The Day of the Jack-up
    description: After a mysterious buyer purchases every ticket for the KPOP concert Lisa wants to go to, the Simpsons have to figure out the identity of this evil ticket reseller. Or do they? (Yes, they do).
    released: 2025-11-23
    length: 30m
  - name: Aunt Misbehavin'
    description: 'Patty and Bart team up for the ultimate prank: getting Homer declared legally dead. To their chagrin, Homer loves being officially dead - which leads to Patty and Selma having a huge fight and Patty moving away to "Palm Springfield".'
    released: 2025-11-30
    length: 30m
  - name: Guess Who's Coming to Skinner
    description: When Principal Skinner discovers that one of his students is a runaway who has been living in the school library, he has to take the snarky, difficult kid into his home and is forced into a role he never expected or wanted - being a parent.
    released: 2025-12-07
    length: 30m
  - name: Parahormonal Activity
    description: Set in the near future, Marge is competently coping with the hormonal onslaught hitting her now teenage kids when she's suddenly struck by a big life change of her own, leaving Homer as the last sane person in the house.. or is he?
    released: 2025-12-14
    length: 30m
  - name: ¡The Fall Guy-Yi-Yi!
    description: Homer revitalizes Bumblebee Man's career when he becomes his secret stuntman. But how much punishment can a Stunt-Bee take before it starts to sting.
    released: 2025-12-28
    length: 30m
  - name: Seperance
    description: Homer's enthusiasm skills land him a job at a secretive company with a mind-altering agenda.
    released: 2026-01-04
    length: 30m
  - name: Irrational Treasure
    description: Marge's crusade to get the family dog in better shape leads to her entering Santa's Little Helper in canine agility competitions and a trip to the National Dog Show in Philadelphia. There, Marge and Homer suddenly find themselves - and the dog - mixed up in a historical conspiracy adventure worthy of a "National Treasure" movie.
    released: 2026-02-15
    length: 30m
  - name: Homer? A Cracker Bro?
    description: Homer strikes up an unlikely friendship with Kirk Van Houten, which leads to them launching a hugely successful business venture together - a "crumbless" cracker that sweeps the nation. But when Kirk's darkest secrets are revealed, Homer has to choose between his family and his fortune... and may just end up going in jail.
    released: 2026-02-15
    length: 30m
