name: SpongeBob SquarePants
description: >
  SpongeBob SquarePants follows an optimistic sea sponge and his friends in the
  underwater city of Bikini Bottom. SpongeBob works as a fry cook at the Krusty
  Krab while getting pulled into surreal comedy with Patrick, Squidward, Sandy,
  Mr. Krabs, Plankton, and the rest of the town.
