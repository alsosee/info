  - name: Dia-bill-ic Shock
    description: Unwilling to change his eating habits, Bill is diagnosed with diabetes.
    released: 2008-09-28
    length: 30m
  - name: Earthy Girls Are Easy
    description: Dale, in an attempt to impress the ladies, organizes an Earth Benefit concert after charging Buck Strickland for carbon offsets.
    released: 2008-10-05
    length: 30m
  - name: Square-Footed Monster
    description: The Hill family and the rest of the neighborhood visit the City Council to protest when Ted Wassonasong tries to build a McMansion on Rainy street when a neighbors house goes up for sale.
    released: 2008-10-19
    length: 30m
  - name: Lost in Myspace
    description: Hank gets upset with the My Space page that Donna creates for Strickland Propane; Dale gets a pig so he can go truffle hunting and he takes Bill and Bobby on the Big Tuffle hunt adventure.
    released: 2008-11-02
    length: 30m
  - name: No Bobby Left Behind
    description: Bobby is identified as special at school when there is a problem with the tests and no child left behind. He is then placed in a class where he no longer has to do any homework or take the standardized tests.
    released: 2008-11-09
    length: 30m
  - name: A Bill Full of Dollars
    description: Peggy plays the stock market with with Minh and Dale and take advantage of Bill in the process, hoping to earn enough money to buy a new Flat Screen TV.
    released: 2008-11-16
    length: 30m
  - name: Straight as an Arrow
    description: When Hank and Bobby decide to get involved with a boys outdoor club called the Order of the Straight Arrow, Hank clashes with the Arrowmaster.
    released: 2008-11-30
    length: 30m
  - name: Lucky See, Monkey Do
    description: When Peggy plans a baby shower for Luanne, Lucky asks his sister Myrna and her children to the party. Lucky's sister then starts taking over. Bill falls for a fast food drive through order taker and tracks her down.
    released: 2009-02-08
    length: 30m
  - name: What Happens at the National Propane Gas Convention in Memphis Stays at the National Propane Convention in Memphis
    description: Hanks boss, Buck Strickland asks Hank to accompany him to the National Propane Gas Convention.
    released: 2009-02-15
    length: 30m
  - name: Master of Puppets
    description: Hank and Peggy go out together on a date night and forget to pick Bobby up. He then uses their guilt to pit them against each other for his attention so he can get gifts. Meanwhile, Dale decides to become Survivor Man and tries to live off the land.
    released: 2009-03-01
    length: 30m
  - name: Bwah My Nose
    description: Hank and the guys end up in a rematch football game against the team they lost the State Championship to back in high school, during practice Hank breaks his nose and goes to a surgeon who fixes and makes it better than it was.
    released: 2009-03-08
    length: 30m
  - name: Uncool Customer
    description: Peggy becomes friends with Katt Savage, the coolest and most glamorous mother at Bobby's Cotillion classes. Meanwhile, Hank discovers a new sandwich shop that becomes his favorite food joint.
    released: 2009-03-15
    length: 30m
  - name: Nancy Does Dallas
    description: Nancy leaves town for a job in Dallas and starts climbing the corporate ladder by any means possible. With Nancy gone, Dale starts preparing for a ice age. Bobby and Joseph go security crazy.
    released: 2009-03-22
    length: 30m
  - name: Born Again on the Fourth of July
    description: Bobby sees the error of his ways after going to church with Lucky, meanwhile, Hank and the guys prepare for the 4th of July and battle with men from the next street over from theirs for the best fireworks.
    released: 2009-04-19
    length: 30m
  - name: Serves Me Right for Giving General George S. Patton the Bathroom Key
    description: Hank receives a box of his late fathers personal effects from Didi and a bizarre list of last requests from Cotton that he has to follow.
    released: 2009-04-26
    length: 30m
  - name: Bad News Bill
    description: Hank is vilified by a Little League coach when he tries to be realistic about Bobby's below-average baseball skills.
    released: 2009-05-03
    length: 30m
  - name: Manger Baby Einstein
    description: Luanne creates a franchise around her Manger Baby puppets and becomes a children's performer.
    released: 2009-05-10
    length: 30m
  - name: Uh-Oh Canada
    description: Hank and the guys deal with less than agreeable visitors when Boomhauer trades homes with a Canadian family for the summer.
    released: 2009-05-17
    length: 30m
  - name: The Boy Can't Help It
    description: A trio of older girls befriends Bobby, and Hank worries that Bobby is being emasculated.
    released: 2009-09-13
    length: 30m
  - name: To Sirloin with Love
    description: Bobby joins the local college's meat cutting examination team after he discovers that he has a talent for identifying cuts of meat.
    released: 2009-09-13
    length: 30m
  - name: The Honeymooners
    description: Hanks mother announces that she has decided to marry a an Hank has never met and move into a recreational vehicle.
    released: 2010-02-21
    length: 30m
  - name: Bill Gathers Moss
    description: To relieve his loneliness, Bill takes in some roommates, including Principal Moss.
    released: 2010-05-03
    length: 30m
  - name: When Joseph Met Lori, and Made Out with Her in the Janitor's Closet
    description: After getting into an argument with Joseph about the girl he has been dating, Dale commits himself to a mental institute.
    released: 2010-05-04
    length: 30m
  - name: Just Another Manic Kahn-Day
    description: Kahn's bouts of manic depression threaten to derail Hanks plan to build a tricked out barbecue grill for Strickland Propane's upcoming event. Bobby has problems understanding his dads old comedy albums.
    released: 2010-05-05
    length: 30m
