episodes:
  - name: The Thin White Line
    description: Family dog Brian is "in a rut" so he tries volunteerism, then takes a job as a dope-sniffing narc for the Quahog P.D. Trouble is, he likes what he sniffs a bit too much.
    released: 2001-07-11
    length: 30m
  - name: Brian Does Hollywood
    description: Brian heads to Hollywood to be screenwriter and the others follow when Stewie is chosen to be on "Kids Say the Darndest Things." Stewie doesn't exactly hit it off with host Bill Cosby but Brian does make his mark in show business, if not in the way he had intended (as a porn "auteur").
    released: 2001-07-18
    length: 30m
  - name: Mr. Griffin Goes to Washington
    description: A conglomerate buys Happy Go Lucky Toys and installs Peter (voice of series creator Seth McFarlane) as president. The conglomerate also owns a tobacco company, and before long Peter is on his way to Washington to testify before Congress on the benefits of smoking.
    released: 2001-07-25
    length: 30m
  - name: One If by Clam, Two If by Sea
    description: Peter and his pals catch a beer-besotted version of the "Spirit of '76" when a Brit buys the Drunken Clam and turns it into an English pub. As it happens, pub owner Nigel Pinchley (voice of series creator Seth MacFarlane) and his family move in next door to the Griffins, and Stewie (also voiced by MacFarlane) plays 'Enry 'Iggins to Nigel's Cockney-accented 3-year-old daughter.
    released: 2001-08-01
    length: 30m
  - name: And the Wiener is...
    description: Meg makes the flag-girl squad at James Woods High. That's "almost a cheerleader," she boasts, but it doesn't impress the cool kids. Meanwhile, Peter (voice of series creator Seth MacFarlane) develops a severe case of Chris-envy.
    released: 2001-08-08
    length: 30m
  - name: Death Lives
    description: Peter pays a price when he plays golf on his anniversary---he's struck by lightning. Adam Carolla provides the voice of the Grim Reaper, who guides Peter through his "near death experience," which leads to a "revelation" concerning Lois. Also, Peter offers the Reaper dating tips.
    released: 2001-08-15
    length: 30m
  - name: Lethal Weapons
    description: With a few tae-jitsu lessons under her black belt, Lois (voice of Alex Borstein) turns herself into Quahog's answer to Xena, cutting a wide swath through the hordes of obnoxious leaf-peeping tourists from New York. But soon her violent ways begin to hit home.
    released: 2001-08-22
    length: 30m
  - name: The Kiss Seen Around the World
    description: Meg (voice of Mila Kunis) gets an internship at a TV station. It's a dream job...because she thinks the station's male anchor is dreamy. But it turns nightmarish when the station's other intern, "the biggest dork on the planet," gets a crush on her. Meanwhile, a bully steals Stewie's tricycle.
    released: 2001-08-29
    length: 30m
  - name: Mr. Saturday Knight
    description: Peter's boss, Mr. Weed, dies suddenly (at the Griffins' house, as it happens), and the toy factory dies with him. Not surprisingly, Peter's "career transition" is less than smooth. Then he decides to follow his 25-year-old dream and become a jouster at Quahog's Renaissance Faire.
    released: 2001-09-05
    length: 30m
  - name: Fish Out of Water
    description: 'A jobless Peter decides on a line of work fit for "a real New England man": He becomes a fisherman. But there''s something fishy about the bank that finances his boat. Meanwhile, Meg and Lois do some serious spring-break partying (Lois does, anyway) at Rhode Island''s Narragansett Beach.'
    released: 2001-09-19
    length: 30m
  - name: Emission Impossible
    description: After Peter helps deliver Lois's sister's baby, he and Lois decide to try to have another kid, but Stewie will attempt to foil their new plan.
    released: 2001-11-08
    length: 30m
  - name: To Love and Die in Dixie
    description: Waylon Jennings has a voice cameo in an episode in which the Griffins discover Southern hospitality---courtesy of the Witness Protection Program. They're in hiding because the convenience-store thief Chris fingers escapes from jail and vows revenge. But should he track Chris (voice of Seth Green) down, he'll have to contend with Sheriff Peter Griffin (series creator Seth MacFarlane).
    released: 2001-11-15
    length: 30m
  - name: Screwed the Pooch
    description: Peter can't stop trying to impress Lois's father, Mr. Pewterschmidt, and Brian can't take his eye off Pewterschmidt's racing grayhound. Bob Barker has a voice cameo as himself. Series creator Seth MacFarlane provides the voices of Peter, Brian, Pewterschmidt, Bill Gates, an ape and a cockroach.
    released: 2001-11-29
    length: 30m
  - name: 'Peter Griffin: Husband, Father...Brother?'
    description: When Chris adopts hip-hop speech, Peter (who can't understand a word he's saying) decides to teach his son about his roots. He makes a startling discovery. Meanwhile, Stewie becomes enchanted with the Buddy Cianci Junior High cheerleaders.
    released: 2001-12-06
    length: 30m
  - name: Ready, Willing, and Disabled
    description: 'Joe, Quahog''s disabled cop, is depressed after failing to nab a perp, so Peter suggests he compete in the Special People''s Games as a confidence booster. His event: the decathlon. His competition: "a trash-talking quadriplegic" (voice of series creator Seth MacFarlane). Tony Danza and Valerie Bertinelli have voice cameos as actors playing Joe and his wife, Bonnie, in a movie.'
    released: 2001-12-20
    length: 30m
  - name: A Very Special Family Guy Freakin' Christmas
    description: It may be the season, but Peter's anything but merry when holiday preparations prevent him from watching his favorite Christmas special, "KISS Saves Santa." And soon the family experiences the same lack of spirit when they're compelled to do last-minute shopping. Members of KISS provide their own voices.
    released: 2001-12-21
    length: 30m
  - name: Brian Wallows and Peter's Swallows
    description: Brian, depressed over bad luck in love, is convicted of DUI and sentenced to care for an ornery old woman whose past comes to the attention of celebrity watcher A.J. Benza. Meanwhile, Peter grows a beard, which displeases Lois (who isn't alone in thinking that it's for the birds).
    released: 2002-01-17
    length: 30m
  - name: From Method to Madness
    description: Stewie displays some show-business talent---as long as he's paired with a girl he despises; Meg develops a crush on a teenage nudist. Fred Willard has a voice cameo as the boy's father (who's also a nudist).
    released: 2002-01-24
    length: 30m
  - name: Stuck Together, Torn Apart
    description: Lois runs into an old male friend from school and they renew their friendship. When Peter finds out, he gets jealous, to say the least. Meanwhile, Brian and Stewie get themselves stuck together with industrial-strength glue. Jennifer Love Hewitt has a voice cameo as herself.
    released: 2002-01-31
    length: 30m
  - name: Road to Europe
    description: Brian and Stewie stow away on a plane they think is bound for England. They're wrong, and soon they're in Saudi Arabia, at the beginning of a long, strange trip back home. Meanwhile, back in the U.S., Peter and Lois have an odd encounter with KISS.
    released: 2002-02-07
    length: 30m
  - name: Family Guy Viewer Mail (1)
    description: Three mini-episodes. In the first, a genie grants Peter three wishes and he ends up being propositioned by Catherine Zeta-Jones (voice of Alex Borstein). Then, exposure to toxic waste gives the Griffins super powers (one per Griffin). Finally, in flashbacks, L'il Peter braves a haunted house (for awhile) to impress L'il Lois.
    released: 2002-02-14
    length: 30m
  - name: When You Wish Upon a Weinstein
    description: The day that Peter buys volcano insurance is the day that Lois becomes fed up with their constant money problems. When Peter wishes for a Jewish "money guy" to help them, Max Weinstein comes to the rescue. After meeting Max, Peter decides Chris could be successful if he converted to Judaism as soon as possible, but the plans for a "quickie" bar mitzvah in Las Vegas are quickly foiled by Lois.
    released: 2004-12-10
    length: 30m
