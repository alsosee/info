episodes:
  - name: Treehouse of Horror XII
    description: '"Treehouse of Horror XII" includes Pierce Brosnan as the voice of a computerized house that falls for Marge; a Gypsy''s curse bringing bad luck to Homer''s loved ones; and Bart and Lisa as competing wizards, with Bart enlisting help from a dark source.'
    released: 2001-11-06
    length: 30m
  - name: The Parent Rap
    description: Bart is tethered to Homer as punishment for stealing a police cruiser. Blackboard 'Nobody reads these anymore!'.
    released: 2001-11-11
    length: 30m
  - name: Homer the Moe
    description: Moe gets more depressed than usual and renovates his tavern. He then kicks the old gang out and Homer opens a bar in his garage so the gang can have a place to hang out and fit in.
    released: 2001-11-18
    length: 30m
  - name: Hunka Hunka Burns in Love
    description: 'Homer is hired to write fortunes for fortune cookies, one of them changes Mr. Burn''s life. Homer helps Mr. Burns with his dating. Blackboard: ''Fun does not have a size''.'
    released: 2001-12-02
    length: 30m
  - name: The Blunder Years
    description: Marge becomes obsessed with a brand of paper towels and Homer pulls a gag on her. To make up for it, Homer takes her out, gets hypnotized and regresses to a childhood fear and starts screaming and does not stop until the source of the fear is drawn out of him. Blackboard 'I am not Charlie Brown on acid'.
    released: 2001-12-09
    length: 30m
  - name: She of Little Faith
    description: 'In this Christmas episode, Richard Gere offers Buddhist teachings to Lisa after she leaves her church because of Mr. Burns'' tacky fund-raising efforts, which include commercials (during sermons) and podium-placed ads. Blackboard: ''I do not have a cereal named after me''.'
    released: 2001-12-16
    length: 30m
  - name: Brawl in the Family
    description: Grampa comes to Homer's rescue after Ned and His Vegas wives show up at the house.
    released: 2002-01-06
    length: 30m
  - name: Sweets and Sour Marge
    description: Ben Stiller plays a sugar company's CEO who draws Marge's ire after Springfield is declared the "World's Fattest Town."
    released: 2002-01-20
    length: 30m
  - name: Jaws Wired Shut
    description: When Homer accidentally breaks his jaw, he has to have it wired shut and can not talk. He learns to become the good listener that Marge has wanted.
    released: 2002-01-27
    length: 30m
  - name: Half-Decent Proposal
    description: Now fabulously wealthy, Marge's grabby prom date Artie Ziff offers a million dollars for a weekend with her that, he says, will have "no funny stuff." The Simpsons agree when they realize the money will help their marriage---by paying for an operation that will cure Homer's snoring.
    released: 2002-02-10
    length: 30m
  - name: The Bart Wants What It Wants
    description: 'Bart ends up becoming close friends with Greta Wolfecastle after a fun fair and he has a blind eye to her feelings about him. Blackboard: ''The giving tree is not a chump''.'
    released: 2002-02-17
    length: 30m
  - name: The Lastest Gun in the West
    description: Bart and Lisa try to help an old cowboy actor, who yearns to reclaim his past fame by getting him booked on the Krusty the Clown show.
    released: 2002-02-24
    length: 30m
  - name: The Old Man and the Key
    description: Grampa Simpson regains his driver's license to woo a new woman but is goaded into a race by senior punks.
    released: 2002-03-10
    length: 30m
  - name: Tales from the Public Domain
    description: 'Homer discovers a library book he checked out when Bart was born and Lisa suggests that he read aloud from it. Blackboard: ''Vampire is not a career choice''.'
    released: 2002-03-17
    length: 30m
  - name: Blame It on Lisa
    description: Homer refuses to pay a really high phone bill then their service is shut off. The family travels to Rio De Janeiro to see Lisa's sponsored orphan.
    released: 2002-03-31
    length: 30m
  - name: Weekend at Burnsies
    description: Homer uses medicinal marijuana to relieve pain from eye injuries he suffered when attacked by crows.
    released: 2002-04-07
    length: 30m
  - name: Gump Roast
    description: The Springfield Friars Club roasts Homer, with emcee Krusty the Clown introducing friends, family and their memories from past episodes.
    released: 2002-04-21
    length: 30m
  - name: I Am Furious Yellow
    description: Encouraged by comic-book guru Stan Lee (in a cameo), Bart creates a strip about Homer that gets onto the Internet.
    released: 2002-04-28
    length: 30m
  - name: The Sweetest Apu
    description: Homer accidentally walks in on Apu when he is cheating on his wife at the Kwiki Mart.
    released: 2002-05-05
    length: 30m
  - name: Little Girl in the Big Ten
    description: Lisa becomes friends with college girls who are unaware of her age. Bart is bitten by a Chinese mosquito and must live in a bubble. Bart and Lisa also share a special moment.
    released: 2002-05-12
    length: 30m
  - name: Frying Game
    description: Homer's community service for threatening an endangered species involves helping a kindly senior, who meets an untimely death.
    released: 2002-05-19
    length: 30m
  - name: Papa's Got a Brand New Badge
    description: Homer starts a security company that ultimately replaces the cops---and runs afoul of mobster Fat Tony
    released: 2002-05-22
    length: 30m
