episodes:
  - name: Bobby Goes Nuts
    description: After Bobby is forced to eat dirt by a older boy he takes a self defense class at the YWCA. He then becomes a bully and is punished by his dad.
    released: 2001-11-11
    length: 30m
  - name: Soldier of Misfortune
    description: Dale Gribble runs for president of the gun club again against Mad Dog. Peggy, Hank, Bill and Boomhauer come up with a plan to answer Gribbles add in Soldier Of Fortune magazine. Sending him on a mission to boost his confidence when he looses the presidency.
    released: 2001-12-09
    length: 30m
  - name: Lupe's Revenge
    description: When Peggy supervises the Spanish classes field trip to Mexico, she accidentally brings a Mexican girl back with her believing the girl is one of her students. Hank is stopped by a female police officer and she thinks he is flirting with her.
    released: 2001-12-12
    length: 30m
  - name: The Father, the Son and J.C.
    description: Hank gets Buck Strickland out of jail and the judge assigns him to community service with Habitat for Humanity. Peggy and Dee Dee plan a extravagant Christmas dinner at the new house for the occupants. Hank has issues with Cotton.
    released: 2001-12-16
    length: 30m
  - name: Father of the Bribe
    description: Kahn tries to bribe bobby into breaking up with Connie but the kids come up with a plan and the scheme backfires on him.
    released: 2002-01-06
    length: 30m
  - name: I'm with Cupid
    description: Bill depresses Bobby on Valentines day while Hank and Peggy are out on the town. Boomauer gives Bobby advice on love so Bobby can impress Connie.
    released: 2002-02-10
    length: 30m
  - name: Torch Song Hillogy
    description: Bobby gets upset because he does not have any trophies. Peggy suggests that he can enter to carry the Olympic Torch through Arlen Texas. Hank ends up being chosen to carry it instead and accidentally drops it and puts the flame out.
    released: 2002-02-17
    length: 30m
  - name: Joust Like a Woman
    description: Buck Strickland sends Hank to a Renaissance fair to get a new propane account. Peggy joins the group and then becomes upset about the treatment of the fair wenches and starts a resistance to King Philip.
    released: 2002-02-24
    length: 30m
  - name: The Bluegrass is Always Greener
    description: Hank and the guys form a Bluegrass band with Connie as the fiddler. Kahn objects and tells her she can not play with their band.
    released: 2002-02-24
    length: 30m
  - name: The Substitute Spanish Prisoner
    description: Peggy starts to worry about how smart she is so she takes an online IQ test. She ends up being conned by the person who set the test up. She then gets the group together who did the IQ test locally and comes up with a plan to turn the tables on the Con man.
    released: 2002-03-03
    length: 30m
  - name: Unfortunate Son
    description: Cotton and his war buddy cronies loose their VFW due to lack of money. They are forced to move in with Hank and Peggy. Dale Gribble gets a falcon and tries to train the bird.
    released: 2002-03-10
    length: 30m
  - name: Are You There, God? It's Me, Margaret Hill
    description: No one is getting sick and calling off work so Peggy can be called in. She then impersonates a nun at St. Ignatious to land a teaching job.
    released: 2002-03-17
    length: 30m
  - name: Tankin' It to the Streets
    description: Bill gets upset about blacked out items in his military medical file. Dale sneaks in and takes photo's of Bill's file and shows it to everyone. Bill then gets extremely upset and drunk and steals a tank from the military base.
    released: 2002-03-31
    length: 30m
  - name: Of Mice and Little Green Men
    description: Hank and Dale realize that they do not have anything in common with their sons. Dale starts to obsess with Joseph having been fathered by an alien.
    released: 2002-04-07
    length: 30m
  - name: A Man Without a Country Club
    description: After Hank and the guys build a golf hole in the back yard, he is invited to join the Nine Rivers Country Club.
    released: 2002-04-14
    length: 30m
  - name: Beer and Loathing
    description: The guys try to buy Alamo beer and none of the stores have any. Peggy starts to work at Alamo as a Spanish Interpreter and finds out the reason. The guys later go to Mexico and by a carload of Alamo beer and find out themselves why there is none available at home.
    released: 2002-04-14
    length: 30m
  - name: Fun with Jane and Jane
    description: Luann Joins a cult thinking it is a sorority, she drags Peggy in with her. Hank and the rest of the Rainy Street guys go Emu hunting for Buck Strickland and havoc ensues.
    released: 2002-04-21
    length: 30m
  - name: My Own Private Rodeo
    description: Hank invites Dale's gay dad to Dale and Nancy's wedding vow renewal, Dale thinks his dad is a woman chaser and is after Nancy.
    released: 2002-04-28
    length: 30m
  - name: Sug Night
    description: After helping Nancy set up her new hot tub, Hank starts having a recurring dream about barbecuing naked with Nancy. When Peggy finds out, she freaks out and tries to cure the problem ending up at a nude beach.
    released: 2002-05-05
    length: 30m
  - name: Dang Ol' Love
    description: A marriage proposal is made when Bill and Boomhauer compete for the same woman's affections.
    released: 2002-05-05
    length: 30m
  - name: Returning Japanese (1)
    description: Peggy tries to find ways to get the newspaper she writes for to pay for free trips, Cotton goes back to Japan to supposedly apologize to the families of soldiers he killed during WWII. Hank makes a startling discovery once he arrives in Japan.
    released: 2002-05-12
    length: 30m
  - name: Returning Japanese (2)
    description: Cotton gets so upset, he makes getting to the Emperor of Japan so he can spit on him his main mission in life. Hank and his new found brother have to stop him.
    released: 2002-05-12
    length: 30m
