episodes:
  - name: The Serfsons
    description: In a magical medieval world, Marge's mother is turned into an Ice Walker and the only way for Homer to afford the cure is to force Lisa to use illegal magic. When the King discovers this, he kidnaps Lisa, and Homer must lead a feudal uprising to save her.
    released: 2017-10-01
    length: 30m
  - name: Springfield Splendor
    description: Marge and Lisa turn Lisa's sad experience into a successful graphic novel-turned-Broadway show, but they struggle with creative differences and ego.
    released: 2017-10-08
    length: 30m
  - name: Whistler's Father
    description: Homer discovers that Maggie is a whistling savant and launches her baby-celebrity career. Meanwhile, Marge impresses Fat Tony with her interior design taste, and he hires her to style his brothel.
    released: 2017-10-15
    length: 30m
  - name: Treehouse of Horror XXVIII
    description: Maggie becomes possessed by an ancient demon, Lisa discovers a creepy/perfect version of her family in an alternate universe and Homer cannibalizes himself.
    released: 2017-10-22
    length: 30m
  - name: Grampy Can Ya Hear Me
    description: 'Grampa gets a hearing aid and finally hears what everyone has been saying about him. Meanwhile, Mr. Skinner discovers that his mother has kept the ultimate secret from him. Blackboard: ''Hooligan is not a profession''.'
    released: 2017-11-05
    length: 30m
  - name: The Old Blue Mayor She Ain't What She Used to Be
    description: 'Frustrated with the local government, Marge decides to run for Mayor. To win public support, she begins making Homer the butt of her jokes. Blackboard: ''I will not ask my guidance counselor why he couldn''t get a better job''.'
    released: 2017-11-12
    length: 30m
  - name: Singin' in the Lane
    description: 'Homer and the guys reunite their old bowling team to cheer up Moe, only to end up in fierce competition with a team of arrogant millionaires. Meanwhile, Lisa and Marge try to teach Bart that money isn''t everything. Blackboard: ''We do not live in our own pee''. (underwater title sequence)'
    released: 2017-11-19
    length: 30m
  - name: Mr. Lisa's Opus
    description: As future Lisa writes her college application essay for Harvard, she recalls past disappointing birthdays that helped shape her.
    released: 2017-12-03
    length: 30m
  - name: Gone Boy
    description: When Bart goes missing, the town puts together a search party to find him. After most give up hope, Sideshow Bob manipulates Millhouse into revealing where Bart is hiding. Blackboard 'Snow Angels are not frozen Hobos'.
    released: 2017-12-10
    length: 30m
  - name: Haw-Haw Land
    description: When the Simpsons go to a STEM conference, Lisa falls for a crooning jazz pianist named Brendan. Meanwhile, Bart discovers that he has an affinity for chemistry.
    released: 2018-01-07
    length: 30m
  - name: Frink Gets Testy
    description: 'Fearing that the end of the world is near, Mr. Burns tasks Dr. Frink with testing all of Springfield to determine who is worth saving. The results shake the Simpson family to their core. Blackboard: features Bart watching Homer assigned to write ''Strangling is not an effective parenting tool''.'
    released: 2018-01-14
    length: 30m
  - name: Homer is Where the Art Isn't
    description: When Homer is accused of stealing a million-dollar painting, only a detective from the 1970s can clear his name, or send him to jail. It's a classic impossible mystery.
    released: 2018-03-18
    length: 30m
  - name: 3 Scenes Plus a Tag from a Marriage
    description: Homer and Marge recount the story of their transition from loving their life without kids to being miserable parents.
    released: 2018-03-25
    length: 30m
  - name: Fears of a Clown
    description: Bart goes to prankster rehab after a clown-mask prank terrifies the town and destroys Krusty's career. A tortured Krusty then tries his hand at serious drama with a regional theater company.
    released: 2018-04-01
    length: 30m
  - name: No Good Read Goes Unpunished
    description: 'In an attempt to bring the family together, Marge forces everyone to hand in their electronics and take a trip to a book store. Blackboard: ''April Showers did not date the president''.'
    released: 2018-04-08
    length: 30m
  - name: King Leer
    description: Homer and Marge follow Moe after the bar closes early and discover him and his father fighting. The Simpsons, after finding out that Moe has been excommunicated from his family for years, attempt to bring them back together.
    released: 2018-04-15
    length: 30m
  - name: Lisa Gets the Blues
    description: When the Simpsons' flight to Gainesville gets re-routed to New Orleans, Lisa is forced to face her failures, and regain her confidence as a jazz musician. Meanwhile, Bart is intrigued by the voodoo in Louisiana, and Homer is intrigued by the drinking.
    released: 2018-04-22
    length: 30m
  - name: Forgive and Regret
    description: Grampa makes a confession to Homer while on his deathbed. After his recovery, he comes to realize that this issue will not be easy to reconcile.
    released: 2018-04-29
    length: 30m
  - name: Left Behind
    description: Homer gets Flanders a job at the plant, and he soon learns that no good deed goes unpunished when Flanders starts to insist on carpools and demands more from Homer's work performance. Meanwhile, Marge feels as though their marriage has lost its spark.
    released: 2018-05-06
    length: 30m
  - name: Throw Grampa from the Dane
    description: After receiving an insurance payout, the Simpsons go to Denmark, so Grampa can benefit from the country's free healthcare.
    released: 2018-05-13
    length: 30m
  - name: Flanders' Ladder
    description: After getting struck by lightning, Bart receives visits from ghosts, who want closure only he can provide.
    released: 2018-05-20
    length: 30m
