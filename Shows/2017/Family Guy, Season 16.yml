episodes:
  - name: Emmy-Winning Episode
    description: Tired of not winning an Emmy, Peter embarks on his own For Your Consideration campaign for Family Guy by making the show more like Emmy-winning shows - and no category is off limits.
    released: 2017-10-01
    length: 30m
  - name: Foxx in the Men House
    description: Peter becomes friends with a cool, handsome paramedic named Stryker Foxx. Wrapped up in his newfound "coolness," he soon dumps Quagmire, Joe and Cleveland.
    released: 2017-10-08
    length: 30m
  - name: Nanny Goats
    description: The Griffins get a nanny for the kids, courtesy of Lois' parents, which gives Peter and Lois the opportunity to reconnect.
    released: 2017-10-15
    length: 30m
  - name: Follow the Money
    description: After Chris gets a special one-dollar bill for his birthday and quickly loses it, the dollar gets passed from character to character throughout Quahog.
    released: 2017-10-22
    length: 30m
  - name: Three Directors
    description: In a special anthology-style episode, Peter gets fired from his job at the brewery in the signature styles of three famous Hollywood film directors.
    released: 2017-11-05
    length: 30m
  - name: The D in Apartment 23
    description: When Brian posts an offensive tweet that goes viral and the rest of the Griffins are also treated as outcasts, he's forced to move out of the Griffin house.
    released: 2017-11-12
    length: 30m
  - name: Petey IV
    description: On Thanksgiving weekend, Peter discovers an alternate ending in the Russian version of one of his favorite films and writes to Vladimir Putin, who comes to Quahog. Meanwhile, a strapped-for-cash Brian gets a job at a suicide hotline center and attempts to strike up a romance with a co-worker.
    released: 2017-11-19
    length: 30m
  - name: Crimes and Meg's Demeanor
    description: Peter encourages Meg to attend a high school party, where she takes up drinking, which both concerns and delights her father. Meanwhile, Brian begins spying on his neighbors and suspects Principal Shepherd of a crime.
    released: 2017-12-03
    length: 30m
  - name: Don't Be a Dickens at Christmas
    description: In this special holiday episode, a selfish Peter loses his Christmas spirit and is visited by ghosts of Christmas past, present and future who take him on a journey around Quahog in the style of Charles Dickens' "A Christmas Carol".
    released: 2017-12-10
    length: 30m
  - name: Boy (Dog) Meets Girl (Dog)
    description: At the vet's office, Brian meets a female show dog named Ellie. Smitten with her, he enters a show dog competition, in which the winner gets to breed with her. Meanwhile, Peter and Lois go to extreme measures to try to convince Chris that "Arthur Valentine" doesn't exist.
    released: 2018-01-07
    length: 30m
  - name: Dog Bites Bear
    description: Milestone 300th episode Stewie and Brian get into a friendship-ending fight after Brian commits a terrible act to one of Stewie's beloved toys. Meanwhile, Peter refuses to wash his hand after meeting his favorite breakfast cereal mascot, Boo Berry.
    released: 2018-01-14
    length: 30m
  - name: Send in Stewie, Please
    description: Stewie gets sent to see his school's child psychologist, Dr. Cecil Pritchfield, for a surprising session, which causes Stewie to reveal major, never-before-told secrets about himself.
    released: 2018-03-18
    length: 30m
  - name: V is for Mystery
    description: In a special Dickensian-themed episode, Stewie and Brian are detectives who embark on solving a string of mysterious murders set in Victorian-era London.
    released: 2018-03-25
    length: 30m
  - name: Veteran Guy
    description: After Peter and the guys get caught pretending to be military veterans and are found guilty of the Stolen Valor Act, a judge sentences them to join the U.S. Coast Guard.
    released: 2018-04-01
    length: 30m
  - name: The Woof of Wall Street
    description: Brian convinces Stewie to teach him how to invest in the stock market after learning Stewie has a knack for making money from it. Meanwhile, Peter, Quagmire, Cleveland, and Joe look after the Drunken Clam while Jerome is away.
    released: 2018-04-08
    length: 30m
  - name: '''Family Guy'' Through the Years'
    description: Family Guy is reimagined as a series that's been on the air for 60 years and, in a special retrospective, it looks back at the cultural events and issues that were tackled on the show in the 1950s, '60s and '70s.
    released: 2018-04-22
    length: 30m
  - name: Switch the Flip
    description: To help get Brian's life in order, Stewie and Brian swap bodies using a machine that Stewie invents, but chaos quickly ensues around Quahog when the machine goes haywire.
    released: 2018-04-29
    length: 30m
  - name: HTTPete
    description: To help promote the brewery to millennials, Peter adopts the millennial lifestyle, and his methods soon attract the attention of a high-powered Silicon Valley executive.
    released: 2018-05-06
    length: 30m
  - name: The Unkindest Cut
    description: Quagmire's most treasured body part gets cut off in a freak accident and he is forced to learn how to live without it. Meanwhile, Stewie and Brian search for Mort after learning there is a $10,000 reward for turning him into the police for his involvement in a drug scam.
    released: 2018-05-13
    length: 30m
  - name: Are You There God? It's Me, Peter
    description: After Peter falls into a coma, Peter meets God face-to-face, which leads him to ask some of life's tough questions.
    released: 2018-05-20
    length: 30m
