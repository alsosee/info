  The outrageous ninth season revolves around the blended Pritchett-Dunphy-Tucker clan, headed by Jay Pritchett. Jay and his vivacious second wife Gloria are raising their young son Joe and Gloria's college bound son Manny. Meanwhile, Jay's grown daughter Claire and her husband Phil are becoming empty nesters, while Clare's brother Mitchell and his husband Cameron fumble through nurturing their gifted daughter Lily.
