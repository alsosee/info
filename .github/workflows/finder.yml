name: finder

on:
  push:
    branches:
      - main
    paths:
      - _finder/**
      - .github/workflows/finder.yml
  workflow_dispatch:
  repository_dispatch:
    types: [finder]

jobs:
  finder:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout finder
        uses: actions/checkout@v6
        with:
          repository: alsosee/finder
          path: finder

      - name: Build and push to CR
        uses: chuhlomin/actions/docker-build-push@main
        env:
          DOCKER_IMAGE: ghcr.io/alsosee/info
        with:
          registry: ghcr.io
          username: alsosee-bot
          dockerfile: _finder/Dockerfile
          password: ${{ secrets.PKG_TOKEN }}
          image_name: ${{ env.DOCKER_IMAGE }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Trigger deploy
        if: github.event_name != 'repository_dispatch' || github.event.client_payload.trigger != 'finder-worker'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TOKEN }}
          repository: alsosee/info
          event-type: deploy

      - name: Trigger worker deploy
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.trigger == 'finder-worker'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TOKEN }}
          repository: alsosee/info
          event-type: finder-worker
          client-payload: '{"trigger": "finder-worker", "ref": "${{ github.event.client_payload.ref }}", "sha": "${{ github.event.client_payload.sha }}"}'
