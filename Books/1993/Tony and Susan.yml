name: Tony and Susan
description: >
  A story within a story that follows Susan Morrow as she reads a manuscript from her ex-husband Edward Sheffield.
  The novel within the novel tells the harrowing tale of Tony Hastings, whose family vacation turns into a violent nightmare on a Texas highway.
genres:
  - literary thriller
  - metafiction
