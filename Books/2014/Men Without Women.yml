name: Men Without Women
description: >
  A collection of seven short stories that explore the lives of men who have lost women in their lives, usually to other men or death.
  The stories delve into themes of loneliness, isolation, and the complexities of human relationships.
  Includes the story "Drive My Car", which was adapted into the 2021 film of the same name.
genres:
  - fiction
  - short stories
authors: Haruki Murakami
publishers:
  - Bungeishunjū
  - Knopf
isbn: "9781101974520"
released: 2014-04-18
wikipedia: https://en.wikipedia.org/wiki/Men_Without_Women_(short_story_collection)
