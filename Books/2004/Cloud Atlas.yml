name: "Cloud Atlas"
description: >
  A postmodern novel consisting of six nested stories that take the reader from the remote South Pacific in the 19th century to a distant post-apocalyptic future in Hawaii. The narrative progresses chronologically through the first five stories, reaches a central sixth story, and then resolves the first five in reverse chronological order. The book explores themes of reincarnation, the universality of human nature, and predacity.
released: 2004-03-01
genres:
  - fiction
  - science fiction
  - historical fiction
  - dystopian
authors: David Mitchell
wikipedia: https://en.wikipedia.org/wiki/Cloud_Atlas_(novel)
