name: The Voyage of the Dawn Treader
series: The Chronicles of Narnia
description: >
  Edmund and Lucy Pevensie, along with their cousin Eustace Scrubb, are drawn
  into Narnia and taken aboard King Caspian's ship, the Dawn Treader. The voyage
  carries them across the Eastern Ocean in search of seven lost lords and the
  edge of Aslan's country.
released: 1952-09-15
genres:
  - fantasy
  - children's literature
authors: C. S. Lewis
publishers: Geoffrey Bles
wikipedia: https://en.wikipedia.org/wiki/The_Voyage_of_the_Dawn_Treader
goodreads: https://www.goodreads.com/en/book/show/140225.The_Voyage_of_the_Dawn_Treader
