name: The Colorado Kid
description: >
  The novel follows the investigation of an unidentified man's body found on a small island off the coast of Maine in 1980.
  Lacking identification or obvious clues, the case reaches repeated dead ends. Twenty-five years later, two veteran
  newspapermen recount the story to a young intern, using the mystery to test her investigative skills and meditate
  on the nature of "true" unexplained mysteries.
genres:
  - mystery
  - crime
authors: Stephen King
isbn: 9780843955842
released: 2005-10-04
wikipedia: https://en.wikipedia.org/wiki/The_Colorado_Kid
