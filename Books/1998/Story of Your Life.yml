name: Story of Your Life
description: >
  Linguist Dr. Louise Banks works to decipher the language of visiting aliens called
  heptapods. Learning their non-linear written language transforms her perception of time,
  allowing her to glimpse her future daughter's life and eventual death.
genres:
  - science fiction
  - novella
authors: Ted Chiang
released: 1998-11-01
wikipedia: https://en.wikipedia.org/wiki/Story_of_Your_Life
goodreads: https://www.goodreads.com/book/show/221833155-story-of-your-life
