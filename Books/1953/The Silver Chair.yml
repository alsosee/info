name: The Silver Chair
series: The Chronicles of Narnia
description: >
  Eustace Scrubb and Jill Pole are sent into Narnia by Aslan to find Prince
  Rilian, the missing son of King Caspian. Their search leads them through wild
  northern lands and into an underground realm ruled by a mysterious enchantress.
