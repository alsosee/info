name: "Howl's Moving Castle"
description: >
  Sophie Hatter is the eldest of three daughters living in the land of Ingary, where magical things happen.
  Cursed by the Witch of the Waste and turned into an old woman, she finds her way to the moving castle of the notorious Wizard Howl.
  There she strikes a bargain with the fire demon Calcifer to break her curse.
authors: Diana Wynne Jones
released: 1986-04-14
isbn: 9780688062330
wikipedia: https://en.wikipedia.org/wiki/Howl%27s_Moving_Castle_(novel)
