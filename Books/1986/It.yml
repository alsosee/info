name: It
description: >
  In Derry, Maine, seven outcast children confront a shapeshifting evil that feeds on fear and often appears as Pennywise the Dancing Clown. Decades later, the survivors are called back to Derry when the pattern begins again, forcing them to reckon with childhood trauma, memory, and the town's hidden history.
