name: The Horse and His Boy
series: The Chronicles of Narnia
description: >
  Shasta, a boy raised in Calormen, escapes north with Bree, a talking horse who
  longs to return to Narnia. Their journey joins them with Aravis and Hwin as
  they race toward freedom and uncover a threat to Archenland.
released: 1954-09-06
genres:
  - fantasy
  - children's literature
authors: C. S. Lewis
publishers: Geoffrey Bles
