name: "The Lion, the Witch and the Wardrobe"
series: The Chronicles of Narnia
description: >
  Four children evacuated from wartime London discover a wardrobe that leads
  into Narnia, a magical world trapped in endless winter by the White Witch.
  With the help of Aslan, they are drawn into a struggle to free Narnia and
  restore its rightful order.
released: 1950-10-16
genres:
  - fantasy
  - children's literature
authors: C. S. Lewis
publishers: Geoffrey Bles
wikipedia: https://en.wikipedia.org/wiki/The_Lion,_the_Witch_and_the_Wardrobe
goodreads: https://www.goodreads.com/book/show/100915.The_Lion_the_Witch_and_the_Wardrobe
