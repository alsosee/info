name: Little Women
description: >
  Louisa May Alcott's coming-of-age novel follows Meg, Jo, Beth, and Amy March
  as they grow from childhood toward adulthood in Civil War-era New England.
  Drawing loosely on Alcott's own family life, the novel traces the sisters'
  ambitions, relationships, creative work, and moral education within the
  pressures and possibilities of domestic life.
genres:
  - coming-of-age
  - historical fiction
  - romance
  - children's literature
wikipedia: https://en.wikipedia.org/wiki/Little_Women
