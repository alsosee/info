name: "A House of Dynamite"
description: >
  A visceral visual companion to Kathryn Bigelow's 2025 political thriller. Featuring raw, cinematic stills by acclaimed photojournalist Eros Hoagland, the book documents the film's dramatization of a nuclear crisis in Washington, D.C., offering an intimate glimpse into a world under the shadow of imminent catastrophe.
