name: "Killers of the Flower Moon: The Osage Murders and the Birth of the FBI"
description: >
  A twisting, haunting true-life murder mystery about the Osage Indian Nation in Oklahoma in the 1920s. After oil was discovered beneath their land, the Osage became the richest people per capita in the world, but were then systematically murdered. The book follows the investigation by the newly created FBI, led by former Texas Ranger Tom White, as they struggle to adopt modern detection techniques and expose one of the most sinister conspiracies in American history.
genres:
  - nonfiction
  - history
  - true crime
  - mystery
authors: David Grann
publishers: Doubleday
released: 2017-04-18
