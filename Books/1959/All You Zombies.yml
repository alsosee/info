name: "'—All You Zombies—'"
description: >
  A bartender working for a time-travel bureau recruits a confession-story writer
  known as the Unmarried Mother into a mission across his own past. Robert A.
  Heinlein's short story builds an intricate closed-loop paradox around identity,
  causality, and self-creation.
genres:
  - science fiction
  - short story
  - time travel
authors: Robert A. Heinlein
released: 1959-03-01
wikipedia: https://en.wikipedia.org/wiki/%27%E2%80%94All_You_Zombies%E2%80%94%27
goodreads: https://www.goodreads.com/book/show/13030110-all-you-zombies
