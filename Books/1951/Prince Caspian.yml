name: Prince Caspian
series: The Chronicles of Narnia
description: >
  The Pevensie children are called back to Narnia, where centuries have passed
  and the old world of talking beasts and mythic creatures has been driven into
  hiding. They join Prince Caspian, the rightful heir to the Telmarine throne,
  as he seeks to revive Old Narnia.
