name: Who Censored Roger Rabbit?
description: >
  In a surreal version of Los Angeles where comic strip characters live alongside humans,
  hard-boiled private investigator Eddie Valiant is hired by Roger Rabbit to investigate
  why his employers have reneged on a promise to give him his own strip.
  The investigation takes a dark turn when Roger is murdered, and Eddie must work
  with Roger's short-lived "doppelgänger" to solve the crime.
authors: Gary K. Wolf
publishers: St. Martin's Press
isbn: 9780312870010
released: 1981-06-06
genres:
  - mystery
  - fantasy
  - noir
wikipedia: https://en.wikipedia.org/wiki/Who_Censored_Roger_Rabbit?
