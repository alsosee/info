name: "American Psycho"
description: >
  American Psycho is a horror novel by American writer Bret Easton Ellis, published in 1991.
  The story is told in the first-person by Patrick Bateman, a wealthy, narcissistic, and vain
  Manhattan investment banker who lives a double life as a serial killer.
