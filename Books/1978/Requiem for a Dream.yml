name: "Requiem for a Dream"
description: >
  Requiem for a Dream is a novel by American writer Hubert Selby Jr., published
  in 1978. The story follows Sara Goldfarb, her son Harry, Harry's girlfriend
  Marion, and his friend Tyrone as their private hopes become consumed by
  addiction and delusion in New York City.
