name: Sexual Misconduct of the Middle Classes
description: >
  Jon, a star professor and author facing the collapse of his third marriage, becomes
  drawn to Annie, a nineteen-year-old student and admirer of his work. Hannah
  Moscovitch's two-hander reframes a familiar teacher-student affair through a
  post-#MeToo lens, shifting questions of power, authorship, and perspective as
  their relationship unfolds.
genres:
  - drama
  - play
  - feminist theatre
authors:
  - Hannah Moscovitch
