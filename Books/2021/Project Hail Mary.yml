name: Project Hail Mary
description: >
  Ryland Grace is the sole survivor on a desperate, last-chance mission—and if he fails, 
  humanity and the earth itself will perish. Except that right now, he doesn't know that. 
  He can't even remember his own name, let alone the nature of his assignment or how to complete it.
