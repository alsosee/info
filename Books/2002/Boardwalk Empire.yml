name: "Boardwalk Empire: The Birth, High Times, and Corruption of Atlantic City"
description: >
  A comprehensive history of Atlantic City, New Jersey, spanning from its origins as a quiet seaside health resort in the 19th century to its transformation into a gambling mecca. The book focuses on the "corrupt alliance" between local politicians and racketeers that dominated the city for most of the 20th century, centering on three powerful Republican bosses: Louis "the Commodore" Kuehnle, Enoch "Nucky" Johnson, and Frank "Hap" Farley.
genres:
  - history
  - non-fiction
  - true crime
authors: Nelson Johnson
publishers: Plexus Publishing
isbn: 9780966674873
released: 2002-07-01
