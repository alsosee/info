name: "The Devil Wears Prada"
description: >
  A recent Brown graduate, Andrea "Andy" Sachs, is hired as the junior personal assistant to Miranda Priestly, the powerful and tyrannical editor-in-chief of the high-fashion magazine Runway. Andy, who has no interest in fashion, struggles with Miranda's impossible demands and the superficiality of the industry, eventually questioning her own values and ambition.
genres:
  - chick lit
authors: Lauren Weisberger
publishers: Broadway Books
isbn: 9780767914765
released: 2003-02-06
