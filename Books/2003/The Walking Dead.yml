name: The Walking Dead
description: >
  The Walking Dead is an American zombie apocalypse comic book series created by writer Robert Kirkman and artist Tony Moore.
  The story follows Rick Grimes, a sheriff's deputy who awakens from a coma to find the world overrun by the undead.
  As he leads a group of survivors through various challenges, the series explores the depths of human nature in a post-apocalyptic setting.
