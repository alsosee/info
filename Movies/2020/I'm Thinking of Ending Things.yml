name: "I'm Thinking of Ending Things"
description: >
  A young woman takes a snowy road trip with her boyfriend to meet his parents
  at their secluded farmhouse, while doubts about the relationship give way to
  shifting identities and unsettling gaps in reality. Charlie Kaufman's
  surreal psychological thriller is loosely adapted from Iain Reid's novel.
