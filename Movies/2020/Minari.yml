name: Minari
description: >
  A Korean American family moves from California to rural Arkansas in the
  1980s, where Jacob Yi hopes to build a farm growing Korean produce. As the
  family adapts to an isolated new home and the arrival of Monica's mother from
  South Korea, their pursuit of stability tests their resilience and sense of
  belonging.
