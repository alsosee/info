name: "Ma Rainey's Black Bottom"
description: >
  Tensions rise when the trailblazing Mother of the Blues and her band gather
  at a Chicago recording studio in 1927. Adapted from August Wilson's play,
  the film captures a single recording session where the legendary blues singer
  Ma Rainey and her ambitious trumpet player Levee battle over control of the
  music while the white management tries to use them both.
