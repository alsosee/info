name: Another Round
description: >
  Four Copenhagen high school teachers test a theory that a steady, low level
  of intoxication can improve their creativity, confidence, and stalled
  personal lives. Their experiment starts as a jolt of renewed energy, then
  forces each man to confront the costs of chasing escape through alcohol.
