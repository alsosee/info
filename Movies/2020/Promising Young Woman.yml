name: Promising Young Woman
description: >
  Cassie Thomas lives a quiet life by day while confronting predatory men by
  night, driven by trauma from her medical school past. When a chance encounter
  offers a path toward healing, she is pulled back toward the people who enabled
  the event that changed her life.
