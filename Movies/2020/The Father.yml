name: The Father
description: >
  Anthony, an aging Londoner living with dementia, rejects the carers his
  daughter Anne tries to arrange while his grasp on people, rooms, and time
  begins to slip. The film places the audience inside his disorientation as
  Anne struggles to balance love, grief, and the practical demands of care.
