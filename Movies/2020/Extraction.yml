name: 'Extraction'
description: >
  Tyler Rake, a fearless black market mercenary, embarks on the most deadly
  extraction of his career when he's enlisted to rescue the kidnapped son of
  an imprisoned international crime lord. Set in the underworld of weapons
  dealers and drug traffickers, an already deadly mission becomes nearly
  impossible when Rake discovers the boy is being held in Dhaka, Bangladesh,
  one of the most dangerous cities in the world.
