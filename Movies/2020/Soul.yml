name: Soul
description: >
  Joe Gardner, a New York middle-school band teacher and aspiring jazz pianist,
  lands the gig he has always wanted before an accident sends his soul to the
  Great Before. Determined to return to his life, he teams up with a reluctant
  new soul named 22 and begins to question what makes a life meaningful.
