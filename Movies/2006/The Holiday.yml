name: The Holiday
description: >
  After separate breakups, Los Angeles movie-trailer producer Amanda Woods and
  London newspaper columnist Iris Simpkins arrange a holiday home exchange.
  Swapping California sunshine for the English countryside, each finds new
  companionship while trying to reset her life.
