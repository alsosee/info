name: Paprika
description: >
  After a device that lets therapists enter patients' dreams is stolen, research psychologist Atsuko Chiba pursues the thief through her dream-detective alter ego, Paprika.
  Satoshi Kon's animated psychological thriller turns dream logic, cinema, and identity into a surreal race to keep the waking world from collapsing.
