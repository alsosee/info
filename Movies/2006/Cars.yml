name: Cars
description: >
  Rookie race car Lightning McQueen is on his way to a championship tiebreaker
  when he is stranded in Radiator Springs, a faded town on Route 66. Forced to
  repair the damage he caused, he gets to know the town's residents and begins
  to question whether fame and trophies are the only things worth chasing.
