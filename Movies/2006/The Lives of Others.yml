name: The Lives of Others
description: >
  In 1984 East Berlin, a dedicated Stasi agent conducting surveillance on a prominent playwright and his actress girlfriend finds himself increasingly absorbed by their lives, leading to a profound shift in his own loyalties. It is a tense, emotional drama exploring the human cost of state oppression and the transformative power of art.
