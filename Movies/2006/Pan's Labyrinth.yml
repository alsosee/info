name: Pan's Labyrinth
description: >
  In Francoist Spain in 1944, young Ofelia travels with her pregnant mother to
  the rural post of her new stepfather, a brutal army captain hunting anti-Franco
  rebels. Drawn into an ancient labyrinth, she meets a mysterious faun who gives
  her three tasks that blur the boundary between fairy tale and wartime reality.
