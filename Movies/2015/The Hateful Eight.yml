name: The Hateful Eight
description: >
  In post-Civil War Wyoming, a bounty hunter, his fugitive prisoner, and a group
  of suspicious travelers take shelter from a blizzard at a remote stagecoach
  stopover. As the storm traps them together, old grudges and hidden motives turn
  the cabin into a volatile standoff.
