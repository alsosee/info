name: Tangerine
description: >
  On Christmas Eve in Hollywood, Sin-Dee Rella returns from a short jail term
  and learns from her best friend Alexandra that her boyfriend and pimp may have
  been unfaithful. Their search through Los Angeles becomes a raw, comic odyssey
  through friendship, betrayal, and survival.
