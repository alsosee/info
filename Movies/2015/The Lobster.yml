name: The Lobster
description: >
  In a dystopian near future, newly single David is sent to a hotel where
  residents must find a compatible partner within 45 days or be transformed
  into an animal. As he moves between the hotel's rigid rituals and a rebel
  group with its own severe rules, the search for connection becomes an
  absurd test of conformity, loneliness, and love.
