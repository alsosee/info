name: The Big Short
description: >
  A group of outsiders in finance recognize the instability beneath the U.S.
  housing market and bet against the banks before the 2008 financial crisis.
  Their separate investigations expose the risk, fraud, and institutional denial
  behind the mortgage-backed securities boom.
