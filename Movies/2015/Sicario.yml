name: Sicario
description: >
  Idealistic FBI agent Kate Macer is recruited by a government task force to
  join the escalating war against drug cartels along the U.S.-Mexico border.
  As the mission grows more opaque, she is forced to navigate a campaign driven
  by secrecy, compromised authority, and violent pragmatism.
