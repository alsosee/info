name: Toy Story 2
description: >
  When Woody is stolen by a greedy toy collector, Buzz Lightyear and the other
  toys leave Andy's room to rescue him. At the collector's apartment, Woody
  discovers his origins as the star of a vintage television show and must decide
  where he belongs.
