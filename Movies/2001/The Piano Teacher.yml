name: The Piano Teacher
description: >
  Erika Kohut, a severe piano professor at the Vienna Conservatory, lives under the control of her domineering mother while pursuing a hidden life of sexual compulsion and self-punishment.
  When a confident young student becomes fascinated with her, their relationship turns into a bleak struggle over desire, humiliation, and control.
