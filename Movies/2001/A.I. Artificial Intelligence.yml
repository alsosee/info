name: A.I. Artificial Intelligence
description: >
  In a climate-altered future, David, a childlike android programmed to love, is adopted by a grieving family as a test case for a new kind of artificial child.
  When his place in the human world collapses, he sets out with other mechas to find a way to become real and reclaim the love he was made to need.
