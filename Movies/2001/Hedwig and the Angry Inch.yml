name: Hedwig and the Angry Inch
description: >
  East German rock singer Hedwig Robinson tours the United States with her band while
  shadowing the arena tour of Tommy Gnosis, a former lover and collaborator who stole
  her songs. Through performances and flashbacks, she recounts her transformation,
  exile, and search for love, fame, and a complete sense of self.
