name: Training Day
description: >
  Rookie LAPD narcotics officer Jake Hoyt spends his first day with decorated
  detective Alonzo Harris, whose streetwise methods quickly reveal a corrupt and
  dangerous agenda. As the day moves through Los Angeles neighborhoods, Jake is
  forced to decide how far he will go to survive and keep his integrity intact.
