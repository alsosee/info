name: A Beautiful Mind
description: >
  Brilliant mathematician John Nash develops groundbreaking ideas at Princeton and
  MIT, but his pursuit of recognition is complicated by delusions, paranoia, and
  a difficult struggle with schizophrenia. With Alicia's support, Nash works to
  rebuild his life and continue his academic career.
