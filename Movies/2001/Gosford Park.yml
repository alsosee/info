name: Gosford Park
description: >
  In 1932, a shooting weekend at an English country estate brings together aristocrats, visiting guests, and the servants who keep the house running.
  When murder interrupts the party, the investigation exposes the household's class divisions, private bargains, and long-buried grievances.
