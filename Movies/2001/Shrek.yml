name: Shrek
description: >
  When fairy tale creatures are exiled to his swamp, the reclusive ogre Shrek
  agrees to rescue Princess Fiona for Lord Farquaad in exchange for getting his
  home back. Joined by a talkative Donkey, Shrek finds the quest challenging his
  assumptions about beauty, friendship, and belonging.
