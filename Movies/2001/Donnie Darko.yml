name: Donnie Darko
description: >
  After narrowly escaping a bizarre accident, troubled teenager Donnie Darko begins seeing Frank, a mysterious figure in a rabbit costume who tells him the world will end in 28 days.
  As Donnie's visions intensify, his suburban life unravels into a strange collision of time travel, fate, and adolescent alienation.
