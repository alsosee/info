name: Millennium Actress
description: >
  Documentary filmmaker Genya Tachibana interviews reclusive former star Chiyoko Fujiwara as her old studio is being demolished.
  As Chiyoko recounts her life and career, her memories, film roles, and the history of Japanese cinema blur into a single search for a lost artist.
