name: La ciénaga
description: >
  During a humid summer in northwestern Argentina, two related families drift between a decaying country estate and a nearby town.
  Lucrecia Martel's debut feature observes their routines, resentments, class tensions, and neglected children through an uneasy domestic atmosphere.
