name: Ghost World
description: >
  After high school graduation, cynical best friends Enid and Rebecca drift toward
  adulthood with little direction beyond finding jobs and moving in together.
  Their friendship begins to fracture when a prank on an eccentric record
  collector draws Enid into an unexpected bond with him.
