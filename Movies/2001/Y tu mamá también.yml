name: Y tu mamá también
description: >
  Two teenage friends, Julio and Tenoch, invite Luisa, the wife of Tenoch's cousin, on an improvised road trip to a secluded beach they invented.
  As they drive through rural Mexico, their friendship, desire, and class differences come into sharper focus.
