name: The Princess Diaries
description: >
  Shy San Francisco teenager Mia Thermopolis learns that her late father was the
  crown prince of Genovia, making her heir to the throne. With guidance from
  her estranged grandmother, Queen Clarisse Renaldi, Mia has to decide whether
  to keep her ordinary high-school life or accept a public royal role.
