name: Millennium Mambo
description: >
  In Taipei at the turn of the millennium, Vicky looks back on a drifting youth shaped by nightlife, uneasy romance, and her pull between the volatile Hao-Hao and the calmer Jack.
  Hou Hsiao-hsien's film follows her memories through clubs, apartments, and moments of escape as she searches for a way beyond a stalled relationship.
