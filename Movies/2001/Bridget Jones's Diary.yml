name: Bridget Jones's Diary
description: >
  Thirty-two-year-old Londoner Bridget Jones starts a diary as part of a New Year's resolution to take control of her life.
  Her efforts to change course become tangled with her charming but unreliable boss Daniel Cleaver and the seemingly aloof barrister Mark Darcy.
