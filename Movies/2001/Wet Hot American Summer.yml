name: Wet Hot American Summer
description: >
  On the last full day at Camp Firewood in 1981, counselors and campers scramble through romances, rivalries, crises, and the end-of-summer talent show.
  The film spoofs teen summer-camp comedies with an absurd ensemble story built around one increasingly chaotic day.
