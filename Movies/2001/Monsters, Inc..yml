name: Monsters, Inc.
series: Monsters, Inc.
description: >
  In Monstropolis, top scarer James P. "Sulley" Sullivan and his assistant Mike
  Wazowski work at a factory that powers the monster world with children's
  screams. When a little girl named Boo slips through a closet door into their
  world, Sulley and Mike must hide her from frightened monsters and return her
  home.
