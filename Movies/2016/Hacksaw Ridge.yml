name: Hacksaw Ridge
description: >
  Desmond Doss enlists as a U.S. Army medic during World War II while refusing
  to carry a weapon because of his faith. After enduring suspicion and hostility
  from his unit, he enters the Battle of Okinawa determined to save lives without
  firing a shot.
