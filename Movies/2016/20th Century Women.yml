name: 20th Century Women
description: >
  In 1979 Santa Barbara, single mother Dorothea Fields asks two younger women
  to help her understand and raise her teenage son Jamie. As their improvised
  household navigates generational change, punk music, feminism, and family
  intimacy, each person reconsiders what they need from one another.
