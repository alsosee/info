name: Sing Street
description: >
  In 1980s Dublin, teenager Conor Lalor transfers to a strict inner-city school
  and starts a band to impress aspiring model Raphina. With help from his older
  brother and new classmates, he turns family strain and adolescent longing into
  music videos, pop songs, and a first attempt at reinvention.
