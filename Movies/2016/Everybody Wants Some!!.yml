name: Everybody Wants Some!!
description: >
  In 1980 Texas, freshman pitcher Jake Bradford moves into an off-campus house
  with his new college baseball teammates. Over the last weekend before classes
  begin, the group drifts through parties, rivalries, music scenes, and the
  first freedoms of unsupervised adulthood.
