name: Train to Busan
description: >
  A divorced fund manager boards a KTX train from Seoul to Busan with his young daughter
  just as a fast-moving zombie outbreak spreads across South Korea. Trapped with other
  passengers in the sealed train, he is forced to choose between self-preservation and
  protecting the people around him.
