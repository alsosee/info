name: The Handmaiden
description: >
  In Japanese-occupied Korea, pickpocket Sook-hee is hired by a con man to pose
  as a maid for the secluded heiress Lady Hideko and help steal her fortune. The
  assignment pulls both women into a dangerous scheme shaped by desire,
  deception, and control.
