name: Arrival
description: >
  When twelve mysterious spacecraft touch down around the world, linguist Louise Banks is
  recruited by the U.S. Army to decipher the aliens' language before global tensions spiral
  into war. Her investigation leads to a profound discovery about the nature of time and
  human perception.
