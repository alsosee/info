name: Manchester by the Sea
description: >
  After his older brother dies, solitary Boston janitor Lee Chandler returns to
  his North Shore hometown and learns he has been named guardian of his teenage
  nephew. As Lee tries to settle family affairs, he is forced to confront the
  grief and guilt that drove him away from Manchester-by-the-Sea.
