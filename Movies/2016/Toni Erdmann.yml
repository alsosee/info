name: Toni Erdmann
description: >
  After his dog dies, prank-loving music teacher Winfried Conradi travels to
  Bucharest to reconnect with his career-driven daughter Ines. When his visit
  strains their already distant relationship, he adopts the outrageous alter ego
  Toni Erdmann and starts intruding on her corporate life in ways that test both
  their defenses.
