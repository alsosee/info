name: Raw
description: >
  Vegetarian veterinary student Justine enters a harsh first-year campus culture
  where a hazing ritual forces her to eat raw meat for the first time. Julia
  Ducournau's debut feature turns her awakening appetite into a coming-of-age
  body horror story about desire, family, and self-control.
