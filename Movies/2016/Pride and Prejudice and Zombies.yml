name: Pride and Prejudice and Zombies
description: >
  In an alternate Regency England overrun by the undead, Elizabeth Bennet and her
  sisters are trained fighters as well as eligible young women navigating courtship
  and class expectations. When Mr. Darcy arrives as both a wealthy suitor and a
  skilled zombie hunter, romance and survival become tangled on the battlefield.
