name: The Wailing
description: >
  In a remote South Korean village, a police officer investigates a wave of violent
  killings and a strange illness that locals connect to a newly arrived stranger.
  As his young daughter begins showing symptoms, the case draws him into a volatile
  mix of suspicion, folklore, and supernatural terror.
