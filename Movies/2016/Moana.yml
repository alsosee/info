name: Moana
description: >
  On the Polynesian island of Motunui, the chief's daughter Moana is chosen by
  the ocean to restore the heart of the goddess Te Fiti. When her island is
  threatened by a spreading blight, she sails beyond the reef to find the
  demigod Maui and fulfill her people's voyaging legacy.
