name: "A Silent Voice: The Movie"
description: >
  Years after bullying deaf transfer student Shoko Nishimiya in elementary
  school, isolated high schooler Shoya Ishida seeks her out to make amends.
  Their reunion forces both of them to confront the damage left by bullying,
  guilt, and loneliness.
