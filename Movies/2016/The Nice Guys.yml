name: The Nice Guys
description: >
  In 1977 Los Angeles, down-on-his-luck private eye Holland March and hired enforcer Jackson Healy
  become reluctant partners while investigating the disappearance of a young woman and the death of
  a porn star. Their case draws them into a conspiracy involving activists, the auto industry, and
  people willing to kill to keep a film from surfacing.
