name: "O.J.: Made in America"
description: >
  Ezra Edelman's documentary traces O.J. Simpson's rise as a football star and
  celebrity, his relationship with Nicole Brown Simpson, the 1994 murder case,
  and the later robbery conviction. It frames Simpson's life against the racial
  tensions, media spectacle, policing, and celebrity culture of Los Angeles and
  late-20th-century America.
