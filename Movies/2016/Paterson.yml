name: Paterson
description: >
  In Paterson, New Jersey, a bus driver named Paterson moves through a quiet
  week of work, neighborhood encounters, and private poetry. At home, his wife
  Laura pursues a stream of creative dreams while encouraging the poems he keeps
  in a notebook.
