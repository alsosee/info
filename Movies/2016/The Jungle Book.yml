name: The Jungle Book
description: >
  Raised by wolves in the Indian jungle, Mowgli is forced to leave the only home
  he has known after the tiger Shere Khan marks him as a threat. Guided by
  Bagheera and Baloo, he encounters allies and dangers while deciding where he
  belongs.
