name: Shin Godzilla
description: >
  After a massive unknown creature surfaces in Tokyo Bay and begins evolving into
  Godzilla, Japanese officials struggle to respond through layers of bureaucracy,
  military pressure, and international crisis. A task force led by Rando Yaguchi
  races to understand the creature before Tokyo faces an even greater catastrophe.
