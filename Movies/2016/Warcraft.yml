name: Warcraft
description: >
  As the orc world of Draenor collapses, the warlock Gul'dan opens a portal
  to Azeroth and leads the Horde into war against the human kingdom of
  Stormwind. Anduin Lothar and Durotan, warriors on opposite sides of the
  conflict, struggle to protect their people from the power driving the
  invasion.
