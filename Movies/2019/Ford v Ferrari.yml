name: Ford v Ferrari
description: >
  Automotive designer Carroll Shelby and British driver Ken Miles are recruited by Ford Motor Company to build a race car capable of defeating Ferrari at the 1966 24 Hours of Le Mans. As the team pushes the GT40 toward competition, they contend with corporate pressure, technical failures, and the risks of endurance racing.
