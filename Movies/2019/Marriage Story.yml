name: Marriage Story
description: >
  A New York theater director and his actor wife try to navigate a bi-coastal divorce while preserving their bond with their young son. As lawyers, distance, and old resentments reshape their separation, the film follows the emotional cost of a family trying to come apart without breaking entirely.
