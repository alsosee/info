name: Once Upon a Time... in Hollywood
description: >
  In 1969 Los Angeles, fading television actor Rick Dalton and his longtime stunt double Cliff Booth try to find their place in a changing film industry. As their lives drift through old studio lots, Hollywood parties, and the orbit of Sharon Tate, the city moves toward a violent cultural turning point.
