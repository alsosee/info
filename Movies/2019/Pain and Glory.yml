name: Pain and Glory
description: >
  Aging Spanish filmmaker Salvador Mallo drifts through pain, creative paralysis, and memories of the people who shaped him. As encounters from his past and present return to him, he begins to reckon with desire, family, lost love, and the need to make art again.
