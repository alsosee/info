name: Portrait of a Lady on Fire
description: >
  In late 18th-century France, painter Marianne is commissioned to secretly paint a wedding portrait of Héloïse, a young aristocrat who resists her arranged marriage. As Marianne studies Héloïse under the guise of companionship, the two women form an intimate bond shaped by art, observation, and brief freedom.
