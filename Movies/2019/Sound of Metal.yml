name: Sound of Metal
description: >
  A metal drummer and recovering addict begins to lose his hearing while touring
  with his singer-girlfriend. As he enters a sober house for deaf recovering
  addicts, he struggles to accept a life reshaped by silence, community, and the
  possibility that deafness is not something to fix.
