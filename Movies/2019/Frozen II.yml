name: Frozen II
description: >
  Three years after Elsa's coronation, a mysterious voice draws her beyond
  Arendelle toward an enchanted forest sealed off since her parents' youth.
  Anna, Kristoff, Olaf, and Sven join Elsa on the journey as she searches for
  the origin of her powers and the truth behind a threat to the kingdom.
