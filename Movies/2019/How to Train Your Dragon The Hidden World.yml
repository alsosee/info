name: "How to Train Your Dragon: The Hidden World"
description: >
  With Berk transformed into a crowded dragon sanctuary, Hiccup searches for a
  legendary hidden world where dragons can live safely. When Toothless meets a
  Light Fury and dragon hunter Grimmel threatens their home, Hiccup must decide
  what kind of leader Berk needs.
