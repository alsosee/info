name: Goodfellas
description: >
  The rise and fall of mob associate Henry Hill and his friends and family in the Italian-American crime syndicate.
  Based on the true story of Hill's life in the Lucchese crime family, the film chronicles the gritty and violent
  reality of the mafia over three decades.
