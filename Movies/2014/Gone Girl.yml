name: Gone Girl
description: >
  On his fifth wedding anniversary, Nick Dunne reports that his wife Amy has
  disappeared, drawing a media frenzy that quickly turns suspicion toward him.
  As investigators and television pundits pick apart the couple's marriage, the
  case exposes a darker contest over image, intimacy, and control.
