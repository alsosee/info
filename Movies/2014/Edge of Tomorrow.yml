name: Edge of Tomorrow
description: >
  A military public affairs officer with no combat experience is forced into a doomed landing operation against alien invaders, only to become trapped in a time loop that returns him to the same battle each time he dies. With the help of decorated soldier Rita Vrataski, he uses each reset to train, adapt, and search for a way to end the war.
