name: Mommy
description: >
  In a near-future version of Canada, widowed single mother Diane "Die" Després regains custody of her volatile teenage son Steve after he is expelled from a juvenile facility. As their fragile household draws in neighbor Kyla, the three search for stability while institutional pressure and Steve's behavior push Die toward impossible choices.
