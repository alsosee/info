name: How to Train Your Dragon 2
description: >
  Five years after Vikings and dragons made peace on Berk, Hiccup and Toothless
  discover a hidden ice cave filled with wild dragons and meet a mysterious
  dragon rider tied to Hiccup's past. Their discovery draws Berk into conflict
  with Drago Bludvist, a warlord building a dragon army.
