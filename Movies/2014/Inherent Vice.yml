name: Inherent Vice
description: >
  In 1970 Los Angeles, private investigator Larry "Doc" Sportello is drawn into
  a hazy case after his ex-girlfriend asks him to look into a possible plot
  against her wealthy new lover. As Doc follows the trail, surfers, cops,
  lawyers, musicians, and a mysterious operation called the Golden Fang pull him
  deeper into the city's paranoid counterculture.
