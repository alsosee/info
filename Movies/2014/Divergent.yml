name: Divergent
description: >
  In a dystopian future Chicago where society is divided into factions by
  personality and social role, Beatrice Prior discovers that she does not fit
  into a single category. After joining Dauntless and taking the name Tris, she
  must hide her Divergent status while uncovering a conspiracy against her
  former faction.
