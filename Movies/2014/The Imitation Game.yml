name: The Imitation Game
description: >
  During World War II, mathematician Alan Turing joins Britain's codebreaking
  operation at Bletchley Park and helps develop a machine to decipher Nazi
  Germany's Enigma messages. The film follows his wartime breakthroughs and the
  private pressures he faces in a society that criminalizes his sexuality.
