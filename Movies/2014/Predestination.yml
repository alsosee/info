name: Predestination
description: >
  A temporal agent undertakes his final time-travel assignment to stop the
  elusive Fizzle Bomber, a terrorist whose attacks have haunted the agency
  across decades. Based on Robert A. Heinlein's short story "All You Zombies",
  the film follows the mission into questions of identity, causality, and fate.
