name: Bloodsport
description: >
  U.S. Army Captain Frank Dux travels to Hong Kong without leave to enter the Kumite, a secret
  full-contact martial arts tournament. As military investigators try to bring him home, Dux
  tests his training against an international field of fighters and the ruthless champion Chong Li.
