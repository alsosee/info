name: Who Framed Roger Rabbit
description: >
  In 1947 Los Angeles, toon-hating private investigator Eddie Valiant is hired to exonerate Roger Rabbit,
  a toon star framed for the murder of a wealthy businessman. As they unravel the conspiracy,
  they discover a plot to destroy Toontown and replace it with a freeway system.
