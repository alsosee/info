name: The Fifth Element
description: >
  In the 23rd century, taxi driver Korben Dallas is pulled into a race to protect Leeloo,
  a mysterious woman tied to an ancient weapon that can stop a cosmic evil from destroying
  Earth. As a priest, a corrupt industrialist, and alien mercenaries pursue the same elemental
  stones, Korben and Leeloo become humanity's unlikely last defense.
