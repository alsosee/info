name: 'A Man For All Seasons'
description: >
  The story of Sir Thomas More, the 16th-century Lord Chancellor of England
  who refused to endorse King Henry VIII's wish to divorce his wife Catherine
  of Aragon so he could marry Anne Boleyn. More's refusal to bend his moral
  principles leads to his eventual execution for treason.
