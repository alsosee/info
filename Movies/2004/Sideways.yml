name: Sideways
description: >
  A depressed middle-school teacher and aspiring novelist takes his actor friend
  on a week-long road trip through California wine country before the friend's
  wedding. Their uneven friendship, romantic detours, and clashing expectations
  turn the bachelor getaway into a comic study of disappointment and desire.
