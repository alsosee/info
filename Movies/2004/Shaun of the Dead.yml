name: Shaun of the Dead
description: >
  Shaun, an aimless London electronics salesman, tries to win back his girlfriend and sort out his life just as a zombie outbreak overtakes the city.
  With his best friend Ed in tow, he sets out to rescue the people closest to him and wait out the chaos at their local pub.
