name: "Howl's Moving Castle"
description: >
  Sophie, a young milliner, is cursed by a witch and transformed into an elderly woman.
  She leaves home and encounters a wizard named Howl, becoming a cleaning lady in his magical moving castle while a war rages between neighboring kingdoms.
