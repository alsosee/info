name: Shrek 2
description: >
  Newly married Shrek and Fiona travel to the Kingdom of Far Far Away to meet
  Fiona's royal parents, who are shocked to discover that their daughter and her
  husband are ogres. As Shrek tries to prove he belongs in Fiona's world, the
  Fairy Godmother and Prince Charming scheme to pull the couple apart.
