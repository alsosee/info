name: The Notebook
description: >
  In 1940s South Carolina, mill worker Noah Calhoun and wealthy summer visitor
  Allie Hamilton begin a romance that is tested by class expectations, distance,
  and time. Years later, their story is read from a notebook in a nursing home,
  where its memories carry deep personal meaning.
