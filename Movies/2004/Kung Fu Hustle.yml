name: Kung Fu Hustle
description: >
  In 1940s Shanghai, small-time crook Sing tries to bluff his way into the feared Axe Gang by intimidating the residents of Pigsty Alley.
  His scheme draws real gang violence to the slum, where several unassuming tenants reveal themselves as formidable kung fu masters.
