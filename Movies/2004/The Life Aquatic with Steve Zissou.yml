name: The Life Aquatic with Steve Zissou
description: >
  After a jaguar shark kills his longtime partner, fading oceanographer and documentarian Steve Zissou assembles Team Zissou for a revenge expedition aboard the Belafonte.
  The voyage draws in a possible son, a pregnant journalist, old rivals, financial trouble, and the melancholy absurdity of trying to turn grief into another film.
