name: 13 Going on 30
description: >
  After a humiliating thirteenth birthday party, Jenna Rink wishes she could skip ahead to adulthood and wakes up in 2004 as a successful thirty-year-old magazine editor.
  As she tries to understand the life she has grown into, Jenna reconnects with her childhood best friend and reconsiders the choices that shaped her future.
