name: "Harry Potter and the Prisoner of Azkaban"
description: >
  Harry Potter's third year at Hogwarts is overshadowed by the escape of Sirius Black
  from Azkaban prison, believed to be a follower of Voldemort with a vendetta against
  Harry. With new teacher Professor Lupin and soul-sucking Dementors guarding the
  school, Harry, Ron, and Hermione uncover startling truths about Harry's past.
