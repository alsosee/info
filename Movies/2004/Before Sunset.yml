name: Before Sunset
description: >
  Nine years after their night together in Vienna, Jesse and Céline reunite in
  Paris during the final stop of Jesse's book tour. With only a short time
  before he must leave for the airport, they walk through the city and confront
  the lives, regrets, and feelings that have grown between them.
