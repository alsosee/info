name: The Chronicles of Riddick
description: >
  Fugitive antihero Riddick is drawn into a galactic conflict when the
  Necromongers, a conquering empire that converts or kills its targets, threaten
  the future of humanity. With bounty hunters closing in and allies in danger,
  he is forced to confront an enemy whose ambitions reach across worlds.
