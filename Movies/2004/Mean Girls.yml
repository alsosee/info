name: Mean Girls
description: >
  After years of homeschooling abroad, Cady Heron enters an American high school and is drawn into the orbit of the Plastics, a popular clique led by Regina George.
  As Cady navigates friendship, status, and rivalry, she learns how quickly social survival can turn into imitation.
