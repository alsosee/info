name: "Kill Bill: Volume 2"
description: >
  Beatrix Kiddo continues her revenge against the surviving Deadly Viper assassins,
  pursuing Budd, Elle Driver, and their leader Bill. As her mission nears its end,
  she confronts the past that led to the wedding chapel massacre and discovers what
  happened to the child she believed she had lost.
