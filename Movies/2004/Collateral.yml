name: Collateral
description: >
  Los Angeles cab driver Max Durocher accepts a lucrative fare from Vincent, a
  sharply dressed passenger who claims he has several stops to make in one night.
  Max soon realizes Vincent is a contract killer and is forced to drive him
  across the city while looking for a way to survive the night.
