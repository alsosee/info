name: Downfall
description: >
  In the final days of World War II, Adolf Hitler retreats into the
  Fuhrerbunker as Berlin collapses around him. Told partly through the eyes of
  secretary Traudl Junge, the film follows the bunker staff, military leaders,
  and civilians caught in the last hours of the Third Reich.
