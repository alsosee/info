name: Million Dollar Baby
description: >
  A determined Missouri waitress trains at a Los Angeles boxing gym, where she
  slowly earns the respect of a guarded veteran trainer and his longtime friend.
  As her career rises, their bond becomes a story about ambition, loyalty, and
  the emotional costs of chasing a life beyond one's circumstances.
