name: Birth
description: >
  A New York widow preparing to remarry is unsettled when a ten-year-old boy
  appears and claims to be the reincarnation of her dead husband. As the boy's
  knowledge of her past deepens, her grief and doubt begin to threaten the life
  she is trying to rebuild.
