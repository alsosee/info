name: Nobody Knows
description: >
  In Tokyo, twelve-year-old Akira Fukushima becomes responsible for his younger half-siblings
  after their mother leaves them alone in a small apartment. Hirokazu Kore-eda's drama follows
  the children as they try to preserve a fragile family life while remaining invisible to the
  adults around them.
