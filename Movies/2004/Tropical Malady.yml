name: Tropical Malady
description: >
  In rural Thailand, a soldier and a young villager drift into a tender romance
  before the film transforms into a folkloric jungle tale of pursuit, desire, and
  animal spirit. Apichatpong Weerasethakul's two-part art film folds psychological
  drama, queer romance, and myth into a dreamlike meditation on longing.
