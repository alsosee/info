name: The Lego Movie
description: >
  An animated media franchise based on Lego construction toys, beginning with
  The Lego Movie in 2014 and continuing through theatrical spin-offs and a
  direct sequel. The Warner Bros. film series combines computer animation,
  live-action framing, licensed characters, and original Lego worlds.
wikipedia: https://en.wikipedia.org/wiki/The_Lego_Movie_(franchise)
website: https://www.lego.com
