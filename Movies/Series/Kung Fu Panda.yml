name: Kung Fu Panda
description: >
  An American animated martial arts comedy franchise from DreamWorks Animation
  following Po, a panda who becomes the Dragon Warrior and protects the Valley
  of Peace with his kung fu allies. The film series began with Kung Fu Panda in
  2008 and continued with sequels in 2011, 2016, and 2024.
wikipedia: https://en.wikipedia.org/wiki/Kung_Fu_Panda
