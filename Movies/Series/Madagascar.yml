name: Madagascar
description: >
  An American animated media franchise from DreamWorks Animation about four
  Central Park Zoo animals whose escape attempt leads to adventures in
  Madagascar, Africa, Europe, and beyond. The franchise began with the 2005 film
  Madagascar and expanded into sequels, short films, television series,
  specials, and video games.
wikipedia: https://en.wikipedia.org/wiki/Madagascar_(franchise)
