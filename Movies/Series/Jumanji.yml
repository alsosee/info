name: Jumanji
description: >
  An American fantasy adventure film series centered on magical games that pull
  players into dangerous worlds or unleash their hazards into reality. The series
  began with the 1995 film adaptation of Chris Van Allsburg's picture book and
  later expanded with a space-themed spin-off, video-game-era sequels, and an
  upcoming final film that brings the game's hazards into the real world.
wikipedia: https://en.wikipedia.org/wiki/Jumanji_(franchise)
