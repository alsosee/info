name: Toy Story
description: >
  An American animated media franchise from Pixar about toys that come to life
  when humans are not present. The series began with Pixar's 1995 feature film
  and expanded into theatrical sequels, short films, television specials,
  streaming series, and the spin-off film Lightyear.
wikipedia: https://en.wikipedia.org/wiki/Toy_Story_(franchise)
website: https://www.pixar.com/toy-story
