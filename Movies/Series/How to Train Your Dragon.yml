name: How to Train Your Dragon
description: >
  An American fantasy adventure film franchise from DreamWorks Animation,
  following Hiccup Horrendous Haddock III and Toothless as humans and dragons
  move from conflict toward coexistence. The franchise began with the 2010
  animated feature, expanded into an animated trilogy, and later received a
  live-action remake.
wikipedia: https://en.wikipedia.org/wiki/How_to_Train_Your_Dragon_(franchise)
website: https://www.dreamworks.com/how-to-train-your-dragon
