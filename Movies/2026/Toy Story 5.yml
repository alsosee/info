name: Toy Story 5
description: >
  Woody, Buzz, Jessie, and the rest of Bonnie's toys face a new challenge when
  Bonnie becomes attached to Lilypad, a frog-shaped tablet with its own ideas
  about what is best for her. As playtime shifts toward screens, the toys try
  to protect Bonnie's imagination and reconnect with missing friends.
