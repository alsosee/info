name: Hokum
description: >
  A reclusive novelist travels to a remote Irish inn to scatter his parents' ashes,
  only to become unsettled by the staff's stories about an ancient witch haunting
  the hotel's locked honeymoon suite. As disturbing visions and a disappearance
  pull him deeper into the inn's secrets, he is forced to confront the darker
  corners of his own past.
