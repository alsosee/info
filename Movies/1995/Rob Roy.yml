name: Rob Roy
description: >
  In 18th-century Scotland, clan leader Robert Roy MacGregor borrows money to
  support his people, only to be drawn into conflict with corrupt nobles after
  the loan is stolen. The film follows Rob Roy as he tries to protect his family,
  his clan, and his honor while becoming an outlaw in the Highlands.
