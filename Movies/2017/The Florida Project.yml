name: The Florida Project
description: >
  Six-year-old Moonee spends a summer exploring the motels and tourist strips
  near Walt Disney World while living week to week with her young mother,
  Halley. Sean Baker's slice-of-life drama contrasts childhood mischief and
  wonder with the economic precarity faced by families on the margins of
  Orlando's tourist economy.
