name: A Ghost Story
description: >
  After a musician dies suddenly, his white-sheeted ghost returns to the
  suburban home he shared with his wife and silently watches grief, memory, and
  time move around him. David Lowery's supernatural drama turns a haunted-house
  premise into a quiet meditation on love, loss, and the longing to leave a
  trace behind.
