name: Phantom Thread
description: >
  In 1950s London, renowned dressmaker Reynolds Woodcock runs a carefully controlled
  couture house with his sister Cyril until Alma, a young waitress, becomes his muse
  and lover. Paul Thomas Anderson's psychological period drama follows the shifting
  power and intimacy inside their obsessive relationship.
