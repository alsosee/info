name: Baby Driver
description: >
  A young Atlanta getaway driver with tinnitus times his work to a personal
  soundtrack, hoping to leave crime behind after meeting a waitress named
  Debora. When a crime boss pulls him back for one last job, his driving,
  loyalties, and chance at freedom are pushed to the limit.
