name: Columbus
description: >
  Jin Lee travels to Columbus, Indiana after his estranged father, an architecture
  scholar, falls ill during a lecture trip. While waiting in the small Midwestern
  city, he forms a quiet friendship with Casey, a young library worker and
  architecture enthusiast who feels torn between her ambitions and her life at
  home.
