name: Call Me by Your Name
description: >
  In northern Italy in 1983, teenage musician Elio Perlman spends a languid
  summer at his family's villa, where Oliver, a graduate student assisting his
  father, arrives as a houseguest. Luca Guadagnino's romantic coming-of-age
  drama follows their charged friendship as it becomes a formative first love.
