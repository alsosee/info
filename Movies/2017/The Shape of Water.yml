name: The Shape of Water
description: >
  In 1962 Baltimore, Elisa Esposito works as a cleaner at a secret government
  laboratory where she discovers a captive amphibious creature. Guillermo del
  Toro's romantic dark fantasy follows her bond with the creature as Cold War
  paranoia, violence, and isolation close around them.
