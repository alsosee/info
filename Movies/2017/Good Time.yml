name: Good Time
description: >
  After a botched bank robbery lands his brother in custody, small-time
  criminal Connie Nikas tears through New York City's underworld trying to
  free him before the night is over. Josh and Benny Safdie's crime thriller
  follows one increasingly desperate escape plan through bail bondsmen,
  hospitals, apartments, and amusement parks.
