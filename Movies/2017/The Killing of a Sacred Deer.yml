name: The Killing of a Sacred Deer
description: >
  Dr. Steven Murphy, a successful cardiovascular surgeon, draws a mysterious
  teenage boy into the orbit of his wife and children after a hidden connection
  to Steven's past. Yorgos Lanthimos' psychological horror thriller turns a
  pristine family life into an unsettling modern fable of guilt, punishment,
  and impossible choice.
