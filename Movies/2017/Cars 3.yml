name: Cars 3
description: >
  After a new generation of high-tech racers pushes Lightning McQueen out of
  contention, he trains with young racing technician Cruz Ramirez to find a way
  back onto the track. His comeback forces him to reckon with the legacy of Doc
  Hudson and decide what kind of champion he still wants to be.
