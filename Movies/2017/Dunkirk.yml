name: Dunkirk
description: >
  Allied soldiers are trapped on the beaches of Dunkirk during World War II as
  German forces close in, while civilian boats and Royal Air Force pilots race
  to help evacuate them. Christopher Nolan stages the rescue across land, sea,
  and air with interlocking timelines and sparse dialogue.
