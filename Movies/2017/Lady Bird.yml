name: Lady Bird
description: >
  Christine "Lady Bird" McPherson is a Sacramento high school senior trying to
  define herself while clashing with her strong-willed mother and dreaming of a
  future beyond home. Greta Gerwig's coming-of-age comedy drama follows her final
  year before college with a focus on family, friendship, class, and belonging.
