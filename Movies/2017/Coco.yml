name: Coco
description: >
  Miguel, a 12-year-old aspiring musician in Mexico, rebels against his
  family's generations-old ban on music and finds himself in the Land of the
  Dead. With the help of the trickster Héctor, he searches for the truth behind
  his family's history and their connection to his idol, Ernesto de la Cruz.
