name: 'Death In Venice'
subtitle: 'Morte a Venezia'
description: >
  Gustav von Aschenbach, a renowned but aging composer, travels to Venice to
  recover his health and inspiration. While staying at the Grand Hotel des Bains
  on the Lido, he becomes obsessed with Tadzio, a beautiful Polish boy, leading
  to his psychological and physical deterioration as a cholera epidemic spreads
  through the city.
