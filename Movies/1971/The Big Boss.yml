name: The Big Boss
description: >
  A 1971 Hong Kong martial arts film starring Bruce Lee as Cheng Chao-an, a Chinese immigrant
  who moves to Thailand to work with his cousins at an ice factory. Bound by an oath of
  nonviolence, Cheng is drawn into conflict when the factory's criminal operation threatens
  his family.
