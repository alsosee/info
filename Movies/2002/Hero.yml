name: Hero
description: >
  In ancient China, the nameless prefect of a Qin province is summoned before the
  King of Qin after claiming to have defeated three legendary assassins. As he
  recounts his victories, the king begins to question the truth behind the
  stories and the purpose of Nameless's visit.
