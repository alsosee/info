name: 25th Hour
description: >
  In post-9/11 New York City, convicted drug dealer Monty Brogan spends his last
  day of freedom before beginning a seven-year prison sentence. As he reconnects
  with his father, his girlfriend, and two longtime friends, the looming deadline
  forces him to confront betrayal, regret, and the life he is leaving behind.
