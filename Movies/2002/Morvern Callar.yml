name: Morvern Callar
description: >
  After finding her boyfriend dead on Christmas morning, Scottish supermarket worker Morvern
  Callar conceals his death and submits his unpublished novel under her own name. With money and
  a mixtape he left behind, she leaves for Spain with her best friend and drifts through grief,
  reinvention, and escape.
