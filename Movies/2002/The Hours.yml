name: The Hours
description: >
  Three women in different eras are linked by Virginia Woolf's Mrs Dalloway:
  Woolf in 1920s England, a troubled Los Angeles housewife in 1951, and a
  New York editor preparing a party for her longtime friend in 2001. Their
  parallel days trace questions of identity, obligation, depression, and the
  lives people choose or endure.
