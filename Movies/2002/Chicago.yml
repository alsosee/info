name: Chicago
description: >
  In 1920s Chicago, aspiring vaudeville performer Roxie Hart and nightclub star Velma Kelly
  become rival murder defendants competing for celebrity, sympathy, and the services of a
  showboating lawyer. The film adapts the Broadway musical into a satirical crime story about
  fame, scandal, and courtroom spectacle.
