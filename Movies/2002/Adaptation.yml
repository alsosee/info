name: Adaptation.
description: >
  A blocked screenwriter struggles to adapt Susan Orlean's The Orchid Thief and
  writes himself, his fictional twin brother, Orlean, and orchid hunter John
  Laroche into a self-referential story about creativity, obsession, and the
  limits of faithful adaptation.
