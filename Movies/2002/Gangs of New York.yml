name: Gangs of New York
description: >
  In 1860s Manhattan, Irish immigrant Amsterdam Vallon returns to the Five Points
  seeking revenge against Bill the Butcher, the nativist gang leader who killed his
  father. As Amsterdam enters Bill's circle, his private vendetta becomes entangled
  with immigrant politics, Tammany Hall corruption, and the Civil War draft riots.
