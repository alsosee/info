name: Insomnia
description: >
  Los Angeles detective Will Dormer travels to a small Alaska town to help
  investigate the murder of a teenage girl. When a fatal mistake gives the
  killer leverage over him, Dormer's guilt and the town's endless daylight push
  him into a tense moral standoff.
