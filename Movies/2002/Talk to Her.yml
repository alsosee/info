name: Talk to Her
description: >
  In Madrid, journalist Marco and nurse Benigno form an uneasy friendship while
  keeping vigil over two women in comas: bullfighter Lydia and dancer Alicia.
  Pedro Almodóvar's melodrama follows the men's loneliness, devotion, and moral
  blindness as their lives become intertwined around the silent women they love.
