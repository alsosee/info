name: Infernal Affairs
description: >
  In Hong Kong, undercover officer Chan Wing-yan infiltrates a triad while triad
  recruit Lau Kin-ming rises through the police force as a long-term mole. When
  both organizations discover they have been compromised, Chan and Lau race to
  identify each other before their own covers collapse.
