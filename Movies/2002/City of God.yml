name: City of God
description: >
  In Rio de Janeiro's Cidade de Deus favela, aspiring photographer Rocket watches organized crime
  grow from small-time robbery into a violent drug war across the 1960s, 1970s, and early 1980s.
  The film follows the neighborhood through his perspective as Li'l Zé rises to power and the
  community is pulled deeper into cycles of violence.
