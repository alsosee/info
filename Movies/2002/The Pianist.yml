name: The Pianist
description: >
  Polish-Jewish pianist Władysław Szpilman struggles to survive in Nazi-occupied Warsaw
  as his family is forced into the Warsaw Ghetto and deported. Separated from them, he
  hides among the city's ruins with help from members of the Polish resistance and a
  German officer who discovers his musical identity.
