name: "Lilo & Stitch"
description: >
  On Kauai, lonely young Lilo adopts a strange blue creature she believes is a
  dog, unaware that he is a runaway alien experiment designed for destruction.
  As Stitch hides from intergalactic pursuers, Lilo and her older sister Nani
  struggle to hold their family together.
