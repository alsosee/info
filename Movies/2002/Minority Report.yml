name: Minority Report
description: >
  In 2054 Washington, D.C., Precrime chief John Anderton works for a police unit
  that arrests killers before they commit murder. When the system predicts that
  Anderton himself will kill a man he has never met, he goes on the run to prove
  his innocence and expose the flaw in Precrime's future.
