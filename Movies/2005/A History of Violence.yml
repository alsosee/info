name: A History of Violence
description: >
  After small-town diner owner Tom Stall kills two robbers in self-defense, he
  becomes a reluctant local hero. The attention brings a threatening stranger to
  his family and forces Tom to confront questions about identity, violence, and
  the past he may be hiding.
