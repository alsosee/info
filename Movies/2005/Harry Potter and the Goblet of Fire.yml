name: "Harry Potter and the Goblet of Fire"
description: >
  Harry Potter's fourth year at Hogwarts takes a dangerous turn when his name
  is mysteriously selected by the Goblet of Fire to compete in the Triwizard
  Tournament — a grueling magical contest between three wizarding schools.
  As he faces deadly challenges, signs of Lord Voldemort's return begin to emerge.
