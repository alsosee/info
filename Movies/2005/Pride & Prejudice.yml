name: "Pride & Prejudice"
description: >
  Elizabeth Bennet lives with her parents and sisters in the English countryside,
  where family pressure and social expectations make marriage an urgent concern.
  When she meets the wealthy and reserved Mr. Darcy, mutual misjudgments and class
  tensions complicate a growing attraction between them.
