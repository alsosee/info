name: The 40-Year-Old Virgin
description: >
  Andy Stitzer, a shy electronics-store employee with a quiet routine and a beloved action-figure collection, is pushed by his co-workers to start dating after they learn he is still a virgin at 40.
  As their advice pulls him through awkward schemes and false starts, Andy forms a more genuine connection with single mother Trish.
