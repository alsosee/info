name: Lady Vengeance
description: >
  After thirteen years in prison for a murder she did not commit, Lee Geum-ja is released
  with a carefully prepared plan for revenge. As she reconnects with her daughter and
  former inmates, her pursuit of the real killer becomes a reckoning with guilt, justice,
  and the limits of forgiveness.
