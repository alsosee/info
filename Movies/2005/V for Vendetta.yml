name: V for Vendetta
description: >
  In a fascist future Britain, a masked vigilante known as V rescues Evey
  Hammond and draws her into his campaign against the ruling Norsefire regime.
  As V prepares a symbolic act of rebellion, Evey is forced to confront fear,
  complicity, and the cost of resistance.
