name: Grizzly Man
description: >
  Werner Herzog examines the life and death of Timothy Treadwell, who spent
  thirteen summers living among grizzly bears in Alaska's Katmai National Park.
  Built from Treadwell's own footage and interviews with people who knew him,
  the documentary studies his devotion to the bears, his image of nature, and
  the danger he underestimated.
