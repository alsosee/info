name: "The New World"
description: >
  In 1607 Virginia, English explorer John Smith arrives with the Jamestown
  expedition and encounters Pocahontas, the daughter of Chief Powhatan. Terrence
  Malick's historical romance follows the collision of cultures, the founding of
  the settlement, and Pocahontas's movement between two worlds.
