name: Wedding Crashers
description: >
  Divorce mediators John Beckwith and Jeremy Grey spend wedding season sneaking into receptions under false identities to meet women.
  When they crash the wedding of a cabinet secretary's daughter, John falls for Claire Cleary and the pair are drawn into a chaotic weekend with her wealthy family.
