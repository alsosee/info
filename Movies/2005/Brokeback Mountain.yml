name: Brokeback Mountain
description: >
  In 1963 Wyoming, ranch hand Ennis Del Mar and rodeo cowboy Jack Twist meet
  while herding sheep on Brokeback Mountain. Their connection becomes a hidden,
  years-long relationship shaped by distance, marriage, social pressure, and the
  limits of the lives available to them.
