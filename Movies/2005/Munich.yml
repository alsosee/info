name: Munich
description: >
  After the 1972 Munich Olympics massacre, an Israeli agent is recruited to lead
  a covert team assigned to track down the people believed responsible. As the
  mission moves across Europe, the team faces mounting moral pressure, danger,
  and uncertainty about the cost of retaliation.
