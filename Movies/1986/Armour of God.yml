name: Armour of God
description: >
  Treasure hunter Asian Hawk is drawn into a rescue mission after a cult kidnaps
  his former bandmate's girlfriend and demands several pieces of the legendary
  Armour of God. The adventure sends him across Europe with an uneasy team as he
  races to recover the artifacts and confront the cult.
