name: No Retreat, No Surrender
description: >
  After his father's dojo is attacked by organized-crime enforcers, teenage karate
  student Jason Stillwell moves to Seattle and struggles against local bullies.
  Guided by the spirit of Bruce Lee, he trains for a showdown with Soviet fighter
  Ivan Kraschinsky.
