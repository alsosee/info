name: The Missouri Breaks
description: >
  A wealthy Montana rancher hires an eccentric "regulator" to track down a gang of horse thieves.
  The regulator, Lee Clayton, uses bizarre and lethal methods to eliminate the gang members one by one,
  while their leader, Tom Logan, tries to maintain a quiet life on a neighboring farm.
