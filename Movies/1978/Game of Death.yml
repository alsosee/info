name: Game of Death
description: >
  A 1978 Hong Kong martial arts film assembled after Bruce Lee's death from new
  material and surviving footage from his unfinished project. Lee stars as Billy Lo,
  a martial arts movie star who fakes his death and fights back against the crime
  syndicate trying to control him.
