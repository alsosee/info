name: A Different Man
description: >
  Edward, an aspiring actor with neurofibromatosis, undergoes an experimental medical procedure to drastically transform his appearance.
  However, his new face becomes a nightmare when he loses out on the role he was born to play and becomes obsessed with reclaiming what was lost.
