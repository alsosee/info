name: The Brutalist
description: >
  Escaping post-war Europe, visionary architect László Tóth arrives in America to rebuild his life, his work, and his marriage to his wife Erzsébet.
  After settling in Pennsylvania, he is commissioned by wealthy industrialist Harrison Lee Van Buren, but the promise of patronage comes with a heavy cost.
