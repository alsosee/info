name: "Furiosa: A Mad Max Saga"
description: >
  The origin story of renegade warrior Furiosa before her encounter and team-up with Mad Max.
  As the world falls, young Furiosa is snatched from the Green Place of Many Mothers and falls into the hands of a great Biker Horde led by the Warlord Dementus.
  Sweeping through the Wasteland, they come across the Citadel presided over by The Immortan Joe. While the two Tyrants war for dominance, Furiosa must survive many trials as she plots her way home.
