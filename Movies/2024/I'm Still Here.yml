name: I'm Still Here
description: >
  In 1971 Rio de Janeiro, Eunice Paiva is forced to hold her family together after Brazil's military dictatorship abducts her husband, former congressman Rubens Paiva.
  Based on Marcelo Rubens Paiva's memoir, the film follows her search for answers and her reinvention as a mother and activist.
