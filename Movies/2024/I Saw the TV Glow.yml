name: I Saw the TV Glow
description: >
  Teenager Owen is drawn into a mysterious late-night television show by his classmate Maddy, whose obsession with its supernatural world starts to reshape how they see their own lives.
  As the show seeps into reality, Owen is forced to confront questions of memory, identity, and escape.
