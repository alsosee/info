name: The Substance
description: >
  A fading celebrity, Elisabeth Sparkle, decides to use a black-market medical procedure known as "The Substance," which creates a younger,
  more perfect version of herself named Sue. However, the two must share time—one week for one, one week for the other—but the delicate balance soon spirals into a grotesque nightmare.
