name: Wicked
description: >
  In the Land of Oz, misunderstood green-skinned Elphaba is sent to Shiz University with her sister and becomes reluctant roommates with the popular Galinda.
  Their unlikely friendship is tested as Elphaba's powers draw the attention of the Wizard and reveal the political forces shaping Oz.
