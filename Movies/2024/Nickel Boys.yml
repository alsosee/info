name: Nickel Boys
description: >
  In 1960s Florida, Elwood Curtis is unjustly sent to Nickel Academy, a segregated reform school where he befriends Turner.
  Adapted from Colson Whitehead's novel, the film follows the boys' friendship and survival inside an abusive institution inspired by the Dozier School for Boys.
