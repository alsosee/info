name: Rebel Ridge
description: >
  Former Marine Terry Richmond arrives in a small Louisiana town to post bail for his cousin, only for local police to seize his cash through civil forfeiture.
  As he tries to recover the money, Terry uncovers a deeper pattern of corruption and finds an ally in court clerk Summer McBride.
