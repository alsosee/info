name: Nosferatu
description: >
  In 1838, newlywed Thomas Hutter travels to Transylvania to complete a property sale with the reclusive Count Orlok, while his wife Ellen is haunted by a supernatural presence.
  Robert Eggers reimagines the 1922 silent horror film as a gothic tale of obsession, dread, and vampiric terror.
