name: Gran Torino
description: >
  Recently widowed Korean War veteran Walt Kowalski keeps his family and
  changing Detroit neighborhood at a hostile distance. After a Hmong teenager is
  pressured into trying to steal Walt's prized 1972 Ford Gran Torino, Walt is
  drawn into an uneasy bond with the boy and his family.
