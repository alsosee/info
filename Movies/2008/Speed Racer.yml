name: Speed Racer
description: >
  Young racing driver Speed Racer rejects a lucrative corporate offer and
  discovers that powerful interests are fixing major races. With his family,
  the mysterious Racer X, and the Mach 5, he enters a dangerous cross-country
  rally to protect independent racing and expose corruption in the sport.
