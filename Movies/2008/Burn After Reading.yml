name: Burn After Reading
description: >
  After disgraced CIA analyst Osborne Cox quits his job and starts writing a
  memoir, a misplaced disc falls into the hands of two gym employees who mistake
  it for classified intelligence. Their clumsy attempt to profit from the find
  pulls a circle of self-absorbed Washington insiders into an escalating farce.
