name: WALL·E
description: >
  On a deserted future Earth buried under trash, a solitary waste-collecting
  robot spends his days compacting garbage and collecting remnants of human
  life. When a sleek probe named EVE arrives searching for signs of renewal,
  WALL·E follows her into space and becomes part of a journey that could change
  humanity's future.
