name: "Madagascar: Escape 2 Africa"
series: Madagascar
description: >
  Alex, Marty, Melman, Gloria, King Julien, and the penguins leave Madagascar in
  a repaired plane that crash-lands on an African wildlife reserve. There, Alex
  reunites with his parents while the group faces new conflicts among animals of
  their own species.
