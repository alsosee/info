name: Ponyo
description: >
  A goldfish-like girl escapes from the sea and is rescued by Sōsuke, a five-year-old boy living on a seaside cliff.
  As Ponyo tries to become human, her magic draws her father and the ocean into a widening disturbance around the coastal town.
