name: Tropic Thunder
description: >
  A group of self-absorbed actors making an expensive Vietnam War film are
  dropped into the jungle to salvage the production, only to mistake real danger
  for part of the shoot. Ben Stiller's satire targets Hollywood ego, prestige
  war movies, and method-acting excess.
