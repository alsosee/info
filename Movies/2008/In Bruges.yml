name: In Bruges
description: >
  After a job goes wrong, Irish hitmen Ray and Ken are sent to Bruges to hide
  out and await instructions from their boss. Ken warms to the medieval Belgian
  city, while Ray's restlessness pulls them into a darkly comic spiral of guilt,
  violence, and unexpected encounters.
