name: Let the Right One In
description: >
  In a snowy Stockholm suburb, bullied 12-year-old Oskar befriends Eli, a
  mysterious new neighbor who only appears after dark. Their bond draws Oskar
  into a quiet, dangerous coming-of-age story shaped by loneliness, violence,
  and Eli's secret.
