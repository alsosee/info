name: Still Walking
description: >
  In Hirokazu Kore-eda's Japanese family drama, also known as Aruitemo aruitemo,
  the Yokoyama family gathers over roughly one day to commemorate the eldest
  son's death. Old resentments, grief, and everyday rituals surface as parents,
  children, and new relatives share meals and uneasy conversation.
