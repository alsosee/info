name: Perfect Days
description: >
  Hirayama, a public toilet cleaner in Tokyo, lives a simple life of routine, finding beauty in the everyday through his passion for music, books, and photographing trees. His structured existence is gently disrupted by unexpected encounters that reveal glimpses of his past.
