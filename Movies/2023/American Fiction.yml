name: American Fiction
description: >
  A frustrated novelist and professor writes a deliberately outlandish book under a pseudonym to mock the publishing industry's appetite for narrow Black stereotypes. Adapted from Percival Everett's novel Erasure, the satire follows him as the joke becomes a commercial and critical success.
