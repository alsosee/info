name: Christy
description: >
  Christy is a 2023 Indian Malayalam-language romantic drama film based on a true story. It follows Roy, a 12th-grade student in Poovar who falls in love with his tutor, Christy. As their friendship grows, Christy prepares to leave for a teaching job in the Maldives, leading to a poignant exploration of their relationship and Roy's coming-of-age.
