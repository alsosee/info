name: The Boy and the Heron
description: >
  After his mother's death during the Pacific War, Mahito Maki moves to the countryside with his father and new stepmother.
  Drawn by a mysterious grey heron to an abandoned tower, he enters a fantastical world shared by the living and the dead.
