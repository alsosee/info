name: The Beast
description: >
  In a near future where artificial intelligence treats human emotion as a threat, Gabrielle undergoes a procedure meant to purge the pain of her past lives. Across 1910 Paris, 2014 Los Angeles, and 2044, she repeatedly encounters Louis, a connection that draws her toward love, fear, and catastrophe.
