name: Asteroid City
description: >
  In a fictional American desert town circa 1955, students and parents gather for a Junior Stargazer convention during the annual Asteroid Day celebration. The carefully scheduled event is disrupted by world-changing events as the story shifts between the town, a staged play, and the television production around it.
