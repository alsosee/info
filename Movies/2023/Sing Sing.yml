name: Sing Sing
description: >
  Divine G, incarcerated at Sing Sing Correctional Facility, finds purpose through a theater group made up of fellow inmates.
  Based on the real-life Rehabilitation Through the Arts program, the film follows the men as they prepare an original stage production and use performance as a path toward dignity and connection.
