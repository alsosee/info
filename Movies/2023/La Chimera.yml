name: La Chimera
description: >
  In 1980s Italy, a British former archaeologist returns from prison and rejoins a band of tomb raiders who loot Etruscan graves. Haunted by the woman he lost, Arthur follows his uncanny gift for finding buried things into a search for treasure, memory, and passage between the living and the dead.
