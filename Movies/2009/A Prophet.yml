name: A Prophet
description: >
  Sentenced to six years in a French prison, young Malik El Djebena enters a
  brutal world divided between Corsican and Maghrebi factions. As he survives
  under the control of a Corsican crime boss, Malik learns the prison's codes
  and begins building power of his own.
