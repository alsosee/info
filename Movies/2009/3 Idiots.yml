name: 3 Idiots
description: >
  Years after graduation, two friends search for their missing college companion, whose free-thinking
  approach to engineering school challenged a rigid education system and changed their lives. Their
  journey revisits the friendships, pressures, and choices that shaped them at the Indian College of
  Engineering.
