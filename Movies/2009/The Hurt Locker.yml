name: The Hurt Locker
description: >
  During the Iraq War, a new sergeant joins a U.S. Army bomb disposal team in
  Baghdad and unsettles his squad with a reckless, instinct-driven approach to
  defusing explosives. As their rotation nears its end, the unit faces a series
  of dangerous missions that test their nerves, trust, and relationship to
  combat.
