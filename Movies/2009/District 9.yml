name: District 9
description: >
  After an alien spacecraft stalls over Johannesburg, its refugee passengers are
  confined to a segregated settlement called District 9. Decades later, a
  corporate field agent leading a forced relocation is exposed to alien
  biotechnology and becomes entangled with the people he was sent to evict.
