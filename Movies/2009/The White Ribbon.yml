name: The White Ribbon
description: >
  In a Protestant village in northern Germany on the eve of World War I, a
  schoolteacher observes a series of unexplained accidents, punishments, and
  violent incidents. As suspicion settles over the community, the village's
  rigid hierarchies and moral discipline reveal a deeper climate of fear and
  repression.
