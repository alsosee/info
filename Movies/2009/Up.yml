name: Up
description: >
  When 78-year-old widower Carl Fredricksen ties thousands of balloons to his
  house and lifts off for the South American wilderness to fulfill a promise made
  to his late wife, he inadvertently brings along Russell, an overeager
  8-year-old Wilderness Explorer hoping to earn his final merit badge. The
  unlikely pair journey through uncharted jungle and encounter a talking dog and
  a rare exotic bird.
