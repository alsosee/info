name: Merry Madagascar
series: Madagascar
description: >
  Alex, Marty, Melman, and Gloria try to return to New York for Christmas, but
  a mistaken clash with Santa leaves the holiday in their hands. With Santa
  unable to deliver presents, the zoo animals and penguins attempt to finish his
  route before returning to Madagascar.
