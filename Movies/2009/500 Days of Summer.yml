name: (500) Days of Summer
description: >
  Tom Hansen, a greeting-card writer and aspiring architect, looks back across
  the 500 days of his relationship with Summer Finn after their breakup. Told
  through a nonlinear timeline, the film follows Tom's romantic idealism,
  Summer's skepticism about love, and the gap between memory, expectation, and
  reality.
