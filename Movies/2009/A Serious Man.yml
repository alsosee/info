name: A Serious Man
description: >
  In 1967 Minnesota, physics professor Larry Gopnik watches his orderly life
  unravel through family upheaval, professional uncertainty, and spiritual doubt.
  Seeking clarity, he turns to a series of rabbis while the pressures around him
  grow increasingly absurd and ominous.
