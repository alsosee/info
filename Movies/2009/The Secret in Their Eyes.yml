name: The Secret in Their Eyes
description: >
  Retired judiciary agent Benjamín Espósito revisits an unresolved murder case from 1970s
  Argentina while confronting the memories of his former superior Irene Menéndez Hastings. Juan
  José Campanella's crime drama moves between investigation, political corruption, and long-buried
  romantic regret.
