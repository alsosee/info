name: Avatar
description: >
  In 2154, a paraplegic Marine is sent to the moon Pandora where humans mine
  a precious mineral, threatening the indigenous Na'vi people. He infiltrates
  the Na'vi through a genetically engineered avatar body and finds himself torn
  between following orders and protecting an alien civilization.
