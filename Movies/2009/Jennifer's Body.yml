name: Jennifer's Body
description: >
  After a botched occult sacrifice leaves popular high school student Jennifer Check possessed by a demon, she begins preying on male classmates in her small Minnesota town.
  Her best friend Needy Lesnicki tries to understand what has happened to Jennifer before the attacks consume everyone around them.
