name: Enter the Void
description: >
  In Tokyo, a young American drug dealer is shot during a police raid and
  experiences the city, his memories, and his bond with his sister from an
  out-of-body perspective. Gaspar Noé's surreal drama follows grief,
  reincarnation, and sensory overload through neon-lit first-person imagery.
