  FBI trainee Clarice Starling is assigned to interview the brilliant but
  dangerous imprisoned psychiatrist Dr. Hannibal Lecter in hopes of gaining
  insight into a serial killer terrorizing the country. One of only three
  films to sweep all five major Academy Awards — Best Picture, Director,
  Actor, Actress, and Adapted Screenplay.
