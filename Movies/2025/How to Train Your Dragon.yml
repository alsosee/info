name: How to Train Your Dragon
description: >
  On the Viking island of Berk, inventive outsider Hiccup defies his dragon-
  fighting village after he wounds and befriends a feared Night Fury he names
  Toothless. Their bond challenges Berk's traditions and gives Hiccup a chance
  to change how humans and dragons see each other.
