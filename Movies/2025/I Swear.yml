name: I Swear
description: >
  A biographical comedy-drama based on the true life story of John Davidson,
  a Scottish man with severe Tourette syndrome. The film follows his journey
  from a misunderstood childhood in the 1980s to becoming a prominent
  campaigner for Tourette's awareness.
