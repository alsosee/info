name: "Predator: Badlands"
description: >
  Set in the future on a remote planet, a young Predator named Dek, outcast
  from his clan, forms an unlikely alliance with a Weyland-Yutani android
  named Thia. Together, they embark on a treacherous journey to hunt an apex
  predator and prove Dek's worth.
