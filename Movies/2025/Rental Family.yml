name: Rental Family
description: >
  Set in modern-day Tokyo, an American actor who struggles to find purpose
  lands an unusual gig: working for a Japanese "rental family" agency,
  playing stand-in roles for strangers. As he immerses himself in his
  clients' worlds, he begins to form genuine bonds that blur the lines
  between performance and reality.
