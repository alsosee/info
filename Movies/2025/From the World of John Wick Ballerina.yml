name: "From the World of John Wick: Ballerina"
description: >
  Eve Macarro, a ballerina and assassin trained by the Ruska Roma, embarks on
  a quest for vengeance against the cult responsible for her father's death.
  The film is a spin-off set between the events of John Wick: Chapter 3 –
  Parabellum and Chapter 4.
