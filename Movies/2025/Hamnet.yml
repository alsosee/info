name: Hamnet
description: >
  A historical drama that dramatizes the family life of William Shakespeare and his wife Agnes Hathaway as they cope with the death of their 11-year-old son, Hamnet, amidst an outbreak of the bubonic plague. The film explores the emotional toll of their loss and how it inspired Shakespeare's play Hamlet.
