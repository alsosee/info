name: Enter the Dragon
description: >
  A 1973 martial arts film featuring Bruce Lee's final completed film appearance.
  Lee plays a Shaolin martial artist who goes undercover to participate in a tournament on a private island
  to gather evidence against a suspected crime lord named Han.
