name: Crouching Tiger, Hidden Dragon
description: >
  In Qing dynasty China, master warriors Li Mu Bai and Yu Shu Lien are drawn back into danger when the legendary Green Destiny sword is stolen.
  Their search exposes the rebellious talents and divided desires of young noblewoman Jen Yu, linking martial duty, romance, and freedom across a changing world.
