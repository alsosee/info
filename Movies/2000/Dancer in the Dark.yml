name: Dancer in the Dark
description: >
  Czech immigrant Selma Jezkova works in a rural American factory while hiding her
  degenerative eye condition and saving for an operation that could spare her son
  the same fate. Her love of classic Hollywood musicals becomes a private refuge as
  her fragile life is pushed toward tragedy.
