name: Almost Famous
description: >
  A teenage music writer lands a Rolling Stone assignment to profile the rising rock band Stillwater in the early 1970s.
  As he travels with the band, he is pulled between journalistic honesty, backstage loyalty, and his fascination with the people around him.
