name: Werckmeister Harmonies
description: >
  In a bleak Hungarian town, newspaper carrier János Valuska watches local order fray after a traveling circus arrives with a giant whale and rumors of a mysterious figure called the Prince.
  The film turns the town's mounting unease into a stark, black-and-white fable about political dread, mass suggestion, and fragile ideas of harmony.
