name: The Gleaners and I
description: >
  Agnès Varda travels through rural and urban France to meet people who gather
  food, objects, and images from what others leave behind. Blending social
  observation with self-portraiture, the documentary turns gleaning into a
  playful, reflective essay on waste, survival, aging, and creativity.
