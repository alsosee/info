name: Amores perros
description: >
  Three lives in Mexico City are bound together by a violent car crash: a young man drawn into dogfighting, a model facing a sudden crisis, and a weary hitman living on the margins.
  Alejandro González Iñárritu's debut feature links their stories through love, betrayal, violence, and the dogs that move between them.
