name: 28 Days
description: >
  After a drunken crash at her sister's wedding, New York writer Gwen Cummings is ordered to spend twenty-eight days in a rehabilitation center.
  Resistant at first, she is forced to confront her addiction, her relationships, and the habits that keep pulling her back into chaos.
