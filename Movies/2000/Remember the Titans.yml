name: Remember the Titans
description: >
  In 1971 Alexandria, Virginia, newly appointed coach Herman Boone takes over a newly integrated high school football team and must work with former head coach Bill Yoast to bring the players together.
  As the Titans confront racial tension on and off the field, the season becomes a test of discipline, trust, and community.
