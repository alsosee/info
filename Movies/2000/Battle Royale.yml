name: Battle Royale
description: >
  In a near-future Japan, a junior high school class is taken to a remote island and forced into a government-run survival game.
  As the students receive weapons, collars, and shifting danger zones, classmates Shuya Nanahara and Noriko Nakagawa try to survive without surrendering their humanity.
