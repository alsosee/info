name: Yi Yi
description: >
  In Taipei, engineer NJ and three generations of his middle-class family face romantic regrets,
  work frustrations, illness, and the everyday uncertainties of growing up and growing older.
  Edward Yang follows their overlapping lives with quiet attention to how ordinary moments reshape a family.
