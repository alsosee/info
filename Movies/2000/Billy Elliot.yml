name: Billy Elliot
description: >
  In a County Durham mining town during the 1984-1985 miners' strike, 11-year-old Billy Elliot drifts from boxing lessons into a ballet class.
  As his talent grows, his widowed father, older brother, and teacher are forced to confront what Billy's dream might cost their family and community.
