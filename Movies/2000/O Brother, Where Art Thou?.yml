name: O Brother, Where Art Thou?
description: >
  Three escaped convicts cross Depression-era Mississippi in search of a buried treasure before their chain-gang sentence catches up with them.
  Along the way, their journey turns into a comic folk odyssey through radio fame, political spectacle, and strange encounters across the rural South.
