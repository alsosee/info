name: In the Mood for Love
description: >
  In 1960s Hong Kong, two neighbors discover that their spouses are having an affair and form a restrained, intimate bond.
  Their growing connection unfolds through chance meetings, rehearsed conversations, and the social limits of their shared apartment building.
