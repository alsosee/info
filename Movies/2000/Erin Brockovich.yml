name: Erin Brockovich
description: >
  An unemployed single mother talks her way into a job at a small law firm and uncovers medical records tied to a California utility company's polluted groundwater.
  As she wins the trust of affected Hinkley residents, her investigation grows into a major legal fight over corporate negligence.
