name: Best in Show
description: >
  Five dog owners, handlers, and trainers travel to Philadelphia to compete in the Mayflower Kennel Club Dog Show.
  Christopher Guest's improvised mockumentary follows their rivalries, obsessions, and mismatched relationships as the competition builds toward its final round.
