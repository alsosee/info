name: Unbreakable
description: >
  After surviving a catastrophic train derailment without a scratch, Philadelphia security guard David Dunn begins questioning the limits of his own body and memory.
  His search draws him toward Elijah Price, a comic art dealer whose fragile bones and lifelong obsessions suggest a strange explanation for David's survival.
