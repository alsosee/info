name: 12 Years a Slave
description: >
  Free New York violinist Solomon Northup is kidnapped in Washington, D.C. and
  sold into slavery in Louisiana. Forced to endure years of brutality and
  exploitation, he struggles to preserve his dignity and find a way back to his
  family.
