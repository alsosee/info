name: Ida
description: >
  In 1960s Poland, novice nun Anna prepares to take her vows when she is sent
  to meet her only living relative. Her aunt Wanda reveals Anna's Jewish birth
  name, Ida Lebenstein, and the two women travel through the countryside to
  confront the buried history of their family.
