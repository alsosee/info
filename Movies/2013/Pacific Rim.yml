name: Pacific Rim
description: >
  When colossal monsters emerge from an interdimensional portal in the Pacific Ocean, humanity unites to build massive humanoid mechas.
  A washed-up former pilot and an untested trainee are paired to operate a legendary but obsolete Jaeger in a final effort to save the world from the escalating Kaiju threat.
