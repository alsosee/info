name: 'The Hunger Games: Catching Fire'
description: >
  After winning the 74th Hunger Games, Katniss and Peeta are forced onto a
  Victory Tour through Panem's restless districts, where signs of rebellion
  are growing. President Snow then compels them back into the arena for the
  lethal 75th Quarter Quell, pitting past victors against each other.
