name: Snowpiercer
description: >
  After a failed climate-engineering experiment freezes the Earth, the last
  remnants of humanity survive aboard a perpetually moving train divided by
  class. Curtis Everett leads the oppressed tail-section passengers in a revolt
  toward the engine and the secrets of the train's order.
