name: Madly Madagascar
series: Madagascar
description: >
  In a Valentine's Day story set in the Madagascar film series, King Julien
  finds a love potion and turns it into a business at the watering hole. Marty,
  Melman, Gloria, and the penguins each face romantic complications while Alex
  misses the adoration he once received at the zoo.
