name: Only Lovers Left Alive
description: >
  Centuries-old vampire lovers Adam and Eve live apart in Detroit and Tangier,
  sustaining themselves through carefully sourced blood while withdrawing from a
  decaying modern world. When Eve travels to Detroit to comfort the increasingly
  despondent Adam, their nocturnal calm is disrupted by the arrival of her
  reckless younger sister.
