name: The Wind Rises
description: >
  Jiro Horikoshi dreams of designing beautiful airplanes but cannot become a pilot because of his eyesight.
  As he grows into a gifted aeronautical engineer in prewar Japan, his creative ambitions, romance with Nahoko Satomi, and the country's path toward war become inseparable.
