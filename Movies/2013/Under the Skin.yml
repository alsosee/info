name: Under the Skin
description: >
  An extraterrestrial woman takes human form and drives through Scotland,
  luring isolated men into an otherworldly trap. As she moves through the human
  world, her encounters unsettle her predatory purpose and draw her toward the
  vulnerability of embodied life.
