name: Dallas Buyers Club
description: >
  After being diagnosed with HIV in mid-1980s Texas, electrician and rodeo
  cowboy Ron Woodroof searches for treatments outside the approved medical
  system. As he begins importing unapproved drugs, he forms an underground
  buyers club with Rayon to help other people living with AIDS.
