name: Frozen
description: >
  After Elsa's hidden ice powers accidentally trap Arendelle in an eternal
  winter, her sister Anna sets out across the mountains to find her. Joined by
  the iceman Kristoff, his reindeer Sven, and the snowman Olaf, Anna tries to
  bring Elsa home and restore the kingdom.
