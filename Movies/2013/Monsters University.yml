description: >
  Mike Wazowski arrives at Monsters University determined to become a Scarer
  and quickly clashes with naturally gifted legacy student James P. "Sulley"
  Sullivan. After their rivalry knocks both of them out of the elite scare
  program, they join a misfit fraternity and enter the Scare Games to prove
  they belong.
