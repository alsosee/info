name: The Secret Life of Walter Mitty
description: >
  Walter Mitty, a daydreaming negative-assets manager at Life magazine, leaves
  his routine behind when a missing photo negative threatens the magazine's
  final print issue. His search for the elusive photographer Sean O'Connell
  turns into a real global journey through Greenland, Iceland, and the Himalayas.
