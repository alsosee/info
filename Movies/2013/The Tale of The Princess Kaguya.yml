name: The Tale of The Princess Kaguya
description: >
  A bamboo cutter and his wife discover a tiny girl inside a glowing bamboo stalk and raise her as their fast-growing daughter.
  As her adoptive father tries to transform her into a noble princess, Kaguya struggles between court expectations and memories of her life in the countryside.
