name: Her
description: >
  In a near-future Los Angeles, lonely letter writer Theodore Twombly buys an
  artificially intelligent operating system that names herself Samantha. As their
  connection deepens, Theodore is forced to reconsider intimacy, loneliness, and
  what it means to love someone without a physical form.
