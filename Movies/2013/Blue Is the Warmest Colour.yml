name: Blue Is the Warmest Colour
description: >
  French teenager Adèle begins to question her desire and identity after meeting
  Emma, a blue-haired art student. Their relationship follows Adèle from high
  school into early adulthood as love, class, ambition, and independence reshape
  both women's lives.
