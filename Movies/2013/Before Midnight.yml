name: Before Midnight
description: >
  Nine years after reuniting in Paris, Jesse and Céline are living together with
  twin daughters and spending the summer in Greece. As their vacation ends, a
  day of conversations with friends and each other brings long-running questions
  about family, careers, and commitment to the surface.
