name: Gone with the Wind
description: >
  An epic historical romance set in the American South during the Civil War and Reconstruction,
  following Scarlett O'Hara's pursuit of Ashley Wilkes and her turbulent relationship with Rhett Butler.
  Adapted from Margaret Mitchell's novel, the film is also known for its romanticized depiction of the antebellum South.
