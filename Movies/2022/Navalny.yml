name: 'Navalny'
description: >
  Follows Russian opposition leader Alexei Navalny in his fight against
  Vladimir Putin's regime. The documentary captures Navalny's investigation
  into his own attempted assassination by poisoning, his recovery in Germany,
  and his controversial decision to return to Russia where he faces almost
  certain imprisonment. An intimate portrait of courage and sacrifice in the
  face of authoritarian power.
