name: The Fabelmans
description: >
  Loosely based on Steven Spielberg's childhood, the film follows Sammy
  Fabelman, a young aspiring filmmaker who discovers how movies can help him
  understand his family, his parents' troubled marriage, and his own artistic
  ambitions.
