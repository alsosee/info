name: 'The Offer'
description: >
  The untold story of the making of The Godfather, one of the greatest films
  ever made. Producer Albert S. Ruddy recalls his experiences of making the
  iconic film directed by Francis Ford Coppola, dealing with studio politics,
  the Italian-American Civil Rights League, and countless other obstacles that
  nearly prevented the film from being made.
