name: Tár
description: >
  Celebrated conductor Lydia Tár prepares for a career-defining recording
  while pressures from her professional circle, personal life, and past conduct
  begin to close in around her. The film follows her through the elite world of
  classical music as questions of power, reputation, and artistic authority
  reshape her life.
