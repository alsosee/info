name: Close
description: >
  In rural Belgium, two thirteen-year-old best friends have their intimate bond
  tested when classmates begin to question their relationship. Lukas Dhont's
  coming-of-age drama follows Léo as distance, grief, and responsibility reshape
  his understanding of friendship.
