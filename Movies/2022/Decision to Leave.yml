name: Decision to Leave
description: >
  A Busan detective investigating a man's fatal fall from a mountain becomes
  increasingly drawn to the dead man's enigmatic widow. As suspicion turns into
  obsession, the case pulls them into a tense web of deception, longing, and
  moral compromise.
