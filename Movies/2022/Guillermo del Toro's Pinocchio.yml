name: "Guillermo del Toro's Pinocchio"
description: >
  A darker, more mature take on the classic Pinocchio tale set against the
  backdrop of Mussolini's Italy during the rise of fascism. A wooden puppet
  magically comes to life to mend the heart of a grieving woodcarver named
  Geppetto. This reimagining of the beloved story is a stop-motion musical
  that follows the mischievous and disobedient adventures of Pinocchio in his
  pursuit of becoming a real boy.
