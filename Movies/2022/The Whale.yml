name: 'The Whale'
description: >
  A reclusive, morbidly obese English teacher attempts to reconnect with his
  estranged teenage daughter for one last chance at redemption. Charlie, a
  600-pound middle-aged man, hides out in his Idaho apartment teaching writing
  courses online. Suffering from severe obesity and worsening congestive heart
  failure, he knows his time is limited as he makes one final attempt to connect
  with his daughter Ellie.
