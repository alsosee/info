name: 'The Banshees of Inisherin'
description: >
  Set on a remote island off the west coast of Ireland, the film follows
  lifelong friends Pádraic and Colm, who find themselves at an impasse when
  Colm unexpectedly puts an end to their friendship. A stunned Pádraic, aided
  by his sister Siobhán and troubled young islander Dominic, endeavours to
  repair the relationship, refusing to take no for an answer.
