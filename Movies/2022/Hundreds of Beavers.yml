name: Hundreds of Beavers
description: >
  In the 19th century, a drunken applejack salesman is stranded in a surreal winter wilderness and tries to become North America's greatest fur trapper.
  To win a furrier's hand, he builds increasingly elaborate traps and battles a colony of beavers played by actors in mascot costumes.
