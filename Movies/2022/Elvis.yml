name: 'Elvis'
description: >
  The life story of Elvis Presley as seen through the lens of his complicated
  relationship with his enigmatic manager, Colonel Tom Parker. The film explores
  the complex dynamic between Presley and Parker that spans over 20 years, from
  Presley's rise to fame to his unprecedented stardom, against the backdrop of
  the evolving cultural landscape and loss of innocence in America.
