name: Heavy Metal
description: >
  An adult animated science fantasy anthology in which the glowing Loc-Nar,
  a sphere embodying ultimate evil, terrorizes a young girl by showing her
  violent and surreal stories across distant worlds, future cities, and
  strange dimensions.
