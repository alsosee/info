name: Independence Day
description: >
  When massive alien spacecraft appear over Earth's major cities on July 2, 1996, disparate groups
  converge in the Nevada desert to mount a desperate counterattack. A Marine pilot, a satellite
  technician, the President, and various civilians discover the aliens' weakness and unite to launch
  a coordinated defense on July 4th.
