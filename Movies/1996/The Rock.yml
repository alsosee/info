name: "The Rock"
description: >
  A rogue Marine general seizes Alcatraz Island with hostages and threatens San Francisco with
  chemical weapons unless the government pays reparations to the families of covert operatives.
  An FBI chemical weapons specialist and the only prisoner known to have escaped Alcatraz are sent
  in to stop the attack.
