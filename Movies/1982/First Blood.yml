name: "First Blood"
description: >
  John Rambo, a former Green Beret and Vietnam War veteran, is harassed and arrested for vagrancy by a small-town sheriff.
  The police's brutality triggers his PTSD, leading him to escape into the mountains and wage a one-man war against his pursuers.
