name: 'CODA'
subtitle: 'Child of Deaf Adults'
description: >
  Ruby is the only hearing member of a deaf family from Gloucester, Massachusetts.
  At 17, she works mornings before school to help her parents and brother keep
  their fishing business afloat. But when Ruby joins her high school choir club,
  she discovers a gift for singing and must choose between her family's
  expectations and her own dreams.
