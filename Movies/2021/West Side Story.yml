name: 'West Side Story'
description: >
  An adaptation of the 1957 musical, West Side Story explores forbidden love
  and the rivalry between the Jets and the Sharks, two teenage street gangs
  of different ethnic backgrounds. The love story between Tony, a former member
  of the Jets, and María, the sister of Sharks leader Bernardo, unfolds against
  the backdrop of 1950s New York.
