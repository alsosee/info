name: "The Suicide Squad"
description: >
  Supervillains Harley Quinn, Bloodsport, Peacemaker, and a collection of nutty cons at Belle Reve prison
  join the super-secret, super-shady Task Force X. They are dropped off at the remote, enemy-infused island
  of Corto Maltese to destroy a Nazi-era laboratory housing the secret "Project Starfish."
