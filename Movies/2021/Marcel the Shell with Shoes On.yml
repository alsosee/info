name: Marcel the Shell with Shoes On
description: >
  A documentary filmmaker staying in an Airbnb discovers Marcel, a one-inch-tall
  shell living with his grandmother Connie and their pet lint. When Dean's videos
  make Marcel an online sensation, the attention brings new pressure and a chance
  to search for the community he lost.
