name: Licorice Pizza
description: >
  In 1973 San Fernando Valley, teenage actor and hustler Gary Valentine meets
  Alana Kane, a restless photographer's assistant, and pulls her into a series
  of schemes, auditions, deliveries, and detours. Paul Thomas Anderson's
  coming-of-age comedy drama follows their uneven friendship and attraction
  as they run through the opportunistic edges of early-1970s Los Angeles.
