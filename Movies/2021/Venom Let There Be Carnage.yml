name: "Venom: Let There Be Carnage"
description: >
  Eddie Brock struggles to rebuild his career and coexist with Venom while
  interviewing imprisoned serial killer Cletus Kasady. When Cletus becomes the
  host of a new symbiote called Carnage, Eddie and Venom must repair their
  uneasy partnership to stop him.
