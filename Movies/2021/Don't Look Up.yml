name: "Don't Look Up"
description: >
  Two low-level astronomers must go on a giant media tour to warn mankind
  of an approaching comet that will destroy planet Earth. A satirical look
  at media, politics, and society's response to existential threats,
  exploring themes of climate change, political polarization, and social media.
