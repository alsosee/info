name: Drive My Car
subtitle: ドライブ・マイ・カー
description: >
  A renowned stage actor and director, Yūsuke Kafuku, deals with the unexpected death of his wife.
  Two years later, he accepts a residency in Hiroshima to direct a multilingual production of Uncle Vanya,
  where he is assigned a reserved young woman, Misaki Watari, as his chauffeur.
  As they spend time together, they confront their shared grief and secrets.
