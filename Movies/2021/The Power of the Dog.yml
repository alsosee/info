name: 'The Power of the Dog'
description: >
  A domineering rancher responds with mocking cruelty when his brother brings
  home a new wife and her son, until the unexpected comes to pass. Set in
  1925 Montana, charismatic rancher Phil Burbank inspires fear and awe in
  those around him. When his brother brings home a new wife and her son,
  Phil torments them until he finds himself exposed to the possibility of love.
