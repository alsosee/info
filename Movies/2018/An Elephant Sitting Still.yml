name: An Elephant Sitting Still
description: >
  In a gray industrial city in northern China, a bullied teenager, a classmate,
  a drifting young man, and an elderly neighbor are pushed toward the same rumor:
  an elephant in Manzhouli that sits still no matter what happens around it.
  Over one bleak day, their separate crises converge into a desperate search for
  escape.
