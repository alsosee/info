name: Beautiful Boy
description: >
  Journalist David Sheff tries to support his teenage son Nic through cycles of
  addiction, relapse, and recovery. Adapted from memoirs by David and Nic Sheff,
  the film follows the strain that substance use places on their father-son bond
  and their family.
