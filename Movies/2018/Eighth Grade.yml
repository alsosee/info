name: Eighth Grade
description: >
  Thirteen-year-old Kayla Day struggles with anxiety and social acceptance during
  her final week of middle school. As she records self-help vlogs and navigates
  classmates, parties, crushes, and her relationship with her father, she tries to
  bridge the gap between who she is and who she wants to become.
