name: Venom
description: >
  Investigative journalist Eddie Brock loses his career and relationship after
  confronting the Life Foundation, then becomes the host of an alien symbiote
  that gives him dangerous new powers. As Eddie and Venom learn to coexist,
  they face Carlton Drake and a more violent symbiote threat.
