name: Burning
description: >
  Aspiring writer Lee Jong-su reconnects with childhood neighbor Shin Hae-mi,
  who asks him to watch her cat while she travels to Africa. When she returns
  with the wealthy and enigmatic Ben, Jong-su is drawn into a mystery shaped by
  jealousy, class anxiety, and Ben's unsettling confession about his private hobby.
