name: Cold War
description: >
  In postwar Poland, music director Wiktor discovers singer Zula while
  assembling a folk ensemble. Their romance carries them across Poland,
  Berlin, Yugoslavia, and Paris as politics, ambition, and temperament keep
  pulling them together and apart.
