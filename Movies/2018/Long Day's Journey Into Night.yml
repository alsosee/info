name: Long Day's Journey Into Night
description: >
  Luo Hongwu returns to Kaili after years away and becomes drawn into the memory
  of a woman he once loved and has never been able to forget. Bi Gan's dreamlike
  mystery moves through fragments of loss, desire, and recollection before
  shifting into an extended 3D long take.
