name: Isle of Dogs
description: >
  In a near-future Japanese city, an outbreak of canine flu leads the authoritarian mayor to exile all dogs to Trash Island. Twelve-year-old Atari Kobayashi flies there to find his bodyguard dog, Spots, and joins a pack of banished dogs on a journey that could change the fate of the prefecture.
