name: Annihilation
description: >
  Cellular biology professor and former soldier Lena joins a scientific expedition
  into the Shimmer, a quarantined zone where the laws of nature appear to be
  mutating. As the team moves deeper into the anomaly, they encounter beautiful
  and dangerous transformations that challenge their survival and sense of self.
