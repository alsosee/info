name: First Reformed
description: >
  Reverend Ernst Toller ministers to a small historic church in upstate New York
  while struggling with grief, illness, and a deepening crisis of faith. When a
  pregnant parishioner asks him to counsel her radical environmentalist husband,
  Toller is drawn into a confrontation with despair, conscience, and institutional
  compromise.
