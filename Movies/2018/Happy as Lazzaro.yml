name: Happy as Lazzaro
description: >
  Lazzaro, a guileless young sharecropper on an isolated Italian tobacco estate,
  forms an unlikely friendship with Tancredi, the restless son of the local
  marchesa. Their bond draws him into a strange fable of exploitation, innocence,
  and a world moving uneasily between rural isolation and modern life.
