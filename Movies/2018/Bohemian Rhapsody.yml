name: 'Bohemian Rhapsody'
description: >
  The story of the legendary British rock band Queen and lead singer Freddie
  Mercury, leading up to their famous performance at Live Aid in 1985. The film
  chronicles Mercury's life from his early days as Farrokh Bulsara through his
  rise to fame and struggles with his identity and personal relationships.
