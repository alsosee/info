name: Green Book
description: >
  In 1962, a Bronx bouncer takes a job driving pianist Don Shirley on a concert
  tour through the Deep South. As they rely on The Negro Motorist Green Book to
  navigate segregated travel, the two men confront racism and class differences
  while forming an unlikely bond.
