name: Crazy Rich Asians
description: >
  Chinese American economics professor Rachel Chu travels to Singapore with her
  boyfriend Nick Young for his best friend's wedding, only to discover that Nick
  belongs to one of Asia's wealthiest families. As Rachel enters Singapore high
  society, she has to navigate family expectations, social scrutiny, and Nick's
  formidable mother.
