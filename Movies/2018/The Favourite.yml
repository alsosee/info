name: 'The Favourite'
description: >
  In early 18th century England, a frail Queen Anne occupies the throne and
  her close friend Lady Sarah governs the country in her stead. When a new
  servant Abigail arrives, her charm endears her to Sarah and she quickly
  becomes the Queen's new favourite, threatening Sarah's position and their
  relationship.
