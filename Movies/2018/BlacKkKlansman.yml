name: BlacKkKlansman
description: >
  In 1970s Colorado Springs, Ron Stallworth becomes the city's first Black detective
  and launches an undercover investigation into the local Ku Klux Klan chapter.
  With fellow detective Flip Zimmerman posing as him in person, the case exposes
  both the absurdity and danger of white supremacist organizing.
