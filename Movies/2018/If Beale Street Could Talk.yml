name: If Beale Street Could Talk
description: >
  In 1970s Harlem, Tish Rivers prepares for the birth of her child while her
  family works to prove that her fiance, Fonny Hunt, has been wrongly accused.
  Barry Jenkins adapts James Baldwin's novel as a romantic drama about love,
  family, and racial injustice.
