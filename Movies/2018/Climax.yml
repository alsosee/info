name: Climax
description: >
  In 1996, a French dance troupe gathers in an abandoned school for a final
  rehearsal and all-night celebration. When the dancers realize their sangria
  has been spiked with LSD, the party descends into paranoia, violence, and a
  hallucinatory struggle to survive the night.
