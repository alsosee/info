name: Last Action Hero
description: >
  A fantasy action comedy about Danny Madigan, a young movie fan who is pulled
  into the fictional world of his favorite action franchise by a magic ticket.
  He teams up with larger-than-life detective Jack Slater as a villain from the
  movie universe discovers a way into the real world.
