name: Groundhog Day
description: >
  A fantasy romantic comedy about Phil Connors, a cynical television weatherman
  sent to cover the annual Groundhog Day event in Punxsutawney, Pennsylvania.
  After becoming trapped in a time loop, he is forced to relive February 2
  again and again.
