name: "Schindler's List"
description: >
  In German-occupied Poland during World War II, industrialist Oskar Schindler
  gradually becomes concerned for his Jewish workforce after witnessing their
  persecution by the Nazis. He ultimately saves the lives of more than a
  thousand Jews by employing them in his factories and keeping them safe from
  deportation to concentration camps.
