name: Big Fish
description: >
  Estranged from his dying father Edward Bloom, Will Bloom returns home and tries
  to separate the truth of Edward's life from the elaborate tall tales he has
  always told. As Will revisits stories of witches, giants, circuses, and lost
  towns, he begins to understand the emotional truth behind his father's myths.
