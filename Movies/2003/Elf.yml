name: Elf
description: >
  Buddy, a human raised by Santa's elves at the North Pole, travels to New York
  City after learning that his biological father is a cynical publishing
  executive. His childlike enthusiasm disrupts his new family and workplace,
  but also starts to restore their Christmas spirit.
