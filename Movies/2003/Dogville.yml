name: Dogville
description: >
  A fugitive named Grace finds shelter in an isolated Colorado town, where the residents agree
  to hide her from pursuing gangsters in exchange for her labor. Lars von Trier stages the
  story on a stark, theatrical soundstage, turning Dogville into a brutal moral parable about
  hospitality, power, and exploitation.
