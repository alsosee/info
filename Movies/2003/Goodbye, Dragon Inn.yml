name: Goodbye, Dragon Inn
description: >
  On the final night of a decaying Taipei movie palace, the staff and a handful
  of patrons drift through the theater while King Hu's Dragon Inn plays to a
  nearly empty room. Tsai Ming-liang's slow cinema comedy-drama turns the closing
  screening into a quiet meditation on moviegoing, cruising, memory, and ghosts.
