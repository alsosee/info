name: School of Rock
description: >
  Broke and recently fired from his band, guitarist Dewey Finn impersonates his roommate to take a substitute teaching job at a strict prep school.
  When he discovers his students' musical talent, he turns the class into a secret rock band and pushes them toward a local Battle of the Bands.
