name: Memories of Murder
description: >
  In a rural South Korean province in the late 1980s, local detectives and a Seoul investigator
  pursue a serial killer whose crimes expose the limits of their methods and institutions. Bong
  Joon Ho's crime thriller is based on the real Hwaseong serial murders.
