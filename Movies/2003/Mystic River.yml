name: Mystic River
description: >
  Three childhood friends in a working-class Boston neighborhood are drawn back together
  when the daughter of one of them is murdered. Clint Eastwood's crime drama traces how
  grief, old trauma, and suspicion reshape the lives of the families around the case.
