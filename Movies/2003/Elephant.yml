name: Elephant
description: >
  On what appears to be an ordinary day at a Portland high school, several students drift
  through classes, hallways, and conversations while two classmates prepare a violent attack.
  Gus Van Sant's spare psychological drama observes the school community in the hours before
  the crisis with a detached, looping structure.
