name: Finding Nemo
description: >
  After his young son Nemo is captured from the Great Barrier Reef and taken to
  a dentist's aquarium in Sydney, cautious clownfish Marlin crosses the ocean to
  find him. With help from the forgetful but optimistic Dory, Marlin faces open
  water, sharks, jellyfish, and his own fear of letting Nemo grow.
