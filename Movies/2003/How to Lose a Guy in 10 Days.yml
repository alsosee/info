name: How to Lose a Guy in 10 Days
description: >
  Advice columnist Andie Anderson sets out to write about how to drive a man
  away in 10 days, while advertising executive Benjamin Barry bets he can make a
  woman fall for him in the same time. Their competing schemes collide as a fake
  romance starts turning into something neither planned.
