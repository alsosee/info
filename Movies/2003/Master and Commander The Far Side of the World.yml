name: "Master and Commander: The Far Side of the World"
description: >
  During the Napoleonic Wars, Captain Jack Aubrey of HMS Surprise pursues a larger
  French privateer across the South Atlantic and into the Pacific. As the damaged
  ship presses on, Aubrey's drive to complete the mission tests his crew and his
  friendship with surgeon and naturalist Stephen Maturin.
