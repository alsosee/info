name: Martha Marcy May Marlene
description: >
  A young woman named Martha escapes from a cult in the Catskill Mountains and seeks refuge with her estranged sister and brother-in-law.
  As she struggles to assimilate back into normal life, she is haunted by painful memories and a growing sense of paranoia that the cult is still watching her.
