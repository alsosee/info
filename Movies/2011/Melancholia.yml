name: Melancholia
description: >
  A troubled bride struggles through her lavish wedding at her sister's estate
  while a newly discovered rogue planet approaches Earth. As the cosmic threat
  becomes harder to dismiss, the sisters confront dread, depression, and the
  collapse of their fragile family order in radically different ways.
