name: The Turin Horse
description: >
  After recounting Friedrich Nietzsche's legendary encounter with a beaten horse
  in Turin, the film turns to an isolated farmer, his daughter, and their
  exhausted horse on a windswept plain. Over six repetitive days, their austere
  routine begins to break down as the horse refuses to work and the world around
  them seems to empty itself of motion, light, and sustenance.
