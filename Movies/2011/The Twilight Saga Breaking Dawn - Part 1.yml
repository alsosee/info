name: "The Twilight Saga: Breaking Dawn - Part 1"
description: >
  Bella Swan and Edward Cullen marry and begin a new life together, but their
  honeymoon leads to a dangerous pregnancy that strains the fragile peace between
  the Cullens and the Quileute wolves. As Bella's condition worsens, Jacob Black
  is forced to choose between his pack and his loyalty to her.
