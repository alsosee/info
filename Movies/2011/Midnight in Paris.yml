name: Midnight in Paris
description: >
  Screenwriter Gil Pender visits Paris with his fiancee and her family while
  struggling with his first novel and his nostalgia for the city's artistic
  past. After wandering alone at midnight, he is mysteriously drawn into 1920s
  Paris, where encounters with writers and artists force him to reconsider his
  romance, his work, and the present he is trying to escape.
