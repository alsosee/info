name: The Girl with the Dragon Tattoo
description: >
  Disgraced journalist Mikael Blomkvist is hired by a wealthy industrialist to
  investigate the decades-old disappearance of his niece. As Blomkvist follows
  the trail through a hostile family history, hacker Lisbeth Salander joins the
  case and uncovers connections to corruption and violence.
