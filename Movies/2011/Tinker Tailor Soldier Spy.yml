  Retired British intelligence officer George Smiley is brought back to uncover
  a Soviet mole inside MI6 after a botched operation in Budapest confirms old
  suspicions. Working quietly outside the service's compromised leadership, he
  follows a trail of betrayals, cover stories, and Cold War secrets.
