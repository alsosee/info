name: A Separation
description: >
  A Tehran couple's divorce dispute leaves their daughter caught between them
  and forces the husband to hire a caregiver for his father, whose Alzheimer's
  disease makes daily care increasingly difficult. A confrontation with the
  caregiver draws both families into a legal and moral conflict shaped by class,
  faith, duty, and competing versions of the truth.
