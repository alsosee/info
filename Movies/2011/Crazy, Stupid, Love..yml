name: Crazy, Stupid, Love.
description: >
  After his wife asks for a divorce, middle-aged Cal Weaver is pushed back into
  the dating world with help from polished bachelor Jacob Palmer. Their lessons
  in romance ripple through a set of connected Los Angeles relationships as
  parents, teenagers, and young adults try to understand what love demands of
  them.
