description: >
  A young farm boy, Luke Skywalker, is thrust into a galaxy-wide conflict after acquiring
  a droid carrying stolen plans for the Empire's planet-destroying superweapon, the Death Star.
  He joins forces with veteran Jedi Obi-Wan Kenobi and roguish smuggler Han Solo to rescue
  captive Princess Leia and help the Rebel Alliance destroy the station before it obliterates
  their base.
