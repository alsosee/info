name: Suspiria
description: >
  American ballet student Suzy Bannion arrives at a prestigious dance academy
  in Freiburg and is drawn into a series of violent, occult-tinged mysteries.
  As the school's secrets close in around her, she discovers that the academy
  may be a front for a coven of witches.
