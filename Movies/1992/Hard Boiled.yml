name: Hard Boiled
description: >
  A hard-charging Hong Kong police inspector teams with an undercover officer to
  bring down a violent gun-smuggling syndicate. John Woo's action thriller became
  a landmark of heroic bloodshed cinema, noted for its kinetic gunfight
  choreography and extended hospital shootout.
