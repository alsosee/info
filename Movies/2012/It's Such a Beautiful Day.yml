name: It's Such a Beautiful Day
description: >
  Bill, a stick-figure man with a seemingly ordinary life, struggles with memory
  loss, surreal visions, and an unknown neurological condition. Don Hertzfeldt's
  experimental animated feature combines three shorts into a darkly comic
  meditation on illness, identity, and mortality.
