name: Holy Motors
description: >
  Monsieur Oscar travels through Paris in a limousine, moving from one mysterious
  appointment to the next as he performs a series of strange, theatrical roles.
  Leos Carax's surreal fantasy drama turns the city into a shifting stage for
  identity, performance, and cinema itself.
