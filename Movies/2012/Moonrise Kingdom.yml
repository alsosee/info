name: Moonrise Kingdom
description: >
  On the fictional New England island of New Penzance in 1965, two lonely
  twelve-year-olds fall in love, make a secret pact, and run away together into
  the wilderness. As their families, scout troop, and local authorities search
  for them, an approaching storm throws the island community into upheaval.
