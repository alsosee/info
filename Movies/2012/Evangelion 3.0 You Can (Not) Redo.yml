name: "Evangelion: 3.0 You Can (Not) Redo"
description: >
  Fourteen years after the near Third Impact, Shinji Ikari awakens aboard a
  hostile anti-NERV battleship and finds that the world, his friends, and the
  battle around the Evangelions have changed without him. The third Rebuild of
  Evangelion film pushes the series into a colder post-apocalyptic conflict.
