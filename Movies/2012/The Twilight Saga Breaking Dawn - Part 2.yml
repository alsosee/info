name: "The Twilight Saga: Breaking Dawn - Part 2"
description: >
  After Bella awakens as a vampire, she and Edward build a life around their
  daughter Renesmee while Jacob and the Cullens adjust to the new family order.
  When the Volturi mistake Renesmee for a forbidden immortal child, the Cullens
  gather witnesses from around the world to protect her.
