name: Frances Ha
description: >
  Frances Halladay, a 27-year-old apprentice dancer in New York, drifts through
  apartments, jobs, and friendships as her best friend Sophie's life moves in a
  different direction. Noah Baumbach's black-and-white comedy drama follows her
  restless attempt to find stability without losing her optimism.
