name: Life of Pi
description: >
  After a shipwreck in the Pacific Ocean, teenage Pi Patel is stranded on a
  lifeboat with a Bengal tiger named Richard Parker. As the days at sea stretch
  on, Pi must survive the elements, manage the danger beside him, and make sense
  of a journey shaped by faith, memory, and storytelling.
