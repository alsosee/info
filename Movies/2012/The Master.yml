name: The Master
description: >
  A World War II Navy veteran struggling to adjust to a post-war society meets the charismatic leader of a philosophical movement known as "The Cause."
  He becomes a disciple and travels with the leader's family to spread his teachings, while struggling with his own violent and erratic behavior.
