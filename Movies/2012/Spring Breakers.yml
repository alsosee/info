name: Spring Breakers
description: >
  Four college students rob a restaurant to fund a spring break trip to Florida,
  where they are pulled into a neon-lit world of drugs, violence, and crime by
  an eccentric local dealer. Harmony Korine's crime drama turns the spring break
  ritual into a woozy, abrasive portrait of youth, fantasy, and hedonism.
