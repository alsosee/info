name: The Hunger Games
description: >
  In a dystopian future nation of Panem, sixteen-year-old Katniss Everdeen
  volunteers to take her younger sister's place in the Hunger Games — a
  nationally televised death match between twenty-four teenagers drawn from
  twelve districts — and must survive against ruthless competitors while
  navigating the political spectacle surrounding the Games.
