name: Silver Linings Playbook
description: >
  After eight months in a psychiatric hospital, former teacher Pat Solitano
  moves back in with his parents and tries to rebuild his life while hoping to
  reconcile with his estranged wife. When he meets Tiffany Maxwell, a young
  widow with her own struggles, their uneasy connection turns into a plan built
  around dance practice, family pressure, and second chances.
