name: Godzilla
description: >
  After nuclear tests in the South Pacific create a giant irradiated reptile,
  scientist Niko Tatopoulos is pulled into a military investigation as the
  creature reaches New York City. With the monster loose in Manhattan, Niko and
  a small group of allies try to understand its biology before the crisis spreads.
