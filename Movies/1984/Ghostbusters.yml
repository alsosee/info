name: Ghostbusters
description: >
  Three eccentric parapsychologists start a ghost-catching business in New York City after being fired from their university positions.
  They develop high-tech nuclear-powered equipment to capture and contain ghosts, eventually facing an apocalyptic threat from the shapeshifting god Gozer.
