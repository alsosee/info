name: Certified Copy
description: >
  A British writer visiting Tuscany to promote his book on authenticity meets
  a French antiques dealer, and the two spend an afternoon debating art,
  memory, and relationships. As strangers begin to act like a long-married
  couple, their encounter blurs the line between role-play and shared history.
