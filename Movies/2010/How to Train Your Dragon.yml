name: How to Train Your Dragon
description: >
  In the Viking village of Berk, awkward teenager Hiccup wants to prove himself
  as a dragon slayer but secretly befriends an injured Night Fury he names
  Toothless. Their bond challenges his village's old assumptions about dragons
  and forces Hiccup to choose between tradition and compassion.
