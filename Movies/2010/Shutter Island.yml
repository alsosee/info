name: Shutter Island
description: >
  In 1954, U.S. Marshal Teddy Daniels and his new partner Chuck Aule travel to a remote psychiatric hospital on Shutter Island to investigate a patient's disappearance. As a storm traps them on the island, Teddy's inquiry pulls him deeper into the institution's secrets and his own traumatic memories.
