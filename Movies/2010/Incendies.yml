name: Incendies
description: >
  After their mother's death, Canadian twins Jeanne and Simon Marwan receive
  letters that send them to the Middle East to find a father they believed was
  dead and a brother they never knew existed. Their search uncovers a family
  history shaped by civil war, exile, and buried trauma.
