name: Tangled
description: >
  On the eve of her eighteenth birthday, Rapunzel leaves the hidden tower where
  she has spent her life after making a deal with the wanted thief Flynn Rider.
  As they travel toward the kingdom's floating lanterns, Rapunzel begins to
  uncover the truth about her past and the magic in her hair.
