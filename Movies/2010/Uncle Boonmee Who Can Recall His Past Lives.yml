name: Uncle Boonmee Who Can Recall His Past Lives
description: >
  A dying farmer in rural northeastern Thailand spends his final days with his
  family as the ghost of his wife and his missing son return to him in
  mysterious forms. As Boonmee reflects on illness, karma, and memory, the film
  drifts through stories of spirits, reincarnation, and the landscapes that
  shaped his life.
