name: Shrek Forever After
series: Shrek
description: >
  Feeling trapped by domestic routine and nostalgia for his old life, Shrek makes
  a deal with Rumpelstiltskin that sends him into an alternate Far Far Away where
  he never existed. With Donkey and a warrior version of Fiona, he has one day to
  undo the bargain and restore his family.
