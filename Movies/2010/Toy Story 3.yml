name: Toy Story 3
description: >
  As Andy prepares to leave for college, Woody, Buzz, Jessie, and the rest of
  the toys are accidentally donated to Sunnyside Daycare. While Woody tries to
  return them home, the group discovers that the daycare is ruled by a
  deceptively friendly teddy bear and begins planning an escape.
