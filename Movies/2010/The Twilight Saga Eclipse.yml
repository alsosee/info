name: "The Twilight Saga: Eclipse"
description: >
  As Seattle is terrorized by a string of mysterious killings, Bella Swan faces
  growing pressure from both the vampire and werewolf worlds. With Victoria
  building a newborn vampire army, the Cullens and Quileute wolves must consider
  an uneasy alliance while Bella weighs her future with Edward and Jacob.
