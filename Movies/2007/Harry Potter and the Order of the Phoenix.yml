name: "Harry Potter and the Order of the Phoenix"
description: >
  Harry Potter's fifth year at Hogwarts is overshadowed by the Ministry of Magic's denial
  of Lord Voldemort's return and the appointment of the oppressive Dolores Umbridge as
  Defence Against the Dark Arts teacher. Determined to take matters into his own hands,
  Harry secretly trains a group of students known as Dumbledore's Army to prepare for
  the coming war.
