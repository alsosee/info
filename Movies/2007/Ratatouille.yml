name: Ratatouille
description: >
  Remy, a rat with an unusually refined sense of taste, dreams of becoming a
  chef in Paris. After meeting the awkward kitchen worker Alfredo Linguini, he
  tries to cook inside a famous restaurant while hiding from the humans who
  would never knowingly allow a rat near the food.
