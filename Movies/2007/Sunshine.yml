name: Sunshine
description: >
  In 2057, a dying Sun threatens life on Earth, and the crew of the Icarus II
  travels toward the star with a payload meant to reignite it. When they detect
  the lost first mission, their rescue attempt puts the last chance for humanity
  under increasing pressure.
