name: Spider-Man 3
description: >
  As Peter Parker tries to balance his life with Mary Jane Watson and his duties
  as Spider-Man, an alien symbiote changes his suit and brings out a darker side
  of him. He must confront Sandman, Venom, and Harry Osborn while struggling to
  hold on to the compassion that defines him.
