name: Hot Rod
description: >
  Amateur stuntman Rod Kimble lives for reckless jumps despite constant failure and little respect
  from his stepfather Frank. When Frank needs an expensive heart operation, Rod plans his biggest
  stunt yet to raise the money and earn the fight he thinks will prove himself.
