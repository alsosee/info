name: Into the Wild
description: >
  After graduating from college, Christopher McCandless rejects his conventional
  future, gives away his savings, and travels across North America under the name
  Alexander Supertramp. His journey brings him into the lives of other wanderers
  and toward an isolated attempt to live in the Alaskan wilderness.
