name: "Walk Hard: The Dewey Cox Story"
description: >
  Fictional musician Dewey Cox rises from a traumatic childhood into rock-and-roll fame, cycling
  through musical eras, addictions, marriages, collaborators, and reinventions. The film parodies
  the familiar beats of music biopics while following Dewey's lifelong chase for a defining song.
