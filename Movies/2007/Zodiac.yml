name: Zodiac
description: >
  In the late 1960s and 1970s, the Zodiac Killer terrorizes the San Francisco Bay Area
  while taunting police and newspapers with letters and ciphers. Cartoonist Robert
  Graysmith, crime reporter Paul Avery, and detectives Dave Toschi and Bill Armstrong
  become increasingly consumed by the unresolved investigation.
