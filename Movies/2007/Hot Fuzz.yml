name: "Hot Fuzz"
description: >
  Nicholas Angel, a high-achieving London police officer, is reassigned to the quiet village of Sandford because his efficiency makes his colleagues look bad. There, he partners with the well-meaning but bumbling PC Danny Butterman. Despite the village's peaceful reputation, Angel begins to suspect a dark conspiracy behind a series of gruesome "accidents" in a town that has been named Village of the Year for many consecutive years.
