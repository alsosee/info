name: "4 Months, 3 Weeks and 2 Days"
description: >
  In late-1980s Communist Romania, university student Otilia helps her roommate Gabita arrange an illegal abortion.
  Over a single day, the two women navigate fear, coercion, and the everyday compromises of life under a repressive regime.
