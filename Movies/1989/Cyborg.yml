name: Cyborg
description: >
  In a plague-ravaged future, mercenary Gibson Rickenbacker is drawn into a mission to escort Pearl Prophet, a cyborg carrying data needed to cure the disease. Their route to Atlanta is threatened by Fender Tremolo and his marauders, who want the cure for themselves.
