name: Mark Ruffalo
description: >
  American actor and producer who gained international recognition for playing
  Bruce Banner / Hulk in the Marvel Cinematic Universe beginning with The
  Avengers (2012), and earned four Academy Award nominations for Best Supporting
  Actor for The Kids Are All Right (2010), Foxcatcher (2014), Spotlight (2015),
  and Poor Things (2023).
