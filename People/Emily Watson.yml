name: Emily Watson
description: >
  Emily Margaret Watson is an English actress.
  She began her career on stage and joined the Royal Shakespeare Company in 1992.
  She rose to prominence for her film debut as Bess McNeill in Lars von Trier's Breaking the Waves (1996), for which she received her first Academy Award nomination for Best Actress.
dob: 1967-01-14
