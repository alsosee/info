name: Aubrey Plaza
description: >
  American actress and comedian who gained wide recognition as April Ludgate
  on Parks and Recreation (2009–2015). She received Emmy and Golden Globe
  nominations for The White Lotus (2022) and has starred in acclaimed
  independent films including Emily the Criminal (2022).
