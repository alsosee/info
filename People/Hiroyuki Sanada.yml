name: Hiroyuki Sanada
description: >
  Hiroyuki Sanada is a highly acclaimed Japanese actor and producer who transitioned from a child star and martial arts icon in Japan to a prominent figure in Hollywood. He is best known for his roles in The Last Samurai, The Twilight Samurai, and for his award-winning performance in the series Shōgun.
dob: 1960-10-12
