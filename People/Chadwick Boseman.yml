name: Chadwick Boseman
description: >
  American actor acclaimed for portraying T'Challa / Black Panther in the
  Marvel Cinematic Universe beginning with Captain America: Civil War (2016),
  and for biographical roles as Jackie Robinson in 42 (2013), James Brown in
  Get on Up (2014), and Thurgood Marshall in Marshall (2017). He passed away
  on August 28, 2020 after a four-year battle with colon cancer.
dob: 1976-11-29
