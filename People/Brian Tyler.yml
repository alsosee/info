name: Brian Tyler
description: >
  American composer, conductor, arranger, and multi-instrumentalist known for
  scoring major film franchises including Fast & Furious, The Expendables, and
  Marvel Cinematic Universe films Iron Man 3, Thor: The Dark World, and
  Avengers: Age of Ultron, as well as composing the 2013–2016 Marvel Studios
  fanfare.
dob: 1972-05-08
