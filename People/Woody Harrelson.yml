name: Woody Harrelson
description: >
  American actor best known for his role as bartender Woody Boyd on NBC's
  Cheers (1985–1993), earning a Primetime Emmy Award, and for acclaimed film
  roles in The People vs. Larry Flynt (1996), No Country for Old Men (2007),
  and Three Billboards Outside Ebbing, Missouri (2017).
dob: 1961-07-23
