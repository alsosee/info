name: Tom Salta
description: >
  Tom Salta is an American composer and music producer. He has composed soundtracks for many video game franchises, including Tom Clancy's Ghost Recon, Prince of Persia, Red Steel, and Halo. He also composed the original score for Need for Speed: Underground.
