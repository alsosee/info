name: Denis Villeneuve
description: >
  French-Canadian director known for the crime drama Prisoners (2013), the
  thriller Sicario (2015), the science fiction films Arrival (2016) and Blade
  Runner 2049 (2017), and the epic Dune adaptation in two parts (2021 and 2024),
  widely regarded as one of the most ambitious directors working in contemporary
  Hollywood.
