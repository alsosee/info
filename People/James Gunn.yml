name: James Gunn
description: >
  American filmmaker who wrote and directed the Guardians of the Galaxy trilogy
  (2014–2023) for Marvel Studios and The Suicide Squad (2021) for DC, later
  becoming co-chairman and co-CEO of DC Studios where he wrote and directed
  Superman (2025), also known for Slither (2006) and the HBO Max series
  Peacemaker (2022).
