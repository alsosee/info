name: Jason Schwartzman
description: >
  American actor and musician, member of the Coppola family, who made his film
  debut in Wes Anderson's Rushmore (1998) and has since appeared in seven of
  Anderson's films, known also for playing Gideon Graves in Scott Pilgrim vs.
  the World (2010) and voicing the Spot in Spider-Man: Across the Spider-Verse
  (2023).
