name: Adam McKay
description: >
  American director, screenwriter, and producer who began his career as head
  writer for Saturday Night Live before collaborating with Will Ferrell on
  comedies including Anchorman (2004) and Talladega Nights (2006), later
  winning an Academy Award for Best Adapted Screenplay for the financial
  crisis satire The Big Short (2015).
dob: 1968-04-17
