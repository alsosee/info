name: Cate Blanchett
description: >
  Australian actress who has won two Academy Awards, for Best Supporting Actress
  as Katharine Hepburn in The Aviator (2004) and Best Actress for Blue Jasmine
  (2013), known for playing the elf queen Galadriel in The Lord of the Rings and
  Hobbit trilogies, Queen Elizabeth I in Elizabeth (1998), and Hela in Thor:
  Ragnarok (2017).
dob: 1969-05-14
