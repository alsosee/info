name: Zoe Saldaña
description: >
  American actress of Dominican and Puerto Rican heritage who is the
  highest-grossing actor in history, known for portraying Gamora in the
  Marvel Cinematic Universe's Guardians of the Galaxy franchise, Neytiri in
  James Cameron's Avatar series, and Nyota Uhura in the Star Trek reboot
  series, and for winning the Academy Award for Best Supporting Actress for
  Emilia Pérez (2024).
dob: 1978-06-19
