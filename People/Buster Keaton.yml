name: Buster Keaton
description: >
  American actor, comedian, film director, and stunt performer best known for his silent films.
  His trademark was physical comedy with a consistent deadpan expression, which earned him the
  nickname "The Great Stone Face". He is widely considered one of the greatest filmmakers of the
  silent era, with masterpieces like The General (1926) and Sherlock Jr. (1924).
dob: 1895-10-04
dod: 1966-02-01
