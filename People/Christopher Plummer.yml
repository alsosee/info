name: Christopher Plummer
description: >
  Arthur Christopher Orme Plummer was a Canadian actor whose career spanned
  seven decades. He gained stardom for his role as Captain Von Trapp in The
  Sound of Music (1965), and received numerous accolades, including an Academy
  Award, two Tony Awards, and two Emmy Awards. He voiced the antagonist Charles
  Muntz in Pixar's Up.
dob: 1929-12-13
