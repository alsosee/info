name: Pete Docter
description: >
  Peter Hans Docter is an American animator, film director, screenwriter, and
  producer who has served as the Chief Creative Officer of Pixar since 2018. He
  is best known for directing several of Pixar's most critically acclaimed
  films, including Monsters, Inc., Up, Inside Out, and Soul. He is a
  three-time winner of the Academy Award for Best Animated Feature.
dob: 1968-10-09
