name: Harold Ramis
description: >
  An American actor, comedian, and filmmaker.
  He is best known for his role as Dr. Egon Spengler in Ghostbusters and Ghostbusters II, and for directing comedy classics such as Caddyshack, National Lampoon's Vacation, and Groundhog Day.
