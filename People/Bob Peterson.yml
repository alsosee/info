name: Bob Peterson
description: >
  Bob Peterson is an American animator, director, screenwriter, and voice actor
  who has been a key creative figure at Pixar Animation Studios since 1994. He
  co-directed and co-wrote Up, and is the voice of several iconic Pixar
  characters, including Dug and Alpha from Up, and Roz from Monsters, Inc.
dob: 1961-01-18
