name: Robert Kirkman
description: >
  Robert Kirkman is an American comic book writer, screenwriter, and producer, best known for creating The Walking Dead, Invincible, and Fear the Walking Dead.
  He is a prominent figure in the comic book industry and has played a key role in adapting his works for television.
