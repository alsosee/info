name: E. L. James
description: >
  E. L. James is a British author best known for the best-selling Fifty Shades series of erotic romance novels. Originally writing Twilight fan fiction under the pen name "Snowqueens Icedragon," she transitioned her work into the Fifty Shades trilogy, which became a global multimedia franchise. In 2012, Time magazine named her one of "The World's 100 Most Influential People."
dob: 1963-03-07
