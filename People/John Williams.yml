name: John Williams
description: >
  American composer and conductor best known for his iconic film scores, including
  Star Wars, Jaws, E.T. the Extra-Terrestrial, Indiana Jones, and Schindler's List.
  With 54 Academy Award nominations and 5 wins, he is the second-most nominated
  person in Oscar history.
dob: 1932-02-08
