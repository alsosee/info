name: Thurgood Marshall
description: >
  An American civil rights lawyer and jurist who served as an associate justice
  of the Supreme Court of the United States from 1967 to 1991. He was the
  Court's first African American justice and previously argued landmark civil
  rights cases including Brown v. Board of Education.
dob: 1908-07-02
dod: 1993-01-24
