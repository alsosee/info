name: Timo Tjahjanto
description: >
  Timo Tjahjanto is an Indonesian filmmaker best known for his work in the horror and action genres.
  He gained international recognition as one half of "The Mo Brothers" and has directed acclaimed films like "The Night Comes for Us" and "May the Devil Take You".
