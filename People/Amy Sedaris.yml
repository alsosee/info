name: Amy Sedaris
description: >
  American actress, comedian, and writer known for her cult Comedy Central series
  Strangers with Candy (1999–2000), in which she played 46-year-old ex-convict
  Jerri Blank, for voicing Princess Carolyn in BoJack Horseman (2014–2020), and
  for playing ship mechanic Peli Motto in The Mandalorian (2019–2023).
dob: 1961-03-29
