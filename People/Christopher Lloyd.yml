name: Christopher Lloyd
description: >
  American actor who won three Emmy Awards for playing burned-out ex-hippie Rev.
  Jim Ignatowski on Taxi (1978–1983), and became iconic in film for portraying
  the eccentric inventor Dr. Emmett "Doc" Brown in the Back to the Future trilogy
  (1985–1990), Judge Doom in Who Framed Roger Rabbit (1988), and Uncle Fester in
  The Addams Family (1991).
dob: 1938-10-22
