name: Dennis Wedin
description: >
  A Swedish indie game developer, artist, and musician. He is the co-founder
  of Dennaton Games and the co-creator of the Hotline Miami series. He is
  credited with the series' iconic neon-soaked pixel art style and was the
  lead singer of the band Fucking Werewolf ASSO.
dob: 1983-01-01
