name: Mikey Madison
description: >
  An American actress who rose to international prominence for her breakthrough role as the titular character in Sean Baker's Anora (2024),
  for which she won the Academy Award for Best Actress. She is also known for her roles in Once Upon a Time in Hollywood (2019) and Scream (2022).
