name: Jon Brion
description: >
  Jon Brion is an American singer, songwriter, multi-instrumentalist, record producer, and composer.
  He has composed scores for such films as Hard Eight, Magnolia, Punch-Drunk Love, Eternal Sunshine of the Spotless Mind, I Heart Huckabees, Synecdoche, New York, ParaNorman, and Lady Bird.
