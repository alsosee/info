name: Kublai Khan
description: >
  Mongol ruler who founded the Yuan dynasty and served as its first emperor
  (as Emperor Shizu), as well as the fifth Khagan of the Mongol Empire.
  A grandson of Genghis Khan, he was the first non-Han emperor to rule all of China proper.
dob: 1215-09-23
dod: 1294-02-18
wikipedia: https://en.wikipedia.org/wiki/Kublai_Khan
