name: Jonatan Söderström
description: >
  A Swedish indie game developer, better known as "Cactus". He is the
  co-founder of Dennaton Games and co-creator of the Hotline Miami series.
  Known for his "Rapid Game Design" philosophy, he developed dozens of
  experimental freeware games before his mainstream success.
dob: 1985-10-09
wikipedia: https://en.wikipedia.org/wiki/Jonatan_Söderström
