name: George Miller
description: >
  Australian filmmaker, screenwriter, and producer best known for creating the Mad Max franchise.
  His work spans a wide range of genres, including the Academy Award-winning animated film Happy Feet, the family film Babe, and the critically acclaimed action masterpiece Mad Max: Fury Road.
