name: Elizabeth I
description: >
  Queen of England and Ireland from 1558 until her death in 1603, and the last
  monarch of the House of Tudor. Her reign established the Elizabethan Religious
  Settlement, saw the defeat of the Spanish Armada, and became associated with
  the cultural flourishing of the Elizabethan era.
dob: 1533-09-07
dod: 1603-03-24
wikipedia: https://en.wikipedia.org/wiki/Elizabeth_I
