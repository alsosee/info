name: Ben Kingsley
description: >
  British-Indian actor born Krishna Pandit Bhanji who won the Academy Award
  for Best Actor for Gandhi (1982), received further nominations for Bugsy
  (1991), Sexy Beast (2000), and House of Sand and Fog (2003), and is known
  in the Marvel Cinematic Universe for playing Trevor Slattery in Iron Man 3
  (2013) and Shang-Chi and the Legend of the Ten Rings (2021).
dob: 1943-12-31
