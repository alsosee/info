name: Marie Antoinette
description: >
  Austrian-born queen consort of France as the wife of Louis XVI from 1774
  until the abolition of the French monarchy in 1792 during the French
  Revolution. A prominent figure at Versailles and a target of revolutionary
  criticism, she was tried by the Revolutionary Tribunal and executed in Paris
  in 1793.
dob: 1755-11-02
dod: 1793-10-16
wikipedia: https://en.wikipedia.org/wiki/Marie_Antoinette
website: https://en.chateauversailles.fr/discover/history/great-characters/marie-antoinette
