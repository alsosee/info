name: Ed Asner
description: >
  Eddie Asner was an American actor and former president of the Screen Actors
  Guild. He is best known for playing Lou Grant during the 1970s and early
  1980s, on both The Mary Tyler Moore Show and its spin-off series Lou Grant,
  making him one of the few television actors to portray the same character as
  both a lead and a supporting role in both a comedy and a drama. He voiced
  Carl Fredricksen in Pixar's Up.
dob: 1929-11-15
