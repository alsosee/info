name: Harvey Milk
description: >
  American politician and gay rights activist who was the first openly gay man
  to be elected to public office in California. He was known as the "Mayor of
  Castro Street" and served on the San Francisco Board of Supervisors until his
  assassination in 1978.
dob: 1930-05-22
