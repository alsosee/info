name: Sebastian Stan
description: >
  Romanian-American actor best known for playing Bucky Barnes / Winter Soldier
  in the Marvel Cinematic Universe (2011–present), Tommy Lee in Pam & Tommy
  (2022), and Young Donald Trump in The Apprentice (2024), for which he received
  Academy Award and BAFTA nominations; won the Silver Bear for Best Leading
  Performance and the Golden Globe for Best Actor – Musical or Comedy for A
  Different Man (2024).
dob: 1982-08-13
