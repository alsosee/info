name: Diane Keaton
description: >
  American actress, director, and producer known for her idiosyncratic personality and fashion sense.
  She rose to prominence for her role as Kay Adams-Corleone in Francis Ford Coppola's The Godfather
  trilogy (1972–1990). Her collaboration with Woody Allen began with Play It Again, Sam (1972)
  and reached its peak with Annie Hall (1977), for which she won the Academy Award for Best Actress.
