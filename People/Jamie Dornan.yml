name: Jamie Dornan
description: >
  Jamie Dornan is an actor, model, and musician from Northern Ireland. He gained critical acclaim for his role as serial killer Paul Spector in the crime drama series The Fall (2013–2016) and achieved global recognition as Christian Grey in the Fifty Shades film franchise (2015–2018). His other significant roles include Belfast, The Tourist, and Anthropoid.
