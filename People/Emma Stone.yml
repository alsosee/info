name: Emma Stone
description: >
  American actress who won two Academy Awards for Best Actress, for playing an
  aspiring actress in La La Land (2016) and a resurrected woman in Poor Things
  (2023), known for her early breakout roles in Superbad (2007), Easy A (2010),
  and The Amazing Spider-Man films (2012–2014), and for her recurring
  collaborations with director Yorgos Lanthimos.
dob: 1988-11-06
