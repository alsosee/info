name: Hidetoshi Nishijima
description: >
  A versatile Japanese actor known for his roles in both independent art-house cinema and mainstream blockbusters.
  He received global recognition for his leading role in "Drive My Car" and has starred in notable works such as "Dolls", "Shin Ultraman", and the series "Sunny".
