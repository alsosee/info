name: Lilly Wachowski
description: >
  American filmmaker who co-wrote and co-directed The Matrix trilogy (1999–2003)
  with her sister Lana Wachowski, transforming science fiction cinema, and later
  co-created and co-directed the Netflix series Sense8 (2015–2018), also known
  for V for Vendetta (2005), Speed Racer (2008), and Cloud Atlas (2012).
dob: 1967-12-29
