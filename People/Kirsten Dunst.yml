name: Kirsten Dunst
description: >
  American actress who gained widespread recognition playing child vampire Claudia
  in Interview with the Vampire (1994) and Mary Jane Watson in Sam Raimi's
  Spider-Man trilogy (2002–2007), won the Best Actress prize at the Cannes Film
  Festival for Melancholia (2011), and earned an Emmy nomination for Fargo Season
  2 (2015).
dob: 1982-04-30
