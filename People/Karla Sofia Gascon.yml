name: Karla Sofía Gascón
description: >
  A Spanish actress who achieved international acclaim for her title role in Jacques Audiard's musical crime film Emilia Pérez (2024).
  She made history as the first openly transgender woman to win Best Actress at the Cannes Film Festival and to be nominated for a major lead acting award at the Oscars.
dob: 1972-03-31
