name: David Leitch
description: >
  American filmmaker, stunt performer, and stunt coordinator who co-directed John
  Wick (2014) and went on to direct Atomic Blonde (2017), Deadpool 2 (2018),
  Fast & Furious Presents: Hobbs & Shaw (2019), and Bullet Train (2022), known
  for his kinetic action sequences and background as one of Hollywood's most
  sought-after stunt professionals.
dob: 1975-11-16
