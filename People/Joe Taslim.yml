name: Joe Taslim
description: >
  Joe Taslim is an Indonesian actor, martial artist, and model.
  A former member of Indonesia's national judo team, he rose to international fame for his roles in "The Raid", "Fast & Furious 6", and as Sub-Zero in "Mortal Kombat".
