name: Dakota Johnson
description: >
  Dakota Johnson is an American actress and producer. The daughter of actors Don Johnson and Melanie Griffith, she achieved international stardom for her lead role as Anastasia Steele in the Fifty Shades film franchise (2015–2018). Her other notable work includes The Social Network, Suspiria, The Peanut Butter Falcon, and The Lost Daughter. She is also the founder of the production company TeaTime Pictures.
dob: 1989-10-04
