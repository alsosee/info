name: Tetsuya Mizuguchi
description: >
  A Japanese video game designer, producer, and businessman known for creating games
  that incorporate interactive synesthesia, such as Rez, Lumines, Child of Eden, and Tetris Effect.
  He is the co-founder of Q Entertainment and the founder/CEO of Enhance.
dob: 1965-05-22
