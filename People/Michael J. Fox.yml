name: Michael J. Fox
description: >
  Canadian-American actor who rose to fame playing conservative teenager Alex P.
  Keaton on Family Ties (1982–1989), starred as time-traveler Marty McFly in the
  Back to the Future trilogy (1985–1990), and later became a prominent advocate
  for Parkinson's disease research after his 1991 diagnosis, founding the Michael
  J. Fox Foundation in 2000.
dob: 1961-06-09
