name: Cleve Jones
description: >
  American AIDS and LGBT rights activist who conceived the NAMES Project AIDS
  Memorial Quilt and co-founded the San Francisco AIDS Foundation. He was a
  close associate of Harvey Milk and served as a historical consultant for the
  2008 film Milk.
dob: 1954-10-11
