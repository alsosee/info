name: Lily Gladstone
description: >
  Lily Gladstone is an American actress of Piegan Blackfeet, Nez Perce, and European heritage.
  She is best known for her role as Mollie Kyle in "Killers of the Flower Moon", for which she won a Golden Globe Award.
