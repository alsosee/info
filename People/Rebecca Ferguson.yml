name: Rebecca Ferguson
description: >
  Swedish actress who gained international recognition playing Elizabeth Woodville
  in the BBC drama The White Queen (2013), and became known to global audiences
  as MI6 agent Ilsa Faust in the Mission: Impossible franchise (2015–2023), Jenny
  Lind in The Greatest Showman (2017), and Lady Jessica in Denis Villeneuve's
  Dune films (2021–2024).
