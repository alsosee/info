name: Alec Newman
description: >
  Scottish actor best known for playing Paul Atreides in the Sci Fi Channel's
  Dune miniseries (2000) and its sequel Children of Dune (2003), and for
  voicing Adam Smasher in Cyberpunk 2077 (2020) and Cyberpunk: Edgerunners,
  winning the BAFTA Games Award for Performer in a Leading Role for Still
  Wakes the Deep (2024).
dob: 1974-11-27
