name: Robert Eggers
description: >
  Robert Eggers is an American filmmaker best known for writing and directing atmospheric period films such as The Witch, The Lighthouse, and The Northman. His work is distinguished by its rigorous historical authenticity and the blending of horror, folklore, and mythology.
