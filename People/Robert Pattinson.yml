name: Robert Pattinson
description: >
  Robert Pattinson is an English actor known for his versatile performances in both major studio blockbusters and independent auteur films. He gained worldwide fame as Edward Cullen in The Twilight Saga and has since received critical acclaim for roles in films such as The Lighthouse, Good Time, and as the titular superhero in The Batman.
