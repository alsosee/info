name: Ryusuke Hamaguchi
description: >
  A prominent Japanese filmmaker and screenwriter known for his long-form narratives and exploration of human intimacy.
  He gained international acclaim for "Happy Hour", "Wheel of Fortune and Fantasy", and "Drive My Car", the latter of which won the Academy Award for Best International Feature Film.
dob: 1978-12-16
