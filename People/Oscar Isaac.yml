name: Oscar Isaac
description: >
  Guatemalan-American actor and musician known for his acclaimed lead performance
  in Inside Llewyn Davis (2013), for playing Poe Dameron in the Star Wars sequel
  trilogy (2015–2019), Nathan in Ex Machina (2015), and Marc Spector / Moon
  Knight in the MCU series Moon Knight (2022), winning a Golden Globe for the
  HBO miniseries Show Me a Hero (2015).
dob: 1979-03-09
