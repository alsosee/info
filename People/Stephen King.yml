name: Stephen King
description: >
  Stephen Edwin King is a prolific American author widely known as the "King of Horror" for his extensive work in horror fiction,
  though he has also explored suspense, crime, and fantasy. Since his debut with Carrie in 1974, he has published numerous
  best-selling novels and short stories, many of which have been adapted into iconic films and television series.
dob: 1947-09-21
