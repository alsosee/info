name: Deborah Rush
description: >
  Deborah Rush is an American actress known for her work on stage, film, and television. She is best known for her role as Sara Blank in the cult sitcom Strangers with Candy and has appeared in numerous films such as Julie & Julia and The Purple Rose of Cairo.
