name: Willem Dafoe
description: >
  American actor known for his prolific and daring performances across mainstream
  blockbusters and arthouse cinema. He has received four Academy Award nominations
  for Platoon (1986), Shadow of the Vampire (2000), The Florida Project (2017),
  and At Eternity's Gate (2018).
