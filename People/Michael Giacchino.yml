name: Michael Giacchino
description: >
  Michael Giacchino is an American composer of music for films, television, and
  video games. He has received many awards, including an Academy Award, a
  Primetime Emmy Award, and three Grammy Awards. He is known for his
  collaborations with J. J. Abrams, Brad Bird, Matt Reeves, Pete Docter, and
  Jon Watts.
dob: 1967-10-10
