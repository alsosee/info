name: Da'Vine Joy Randolph
description: >
  American actress who won the Academy Award for Best Supporting Actress for
  playing a grieving mother in The Holdovers (2023), previously earning a Tony
  Award nomination for her Broadway portrayal of psychic Oda Mae Brown in Ghost
  the Musical (2012), with other notable work in Dolemite Is My Name (2019) and
  Only Murders in the Building (2021–present).
dob: 1986-05-21
