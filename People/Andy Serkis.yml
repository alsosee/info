name: Andy Serkis
description: >
  English actor and filmmaker who pioneered performance capture in film, playing
  Gollum in The Lord of the Rings trilogy (2001–2003) and The Hobbit films
  (2012–2014), King Kong (2005), Caesar in the Planet of the Apes reboot series
  (2011–2017), and Supreme Leader Snoke in the Star Wars sequel trilogy
  (2015–2017), as well as directing Mowgli: Legend of the Jungle (2018).
dob: 1964-04-20
