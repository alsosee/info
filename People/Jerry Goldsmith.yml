name: Jerry Goldsmith
description: >
  An American composer and conductor most known for his work in film and television scoring. He composed scores for such films as "Planet of the Apes", "The Omen", "Alien", "Poltergeist", "Star Trek: The Motion Picture", and "Chinatown".
dob: 1929-02-10
