name: Edgar Wright
description: >
  English film director, screenwriter, producer, and actor. He is known for his fast-paced and kinetic editing style, as well as his use of expressive sound design and music. He is best known for the Three Flavours Cornetto trilogy and Scott Pilgrim vs. the World.
