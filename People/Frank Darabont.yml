name: Frank Darabont
description: >
  Frank Darabont is an American screenwriter, director, and producer known for his film adaptations of Stephen King novellas and novels, such as The Shawshank Redemption, The Green Mile, and The Mist.
  He also developed and executive-produced the first season of the AMC horror drama series The Walking Dead.
dob: 1959-01-28
