name: Anya Taylor-Joy
description: >
  British-American actress who gained prominence with her performance in the horror film The Witch (2015).
  She achieved international recognition for her roles as Beth Harmon in the Netflix miniseries The Queen's Gambit (2020), and for starring in films such as Last Night in Soho (2021), The Menu (2022), and as the title character in Furiosa: A Mad Max Saga (2024).
