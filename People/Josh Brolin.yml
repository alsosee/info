name: Josh Brolin
description: >
  American actor known for playing the villain Thanos in the Marvel Cinematic
  Universe's Avengers: Infinity War (2018) and Avengers: Endgame (2019), Cable
  in Deadpool 2 (2018), and Gurney Halleck in Denis Villeneuve's Dune films
  (2021–2024), with earlier acclaimed work in No Country for Old Men (2007) and
  Milk (2008), for which he received an Academy Award nomination.
dob: 1968-02-12
