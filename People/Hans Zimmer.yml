name: Hans Zimmer
description: >
  German film composer and music producer renowned for integrating electronic
  music with traditional orchestral arrangements. Has composed music for over
  150 films, winning two Academy Awards for Best Original Score for The Lion
  King (1994) and Dune (2021).
