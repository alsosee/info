name: EA Black Box
description: >
  EA Black Box was a video game developer based in Burnaby, British Columbia, Canada. Founded in 1998 as Black Box Games, it was acquired by Electronic Arts in 2002 and became a subsidiary. The studio was best known for developing several titles in the Need for Speed and Skate franchises.
founded: 1998
