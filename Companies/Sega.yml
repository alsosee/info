name: Sega
description: >
  A Japanese multinational video game and entertainment company headquartered in
  Tokyo. It was a major home console manufacturer from 1983 to 2001 before
  transitioning into a third-party software developer and publisher. Sega is the
  creator of many popular franchises, including Sonic the Hedgehog, Yakuza, and
  Persona.
released: 1960-06-03
wikipedia: https://en.wikipedia.org/wiki/Sega
website: https://www.sega.com
