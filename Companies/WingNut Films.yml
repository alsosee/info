name: WingNut Films
description: >
  WingNut Films is a New Zealand film production company based in Wellington.
  Owned by filmmaker Peter Jackson, it is most notable for producing The Lord of the Rings and The Hobbit trilogies, as well as the 2005 remake of King Kong.
founded: 1987-02-14
wikipedia: https://en.wikipedia.org/wiki/WingNut_Films
