name: Bungie
description: >
  An American video game developer based in Bellevue, Washington. Founded in
  1991, the company is best known for creating the Marathon, Myth, Halo, and
  Destiny franchises. Since 2022, Bungie has been a subsidiary of Sony
  Interactive Entertainment.
