name: Electronic Arts
description: >
  Electronic Arts (EA) is an American video game company headquartered in Redwood City, California. It is one of the largest video game companies in the world, known for publishing major franchises including FIFA, Madden NFL, Need for Speed, The Sims, and Battlefield.
founded: 1982-05-27
founders: Trip Hawkins
website: https://www.ea.com
wikipedia: https://en.wikipedia.org/wiki/Electronic_Arts
