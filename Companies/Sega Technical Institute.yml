name: Sega Technical Institute
description: >
  An American video game development division of Sega active from 1990 to 1996.
  Founded by Mark Cerny, the studio combined Japanese and American talent to
  develop high-profile titles including Sonic the Hedgehog 2, Sonic the Hedgehog
  3, and Sonic & Knuckles.
released: 1990
wikipedia: https://en.wikipedia.org/wiki/Sega_Technical_Institute
