name: AdHoc Studio
description: >
  An American independent video game developer specializing in interactive narrative games.
  Founded by former Telltale Games veterans, the studio focuses on narrative-driven
  experiences with a strong emphasis on character and choice.
founded: 2018-02-01
location: Long Beach, California
founders:
