name: Paramount Pictures
description: >
  Paramount Pictures Corporation is an American film production and distribution company and the flagship namesake subsidiary of Paramount Skydance.
  Founded in 1912, it is the sixth-oldest global film studio and the second-oldest in the United States.
founded: 1912-05-08
founders:
  - Adolph Zukor
  - Jesse L. Lasky
  - W. W. Hodkinson
