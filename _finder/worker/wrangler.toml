name = "alsosee-info"
main = "src/index.js"
compatibility_date = "2024-02-25"

routes = [
  { pattern = "alsosee.info/*", zone_name = "alsosee.info" }
]

[vars]
GITHUB_REPO = "alsosee/media"

[[r2_buckets]]
binding = "SITE"
bucket_name = "alsosee-info"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "media-purgatory"
