name: Captain Commando
description: >
  Captain Commando leads a four-member Commando Team through a crime-ridden
  futuristic Metro City to stop the mutant super-criminal Scumocide. Capcom's
  arcade beat 'em up builds on the Final Fight lineage with four-player
  side-scrolling combat, comic-book science fiction, and selectable heroes with
  distinct attacks.
released: 1991-09
genres:
  - beat 'em up
