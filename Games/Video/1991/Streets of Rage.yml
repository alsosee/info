name: Streets of Rage
description: >
  Three former police officers, Adam Hunter, Axel Stone, and Blaze Fielding,
  fight through a crime-ridden city to bring down the syndicate led by Mr. X.
  The game established Sega's side-scrolling beat 'em up series with cooperative
  play and Yuzo Koshiro's techno-influenced soundtrack.
released: 1991-08-02
genres:
  - beat 'em up
