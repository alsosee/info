name: Sonic the Hedgehog
description: >
  A landmark platform game developed by Sonic Team for the Sega Genesis,
  featuring a blue hedgehog who runs at supersonic speeds to foil Doctor
  Robotnik's plans to collect the Chaos Emeralds. It established the Genesis as
  a major competitor to Nintendo and became one of the best-selling video games
  of all time.
released: 1991-06-23
genres:
  - platform
