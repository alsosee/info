name: "Street Fighter II: The World Warrior"
description: >
  Eight martial artists from around the world enter a fighting tournament and
  face off against Shadaloo's four boss fighters. Capcom's arcade sequel
  expanded the first Street Fighter with a larger playable roster, distinct
  move sets, combo-driven head-to-head play, and a competitive format that
  helped define the modern fighting game genre.
