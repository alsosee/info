name: Returnal
description: >
  Returnal is a third-person shooter roguelike game that follows Selene Vassos, an astronaut who lands on the alien planet Atropos in search of the mysterious "White Shadow" signal. She finds herself trapped in a time loop, where every death resurrects her at the crash site, forcing her to traverse ever-changing environments and combat extraterrestrial entities.
released: 2021-04-30
genres:
