name: Road 96
description: >
  Road 96 is a narrative-driven adventure game set in the summer of 1996 in the fictional authoritarian nation of Petria. Players control several nameless teenagers attempting to flee the country by reaching the northern border, making choices that influence both their own fate and the outcome of a national election.
