name: "Pathfinder: Wrath of the Righteous"
description: >
  Set in the Pathfinder fantasy world, the game follows a newly empowered Commander who leads the Fifth Crusade against demonic forces pouring through the Worldwound. Players build a party, choose a mythic path, and manage both tactical role-playing battles and a wider crusade campaign.
