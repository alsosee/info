name: Marvel's Guardians of the Galaxy
description: >
  Set in an original Marvel universe, the game follows Star-Lord and the Guardians as a routine monster-hunting job accidentally unleashes a threat to galactic peace. Players control Peter Quill while commanding the other Guardians in combat and navigating dialogue choices that shape the team's relationships.
