name: Crypt of the NecroDancer
description: >
  Crypt of the NecroDancer is a roguelike rhythm game where players explore
  procedurally generated dungeons by moving and attacking on the beat of the
  soundtrack. The game follows Cadence as she descends into the NecroDancer's
  crypt, combining turn-based dungeon tactics with rhythm-game timing.
