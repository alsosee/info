name: "Hotline Miami 2: Wrong Number"
description: >
  Hotline Miami 2 is a top-down shooter and the sequel to Hotline Miami, set
  across multiple chapters in 1985–1991 Miami and told through the perspectives
  of several interconnected characters. It expands the brutal one-hit combat
  and mask system of the original while deepening the surreal narrative and
  featuring a new, expanded electronic soundtrack.
