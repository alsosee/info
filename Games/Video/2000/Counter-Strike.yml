name: Counter-Strike
description: >
  A tactical multiplayer first-person shooter in which Terrorists and
  Counter-Terrorists compete in round-based objective modes such as bomb
  defusal and hostage rescue. Originating as a Half-Life mod, it became one of
  the defining competitive PC shooters of the early 2000s.
