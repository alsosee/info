name: "The Legend of Zelda: Majora's Mask"
description: >
  Action-adventure game in which Link is drawn into the parallel world of
  Termina, where he must use masks, transformations, and a repeating three-day
  cycle to stop the moon from crashing into the world. The Nintendo 64 sequel
  to Ocarina of Time is known for its darker tone, time-loop structure, and
  character-focused side quests.
