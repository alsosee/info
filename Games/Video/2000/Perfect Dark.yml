name: Perfect Dark
description: >
  First-person shooter in which Carrington Institute agent Joanna Dark uncovers
  a conspiracy involving the powerful dataDyne corporation and rival alien
  factions. Developed as Rare's spiritual successor to GoldenEye 007, the game
  expanded the Nintendo 64 shooter formula with objective-driven missions,
  stealth elements, cooperative play, and deep multiplayer options.
released: 2000-05-22
genres:
