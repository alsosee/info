name: "Tetris Effect: Connected"
description: >
  A visually stunning and immersive reimagining of the classic puzzle game.
  Players clear lines of falling blocks (tetrominos) across over 30 stages,
  each featuring unique themes, music, and sound effects that react to the player's actions.
  The "Connected" expansion adds cooperative and competitive multiplayer modes,
  including a 3-player co-op mode against AI bosses.
