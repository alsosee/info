name: Gris
description: >
  A serene and evocative experience, free of danger, frustration or death.
  Players explore a meticulous world brought to life with delicate art,
  detailed animation, and an elegant original score. As the story unfolds,
  Gris will grow emotionally and see her world in a different way,
  revealing new paths to explore using new abilities.
