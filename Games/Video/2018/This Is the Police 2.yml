name: This Is the Police 2
description: >
  A story-driven adventure and strategy game set in the cold border town of
  Sharpwood, where sheriff Lilly Reed and fugitive former police chief Jack Boyd
  manage a troubled sheriff's department, investigate crimes, and navigate a
  corrupt community through tactical and moral choices.
