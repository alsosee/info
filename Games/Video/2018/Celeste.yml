name: Celeste
description: >
  A precision platform game about Madeline, a young woman climbing Celeste
  Mountain while confronting both its supernatural hazards and her own inner
  struggles. The game pairs tight single-screen platforming challenges with an
  introspective story about anxiety, perseverance, and self-acceptance.
