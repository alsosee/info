name: Final Fight
description: >
  Mike Haggar, Cody, and Guy fight through Metro City to rescue Jessica from the
  Mad Gear gang. Capcom's side-scrolling arcade beat 'em up became one of the
  genre's defining games and influenced later Capcom action and fighting games.
