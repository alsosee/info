name: Marathon
description: >
  A science fiction PvPvE extraction shooter set in 2893 on the planet Tau Ceti IV. Players take on the role of cybernetic mercenaries known as "Runners," exploring the remains of a lost colony to recover artifacts and equipment while competing against other players and hostile security forces.
released: 2026-03-05
