name: Mewgenics
description: >
  Mewgenics is a tactical roguelike role-playing game about breeding and
  managing generations of cats, then sending teams into grid-based battles.
  Cats inherit traits, mutations, abilities, and long-term consequences,
  turning each run into a mix of combat, colony management, and strange legacy
  planning.
released: 2026-02-10
