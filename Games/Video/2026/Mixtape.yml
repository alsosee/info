name: Mixtape
description: >
  A narrative adventure about Stacey Rockford, Van Slater, and Cassandra Morino spending their last night of high school together.
  A curated playlist pulls the friends into dreamlike playable memories, with vignettes built around teenage mischief, music, and coming-of-age moments.
