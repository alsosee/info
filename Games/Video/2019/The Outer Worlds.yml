name: The Outer Worlds
description: >
  The Outer Worlds is a single-player science-fiction action role-playing game set in the corporate-controlled Halcyon colony.
  The player controls a passenger from a lost colony ship, revived into a conspiracy that threatens the system and shaped by choices in combat, dialogue, factions, and companions.
