name: Disco Elysium
description: >
  Disco Elysium is an open-world role-playing game about a troubled detective
  who wakes in the district of Martinaise with no memory and must investigate a
  murder alongside Lieutenant Kim Kitsuragi. The game replaces traditional
  combat with skill checks, dialogue, political choices, and internal debates
  between the detective's own thoughts and instincts.
