name: Slay the Spire
description: >
  A roguelike deck-building game in which the player ascends a procedurally
  generated spire across multiple floors as one of four characters, battling
  enemies and bosses using a card-based combat system that requires building
  an effective deck from cards earned through play. Considered the game that
  popularized the roguelike deck-building genre.
released: 2019-01-23
genres:
  - roguelike
  - deck-building
