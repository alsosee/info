name: Control
description: >
  Jesse Faden enters the Federal Bureau of Control's shifting headquarters, the Oldest House, while searching for her missing brother Dylan. After an otherworldly force called the Hiss invades the Bureau, Jesse becomes its new Director and uses paranatural abilities and the shapeshifting Service Weapon to reclaim the building.
