name: Outer Wilds
description: >
  Outer Wilds is an open-world mystery game about a solar system trapped in an endless time loop.
  Players explore a planetary system that resets every 22 minutes when the sun goes supernova,
  investigating the ruins of an ancient alien race called the Nomai to uncover the secrets of the universe.
