name: SpaceChem
description: >
  SpaceChem is a design-based puzzle game about programming reactors to
  transform input atoms and molecules into specified chemical products. Players
  route two manipulators through visual command sequences, then combine reactors
  into larger production systems while optimizing cycles, symbols, and reactor
  count.
released: 2011-01-01
genres:
  - puzzle
  - programming
  - automation
