name: Battlefield 3
description: >
  A first-person shooter following U.S. Marine Henry Blackburn and Russian GRU
  operative Dimitri Mayakovsky across a near-future conflict, while its
  multiplayer emphasizes large-scale combined-arms battles with infantry,
  vehicles, aircraft, and destructible environments.
