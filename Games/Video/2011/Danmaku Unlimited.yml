name: Danmaku Unlimited
description: >
  Danmaku Unlimited is an iOS bullet-hell shoot 'em up inspired by Japanese
  danmaku shooters. Players pilot a fighter through five arcade stages, dodging
  dense projectile patterns, grazing bullets to build score, and facing
  multi-stage boss battles.
released: 2011-05-13
