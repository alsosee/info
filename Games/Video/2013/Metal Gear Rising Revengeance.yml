name: "Metal Gear Rising: Revengeance"
description: >
  Set four years after the events of Metal Gear Solid 4: Guns of the Patriots, the game follows Raiden, a cyborg ninja working for a private military company, as he battles a rival PMC that aims to destabilize nations for profit. Unlike previous Metal Gear titles which focused on stealth, Revengeance features fast-paced sword combat and a unique blade mode system that allows players to precisely cut enemies and objects.
