name: Rayman Legends
description: >
  Rayman, Globox, and the Teensies enter a series of magical paintings to
  rescue captured princesses and stop nightmares spreading through the Glade of
  Dreams. The game expands Rayman Origins' 2D platforming with co-op play,
  rhythm-based stages, and UbiArt Framework animation.
released: 2013-08-29
series: Rayman
