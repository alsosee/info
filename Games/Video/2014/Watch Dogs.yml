name: Watch Dogs
description: >
  A third-person action-adventure in which hacker Aiden Pearce manipulates
  Chicago's city-wide operating system ctOS through his smartphone, using
  hacking, stealth, and combat to pursue the people responsible for his niece's
  death.
released: 2014-05-27
genres:
  - action-adventure
  - open world
  - stealth
wikipedia: https://en.wikipedia.org/wiki/Watch_Dogs_(video_game)
metacritic: https://www.metacritic.com/game/watch-dogs/
directors: Jonathan Morin
producers: Dominic Guay
writers: Kevin Shortt
composers: Brian Reitzell
developers: Ubisoft Montreal
publishers: Ubisoft
characters:
  - name: Aiden Pearce
    actor: Noam Jenkins
  - name: Jordi Chin
    actor: Aaron Douglas
  - name: Clara Lille
    actor: Isabelle Blais
  - name: Raymond "T-Bone" Kenney
    actor: John Tench
