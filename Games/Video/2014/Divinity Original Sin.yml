name: "Divinity: Original Sin"
description: >
  Isometric role-playing game set in the fantasy world of Rivellon, where two
  Source Hunters investigate a murder in Cyseal and uncover a larger conspiracy
  around Source magic. It combines cooperative play, turn-based tactical combat,
  systemic world interactions, and a campaign editor built from Larian Studios'
  Divinity Engine tools.
