name: "Metal Gear Solid V: Ground Zeroes"
description: >
  Set in 1975 after the events of Metal Gear Solid: Peace Walker, the game follows Snake as he infiltrates the American black site Camp Omega in Cuba to rescue Paz Ortega Andrade and Ricardo "Chico" Valenciano Libre. It serves as a standalone prologue to Metal Gear Solid V: The Phantom Pain.
