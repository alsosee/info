name: Sunset Overdrive
description: >
  A fast-paced open-world action-adventure shooter set in Sunset City after
  FizzCo's new energy drink turns residents into mutants. Players grind,
  wall-run, bounce, and zip-line through the city while fighting the OD,
  FizzCo robots, and human gangs with an unconventional arsenal.
released: 2014-10-28
genres:
  - action-adventure
  - third-person shooter
  - open world
