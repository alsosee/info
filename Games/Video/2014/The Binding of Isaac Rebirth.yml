name: "The Binding of Isaac: Rebirth"
description: >
  The Binding of Isaac: Rebirth is a roguelike action-adventure game in which Isaac escapes into a procedurally generated basement and fights monsters with his tears while collecting items that transform his abilities. It remakes the original Flash game with a new engine, expanded content, local co-op, a redesigned interface, and a new soundtrack.
