name: "Madagascar: Operation Penguin"
series: Madagascar
description: >
  Madagascar: Operation Penguin is a Game Boy Advance platform game focused on
  the penguins from Madagascar. The side-scrolling adventure loosely follows the
  film subplot about the penguins escaping the Central Park Zoo for Antarctica.
