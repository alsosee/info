name: Madagascar
series: Madagascar
description: >
  Madagascar is a platform game based on the 2005 DreamWorks Animation film.
  Players control Alex, Marty, Melman, and Gloria through levels inspired by the
  film as the zoo animals leave New York and try to survive in the wild.
