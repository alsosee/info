name: Quake III Arena
description: >
  Quake III Arena is a 1999 first-person shooter developed by id Software and the third installment in the Quake series.
  Unlike its predecessors, it focuses primarily on multiplayer gameplay, replacing the traditional story-based single-player
  campaign with matches against computer-controlled bots.
