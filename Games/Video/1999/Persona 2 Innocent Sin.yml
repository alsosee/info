name: "Persona 2: Innocent Sin"
description: >
  Tatsuya Suou and other students in Sumaru City confront the Joker,
  whose rumor-fueled curse is making wishes and urban legends become
  reality. The party uses Personas in turn-based battles while spreading
  rumors of their own to alter the city and uncover the source of the
  crisis.
