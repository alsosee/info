name: "Street Fighter III: 3rd Strike"
description: >
  Capcom's second and final update to Street Fighter III expands the roster
  with Chun-Li, Makoto, Remy, Q, and Twelve while refining the series' parry
  system, super arts, and competitive rule set. Its expressive animation,
  jazz-, hip-hop-, and drum-and-bass-influenced soundtrack, and high-skill
  tournament play helped it become one of the most enduring 2D fighting games.
