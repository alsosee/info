name: Beneath a Steel Sky
description: >
  Robert Foster is abducted from the wasteland known as the Gap and taken to
  Union City, a dystopian cyberpunk metropolis controlled by corporate power and
  an omnipresent computer system. With the circuit board of his robot companion
  Joey, he must navigate the city and uncover why he was brought there.
