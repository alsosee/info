name: Tekken
description: >
  Fighters from around the world enter the King of Iron Fist Tournament, where
  Kazuya Mishima seeks revenge against his father, Heihachi Mishima. Namco's
  arcade fighting game helped establish 3D polygonal fighters, using a
  limb-based control scheme and a PlayStation-based arcade board before being
  ported to Sony's home console.
released: 1994-12-09
