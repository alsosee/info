name: Sonic the Hedgehog 3
description: >
  A 1994 platformer that introduces Knuckles the Echidna as a rival who tricks
  Sonic and Tails on Angel Island. The game features expansive levels and a
  save system, following the duo's attempt to stop Robotnik from relaunching
  the Death Egg.
