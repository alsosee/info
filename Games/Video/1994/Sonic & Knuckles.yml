name: Sonic & Knuckles
description: >
  A 1994 expansion and sequel featuring "lock-on technology" that allows it to
  be combined with previous Sonic titles. It concludes the story of the Death
  Egg's crash on Angel Island and allows players to control Knuckles in his
  own campaign against Robotnik's minion, EggRobo.
