name: "Streets of Rage 3"
description: >
  The third entry in the original trilogy introduces a more complex plot with
  multiple endings and branching paths. Axel, Blaze, and Skate are joined by the
  cyborg Dr. Zan as they fight to stop the Syndicate from replacing city officials
  with robotic clones. The game refined the combat mechanics with vertical dodge
  rolls and a rechargeable special attack meter.
