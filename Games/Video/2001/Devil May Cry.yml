name: Devil May Cry
description: >
  Action-adventure hack and slash game where Dante, a demon hunter, explores the
  gothic Mallet Island to thwart the demon lord Mundus's plot to conquer the human
  world. Renowned for its stylish combat system, players are rewarded with higher
  rankings for performing varied attacks and avoiding damage.
released: 2001-08-23
genres:
  - action-adventure
  - hack and slash
