name: Dispatch
description: >
  A superhero workplace comedy episodic adventure where you play as Robert Robertson III, formerly the hero Mecha Man. After his mecha suit is destroyed, he is forced to take a job at the Superhero Dispatch Network, managing a team of barely reformed supervillains seeking redemption.
