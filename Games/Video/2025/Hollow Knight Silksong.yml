name: "Hollow Knight: Silksong"
description: >
  Hollow Knight: Silksong is a Metroidvania action-adventure game where players
  control Hornet after she is captured and taken to Pharloom, a haunted kingdom
  ruled by silk and song. The sequel expands Hollow Knight's exploration,
  platforming, questing, and boss combat with Hornet's faster movement and
  silk-based abilities.
