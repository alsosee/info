name: Abiotic Factor
description: >
  A survival crafting game set in 1993 inside a sprawling underground research
  facility in the Australian outback. Players take on the role of scientists
  scavenging office supplies, building defenses, and surviving paranormal
  containment failures, hostile soldiers, and interdimensional threats.
