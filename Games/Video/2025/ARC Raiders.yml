name: ARC Raiders
description: >
  A multiplayer third-person extraction shooter set on a post-apocalyptic
  Earth. Players take on the role of Raiders, scavenging for resources and
  fighting against hostile machines known as ARC while competing with other
  players in a PvPvE environment.
