name: The Alters
description: >
  A sci-fi survival and base-building game about Jan Dolski, a space miner
  stranded on a hostile planet. To survive, Jan creates alternate versions of
  himself shaped by different life choices and recruits them to maintain a
  mobile base before the planet's deadly sunrise catches up.
