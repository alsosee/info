name: Ascent DX
description: >
  Ascent DX is a short metroidvania about exploring an unknown planet after a crash landing.
  Built around 64 x 64 pixel art and chiptune music, it expands the original Ascent with more areas, items, platforming puzzles, lore, and multiple endings.
released: 2025-03-26
genres:
