name: Hades II
description: >
  Hades II is a roguelike action role-playing game where players control
  Melinoe, the Princess of the Underworld, as she uses witchcraft and weapons
  of Night to battle Chronos, the Titan of Time. The sequel expands the
  mythological world of Hades with new routes through the Underworld and the
  surface, a larger cast of gods and spirits, and a story that unfolds across
  repeated escape attempts.
