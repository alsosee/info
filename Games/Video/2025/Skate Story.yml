name: Skate Story
description: >
  You are a crystalline demon in the Underworld, made out of glass and pain.
  The Devil has given you a skateboard with a simple deal: "Skate to the Moon and swallow it, and I shall set you free."
  Skate through the ash and smoke of the Underworld as you learn to ollie, kickflip, and grind your way through a surreal landscape.
