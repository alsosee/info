name: Sword of the Sea
description: >
  An atmospheric surfing adventure set in a world of surreal, animating landscapes.
  Players take on the role of the Wraith, resurrected in a desolate realm called the Necropolis of the Gods,
  using a "Hoversword" that controls like a snowboard, skateboard, and hoverboard to navigate a world where the terrain flows in constant waves.
released: 2025-08-19
genres:
