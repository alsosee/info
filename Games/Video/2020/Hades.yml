name: Hades
description: >
  Hades is a roguelike action role-playing game where players control Zagreus, the prince of the Underworld, as he attempts to escape his father's realm to reach Mount Olympus. Aided by the Olympian gods, players fight through randomized rooms in a hack-and-slash combat system, gaining permanent upgrades and uncovering a branching narrative with each attempt.
