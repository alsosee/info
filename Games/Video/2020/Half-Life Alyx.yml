name: 'Half-Life: Alyx'
description: >
  A VR-exclusive first-person shooter set between the events of Half-Life and
  Half-Life 2, where players control Alyx Vance in a resistance against the
  alien Combine empire, using gravity gloves and physics-based VR interactions.
