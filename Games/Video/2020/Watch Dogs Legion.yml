name: "Watch Dogs: Legion"
description: >
  An action-adventure game set in a near-future, dystopian London. The story
  follows the London branch of the hacker group DedSec as they attempt to clear
  their name after being framed for a series of terrorist bombings and liberate
  the city from the control of Albion, a corrupt private military company.
