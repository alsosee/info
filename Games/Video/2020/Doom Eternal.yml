name: Doom Eternal
description: >
  Doom Eternal is a first-person shooter where the Doom Slayer returns to an
  Earth overrun by demonic forces, combining high-speed arena combat with new
  movement abilities, resource-driven weapon tactics, platforming, and the
  asymmetrical Battlemode multiplayer mode.
