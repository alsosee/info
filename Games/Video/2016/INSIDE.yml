name: INSIDE
description: >
  A puzzle-platform horror game about a boy moving through a dystopian world,
  solving environmental puzzles and avoiding lethal hazards. The game uses
  sparse color, near-silent presentation, and 2.5D side-scrolling spaces to
  build an oppressive, wordless narrative.
released: 2016-06-29
genres:
  - puzzle-platform
  - horror
