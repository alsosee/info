name: Trackmania Turbo
description: >
  An arcade racing game featuring over 200 high-speed tracks across four unique environments, including a magnetic "Rollercoaster Lagoon." The game emphasizes stunts and time trials, offering various modes like a 4-player split-screen, a cooperative "Double Driver" mode where two players control one car, and a random track generator.
released: 2016-03-24
genres:
  - racing
  - arcade
