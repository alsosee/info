name: Oxenfree
description: >
  A supernatural graphic adventure game about Alex, a teenager who brings her new stepbrother Jonas to an overnight party on Edwards Island and accidentally opens a ghostly rift. The game centers on exploration, radio-tuned paranormal events, and a real-time dialogue system where player choices shape Alex's relationships with her friends.
released: 2016-01-15
genres:
