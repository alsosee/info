name: Mirror's Edge Catalyst
description: >
  A reboot of the Mirror's Edge series, Catalyst returns to Faith Connors and her origins as a Runner in the dystopian city of Glass.
  The game expands on the parkour-based traversal of the original with an open-world design and a more detailed narrative about Faith's past.
released: 2016-06-07
genres:
  - action-adventure
  - platformer
