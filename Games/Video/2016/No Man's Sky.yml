name: No Man's Sky
description: >
  No Man's Sky is an action-adventure survival game set in a procedurally
  generated universe of planets, star systems, alien species, and resources.
  Players explore, trade, fight, build bases, upgrade ships and equipment, and
  follow the mystery of the Atlas across a shared science-fiction sandbox.
