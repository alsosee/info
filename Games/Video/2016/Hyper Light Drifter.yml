name: Hyper Light Drifter
description: >
  A 2D action role-playing game rendered in pixel art style, inspired by classic
  8-bit and 16-bit action-adventure games. Players control the Drifter, a warrior
  with access to forgotten technology who suffers from a mysterious illness, exploring
  a world of ancient ruins, roaming creatures, and remnants of a violent past. The
  game communicates its story entirely through visuals and atmosphere, with no spoken
  dialogue.
released: 2016-03-31
genres:
  - action role-playing
  - action-adventure
wikipedia: https://en.wikipedia.org/wiki/Hyper_Light_Drifter
metacritic: https://www.metacritic.com/game/hyper-light-drifter/
website: https://www.heartmachine.com/hyper-light-drifter
developers: Heart Machine
publishers: Heart Machine
designers: Alx Preston
composers:
  - Disasterpeace
  - Akash Thakkar
