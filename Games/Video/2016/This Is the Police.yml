name: This Is the Police
description: >
  A story-driven adventure and strategy management game where players guide
  Freeburg police chief Jack Boyd through his final 180 days on the force,
  balancing emergency response, investigations, city politics, corruption, and
  his goal of building a retirement fund.
released: 2016-08-02
genres:
  - adventure
  - strategy
  - simulation
