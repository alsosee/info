name: Darkest Dungeon
description: >
  A gothic roguelike role-playing game in which the player manages a roster of
  adventurers exploring the corrupted estate they have inherited. Expeditions
  mix side-scrolling dungeon traversal with turn-based combat, resource
  pressure, permanent loss, and a stress system that can break or harden heroes.
