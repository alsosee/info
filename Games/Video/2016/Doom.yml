name: Doom
description: >
  A first-person shooter reboot in which the Doom Slayer fights through a
  demon-overrun Union Aerospace Corporation facility on Mars and into Hell,
  emphasizing fast arena combat, aggressive movement, Glory Kills, and the
  SnapMap level editor.
