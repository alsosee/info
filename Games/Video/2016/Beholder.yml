name: Beholder
description: >
  A dystopian adventure and strategy simulation game in which players manage an
  apartment building while covertly surveilling tenants for a totalitarian state.
  The game centers on moral choices, tenant profiles, and branching consequences
  as the landlord decides whether to serve the regime or protect the people under
  his watch.
released: 2016-11-09
genres:
  - adventure
  - strategy
  - simulation
