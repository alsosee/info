name: Watch Dogs 2
website: https://www.ubisoft.com/en-us/game/watch-dogs/watch-dogs-2
description: >
  Set in a fictionalized version of the San Francisco Bay Area, the game follows Marcus Holloway, a hacker who works with the hacking group DedSec to take down the city's advanced surveillance system known as ctOS 2.0. As Marcus, players explore the open world on foot or by vehicle and use their hacking skills to manipulate city infrastructure and various devices.
