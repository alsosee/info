name: Mirror's Edge
description: >
  Set in a gleaming near-future city under authoritarian surveillance, Mirror's Edge follows Faith Connors, an underground parkour courier
  who transmits messages beyond the reach of the authorities. Players navigate Faith through rooftops and urban environments from a
  first-person perspective using fluid acrobatic movement.
released: 2008-11-11
genres:
  - action-adventure
  - platformer
wikipedia: https://en.wikipedia.org/wiki/Mirror's_Edge
metacritic: https://www.metacritic.com/game/mirrors-edge/
fandom: https://mirrorsedge.fandom.com/wiki/Mirror's_Edge
website: https://www.ea.com/games/mirrors-edge/mirrors-edge
developers: DICE
publishers: Electronic Arts
directors: Senta Jakobsen
designers: Thomas Andersson
writers: Rhianna Pratchett
composers: Solar Fields
characters:
