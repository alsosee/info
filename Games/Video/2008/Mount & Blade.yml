name: Mount & Blade
description: >
  Mount & Blade is a medieval action role-playing sandbox game set in the fictional
  land of Calradia. Players create an adventurer, fight on foot or horseback,
  recruit companions and soldiers, trade, serve lords, and pursue power among
  rival kingdoms.
