name: Braid
description: >
  Braid is a puzzle-platform game where players guide Tim through painterly
  worlds while manipulating time in different ways to solve environmental
  puzzles. Its mechanics reinterpret familiar platform-game ideas through
  rewinding, time immunity, spatially linked time, and other variations.
