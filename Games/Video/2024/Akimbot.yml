name: Akimbot
description: >
  Akimbot is a 3D action-adventure platformer about Exe, an outlaw robot, and
  Shipset, his reluctant sidekick, as they escape prison and cross a robot-only
  galaxy. The game mixes third-person shooting, platforming, spaceship
  sequences, and weapon upgrades in a colorful science-fiction setting.
