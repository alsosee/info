name: Berserk Boy
description: >
  Berserk Boy is a retro-styled 2D action platformer about Kei, a rookie hero
  transformed by mysterious Orb energy, as he fights Dr. Genos and his Dark
  Energy minions. The game emphasizes high-speed movement, combo-driven combat,
  elemental Berserk forms, hidden paths, and score-chasing stages inspired by
  classic action platformers.
