name: Dystopika
description: >
  Dystopika is a meditative cyberpunk city-building sandbox about sculpting
  futuristic skylines with buildings, billboards, holograms, lighting, weather,
  and photo-mode tools. It has no economy, objectives, wins, or losses, focusing
  instead on creative atmosphere and dark cozy city scenes.
