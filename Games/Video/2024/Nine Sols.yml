name: Nine Sols
description: >
  Nine Sols is a hand-drawn 2D action-platformer set in the taopunk world of New Kunlun, where Yi awakens and begins a quest against the nine Sols. Its combat emphasizes deflecting enemy attacks, building energy, and using Taoist talismans while exploring an interconnected Asian fantasy and cyberpunk-inspired realm.
