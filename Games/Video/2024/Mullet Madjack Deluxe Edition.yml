name: "Mullet Madjack: Deluxe Edition"
description: >
  A deluxe edition bundle for the retro anime first-person shooter Mullet
  Madjack, combining the base game with the original soundtrack and official
  artbook. The game sends Jack Banhammer through a dopamine-fueled cyberpunk
  tower, where kills and fast movement keep a ten-second life timer from
  running out.
