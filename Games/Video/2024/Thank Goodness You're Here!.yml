name: Thank Goodness You're Here!
description: >
  Thank Goodness You're Here! is a comedy adventure game set in the fictional
  Northern English town of Barnsworth, where a tiny traveling salesman explores
  the town and helps its residents with increasingly strange odd jobs. The game
  uses hand-drawn 2D animation, fully voiced dialogue, and a slap interaction as
  its main way to talk to characters, move objects, and trigger jokes.
