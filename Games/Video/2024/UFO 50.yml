name: UFO 50
description: >
  UFO 50 is a retro-styled collection of 50 complete single-player and local multiplayer games presented as the recovered catalog of the fictional 1980s studio UFO Soft. The anthology spans platformers, shoot 'em ups, puzzle games, roguelites, RPGs, strategy games, and other genres while using a shared 32-color 8-bit aesthetic.
