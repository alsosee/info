name: "Spec Ops: The Line"
description: >
  A third-person military shooter in which Captain Martin Walker leads a Delta
  Force team into a sandstorm-devastated Dubai to investigate the fate of the
  33rd Infantry Battalion. The game uses its cover-shooter structure to examine
  morality, trauma, and the violence of modern military shooters.
released: 2012-06-26
genres:
  - third-person shooter
