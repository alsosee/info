name: Fez
description: >
  A puzzle-platform game where the player-character Gomez receives a fez that reveals
  his two-dimensional world to be one of four sides of a three-dimensional world.
  The player rotates between these four 2D views to realign platforms and solve
  puzzles to collect cubes and restore order to the universe.
released: 2012-04-13
genres:
  - puzzle
  - platform
