name: Hotline Miami
description: >
  Hotline Miami is a top-down shooter set in an alternate 1989 Miami, where a
  masked protagonist follows cryptic answering-machine messages into violent
  attacks on the city's criminal underworld. Its one-hit combat, surreal
  narrative, neon pixel-art style, and electronic soundtrack helped define the
  tone of early-2010s indie action games.
released: 2012-10-23
genres:
  - top-down shooter
  - action
