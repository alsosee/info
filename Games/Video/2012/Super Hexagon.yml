name: Super Hexagon
description: >
  A minimal action game where the player controls a small triangle and must navigate
  through a series of collapsing hexagonal walls. The game features a high-energy
  chiptune soundtrack and increasing difficulty as the player survives longer,
  challenging their reflexes and rhythm.
