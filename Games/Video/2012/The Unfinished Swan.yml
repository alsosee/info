name: The Unfinished Swan
description: >
  A first-person adventure game about Monroe, a young orphan who follows a swan
  out of an unfinished painting and into a surreal storybook kingdom. Players
  reveal the all-white world by splattering paint, with each chapter introducing
  new ways to explore the kingdom.
released: 2012-10-23
genres:
  - adventure
  - puzzle
