name: "ESP Ra.De."
description: >
  Vertically scrolling bullet hell arcade game set in Tokyo in 2018.
  Players control one of three teenagers with extra-sensory perception (ESPers)
  who must fight against Lady Garra and her Yaksa syndicate.
  It is notable for featuring human characters flying on their own
  rather than piloting traditional vehicles.
released: 1998-04-22
genres:
  - scrolling shooter
  - bullet hell
