name: "Marvel vs. Capcom: Clash of Super Heroes"
description: >
  Marvel and Capcom heroes collide in a two-on-two arcade fighting game built
  around tag-team combat, special partner assists, and the screen-filling
  Variable Cross attack. The crossover broadens Capcom's Marvel fighting series
  beyond Street Fighter characters with fighters from Mega Man, Darkstalkers,
  Strider, and other Capcom franchises.
