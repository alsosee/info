name: Diablo
description: >
  Dark fantasy action role-playing game set beneath the town of Tristram,
  where players descend through procedurally generated dungeons to confront
  Diablo, the Lord of Terror. Its fast real-time combat, randomized loot, and
  Battle.net multiplayer helped define the action RPG format.
released: 1997-01-03
genres:
  - action role-playing
  - hack and slash
  - dark fantasy
