name: Quake II
description: >
  Quake II is a first-person shooter set during humankind's war against a rogue
  alien race known as the Strogg. The player takes the role of a space marine
  named Bitterman who must participate in a counter-offensive on the Strogg
  homeworld to end their plans to conquer Earth.
