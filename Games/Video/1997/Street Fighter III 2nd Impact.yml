name: "Street Fighter III: 2nd Impact"
description: >
  Capcom's arcade update to Street Fighter III expands the roster with Hugo,
  Urien, and Akuma while making Yang a distinct fighter from Yun. It refines the
  parry-driven fighting system with EX specials, personal actions, tech throws,
  bonus rounds, and new character-specific matchups on CP System III hardware.
