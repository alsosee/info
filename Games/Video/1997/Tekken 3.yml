name: Tekken 3
description: >
  Nineteen years after the second King of Iron Fist Tournament, Heihachi
  Mishima gathers fighters from around the world to lure out Ogre, the
  mysterious God of Fighting. Namco's arcade sequel brings the series to
  System 12 hardware, introduces Jin Kazama, Ling Xiaoyu, Hwoarang, Eddy
  Gordo, and other series mainstays, and expands the 3D fighting system with
  universal sidestepping.
