name: Tekken 2
description: >
  Kazuya Mishima rules the Mishima Zaibatsu after defeating his father, drawing
  fighters from around the world into the second King of Iron Fist Tournament.
  Namco's arcade sequel expands the 3D fighting system with new characters,
  back throws, chain throws, reversals, improved lighting, and home-console
  modes that became series staples.
