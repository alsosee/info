name: Devil May Cry
description: >
  Series of action-adventure hack and slash games created by Hideki Kamiya and
  developed by Capcom. The series centers on the demon hunter Dante and his
  efforts to thwart various demon invasions of Earth. It is known for its fast-paced,
  stylized combat and has become a staple of the "character action" subgenre.
genres:
  - action-adventure
  - hack and slash
released: 2001-08-23
wikipedia: https://en.wikipedia.org/wiki/Devil_May_Cry
fandom: https://devilmaycry.fandom.com/wiki/Devil_May_Cry
developers: Capcom
publishers: Capcom
