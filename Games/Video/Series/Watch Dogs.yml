name: Watch Dogs
description: >
  Action-adventure video game series published by Ubisoft, centered on hacker
  protagonists who exploit city-wide operating systems called ctOS to complete
  missions in open-world environments. The series features stealth, hacking, and
  driving mechanics set in fictionalized versions of real cities including Chicago,
  San Francisco, and London.
genres:
  - action-adventure
  - open world
  - stealth
released: 2014-05-27
wikipedia: https://en.wikipedia.org/wiki/Watch_Dogs
developers:
  - Ubisoft Montreal
  - Ubisoft Toronto
publishers: Ubisoft
