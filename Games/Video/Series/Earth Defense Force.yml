name: Earth Defense Force
description: >
  A science fiction third-person shooter series in which EDF soldiers defend
  Earth from waves of giant creatures, aliens, robots, and kaiju. Developed
  primarily by Sandlot and published by D3 Publisher, the series began in 2003
  with Simple 2000 Series Vol. 31: The Earth Defense Force.
genres:
  - third-person shooter
  - action
  - science fiction
released: 2003-06-26
