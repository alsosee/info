name: The Settlers
description: >
  City-building and real-time strategy video game series created by Volker
  Wertich and introduced by Blue Byte in 1993. The games center on building
  settlements, managing production chains, expanding territory, and supporting
  military forces through an economy of settlers and resources.
genres:
  - city-building
  - real-time strategy
released: 1993-06-30
