name: Streets of Rage
description: >
  A series of side-scrolling beat 'em up video games, primarily developed and
  published by Sega. The series follows the efforts of several ex-police officers
  trying to rid a fictional city from a crime syndicate that has corrupted its
  government. The original trilogy was released for the Sega Genesis/Mega Drive.
genres:
  - beat 'em up
released: 1991-08-02
