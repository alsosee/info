name: "Broken Sword: The Shadow of the Templars"
description: >
  American tourist George Stobbart witnesses a bombing in Paris and teams up
  with photojournalist Nicole Collard to investigate a conspiracy linked to the
  Knights Templar. The point-and-click adventure follows their trail across
  Europe and the Middle East through dialogue, clue-gathering, and environmental
  puzzles.
