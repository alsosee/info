name: Tomb Raider
series: Tomb Raider
description: >
  Archaeologist-adventurer Lara Croft is hired by Jacqueline Natla to recover
  the Scion of Atlantis, sending her through ancient ruins in Peru, Greece,
  Egypt, and Atlantis. The game helped define third-person 3D action-adventure
  design with exploration, platforming, combat, and environmental puzzles.
