name: "The Elder Scrolls II: Daggerfall"
description: >
  An open-world action role-playing game set around the Iliac Bay in High Rock
  and Hammerfell. The player is sent by Emperor Uriel Septim VII to put King
  Lysandus' ghost to rest and recover a missing imperial letter tied to the
  ancient Numidium.
