name: Quake
description: >
  Quake is a first-person shooter that follows a soldier, later known as Ranger,
  who travels through teleportation "slipgates" to stop an invasion of Earth
  by a hostile force codenamed "Quake." Notable for its dark fantasy atmosphere
  inspired by H. P. Lovecraft, the game was a technological breakthrough as one
  of the first to feature a fully real-time 3D rendering engine.
released: 1996-07-22
