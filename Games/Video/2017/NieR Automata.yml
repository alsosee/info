name: "NieR: Automata"
description: >
  A 2017 action role-playing game set in a post-apocalyptic world during a proxy war between human-crafted androids and alien-created machines. The story follows combat android 2B, scanner android 9S, and rogue prototype A2 as they fight to reclaim Earth for humanity, requiring multiple playthroughs to reveal the full narrative and philosophical depths of the story.
released: 2017-02-23
genres:
  - action role-playing
  - hack and slash
