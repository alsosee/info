name: Nex Machina
description: >
  A 2017 twin-stick shoot 'em up video game played from a top-down perspective. Set in a "cablepunk" future where humans have become addicted to technology and machines have gained consciousness, players must fight back against a robotic uprising in intense, fast-paced arcade action.
