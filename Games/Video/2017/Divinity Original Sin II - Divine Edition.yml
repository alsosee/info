name: "Divinity: Original Sin II - Divine Edition"
description: >
  A Divine Edition package of Larian Studios' 2017 isometric role-playing game,
  bundling Divinity: Original Sin II with digital extras including art books, a
  map, soundtrack, and art pack. Set in the fantasy world of Rivellon, the game
  follows a party of Sourcerers drawn into a struggle over Source, the
  Voidwoken, and the chance for one character to ascend to divinity.
