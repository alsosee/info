name: Space Pirate Trainer
description: >
  A room-scale VR arcade shooter where players fight waves of attacking droids
  with blasters, shields, and other gadgets. First launched in early access for
  HTC Vive in 2016, it became one of modern VR's seminal wave-based shooters
  before its full Steam release.
