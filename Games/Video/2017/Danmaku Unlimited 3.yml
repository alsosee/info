name: "Danmaku Unlimited 3"
description: >
  Take to the skies once again as the last defender of humanity against overwhelming odds!
  Hand-crafted to be enjoyable for newcomers and veterans alike, Danmaku Unlimited 3 is a perfect medley of the best aspects of classic Japanese bullet-hell shooters wrapped up in a modern and approachable package.
  Featuring a "Trance" system that rewards aggressive play and a high-energy soundtrack by BLANKFIELD.
