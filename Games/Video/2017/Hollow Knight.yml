name: Hollow Knight
description: >
  A 2017 Metroidvania game set in Hallownest, a ruined subterranean kingdom
  inhabited by insectoid characters. The player controls the Knight while
  exploring interconnected areas, fighting bosses, gaining traversal abilities,
  and uncovering the kingdom's history through environmental storytelling.
