name: Undercover Cops
description: >
  Three city sweepers fight through a crime-controlled New York City in 2043 to
  defeat Dr. Crayborn and restore order. Irem's arcade beat 'em up combines
  cooperative side-scrolling combat with a grimy futuristic setting and detailed
  character animation.
