name: Sonic the Hedgehog 2
description: >
  A 1992 sequel that introduces Sonic's sidekick Miles "Tails" Prower and the
  iconic "spin dash" move. Players traverse larger, more varied levels to stop
  Doctor Robotnik from powering his space station, the Death Egg, with the
  Chaos Emeralds.
