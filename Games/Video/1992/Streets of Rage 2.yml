name: "Streets of Rage 2"
description: >
  Widely considered the pinnacle of the series and the genre, this sequel
  introduces Max Thunder and Eddie "Skate" Hunter to the roster as they join
  Axel and Blaze to rescue Adam Hunter from Mr. X. The game features improved
  graphics, larger character sprites, and a legendary electronic soundtrack by
  Yuzo Koshiro and Motohiro Kawashima.
