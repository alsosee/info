name: Street Fighter
description: >
  Ryu enters a worldwide martial arts tournament, battling opponents across
  multiple countries before facing the Muay Thai champion Sagat. Capcom's
  arcade fighting game introduced command-based special moves, a challenger
  system, and the six-button attack layout later refined by its sequels.
