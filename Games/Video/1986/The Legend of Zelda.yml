name: The Legend of Zelda
description: >
  Action-adventure game set in the kingdom of Hyrule, where Link explores an
  open overworld and maze-like dungeons to recover the Triforce of Wisdom and
  rescue Princess Zelda from Ganon. The game introduced the long-running Zelda
  series and became a landmark for nonlinear console adventure games.
