name: "The Bookwalker: Thief of Tales"
description: >
  The Bookwalker: Thief of Tales is a narrative adventure game about Etienne Quist, a writer-turned-thief who can dive into books. Players move between Quist's apartment and surreal book worlds, solving puzzles, reshaping stories with magical ink, and stealing legendary artifacts to restore his ability to write.
