name: Darkest Dungeon II
description: >
  Darkest Dungeon II is a roguelike role-playing game in which a party of
  heroes travels by stagecoach through a ruined world on a last attempt to
  avert the apocalypse. It shifts the original game's dungeon-delving structure
  into expedition-based runs built around turn-based combat, stress, hero
  relationships, and attrition.
