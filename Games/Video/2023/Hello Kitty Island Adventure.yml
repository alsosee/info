name: Hello Kitty Island Adventure
description: >
  A cozy life simulation adventure game where players restore an abandoned island theme park with Hello Kitty and other Sanrio characters.
  The game mixes friendship quests, crafting, decorating, puzzle solving, and light 3D platforming across a growing island setting.
