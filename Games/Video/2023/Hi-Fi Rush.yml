name: Hi-Fi Rush
description: >
  Hi-Fi Rush is a rhythm-based action game where wannabe rock star Chai becomes labeled a corporate defect after a music player is accidentally embedded in his chest. With the world, enemies, and combat moving to the beat, Chai teams up with allies to fight the executives of Vandelay Technologies.
