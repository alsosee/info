name: Turbo Overkill
description: >
  An over-the-top, ultra-fast cyberpunk first-person shooter where you play as Johnny Turbo, a half-metal, half-human street cleaner with a chainsaw for a leg. Returning to your hometown of Paradise, you find its population possessed by Syn, a rogue AI, and must use an arsenal of high-powered weaponry and fluid movement to clean up the city.
