name: Viewfinder
description: >
  Viewfinder is a first-person puzzle game about reshaping a simulated world by placing photographs, paintings, sketches, and other images into the environment as three-dimensional spaces. Players use perspective, an instant camera, and found images to create paths, duplicate objects, and solve spatial puzzles while uncovering the history of the world and its researchers.
released: 2023-07-18
genres:
  - puzzle
  - first-person adventure
  - photography
