name: Dredge
description: >
  Dredge is a fishing adventure and survival horror game in which a fisherman
  explores a remote archipelago, sells catches, upgrades his boat, and dredges
  for materials and relics. Its calm daytime exploration gives way to
  Lovecraftian threats after dark, as the player uncovers the islands' buried
  secrets.
